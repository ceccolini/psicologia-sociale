<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>PsicoSociale</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PsicoSociale">
<meta name="theme-color" content="#0d1117">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{background:#0d1117;color:#e6edf3;font-family:-apple-system,'SF Pro Text',system-ui,sans-serif;height:100%;height:100dvh;overflow:hidden}
body{display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#161b22;border-bottom:1px solid #21262d;flex-shrink:0}
#cap-num-badge{background:#1f6feb33;border:1px solid #58a6ff;border-radius:7px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:#58a6ff;font-weight:700;font-size:13px;flex-shrink:0}
#cap-title-wrap{flex:1;min-width:0}
#cap-title{font-size:13.5px;font-weight:700;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#cap-sub{font-size:10px;color:#8b949e;margin-top:1px}
#btn-list{background:transparent;border:none;color:#8b949e;font-size:20px;padding:4px 6px;flex-shrink:0}

/* ── PROGRESS DOTS ── */
#progress-wrap{display:flex;gap:3px;padding:8px 14px 4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
#progress-wrap::-webkit-scrollbar{display:none}
.pdot{width:6px;height:6px;border-radius:50%;background:#21262d;flex-shrink:0;transition:all .2s}
.pdot.active{background:#58a6ff;width:18px;border-radius:3px}
.pdot.done{background:#3fb95066}

/* ── MAIN SWIPE AREA ── */
#main{flex:1;min-height:0;position:relative;overflow:hidden;touch-action:pan-y}
#track{display:flex;height:100%;transition:transform .28s cubic-bezier(.22,.61,.36,1)}
.page{width:100vw;height:100%;flex-shrink:0;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}
.page::-webkit-scrollbar{display:none}

/* ── CHAPTER HERO ── */
.chap-hero{text-align:center;padding:6px 0 16px}
.chap-hero .n{font-size:11px;color:#58a6ff;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.chap-hero .t{font-size:17px;font-weight:700;margin-top:4px;line-height:1.3}
.chap-hero .more{font-size:10.5px;color:#484f58;margin-top:6px}

/* ── AUTHOR CARDS ── */
.author-card{background:#161b22;border-radius:14px;border:1px solid #21262d;padding:0;margin-bottom:12px;overflow:hidden;transition:border-color .15s}
.author-head{display:flex;align-items:center;gap:12px;padding:14px 15px;cursor:pointer}
.author-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.author-info{flex:1;min-width:0}
.author-name{font-size:15px;font-weight:700;line-height:1.2}
.author-phrase{font-size:12px;color:#8b949e;line-height:1.4;margin-top:3px}
.author-chevron{color:#484f58;font-size:13px;transition:transform .2s;flex-shrink:0}
.author-card.open .author-chevron{transform:rotate(90deg)}
.author-body{display:none;padding:0 15px 14px}
.author-card.open .author-body{display:block}
.concept-chip{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border-radius:9px;background:#0d1117;margin-bottom:7px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.concept-chip:active{transform:scale(.98)}
.concept-chip .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.concept-chip .txt{font-size:12.5px;line-height:1.45;color:#c9d1d9}
.concept-chip .arr{font-size:11px;color:#484f58;flex-shrink:0;margin-left:auto;padding-top:1px}

/* ── BOTTOM NAV HINT ── */
#swipe-hint{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 10px);left:0;right:0;display:flex;justify-content:center;gap:14px;pointer-events:none;z-index:5}

/* ── FRECCE NAVIGAZIONE (desktop, nella topbar) ── */
.nav-arrow{position:relative;width:30px;height:30px;border-radius:9px;background:transparent;border:1px solid #21262d;color:#8b949e;font-size:16px;display:none;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.nav-arrow:hover{background:#1f6feb22;border-color:#58a6ff;color:#58a6ff}
.nav-arrow:active{transform:scale(.92)}
.nav-arrow.disabled{opacity:.25;pointer-events:none}
@media (hover:hover) and (pointer:fine){
  .nav-arrow{display:flex}
}

/* ── HOVER STATES (mouse desktop) ── */
@media (hover:hover) and (pointer:fine){
  .author-card{transition:border-color .15s, transform .15s, box-shadow .15s}
  .author-head{cursor:pointer}
  .author-card:hover{border-color:var(--hover-color, #58a6ff);box-shadow:0 0 0 1px var(--hover-color, #58a6ff)33, 0 6px 18px #00000040;transform:translateY(-1px)}
  .author-card:hover .author-avatar{box-shadow:0 0 14px var(--hover-color, #58a6ff)66}
  .author-card:hover .author-chevron{color:var(--hover-color, #58a6ff)}
  .concept-chip:hover{border-color:#58a6ff66;background:#0d1117}
  .concept-chip:hover .arr{color:#58a6ff}
  .pdot:hover{background:#58a6ff99;cursor:pointer}
  .list-item:hover{background:#161b22;cursor:pointer}
  #btn-lezioni:hover{border-color:#58a6ff;color:#58a6ff;background:#1f6feb0d}
  #heart-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px #00000066}
  #btn-list:hover{color:#58a6ff}
  #credits-close:hover{background:#f8514933;color:#f85149}
  #list-close:hover{background:#21262d;color:#e6edf3}
}
.swipe-arrow{background:#161b22cc;border:1px solid #21262d;border-radius:20px;padding:6px 14px;font-size:11px;color:#8b949e;backdrop-filter:blur(8px)}

/* ── CHAPTER LIST OVERLAY ── */
#list-overlay{position:fixed;inset:0;background:#0d1117;z-index:200;display:none;flex-direction:column}
#list-overlay.show{display:flex}
#list-header{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid #21262d;flex-shrink:0;padding-top:calc(env(safe-area-inset-top) + 14px)}
#list-header input{flex:1;background:#161b22;border:1px solid #21262d;border-radius:10px;padding:10px 12px;color:#e6edf3;font-size:14px;outline:none}
#list-close{background:transparent;border:none;color:#8b949e;font-size:22px;padding:2px 6px}
#list-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 0 30px}
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #161b22}
.list-item:active{background:#161b22}
.list-num{width:30px;height:30px;border-radius:8px;background:#161b22;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#58a6ff;flex-shrink:0}
.list-info{flex:1;min-width:0}
.list-title{font-size:13.5px;font-weight:600;line-height:1.3}
.list-authors{font-size:10.5px;color:#8b949e;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── CONCEPT DETAIL SHEET ── */
#detail-sheet{position:fixed;left:0;right:0;bottom:0;background:#161b22;border-radius:20px 20px 0 0;z-index:300;max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.22,.61,.36,1);box-shadow:0 -8px 40px #00000066}
#detail-sheet.show{transform:translateY(0)}
#detail-backdrop{position:fixed;inset:0;background:#000000aa;z-index:299;opacity:0;pointer-events:none;transition:opacity .25s}
#detail-backdrop.show{opacity:1;pointer-events:auto}
#sheet-handle{width:36px;height:4px;background:#30363d;border-radius:2px;margin:10px auto 4px}
#sheet-header{padding:6px 18px 12px;border-bottom:1px solid #21262d;flex-shrink:0}
#sheet-author{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
#sheet-question{font-size:15px;font-weight:700;line-height:1.4}
#sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px calc(env(safe-area-inset-bottom) + 24px)}
.sheet-opt{display:flex;gap:10px;padding:11px 13px;border-radius:10px;background:#0d1117;margin-bottom:7px;border:1px solid #21262d}
.sheet-opt.correct{border-color:#3fb950;background:#3fb95015}
.sheet-opt .letter{font-weight:700;font-size:12px;color:#484f58;flex-shrink:0}
.sheet-opt.correct .letter{color:#3fb950}
.sheet-opt .txt{font-size:13px;line-height:1.4;color:#c9d1d9}
.sheet-opt.correct .txt{color:#e6edf3;font-weight:600}
#sheet-explain-label{font-size:10.5px;color:#e3b341;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;font-weight:700}
#sheet-explain-text{font-size:13.5px;line-height:1.7;color:#c9d1d9;white-space:pre-wrap}

/* ── more authors note ── */
.more-note{text-align:center;font-size:11px;color:#484f58;padding:8px 0 4px}

/* ── LEZIONI LINK (topbar) ── */
#btn-lezioni{background:transparent;border:1px solid #21262d;border-radius:8px;color:#8b949e;font-size:11px;font-weight:600;padding:6px 9px;display:flex;align-items:center;gap:5px;flex-shrink:0;white-space:nowrap;text-decoration:none}
#btn-lezioni:active{background:#21262d}

/* ── CUORICINO ── */
#heart-btn{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 14px);right:14px;width:46px;height:46px;border-radius:50%;background:#f85149;border:none;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px #00000055;z-index:50;transition:transform .15s}
#heart-btn:active{transform:scale(.9)}

/* ── CREDITS MODAL ── */
#credits-backdrop{position:fixed;inset:0;background:#000000aa;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom)}
#credits-backdrop.show{opacity:1;pointer-events:auto}
#credits-modal{position:relative;width:100%;max-width:560px;height:84vh;max-height:760px;background:#161b22;border-radius:18px;z-index:401;display:flex;flex-direction:column;overflow:hidden;transform:scale(.92) translateY(10px);opacity:0;transition:all .25s cubic-bezier(.22,.61,.36,1);box-shadow:0 20px 60px #000000aa;pointer-events:none}
#credits-modal.show{transform:scale(1) translateY(0);opacity:1;pointer-events:auto}
@media (min-width:760px){
  #credits-modal{height:78vh}
}
#credits-modal-header{display:flex;justify-content:flex-end;padding:8px 8px 0;flex-shrink:0}
#credits-close{background:#21262d;border:none;color:#8b949e;width:30px;height:30px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center}
#credits-iframe{flex:1;border:none;width:100%;background:#fff}
</style>
</head>
<body>

<div id="topbar">

  <div id="cap-title-wrap">
    <div id="cap-title">—</div>
    <div id="cap-sub"></div>
  </div>
  <button class="nav-arrow" id="nav-next" onclick="goTo(currentIdx+1)" title="Capitolo successivo">›</button>

  <button id="btn-list" onclick="openList()">☰</button>

<div id="progress-wrap"></div>

<div id="main">
  <div id="track"></div>
</div>

<div id="swipe-hint">

</div>

<!-- LISTA CAPITOLI -->
<div id="list-overlay">
  <div id="list-header">
    <input id="list-search" placeholder="Cerca capitolo o autore…" oninput="renderList(this.value)">

  <div id="list-body"></div>
</div>

<!-- DETTAGLIO CONCETTO -->
<div id="detail-backdrop" onclick="closeSheet()"></div>
<div id="detail-sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-header">
    <div id="sheet-author"></div>
    <div id="sheet-question"></div>
  </div>
  <div id="sheet-body">
    <div id="sheet-options"></div>
    <div id="sheet-explain-label">Spiegazione</div>
    <div id="sheet-explain-text"></div>
  </div>
</div>

<!-- CUORICINO + MODALE CREDITS -->
<button id="heart-btn" onclick="openCredits()" title="Credits">♥</button>
<div id="credits-backdrop" onclick="closeCredits()"></div>
<div id="credits-modal">
  <div id="credits-modal-header">
    <button id="credits-close" onclick="closeCredits()">✕</button>
  </div>
  <iframe id="credits-iframe" src="" title="Credits"></iframe>
</div>

const QUESTIONS = {"02.01": {"q": "L'interazionismo simbolico è una prospettiva:", "options": {"A": "interna alla sociologia statunitense", "B": "esterna alla sociologia statunitense", "C": "interna alla sociologia europea", "D": "esterna alla sociologia europea"}, "correct": "A", "a": "interna alla sociologia statunitense", "expl": "interna alla sociologia statunitense:\naffonda le sue radici nel pragmatismo filosofico di autori come Peirce, James, Dewey e Mead."}, "02.02": {"q": "Secondo l'interazionismo simbolico, la società e la cultura:", "options": {"A": "modellano e vicnolano il comportamento", "B": "sono il prodotto del comportamento", "C": "modellano e vincolano il comportamento, ma sono anche prodotti da esso", "D": "sono preesistenti all'individuo ma hanno su di esso un trascurabile"}, "correct": "C", "a": "modellano e vincolano il comportamento, ma sono anche prodotti da esso", "expl": "modellano e vincolano il comportamento, ma sono anche prodotti da esso:\nSecondo questo approccio, esiste un rapporto di reciprocità: società e cultura modellano il comportamento e sono preesistenti all'individuo (con un impatto non trascurabile), ma allo stesso tempo sono \"prodotti\" dal comportamento stesso e dalle interazioni tra le persone."}, "02.03": {"q": "Gli assunti di base dell'interazionismo simbolico affermano che:", "options": {"A": "il comportamento umano non si forma nell'interazione", "B": "il comportamento umano è autorefernziale", "C": "il comportamento umano non si ripete in maniera regolare", "D": "il comportamento umano non è modellato e vincolato alla società e alla cultura"}, "correct": "B", "a": "il comportamento umano è autorefernziale", "expl": "il comportamento umano è autoreferenziale:\nTra gli assunti di base viene specificato che il comportamento umano è autoreferenziale, poiché l'essere umano è contemporaneamente il soggetto che agisce e l'oggetto della propria esperienza."}, "02.04": {"q": "I segni si definiscono naturali quando:", "options": {"A": "non si verificano spontaneamente in natura", "B": "rappresentano ciò che un interazionista simbolico intende quando si riferisce ad un simbolo", "C": "la relazione che intrattengono con ciò che significano non è data effettivamente in natura", "D": "la relazione che intrattengono con ciò che significano è data effettivamente in natura"}, "correct": "D", "a": "la relazione che intrattengono con ciò che significano è data effettivamente in natura", "expl": "la relazione che intrattengono con ciò che significano è data effettivamente in natura:\nUn segno è naturale quando il legame con ciò che significa esiste già in natura, come ad esempio il fumo che indica la presenza di un fuoco"}, "02.05": {"q": "Tra le caratteristiche aggiuntive che possiedono i simboli troviamo che:", "options": {"A": "non possono essere impiegati anche in assenza delle cose che significano", "B": "hanno un significato pubblico", "C": "non hanno un significato pubblico", "D": "possono essere impiegati solo in presenza delle cose che significano"}, "correct": "B", "a": "hanno un significato pubblico", "expl": "hanno un significato pubblico:\nI simboli possiedono un \"significato pubblico\", il che significa che il suono di una parola (simbolo) viene udito e compreso sia da chi lo usa sia da chi ascolta. Inoltre, a differenza dei segni naturali, possono essere usati anche in assenza dell'oggetto che significano"}, "02.06": {"q": "Secondo Mead l'impulso procede attraverso:", "options": {"A": "tre stadi (percezione, manipolazione e consumazione)", "B": "due stadi (manipolazione e consumazione)", "C": "quattro stadi (percezione, elaborazione, manipolazione e consumazione)", "D": "due stadi (percezione e consumazione)"}, "correct": "A", "a": "tre stadi (percezione, manipolazione e consumazione)", "expl": "tre stadi: percezione, manipolazione e consumazione\nMead analizza l'atto sociale a partire dall'impulso, il quale si sviluppa attraverso tre fasi precise: la percezione, la manipolazione e, infine, la consumazione"}, "02.07": {"q": "L'ottica interazionista è stata definita specificamente:", "options": {"A": "interazionista", "B": "sociale", "C": "sociocostruzionista", "D": "costruzionista"}, "correct": "C", "a": "sociocostruzionista", "expl": "sociocostruzionista\nL'approccio interazionista viene definito \"sociocostruzionista\" perché sostiene che la mente e il Sé siano costruiti attraverso l'interazione sociale."}, "02.08": {"q": "Il filosofo George H. Mead (1934) viene considerato il padre della teoria:", "options": {"A": "comportamentista", "B": "dell'apprendimento sociale", "C": "strutturalista", "D": "dell'interazionismo simbolico"}, "correct": "D", "a": "dell'interazionismo simbolico", "expl": "dell'interazionismo simbolico\nGeorge H. Mead è esplicitamente indicato come il \"padre della teoria dell’interazionismo simbolico\""}, "02.09": {"q": "Secondo la teoria dell'interazionismo simbolico di Mead, il concetto del Sé viene a costruirsi attraverso l'interazione tra:", "options": {"A": "l'Io e il Super-Io", "B": "l'Io e il Me", "C": "l'Io e l'Es", "D": "il Me e l'Es"}, "correct": "B", "a": "l'Io e il Me", "expl": "l'Io e il Me:\nIl Sé si struttura grazie allo scambio dialettico tra l'Io (l'attore spontaneo) e il Me (la conoscenza autoriflessiva e interiorizzata degli atteggiamenti degli altri)"}, "02.10": {"q": "Per Mead il comportamento umano si fonda:", "options": {"A": "sul significato che non è variabile e non emerge dagli scambi sociali", "B": "sul significato dettato dalla società", "C": "sul significato che però non è dettato dalla società, ma è variabile ed emerge dagli scambi sociali", "D": "sul significato che altri danno alla realtà"}, "correct": "C", "a": "sul significato che però non è dettato dalla società, ma è variabile ed emerge dagli scambi sociali", "expl": "sul significato che però non è dettato dalla società, ma è variabile ed emerge dagli scambi sociali\nPer Mead il comportamento si basa sul significato, ma quest'ultimo non è un dato fisso o imposto dalla società; è invece variabile e nasce continuamente durante gli scambi e le interazioni sociali"}, "01.01": {"q": "La psicologia sociale ha per oggetto lo studio:", "options": {"A": "dei processi di socializzazione e di interazione sociale", "B": "dei processi di socializzazione", "C": "delle interazioni sociali", "D": "solo dei processi di socializzazione ma non di interazione sociale"}, "correct": "A", "a": "dei processi di socializzazione e di interazione sociale", "expl": "dei processi di socializzazione e di interazione sociale:\n\"la psicologia sociale ha per oggetto lo studio dei processi di socializzazione e di interazione sociale\""}, "01.02": {"q": "La psicologia sociale ha come suo focus di interesse:", "options": {"A": "la persona umana con le sue cognizioni ed emozioni", "B": "la persona umana inserita all'interno delle sue relazioni significative", "C": "la persona umana, con le sue cognizioni ed emozioni, inserita all'interno delle sue relazioni significative, nonché dei suoi gruppi di riferimento", "D": "le relazioni umane intragruppo ed intergruppo"}, "correct": "C", "a": "la persona umana, con le sue cognizioni ed emozioni, inserita all'interno delle sue relazioni significative, nonché dei suoi gruppi di riferimento", "expl": "la persona umana, con le sue cognizioni ed emozioni, inserita all'interno delle sue relazioni significative, nonché dei suoi gruppi di riferimento:\nViene specificato che, come branca della psicologia, il suo focus è la persona con le sue componenti cognitive ed emotive nel contesto delle sue relazioni e gruppi di riferimento"}, "01.03": {"q": "Gordon Allport (1985) ha definito la psicologia sociale come:", "options": {"A": "il tentativo di comprendere e spiegare come i pensieri degli individui, i sentimenti e i comportamenti, non sono influenzati dall'attualità, l'immaginazione, o la presenza implicita di altre persone", "B": "il tentativo di comprendere e spiegare come i pensieri degli individui, i sentimenti e i comportamenti, sono influenzati dall'attualità, l'immaginazione, o la presenza implicita di altre persone", "C": "il tentativo di comprendere e spiegare come i sentimenti e i comportamenti degli individui, sono influenzati dall'attualità, l'immaginazione, o la presenza implicita di altre persone", "D": "il tentativo di comprendere e spiegare come i pensieri degli individui, ma non i sentimenti e i comportamenti, sono influenzati dall'attualità, l'immaginazione, o la presenza implicita di altre persone"}, "correct": "B", "a": "il tentativo di comprendere e spiegare come i pensieri degli individui, i sentimenti e i comportamenti, sono influenzati dall'attualità, l'immaginazione, o la presenza implicita di altre persone", "expl": "il tentativo di comprendere e spiegare come i pensieri degli individui, i sentimenti e i comportamenti, sono influenzati dall'attualità, l'immaginazione, o la presenza implicita di altre persone:\nDefinizione letterale per descrivere il contributo di Gordon Allport alla disciplina"}, "01.04": {"q": "L'approccio centrato sulla persona viene elaborato da:", "options": {"A": "Le Bon", "B": "Hegel", "C": "Bentham", "D": "Comte"}, "correct": "C", "a": "Bentham", "expl": "Bentham:\nL'approccio centrato sulla persona si basa sul principio di edonismo/utilità rielaborato da Jeremy Bentham"}, "01.05": {"q": "L'approccio centrato sul sociale viene elaborato da:", "options": {"A": "Hegel", "B": "Le Bon", "C": "Bentham", "D": "Comte"}, "correct": "A", "a": "Hegel", "expl": "Hegel\nL'approccio centrato sul sociale viene ricondotto al filosofo Georg Wilhelm Friedrich Hegel, che considerava lo stato come incarnazione della \"mente sociale\""}, "01.06": {"q": "Lo scrittore francese Gustave Le Bon pubblica il volume:", "options": {"A": "Psicologia delle masse e analisi dell'Io", "B": "La psicologia sociale delle folle", "C": "Psicolgia delle masse", "D": "La psicologia delle folle"}, "correct": "D", "a": "La psicologia delle folle", "expl": "La psicologia delle folle:\nNel 1895, Gustave Le Bon pubblicò il volume intitolato specificamente \"La psicologia delle folle\""}, "01.07": {"q": "Dalla storia della psicologia sociale possiamo dedurre e concludere che comunque emergono due assiomi fondamentali della disciplina:", "options": {"A": "il fatto che le persone non si costruiscono la propria realtà e il fatto che l'influenza sociale è pervasiva", "B": "il fatto che le persone si costruiscono la propria realtà e il fatto che l'influenza sociale è pervasiva", "C": "il fatto che le persone si costruiscono la propria realtà e il fatto che l'influenza sociale non è pervasiva", "D": "il fatto che le persone costruiscono la propria realtà attraverso l'interazione con gli altri e il fatto che l'influenza sociale è pervasiva"}, "correct": "B", "a": "il fatto che le persone si costruiscono la propria realtà e il fatto che l'influenza sociale è pervasiva", "expl": "il fatto che le persone si costruiscono la propria realtà e il fatto che l'influenza sociale è pervasiva:\nLe fonti elencano esattamente questi due punti come gli \"assiomi fondamentali della disciplina\""}, "01.08": {"q": "Il primo esperimento di psicologia sociale viene considerato quello di:", "options": {"A": "Auguste Comte", "B": "William McDougall", "C": "Norman Triplett", "D": "Friedrik Hegel"}, "correct": "C", "a": "Norman Triplett", "expl": "Norman Triplett:\nLe fonti riportano che l'osservazione di Norman Triplett del 1897 sulla prestazione dei ciclisti \"viene considerato il primo esperimento di psicologia sociale\""}, "01.09": {"q": "Max Ringelmann parla di:", "options": {"A": "pigrizia mentale", "B": "collaborazione sociale", "C": "deindividuazione sociale", "D": "pigrizia sociale"}, "correct": "D", "a": "pigrizia sociale", "expl": "pigrizia sociale:\nNegli studi di Ringelmann sulla forza esercitata dai gruppi, si parla di social loafing o \"pigrizia sociale\" es. Tiratori di corda."}, "01.10": {"q": "Il testo \"Social Psychology\" di Edward Alsworth Ross ha per oggetto:", "options": {"A": "l'influenza del sociale sul comportamento delle persone", "B": "la persona in relazione con i gruppi sociali", "C": "l'influenza della persona sul comportamento dei gruppi", "D": "l'individuo e come questi si pone con il mondo esterno"}, "correct": "A", "a": "l'influenza del sociale sul comportamento delle persone", "expl": "l'influenza del sociale sul comportamento delle persone:\nIl manuale del sociologo Ross del 1908 ha come oggetto specifico \"l’influenza del sociale sul comportamento delle persone\""}, "03.01": {"q": "La teoria dell'apprendimento sociale è basata su un modello causale di lettura dell'azione secondo un'ottica denominata:", "options": {"A": "determinismo triadico reciproco", "B": "determinismo triadico", "C": "determinismo reciproco", "D": "apprendimento triadico"}, "correct": "A", "a": "determinismo triadico reciproco", "expl": "determinismo triadico reciproco:\nQuesta ottica vede l'azione come il risultato dell'interazione tra ambiente, persona (elementi cognitivi, fisici, affettivi) e comportamento"}, "03.02": {"q": "Secondo Bandura i bambini/e apprendono allo scopo di ottenere un rinforzo sociale e l'apprendimento si sviluppa attraverso:", "options": {"A": "l'osservazione e l'insegnamento", "B": "l'osservazione e l'imitazione del comportamento del modello", "C": "l'osservazione, l'insegnamento, l'imitazione del comportamento del modello", "D": "l'insegnamento e l'imitazione del comportamento del modello"}, "correct": "C", "a": "l'osservazione, l'insegnamento, l'imitazione del comportamento del modello", "expl": "l'osservazione, l'insegnamento, l'imitazione del comportamento del modello:\nBandura identifica questi tre canali come i percorsi principali attraverso cui si sviluppa l'apprendimento sociale"}, "03.03": {"q": "Il maggior esponente della teoria dell'apprendimento sociale è:", "options": {"A": "Freud", "B": "Conrad", "C": "Watson", "D": "Bandura"}, "correct": "D", "a": "Bandura", "expl": "Bandura:\nAlbert Bandura è lo studioso che ha definito e approfondito la cornice teorica dell'apprendimento sociale"}, "03.04": {"q": "Bandura, nel suo famoso esperimento, poté verificare che i bambini/e che avevano osservato l'adulto picchiare Bobo manifestavano:", "options": {"A": "manifestavano un'incidenza minore di comportamenti aggressivi", "B": "manifestavano un'incidenza maggiore di comportamenti aggressivi", "C": "non manifestavano un'incidenza maggiore di comportamenti aggressivi", "D": "manifestavano comportamenti pacifici"}, "correct": "B", "a": "manifestavano un'incidenza maggiore di comportamenti aggressivi", "expl": "manifestavano un'incidenza maggiore di comportamenti aggressivi:\nL'esperimento della Bobo Doll ha dimostrato che l'osservazione di un modello violento aumenta la probabilità che il bambino replichi tale violenza"}, "03.05": {"q": "Secondo la teoria del determinismo triadico reciproco di Bandura, l'azione compiuta è il risultato di un'interazione reciproca tra fattori:", "options": {"A": "cognitivi, affettivi e fattori ambientali e condotta", "B": "cognitivi, biologici e fattori ambientali e condotta", "C": "cognitivi e fattori ambientali e condotta", "D": "cognitivi, affettivi e biologici, fattori ambientali e condotta"}, "correct": "D", "a": "cognitivi, affettivi e biologici, fattori ambientali e condotta", "expl": "cognitivi, affettivi e biologici, fattori ambientali e condotta:\nIl modello triadico si basa proprio sull'influenza reciproca di questi tre pilastri (persona, ambiente, condotta)"}, "03.06": {"q": "La capacità di autoregolazione comprende le seguenti componenti:", "options": {"A": "l'automonitoraggio, l'autovalutazione, le reazioni del sé", "B": "l'automonitoraggio e le reazioni del sé", "C": "l'autovalutazione e le reazioni del sé", "D": "l'automonitoraggio e l'autovalutazione"}, "correct": "A", "a": "l'automonitoraggio, l'autovalutazione, le reazioni del sé", "expl": "l'automonitoraggio, l'autovalutazione, le reazioni del sé:\nL'autoregolazione permette di gestire il proprio comportamento attraverso il feedback degli altri, il giudizio personale e le conseguenti risposte emotive"}, "03.07": {"q": "Nell'apprendimento osservativo, il bambino/a può inferire che quel comportamento è desiderabile e può decidere di imitarlo attraverso il meccanismo del:", "options": {"A": "rinforzo positivo", "B": "rinforzo negativo", "C": "rinforzo vicariante", "D": "feedback positivo"}, "correct": "C", "a": "rinforzo vicariante", "expl": "rinforzo vicariante:\nVedere un'altra persona premiata per un comportamento spinge il bambino a ritenere quel gesto desiderabile e a imitarlo"}, "03.08": {"q": "Bandura osserva che si possono distinguere tre processi fondamentali nell'apprendimento osservativo:", "options": {"A": "acquisizione, rielaborazione, mantenimento", "B": "acquisizione, esecuzione o performance, mantenimento", "C": "acquisizione, esecuzione o performance, restituzione", "D": "acquisizione, esecuzione, performance"}, "correct": "B", "a": "acquisizione, esecuzione o performance, mantenimento", "expl": "acquisizione, esecuzione o performance, mantenimento:\nL'apprendimento osservativo richiede prima l'incameramento dell'informazione, poi la sua messa in atto e infine il consolidamento dell'azione"}, "03.09": {"q": "Secondo la teoria dell'apprendimento sociale, l'integrazione ha delle implicazioni cognitive:", "options": {"A": "non si verifica una riorganizzazione attiva di comportamenti appresi in precedenza", "B": "si verifica una riorganizzazione passiva di comportamenti appresi in precedenza", "C": "si verifica una riorganizzazione attiva di comportamenti che verranno appresi in futuro", "D": "si verifica una riorganizzazione attiva di comportamenti appresi in precedenza"}, "correct": "D", "a": "si verifica una riorganizzazione attiva di comportamenti appresi in precedenza", "expl": "si verifica una riorganizzazione attiva di comportamenti appresi in precedenza:\nL'apprendimento non è passivo; la persona rielabora e combina simbolicamente le esperienze passate per creare nuovi comportamenti"}, "03.10": {"q": "La capacità di attenzione selettiva del bambino/a, grazie alle esperienze passate, influenza:", "options": {"A": "il tipo di modello cui prestare attenzione e l'efficacia con cui farlo", "B": "solo il tipo di modello cui prestare attenzione", "C": "solo l'efficacia con cui farlo", "D": "il tipo di modello cui prestare attenzione ma non l'efficacia con cui farlo"}, "correct": "A", "a": "il tipo di modello cui prestare attenzione e l'efficacia con cui farlo", "expl": "il tipo di modello cui prestare attenzione e l'efficacia con cui farlo:\nLe esperienze passate del bambino filtrano la realtà, determinando quali modelli catturano la sua attenzione e quanto bene vengano appresi"}, "04.01": {"q": "La prospettiva evolutiva è basata:", "options": {"A": "Sul concetto di sviluppo psicosociale e di socializzazione", "B": "Solo sul concetto di sviluppo psicosociale", "C": "Sul concetto di sviluppo psicomotorio", "D": "Sul concetto di sviluppo psicosociale e neurologico"}, "correct": "A", "a": "Sul concetto di sviluppo psicosociale e di socializzazione", "expl": "Sul concetto di sviluppo psicosociale e di socializzazione:\nLa prospettiva evolutiva si è diffusa unendo la teoria costruttivista di Piaget con l'approccio cognitivista"}, "04.02": {"q": "Secondo Piaget la cooperazione sociale è considerata:", "options": {"A": "Il motore dello sviluppo sensomotorio", "B": "Il motore per lo sviluppo del linguaggio", "C": "Il motore dello sviluppo morale", "D": "Una componente non fondamentale per lo sviluppo dell'individuo"}, "correct": "C", "a": "Il motore dello sviluppo morale", "expl": "Il motore dello sviluppo morale:\nPiaget sostiene che l'interazione e la cooperazione tra coetanei permettano di passare da una morale imposta dall'alto a una autonoma e razionale"}, "04.03": {"q": "Secondo Piaget lo sviluppo dell'intelligenza si articola in:", "options": {"A": "3 fasi", "B": "4 fasi", "C": "Dipende dall'individuo", "D": "5 fasi"}, "correct": "B", "a": "4 fasi", "expl": "4 fasi:\nLo sviluppo dell'intelligenza per Piaget attraversa quattro stadi: senso-motorio, pre-operatorio, delle operazioni concrete e del pensiero formale"}, "04.04": {"q": "Il periodo delle operazioni concrete va:", "options": {"A": "Dai 6 ai 12 anni", "B": "Dai 6 ai 14 anni", "C": "Dai 6 ai 7 anni", "D": "Dai 6 ai 10 anni"}, "correct": "A", "a": "Dai 6 ai 12 anni", "expl": "Dai 6 ai 12 anni:\nQuesto periodo riguarda la terza fase dello sviluppo cognitivo di Piaget, dove il bambino compie operazioni mentali legate a dati concreti"}, "04.05": {"q": "Erikson elabora:", "options": {"A": "La teoria dello sviluppo psicosociale che si articola in 4 fasi", "B": "La teoria dello sviluppo psicomotorio che si articola in 8 fasi", "C": "La teoria dello sviluppo psicomotorio che si articola in 4 fasi", "D": "La teoria dello sviluppo psicosociale che si articola in 8 fasi"}, "correct": "D", "a": "La teoria dello sviluppo psicosociale che si articola in 8 fasi", "expl": "La teoria dello sviluppo psicosociale che si articola in 8 fasi:\nErikson propone un modello che copre l'intero arco della vita, dalla nascita alla vecchiaia, integrando aspetti fisici, individuali e sociali"}, "04.06": {"q": "Il mesosistema è costituito:", "options": {"A": "Dalle relazioni tra macrosistemi", "B": "Dalle relazioni tra microsistemi", "C": "Dalle relazioni tra esosistemi", "D": "Dalle relazioni tra macrosistemi e microsistemi"}, "correct": "B", "a": "Dalle relazioni tra microsistemi", "expl": "Dalle relazioni tra microsistemi:\nNel modello ecologico di Bronfenbrenner, il mesosistema riguarda le connessioni tra i contesti di vita diretta del bambino, come il rapporto tra famiglia e scuola"}, "04.07": {"q": "La persona esprime e costruisce il proprio sé sociale attraverso:", "options": {"A": "Il linguaggio e le capacità motorie", "B": "Il linguaggio e le capacità coordinative", "C": "Il linguaggio e le capacità narrative", "D": "Il linguaggio e le capacità senso percettive"}, "correct": "C", "a": "Il linguaggio e le capacità narrative", "expl": "Il linguaggio e le capacità narrative:\nSecondo Bruner, è attraverso il racconto e la condivisione del pensiero narrativo che l'individuo costruisce ed esprime il proprio Sé nella cultura"}, "04.08": {"q": "I principi di psicologia di William James vennero pubblicati nel:", "options": {"A": "1980", "B": "1890", "C": "1990", "D": "1809"}, "correct": "B", "a": "1890", "expl": "1890:\nIn quest'anno William James pubblicò la sua opera fondamentale, introducendo la distinzione tra il Sé come conoscitore e il Sé come oggetto"}, "04.09": {"q": "Secondo Bruner il concetto del sé sociale si costruisce grazie:", "options": {"A": "Al legame tra individuo e contesto", "B": "Al legame tra individui", "C": "Al legame tra adulti e bambini", "D": "Al mantenimento dell'individualità"}, "correct": "A", "a": "Al legame tra individuo e contesto", "expl": "Al legame tra individuo e contesto:\nBruner sottolinea che il Sé non è un'esperienza interna indipendente, ma matura in un mondo di significati e rapporti sociali"}, "04.10": {"q": "Conservatorismo cognitivo:", "options": {"A": "Tendenza a favorire il cambimento", "B": "Tendenza a non ascoltare l'opinione altrui", "C": "Tendenza a conservare gli ideali degli altri", "D": "Tendenza a resistere al cambiamento"}, "correct": "D", "a": "Tendenza a resistere al cambiamento", "expl": "Tendenza a resistere al cambiamento:\nGreenwald definisce il conservatorismo cognitivo come la propensione degli individui a confermare le proprie ipotesi iniziali e a rafforzare le proprie convinzioni"}, "05.01": {"q": "Secondo la teoria del confronto sociale (Festinger, 1954) impariamo a definire il nostro Sé sociale:", "options": {"A": "attraverso il confronto con noi stessi", "B": "confrontandoci con chi ci circonda", "C": "senza confrontarci con chi ci circonda", "D": "confrontando noi stessi con versioni ideali e diverse del sé"}, "correct": "B", "a": "confrontandoci con chi ci circonda", "expl": "confrontandoci con chi ci circonda\nLa teoria di Festinger sostiene che il Sé sociale si definisce proprio attraverso il paragone con gli altri, che fungono da punto di riferimento esterno"}, "05.02": {"q": "Per la teoria del confronto sociale, le convinzioni, i sentimenti e comportamenti sono:", "options": {"A": "soggettivi", "B": "oggettivi", "C": "irrilevanti", "D": "condizionati dall'altro"}, "correct": "A", "a": "soggettivi", "expl": "soggettivi\nQuesti elementi sono considerati prodotti del nostro pensiero e non hanno un punto di riferimento oggettivo finché non vengono confrontati con gli altri"}, "05.03": {"q": "Gli schemi sono strutture mentali che hanno la funzione di:", "options": {"A": "non influenzare le informazioni che rileviamo, registriamo e, successivamente, ricordiamo", "B": "dare un senso alla qualità delle informazioni e degli stimoli con cui entriamo in contatto", "C": "organizzare la conoscenza del mondo sociale", "D": "organizzare la conoscenza del sé"}, "correct": "C", "a": "organizzare la conoscenza del mondo sociale", "expl": "organizzare la conoscenza del mondo sociale\nGli schemi servono specificamente a ordinare e dare un senso alla vasta quantità di informazioni che riceviamo dal contesto sociale"}, "05.04": {"q": "Brewers e Gardner (1996) parlano di Sé individuale come:", "options": {"A": "definito dalle nostre relazioni con persone importanti", "B": "appartenenza a un gruppo sociale", "C": "costituito da attributi ma non da tratti della personalità che ci distinguono dalle altre persone", "D": "costituito da attributi e tratti della personalità che ci distinguono dalle altre persone"}, "correct": "D", "a": "costituito da attributi e tratti della personalità che ci distinguono dalle altre persone", "expl": "costituito da attributi e tratti della personalità che ci distinguono dalle altre persone\nl sé individuale si focalizza sulle caratteristiche uniche e personali che rendono un individuo diverso dagli altri"}, "05.05": {"q": "Le strategie di autoconferma implicano i processi di:", "options": {"A": "attenzione orientata e selezione dell'informazione", "B": "attenzione orientata", "C": "selezione dell'informazione", "D": "differenziazione"}, "correct": "A", "a": "attenzione orientata e selezione dell'informazione", "expl": "attenzione orientata e selezione dell'informazione\nQueste strategie servono a rafforzare l'immagine di sé filtrando le informazioni ambientali in modo che confermino ciò che già pensiamo di noi"}, "05.06": {"q": "L'affiliazione mirata permette all'individuo di:", "options": {"A": "frequentare le persone che non lo aiuteranno a sentirsi più sicuro di sé", "B": "frequentare le persone che lo aiuteranno a sentirsi più sicuro di sé", "C": "frequentare le persone che lo faranno sentire meno sicuro di sé", "D": "frequentare le persone che lo rendono più sicuro di sé"}, "correct": "B", "a": "frequentare le persone che lo aiuteranno a sentirsi più sicuro di sé", "expl": "frequentare le persone che lo aiuteranno a sentirsi più sicuro di sé\nScegliamo di frequentare persone che supportano la nostra autostima e confermano la nostra identità"}, "05.07": {"q": "Le strategie di autopresentazione sono guidate da copioni sociali che hanno la funzione di:", "options": {"A": "esercitare un controllo su noi stessi", "B": "trasmettere agli altri tutte le informazioni su noi stessi", "C": "rappresentare noi stessi", "D": "esercitare un controllo sugli altri individui"}, "correct": "D", "a": "esercitare un controllo sugli altri individui", "expl": "esercitare un controllo sugli altri individui\nPresentandoci in un certo modo, cerchiamo di influenzare la reazione degli altri e di spingerli a trattarci come desideriamo"}, "05.08": {"q": "I meccanismi di self-handicapping consistono in una serie di strategie di:", "options": {"A": "autoconferma", "B": "differenziazione", "C": "autoimpedimento", "D": "completamento simbolico"}, "correct": "C", "a": "autoimpedimento", "expl": "autoimpedimento\nSono strategie in cui ci creiamo ostacoli da soli per avere una scusa pronta in caso di fallimento, proteggendo così la nostra autostima"}, "05.09": {"q": "Alcune ricerche (Derry, Kuiper, 1981) hanno dimostrato che le persone che possiedono uno schema di sé organizzato in termini negativi, di fronte ad un compito di autodescrizione sono:", "options": {"A": "molto veloci nell'identificare ciò che essi non sono, mentre sono più lenti nel decidere ciò che essi sono", "B": "molto veloci nell'identificare ciò che essi non sono, e altrettanto veloci nel decidere ciò che essi sono", "C": "non molto veloci nell'identificare ciò che essi non sono, ma sono più lenti nel decidere ciò che essi sono", "D": "molto lenti nell'identificare ciò che essi non sono, mentre sono molto veloci nel decidere ciò che essi sono"}, "correct": "A", "a": "molto veloci nell'identificare ciò che essi non sono, mentre sono più lenti nel decidere ciò che essi sono", "expl": "molto veloci nell'identificare ciò che essi non sono, mentre sono più lenti nel decidere ciò che essi sono:\nChi ha un'immagine negativa di sé fatica a trovare tratti positivi e definisce se stesso più rapidamente per esclusione"}, "05.10": {"q": "Le persone diagnosticate come depresse, rispetto a quelle non diagnosticate come tali, tendono a ricordare:", "options": {"A": "un minor numero di parole negative legate al loro sé", "B": "un maggior numero di parole negative legate al loro sé", "C": "un maggior numero di parole positive legate al loro sé", "D": "un maggior numero di parole negative legate agli altri"}, "correct": "B", "a": "un maggior numero di parole negative legate al loro sé", "expl": "un maggior numero di parole negative legate al loro sé\nLo schema di sé depresso è focalizzato su concetti negativi, facilitando il ricordo di esperienze spiacevoli e fallimenti personali"}, "06.01": {"q": "L'autoregolazione e l'autocontrollo costituiscono il processo del:", "options": {"A": "cognitive self-management", "B": "problem solving", "C": "condizionamento", "D": "cognitive management"}, "correct": "A", "a": "cognitive self-management", "expl": "cognitive self-management:\nL'autoregolazione e l'autocontrollo sono definiti come i processi del cognitive self-management, ovvero la \"metacognizione in azione\" che permette di orchestrare gli aspetti cognitivi del problem solving"}, "06.02": {"q": "L'autoaffermazione permette di:", "options": {"A": "ristabilire l'autocontrollo quando le risorse esterne di una persona scarseggiano", "B": "ristabilire l'autoregolazione quando le risorse esterne di una persona scarseggiano", "C": "ristabilire l'autocontrollo quando le risorse interiori di una persona scarseggiano", "D": "ristabilire l'autocontrollo quando le risorse interiori di una persona non scarseggiano"}, "correct": "C", "a": "ristabilire l'autocontrollo quando le risorse interiori di una persona scarseggiano", "expl": "ristabilire l'autocontrollo quando le risorse interiori di una persona scarseggiano:\nQuando le risorse interiori di una persona sono limitate, l'autoaffermazione aiuta a ristabilire l'autocontrollo attraverso azioni o eventi che accrescono il senso individuale di integrità."}, "06.03": {"q": "Il concetto di sé tende a:", "options": {"A": "ad adattarsi all'ambiente", "B": "resistere ai cambiamenti e influenzare i nostri pensieri", "C": "resistere ai cambiamenti senza influenzare i nostri pensieri", "D": "non resistere ai cambiamenti e a non influenzare i nostri pensieri"}, "correct": "B", "a": "resistere ai cambiamenti e influenzare i nostri pensieri", "expl": "resistere ai cambiamenti e influenzare i nostri pensieri:\nUna volta costruito, il concetto di sé diventa una struttura stabile che resiste al cambiamento e funge da filtro per regolare pensieri, emozioni e azioni."}, "06.04": {"q": "Il costrutto mentale o cognitivo rappresentato dalle convinzioni di controllo costituisce:", "options": {"A": "solo l'inizio e la regolazione delle azioni guidate e dirette verso obiettivi", "B": "il prerequisito per la pianificazione ma non regola le azioni guidate e dirette verso obiettivi", "C": "un requisito per la pianificazione delle azioni guidate e dirette verso obiettivi", "D": "il prerequisito per la pianificazione, l'inizio e la regolazione delle azioni guidate e dirette verso obiettivi"}, "correct": "D", "a": "il prerequisito per la pianificazione, l'inizio e la regolazione delle azioni guidate e dirette verso obiettivi", "expl": "il prerequisito per la pianificazione, l'inizio e la regolazione delle azioni guidate e dirette verso obiettivi:\nLe convinzioni di controllo sono fondamentali per l'intero ciclo dell'azione: dalla fase preparatoria (pianificazione) alla fase esecutiva (inizio) fino al monitoraggio (regolazione)."}, "06.05": {"q": "Le convinzioni di controllo vengono concepite come un composto di:", "options": {"A": "convinzioni di contingenza e condizioni intrinseche", "B": "convinzioni di adattamento e convinzioni di competenza", "C": "convinzioni di contingenza e convinzioni di competenza", "D": "convinzioni di contingenza e convinzioni eteroindotte"}, "correct": "C", "a": "convinzioni di contingenza e convinzioni di competenza", "expl": "convinzioni di contingenza e convinzioni di competenza:\nSecondo il modello di Flammer, il controllo percepito nasce dall'unione di quanto riteniamo che un'azione produca un effetto (contingenza) e quanto ci sentiamo capaci di compierla (competenza)."}, "06.06": {"q": "Le convinzioni di contingenza sono convinzioni circa:", "options": {"A": "la probabilità con cui una certa azione porterà a un certo risultato", "B": "la certezza che una certa azione porterà a un certo risultato", "C": "la propria capacità di compiere queste azioni", "D": "la capacità di adattamento per compiere queste azioni"}, "correct": "A", "a": "la probabilità con cui una certa azione porterà a un certo risultato", "expl": "la probabilità con cui una certa azione porterà a un certo risultato:\nLa contingenza riguarda il legame oggettivo-percepito tra causa ed effetto: indica la probabilità stimata che una specifica azione generi effettivamente il risultato sperato."}, "06.07": {"q": "Nei processi di autoregolazione e di autocontrollo, il controllo primario consiste:", "options": {"A": "nel modificare gli stati soggettivi in modo da renderli adatti all'ambiente", "B": "nel cercare di modificare l'ambiente per renderlo più adatto alle proprie aspirazioni personali", "C": "in una strategia per cambiare o adattare il proprio modo di vedere le cose", "D": "nel cercare di non modificare l'ambiente per renderlo più adatto alle proprie aspirazioni personali"}, "correct": "B", "a": "nel cercare di modificare l'ambiente per renderlo più adatto alle proprie aspirazioni personali", "expl": "nel cercare di modificare l'ambiente per renderlo più adatto alle proprie aspirazioni personali:\nIl controllo primario è rivolto verso l'esterno: il soggetto agisce attivamente per cambiare l'ambiente circostante in base ai propri bisogni. Al contrario, il controllo secondario è rivolto verso l'interno (modifica dei propri stati soggettivi)."}, "06.08": {"q": "Le persone con maggiori capacità di automonitoraggio vengono definite:", "options": {"A": "low self-monitor", "B": "a basso monitoraggio", "C": "self-monitor", "D": "high self-monitor"}, "correct": "D", "a": "high self-monitor", "expl": "high self-monitor:\nIl termine tecnico per chi eccelle nell'osservare e regolare il proprio comportamento in base alle situazioni è high self-monitor"}, "06.09": {"q": "Il locus of control è un costrutto proposto da:", "options": {"A": "Lazarus", "B": "Rotter", "C": "Bandura", "D": "Flammer"}, "correct": "B", "a": "Rotter", "expl": "Rotter:\nIl concetto di locus of control, ovvero il \"luogo\" dove si attribuisce la causalità degli eventi, è stato introdotto dallo psicologo Julian Rotter nel 1966."}, "06.10": {"q": "Il concetto di locus of control se è esterno comporta la credenza di:", "options": {"A": "percepire la causa di ciò che accade a noi stessi come conseguenza del proprio intervento...", "B": "avere molte possibilità di influenzare eventi che dipendono dal caso...", "C": "avere poche possibilità di influenzare eventi che dipendono dal caso e, pertanto, si percepiscono gli eventi come imprevedibili e dipendenti da azioni e comportamenti altrui o comunque esterni alla persona", "D": "avere poche possibilità di influenzare eventi che dipendono dal caso ma non si percepiscono gli eventi come imprevedibili..."}, "correct": "C", "a": "avere poche possibilità di influenzare eventi che dipendono dal caso e, pertanto, si percepiscono gli eventi come imprevedibili e dipendenti da azioni e comportamenti altrui o comunque esterni alla persona", "expl": "avere poche possibilità di influenzare eventi che dipendono dal caso e, pertanto, si percepiscono gli eventi come imprevedibili e dipendenti da azioni e comportamenti altrui o comunque esterni alla persona:\nChi ha un locus of control esterno crede che la propria vita sia governata da fattori fuori dal proprio controllo (caso, fortuna, altri potenti), percependo gli eventi come imprevedibili e indipendenti dalle proprie azioni."}, "07.01": {"q": "Il senso di autoefficacia, o self-efficacy, costituisce (Bandura, 1986):", "options": {"A": "la percezione che una persona ha della propria competenza nell'ambiente di appartenenza", "B": "la percezione che una persona ha della propria competenza rispetto agli altri", "C": "un fattore secondario di influenzamento e di mediazione della motivazione", "D": "un fattore che non influenza la motivazione"}, "correct": "A", "a": "la percezione che una persona ha della propria competenza nell'ambiente di appartenenza", "expl": "la percezione che una persona ha della propria competenza nell'ambiente di appartenenza:\nl'autoefficacia è definita come la percezione della propria competenza nel proprio ambiente e funge da importante mediatore della motivazione."}, "07.02": {"q": "Secondo Zimmerman (1995) a differenza del concetto del Sé, l'autoefficacia:", "options": {"A": "comporta un giudizio di valore sulla personalità o sulle capacità generali dell'individuo", "B": "non è una credenza contesto e compito specifica", "C": "è una credenza contesto e compito aspecifica", "D": "è una credenza contesto e compito specifica"}, "correct": "D", "a": "è una credenza contesto e compito specifica", "expl": "è una credenza contesto e compito specifica:\n\nMentre il concetto di Sé è un giudizio generale, l'autoefficacia è strettamente legata a contesti e compiti specifici"}, "07.03": {"q": "Tra le fonti dell'autoefficacia definite da Bandura (1989a) è possibile annoverare:", "options": {"A": "solo i successi sperimentati nell'esperienza passata del soggetto", "B": "il linguaggio non verbale", "C": "le esperienze vicarie apprese tramite l'osservazione e l'imitazione", "D": "solo i fallimenti sperimentati nell'esperienza passata del soggetto"}, "correct": "C", "a": "le esperienze vicarie apprese tramite l'osservazione e l'imitazione", "expl": "le esperienze vicarie apprese tramite l'osservazione e l'imitazione:\nUna delle sei fonti chiave identificate da Bandura sono le esperienze vicarie, ovvero imparare osservando e imitando gli altri."}, "07.04": {"q": "Nota e Soresi (2000) hanno evidenziato alcune dimensioni lungo le quali possono variare le aspettative di autoefficacia:", "options": {"A": "la grandezza dell'autoefficacia e la forza dell'autoefficacia", "B": "la grandezza dell'autoefficacia, la forza dell'autoefficacia e la generalizzazione", "C": "la grandezza dell'autoefficacia e la generalizzazione", "D": "la forza dell'autoefficacia e la generalizzazione"}, "correct": "B", "a": "la grandezza dell'autoefficacia, la forza dell'autoefficacia e la generalizzazione", "expl": "la grandezza dell'autoefficacia, la forza dell'autoefficacia e la generalizzazione:\nLe aspettative variano per grandezza (difficoltà), forza (convinzione/persistenza) e generalizzazione (estensione a compiti simili)."}, "07.05": {"q": "La valutazione che le persone danno della propria efficacia è fortemente influenzata:", "options": {"A": "dallo stato emotivo", "B": "dall'ambiente", "C": "dal confronto sociale", "D": "dal giudizio degli altri"}, "correct": "C", "a": "dal confronto sociale", "expl": "dal confronto sociale:\nha un impatto determinante su come valutiamo la nostra efficacia."}, "07.06": {"q": "L'autoefficacia incrementa la motivazione e il pensiero strategico ed è pertanto in grado di incidere significativamente sulle capacità:", "options": {"A": "di problem solving", "B": "attentive", "C": "relazionali", "D": "comunicative"}, "correct": "A", "a": "di problem solving", "expl": "di problem solving:\nPoiché potenzia motivazione e strategia, l'autoefficacia migliora direttamente le capacità di risoluzione dei problemi (problem solving)"}, "07.07": {"q": "Le convinzioni di efficacia operano come fattori essenziali nella carriera scolastica attraverso (Bandura, 1995):", "options": {"A": "le convinzioni degli studenti circa le proprie capacità di rapportarsi con gli altri", "B": "le convinzioni degli insegnanti circa le proprie capacità di essere all'altezza del compito svolto", "C": "il senso di inefficacia del corpo insegnanti circa l'idoneità delle proprie scuole", "D": "le convinzioni degli studenti circa le proprie capacità di regolare l'apprendimento e di affrontare con successo le diverse materie scolastiche"}, "correct": "D", "a": "le convinzioni degli studenti circa le proprie capacità di regolare l'apprendimento e di affrontare con successo le diverse materie scolastiche", "expl": "le convinzioni degli studenti circa le proprie capacità di regolare l'apprendimento e di affrontare con successo le diverse materie scolastiche:\nIn ambito scolastico, l'autoefficacia si manifesta nella capacità dello studente di regolare il proprio studio e riuscire nelle varie materie."}, "07.08": {"q": "Secondo Bandura (1977) le convinzioni di efficacia a scuola influenzano nello studente:", "options": {"A": "solo il livello di impegno", "B": "il livello di impegno, la sua persistenza e la sua scelta delle attività", "C": "il livello di impegno, la sua persistenza ma non la sua scelta delle attività", "D": "le sue capacità relazionali"}, "correct": "B", "a": "il livello di impegno, la sua persistenza e la sua scelta delle attività", "expl": "il livello di impegno, la sua persistenza e la sua scelta delle attività:\nL'autoefficacia determina quanto uno studente si impegna, quanto insiste di fronte alle difficoltà e quali attività decide di intraprendere."}, "07.09": {"q": "Secondo Bandura (1995), soggetti che hanno un alto senso di efficacia nel regolare il proprio apprendimento e nel padroneggiare le abilità scolastiche tendono prevalentemente:", "options": {"A": "ad essere esclusi dal gruppo dei pari", "B": "ad essere impopolari", "C": "ad assumere ed a sviluppare comportamenti pro-sociali", "D": "a svilluppare comportamenti aggressivi"}, "correct": "C", "a": "ad assumere ed a sviluppare comportamenti pro-sociali", "expl": "ad assumere ed a sviluppare comportamenti pro-sociali:\nStudenti con alta autoefficacia scolastica tendono a essere più popolari e a manifestare comportamenti pro-sociali"}, "07.10": {"q": "Con il termine competenza emotiva individuale si intende:", "options": {"A": "sia la capacità di moderare, diluire e superare le emozioni negative; sia la capacità di godere, condividere e trarre tutti i benefici che possono derivare da emozioni e affetti positivi", "B": "la capacità di moderare, diluire e superare le emozioni negative", "C": "la capacità di godere, condividere e trarre tutti i benefici che possono derivare da emozioni e affetti positivi", "D": "la capacità di regolare alcune emozioni"}, "correct": "A", "a": "sia la capacità di moderare, diluire e superare le emozioni negative; sia la capacità di godere, condividere e trarre tutti i benefici che possono derivare da emozioni e affetti positivi", "expl": "sia la capacità di moderare, diluire e superare le emozioni negative; sia la capacità di godere, condividere e trarre tutti i benefici che possono derivare da emozioni e affetti positivi:\nLa competenza emotiva è completa quando include sia la gestione delle emozioni negative che la capacità di vivere appieno quelle positive"}, "08.01": {"q": "L'Autostima è un processo:", "options": {"A": "oggettivo e duraturo che porta la persona a valutare e apprezzare se stesso tramite l'auto-approvazione del proprio valore", "B": "soggettivo e duraturo che porta la persona a valutare e apprezzare se stesso tramite l'auto-approvazione del proprio valore", "C": "soggettivo e temporaneo che porta la persona a valutare e apprezzare se stesso tramite l'auto-approvazione del proprio valore", "D": "oggettivo e temporaneo che porta la persona a valutare e apprezzare se stesso tramite l'auto-approvazione del proprio valore"}, "correct": "B", "a": "soggettivo e duraturo che porta la persona a valutare e apprezzare se stesso tramite l'auto-approvazione del proprio valore", "expl": "soggettivo e duraturo…. :\nL'autostima è definita come un processo soggettivo (perché dipende dalla propria percezione) e duraturo finalizzato all'auto-approvazione del proprio valore."}, "08.02": {"q": "Il concetto di sé:", "options": {"A": "Consiste in una valutazione circa le informazioni contenute nel concetto di sé", "B": "Consiste nella costellazione di elementi a cui un gruppo fa riferimento", "C": "Consiste nella reazione emotiva che le persone sperimentano quando osservano e valutano cose diverse", "D": "Consiste nella costellazione di elementi a cui una persona fa riferimento per sé stessa"}, "correct": "D", "a": "Consiste nella costellazione di elementi a cui una persona fa riferimento per sé stessa", "expl": "Consiste nella costellazione di elementi a cui una persona fa riferimento per sé stessa:\nIl concetto di sé rappresenta l'insieme (o costellazione) di tutte le conoscenze e gli elementi che una persona usa per definire sé stessa"}, "08.03": {"q": "Nello sviluppo sociale l'autostima:", "options": {"A": "Nasce nell'adolescenza nel confronto con il mondo esterno ed è un concetto in evoluzione", "B": "Nasce nell'età adulta nel confronto con il mondo esterno ed è un concetto immutabile", "C": "Nasce nella prima infanzia nel confronto con il mondo esterno ed è un concetto in continuo mutamento", "D": "Nasce nell'adolescenza nel confronto con il mondo esterno ed è un concetto immutabile"}, "correct": "C", "a": "Nasce nella prima infanzia nel confronto con il mondo esterno ed è un concetto in continuo mutamento", "expl": "Nasce nella prima infanzia nel confronto con il mondo esterno ed è un concetto in continuo mutamento:\nQuesta dimensione ha origine già nella prima infanzia attraverso l'interazione con l'esterno ed è soggetta a continuo mutamento lungo tutto il percorso di vita."}, "08.04": {"q": "In merito all'autostima, secondo Baumeister (1998):", "options": {"A": "L'autocontrollo rappresenta un aspetto valutativo della coscienza riflessiva", "B": "L'autoregolazione rappresenta un aspetto valutativo della coscienza riflessiva", "C": "L'autoefficacia rappresenta un aspetto valutativo della coscienza riflessiva", "D": "L'autostima rappresenta un aspetto valutativo della coscienza riflessiva"}, "correct": "D", "a": "L'autostima rappresenta un aspetto valutativo della coscienza riflessiva", "expl": "L'autostima rappresenta un aspetto valutativo della coscienza riflessiva:\nBaumeister identifica l'autostima come la componente della coscienza riflessiva che si occupa specificamente della valutazione di sé"}, "08.05": {"q": "Costituisce la percezione che una persona ha della propria competenza nell'ambiente di appartenenza e influenza la scelta dei comportamenti adottati tra quelli a disposizione:", "options": {"A": "Autoefficacia", "B": "Autostima", "C": "Autoregolazione", "D": "Concetto di Sè"}, "correct": "A", "a": "Autoefficacia", "expl": "Autoefficacia:\nA differenza dell'autostima (valore personale), l'autoefficacia riguarda la percezione della propria competenza e capacità di agire efficacemente in un dato contesto."}, "08.06": {"q": "Secondo Bandura (2000):", "options": {"A": "Il senso di autoefficacia riguarda i giudizi di valore personale, mentre l'autostima riguarda giudizi di capacità personale", "B": "Il senso di autoefficacia riguarda i giudizi di capacità personale, mentre l'autostima riguarda giudizi di valore personale", "C": "Il senso di autoefficacia e di autostima corrispondono allo stesso concetto", "D": "Il senso di autoefficacia e di autostima riguardano solo i giudizi di capacità personale"}, "correct": "B", "a": "Il senso di autoefficacia riguarda i giudizi di capacità personale, mentre l'autostima riguarda giudizi di valore personale", "expl": "Il senso di autoefficacia riguarda i giudizi di capacità personale, mentre l'autostima riguarda giudizi di valore personale:\nPer Bandura i due concetti sono distinti: l'autoefficacia valuta le capacità (\"cosa so fare\"), mentre l'autostima valuta il valore (\"quanto valgo\")."}, "08.07": {"q": "Le persone utilizzano fondamentalmente tre processi per ricavare elementi di conoscenza sul Sé:", "options": {"A": "L'introspezione, l'osservazione dei comportamenti e l'interazione sociale", "B": "L'autoriflessione, l'osservazione dei comportamenti e l'interazione sociale", "C": "L'introspezione, l'osservazione dei comportamenti e l'interazione gruppale", "D": "L'introspezione, l'apprendimento classico e l'interazione sociale"}, "correct": "A", "a": "L'introspezione, l'osservazione dei comportamenti e l'interazione sociale", "expl": "L'introspezione, l'osservazione dei comportamenti e l'interazione sociale:\nLe tre vie principali per conoscersi sono guardarsi dentro (introspezione), guardare come agiamo (osservazione dei comportamenti) e confrontarsi con gli altri (interazione sociale)."}, "08.08": {"q": "Chi tra i seguenti Autori ha definito l'autostima come un sistema immunitario dello spirito, in grado di rimetterci in forze in qualsiasi situazione:", "options": {"A": "Bandura", "B": "Baumeister", "C": "William James", "D": "Branden"}, "correct": "D", "a": "Branden", "expl": "Nathaniel Branden:\nutilizza la metafora del sistema immunitario dello spirito per spiegare come una buona autostima protegga e dia forza psicologica nelle difficoltà."}, "08.09": {"q": "Rappresenta il processo chiave per comprendere le transizioni identitarie:", "options": {"A": "Il sucesso lavorativo", "B": "La riconsiderazione dell'impegno", "C": "La riconsiderazione dell'attenzione", "D": "La riconsiderazione dell'autostima"}, "correct": "B", "a": "La riconsiderazione dell'impegno", "expl": "La riconsiderazione dell'impegno:\nLa riconsiderazione dell'impegno è l'elemento centrale che spiega come le persone cambiano la propria identità quando non sono più soddisfatte delle scelte fatte e dell’impegno profuso."}, "08.10": {"q": "Il sentimento di identità può rappresentare:", "options": {"A": "L'elemento unificante attraverso cui superare la separazione tra identità e concetto di sé", "B": "L'elemento unificante attraverso cui superare la separazione tra autoefficacia e autostima", "C": "L'elemento unificante attraverso cui superare la separazione tra autocontrollo e autoregolazione", "D": "L'elemento unificante attraverso cui superare la separazione tra automonitoraggio e autoregolazione"}, "correct": "A", "a": "L'elemento unificante attraverso cui superare la separazione tra identità e concetto di sé", "expl": "L'elemento unificante attraverso cui superare la separazione tra identità e concetto di sé:\nIl sentimento di identità funge da collante soggettivo che permette di integrare i processi dell'identità con i contenuti del concetto di sé"}, "09.01": {"q": "Nella teoria del Determinismo Triadico Reciproco elaborata da Albert Bandura (1997), la spiegazione della condotta può essere articolata tenendo in considerazione i seguenti elementi:", "options": {"A": "Human agency o agentività umana, Perceived self-efficacy o autoefficacia percepita, Moral disengagement o disimpegno morale", "B": "Human agency o agentività umana e Perceived self-efficacy o autoefficacia percepita", "C": "Human agency o agentività umana e Moral disengagement o disimpegno morale", "D": "Perceived self-efficacy o autoefficacia percepita e Moral disengagement o disimpegno morale"}, "correct": "A", "a": "Human agency o agentività umana, Perceived self-efficacy o autoefficacia percepita, Moral disengagement o disimpegno morale", "expl": "Human agency o agentività umana, Perceived self-efficacy o autoefficacia percepita, Moral disengagement o disimpegno morale\nLa teoria di Bandura identifica tre pilastri fondamentali per spiegare il comportamento umano: la capacità di agire intenzionalmente (human agency), la convinzione nelle proprie capacità (autoefficacia) e i meccanismi per giustificare azioni contrarie ai propri valori (disimpegno morale)."}, "09.02": {"q": "La Human agency o agentività umana riguarda:", "options": {"A": "gli atti non compiuti intenzionalmente", "B": "gli atti mirati a produrre effetti", "C": "gli atti compiuti intenzionalmente", "D": "gli atti non mirati a produrre effetti Risposta esatta:"}, "correct": "C", "a": "gli atti compiuti intenzionalmente", "expl": "gli atti compiuti intenzionalmente:\nL'agentività umana si definisce specificamente come la capacità di generare atti compiuti intenzionalmente￼. E’la facoltà della mente umana di non limitarsi a reagire, ma agire attivamente nel proprio ambiente."}, "09.03": {"q": "La human agency agisce attivamente nell'ambiente grazie alle sue capacità di:", "options": {"A": "influenza autoreattiva", "B": "anticipazione delle conseguenze delle proprie e altrui azioni", "C": "anticipazione delle conseguenze solo delle proprie azioni", "D": "autoefficacia percepita"}, "correct": "B", "a": "anticipazione delle conseguenze delle proprie e altrui azioni", "expl": "anticipazione delle conseguenze delle proprie e altrui azioni:\nTra le funzioni della mente che permettono l'agentività, Bandura include la capacità di prevedere i risultati non solo del proprio comportamento, ma anche di quello degli altri, permettendo così di regolare le proprie azioni in anticipo."}, "09.04": {"q": "Bandura parla di disimpegno morale come:", "options": {"A": "insieme di strategie cognitive-sociali per apprendere come assumersi delle responsabilità", "B": "insieme di strategie autoefficacia per svincolarsi dalle norme e dalla responsabilità", "C": "insieme di strategie emotive per svincolarsi dalle norme e dalla responsabilità", "D": "insieme di strategie cognitive-sociali per svincolarsi dalle norme e dalla responsabilità"}, "correct": "D", "a": "insieme di strategie cognitive-sociali per svincolarsi dalle norme e dalla responsabilità", "expl": "insieme di strategie cognitive-sociali per svincolarsi dalle norme e dalla responsabilità:\nIl disimpegno morale è descritto come un insieme di dispositivi cognitivi e sociali che l'individuo apprende e utilizza per liberarsi dal senso di colpa e dalle sanzioni interne quando viola una norma."}, "09.05": {"q": "Le persone con una più forte efficacia autoregolatrice percepita hanno:", "options": {"A": "maggiore vulnerabilità alle pressioni sociali a favore di una condotta trasgressiva", "B": "maggiore resistenza alle pressioni sociali a comportarsi violando i propri criteri", "C": "minore resistenza alle pressioni sociali a comportarsi violando i propri criteri", "D": "un basso livello di autocontrollo"}, "correct": "B", "a": "maggiore resistenza alle pressioni sociali a comportarsi violando i propri criteri", "expl": "maggiore resistenza alle pressioni sociali a comportarsi violando i propri criteri:\nChi possiede un alto senso di autoefficacia nel regolare il proprio comportamento tende a perseverare maggiormente nell'autocontrollo, riuscendo a resistere meglio alle influenze esterne che spingono a trasgredire i propri valori."}, "09.06": {"q": "Le persone con un basso senso di efficacia autoregolatrice percepita hanno:", "options": {"A": "un'alta vulnerabilità alle pressioni sociali a favore di una condotta trasgressiva", "B": "minore resistenza alle pressioni sociali a comportarsi violando i propri criteri", "C": "un alto livello di autocontrollo", "D": "maggiore resistenza alle pressioni sociali a comportarsi violando i propri criteri"}, "correct": "A", "a": "un'alta vulnerabilità alle pressioni sociali a favore di una condotta trasgressiva", "expl": "un'alta vulnerabilità alle pressioni sociali a favore di una condotta trasgressiva:\nAl contrario, un basso senso di efficacia autoregolatrice indebolisce l'autocontrollo, rendendo l'individuo molto più vulnerabile e incline a cedere alle pressioni sociali verso condotte scorrette o devianti."}, "09.07": {"q": "Bandura ha individuato e descritto otto meccanismi di disimpegno morale tra cui:", "options": {"A": "umanizzazione della vittima", "B": "accettazione delle conseguenze", "C": "etichettamento eufemistico", "D": "confronto svantaggioso"}, "correct": "C", "a": "etichettamento eufemistico", "expl": "etichettamento eufemistico:\nL'etichettamento eufemistico è uno degli otto meccanismi e consiste nell'usare il linguaggio per dare un significato positivo o rispettabile ad azioni che sono in realtà violente o illegali. (Eufemismo->Spazzino=Operatore Ecologico)"}, "09.08": {"q": "Secondo Bandura la diffusione della responsabilità è osservabile soprattutto quando l'individuo:", "options": {"A": "agisce da solo non sentendosi osservato dal gruppo", "B": "agendo in gruppo, diffonde la sua responsabilità al gruppo stesso, sentendosi così meno responsabile", "C": "agendo in gruppo, non diffonde la sua responsabilità al gruppo stesso, sentendosi così più responsabile", "D": "agisce da solo scaricando la resposnsabilità sulla vittima"}, "correct": "B", "a": "agendo in gruppo, diffonde la sua responsabilità al gruppo stesso, sentendosi così meno responsabile", "expl": "agendo in gruppo, diffonde la sua responsabilità al gruppo stesso, sentendosi così meno responsabile:\nQuesto meccanismo si attiva tipicamente nel gruppo: l'individuo sente che la colpa è divisa tra tutti i partecipanti, portando alla conclusione paradossale che \"se tutti sono responsabili, nessuno lo è veramente\"."}, "09.09": {"q": "Nel caso degli autori di reato a sfondo sessuale, nel meccanismo di attribuzione della colpa alla vittima, tutte le responsabilità per un determinato evento dannoso sono attribuite:", "options": {"A": "a un atteggiamento realmente provocatorio della vittima", "B": "a un atteggiamento di superiorità della vittima", "C": "ad un senso di inferiorità percepita nella vittima", "D": "a un presunto atteggiamento provocatorio della vittima"}, "correct": "D", "a": "a un presunto atteggiamento provocatorio della vittima", "expl": "a un presunto atteggiamento provocatorio della vittima:\nNegli autori di reati sessuali, questo meccanismo serve a giustificare il crimine sostenendo che sia stata la vittima, con un comportamento presuntamente provocatorio, a causare l'evento, scaricando così ogni colpa su di lei."}, "09.10": {"q": "Nella Scala del Disimpegno Morale messa a punto da Bandura, le affermazioni sono valutate:", "options": {"A": "su una scala likert a 5 punti", "B": "su una scala likert a 7 punti", "C": "su una scala di Thurstone", "D": "su una scala likert a 4 punti"}, "correct": "A", "a": "su una scala likert a 5 punti", "expl": "su una scala likert a 5 punti:\nLo strumento di misurazione creato da Bandura e collaboratori utilizza una scala Likert a 5 punti, che va da 1 (completamente in disaccordo) a 5 (completamente d'accordo) per valutare 32 diverse affermazioni. (8 meccanismi x 4 risposte)"}, "10.01": {"q": "I punti cardine della teoria dell'attribuzione causale sono:", "options": {"A": "l'evento, l'attore e l'osservatore", "B": "l'evento e l'osservatore", "C": "l'evento e l'attore", "D": "l'evento e l'attribuzione"}, "correct": "A", "a": "l'evento, l'attore e l'osservatore", "expl": "l'evento, l'attore e l'osservatore:\nLa teoria identifica tre elementi fondamentali che interagiscono nel processo: l'evento che accade, l'attore che compie l'azione e l'osservatore che cerca di spiegarne le cause."}, "10.02": {"q": "Le 'caratteristiche disposizionali' sono:", "options": {"A": "attributi durevoli", "B": "attributi durevoli e peculiarità specifiche", "C": "peculiarità specifiche", "D": "attributi durevoli ma non peculiarità specifiche"}, "correct": "B", "a": "attributi durevoli e peculiarità specifiche", "expl": "attributi durevoli e peculiarità specifiche:\nAttraverso i processi di attribuzione, assegniamo a persone, oggetti o eventi degli attributi che durano nel tempo e delle peculiarità specifiche, definendoli appunto come \"caratteristiche disposizionali\"."}, "10.03": {"q": "Nella teoria dell'attribuzione causale, le forze ambientali possono dipendere da:", "options": {"A": "fattori sociali e pressioni sociali", "B": "fattori emotivi, fattori sociali e pressioni sociali", "C": "fattori non sociali e fattori sociali", "D": "fattori non sociali, fattori sociali e pressioni sociali"}, "correct": "D", "a": "fattori non sociali, fattori sociali e pressioni sociali", "expl": "fattori non sociali, fattori sociali e pressioni sociali:\nLe forze ambientali (o attribuzioni esterne) sono influenzate da tre fattori: non sociali (ostacoli materiali), sociali (leggi, norme) e pressioni sociali (i doveri)."}, "10.04": {"q": "Heider, nel suo modello, prende anche in considerazione l'effetto causato dalle componenti:", "options": {"A": "personali", "B": "disposizionali", "C": "temporanee", "D": "permanenti"}, "correct": "C", "a": "temporanee", "expl": "temporanee:\nOltre ai fattori stabili, Heider considera le componenti temporanee (come l'umore o la fatica) che possono interferire sia con lo sforzo della persona che con l'ambiente."}, "10.05": {"q": "L'inferenza sull'intenzione dell'attore riguarda:", "options": {"A": "effetti specifici e libertà di scelta", "B": "effetti specifici, desiderabilità sociale e libertà di scelta", "C": "desiderabilità sociale e libertà di scelta", "D": "effetti specifici, desiderabilità sociale ma non libertà di scelta"}, "correct": "B", "a": "effetti specifici, desiderabilità sociale e libertà di scelta", "expl": "effetti specifici, desiderabilità sociale e libertà di scelta:\nPer capire se un atto è intenzionale, l'osservatore valuta se ci sono effetti unici (specifici), se l'azione è socialmente accettabile (desiderabilità) e se l'attore ha agito per sua volontà (libertà di scelta)."}, "10.06": {"q": "Secondo E.E. Jones e K.E. Davis (1965) il processo di attribuzione consta di:", "options": {"A": "2 fasi", "B": "1 fase", "C": "più fasi", "D": "3 fasi"}, "correct": "A", "a": "2 fasi", "expl": "2 fasi:\nIl processo è diviso in due fasi: la prima parte dall'osservazione del comportamento e dei suoi effetti, la seconda risale alle intenzioni e alle disposizioni personali sottostanti."}, "10.07": {"q": "Il costrutto di 'Locus of control' è stato proposto da:", "options": {"A": "Jones e Davis", "B": "Weiner", "C": "Ross", "D": "Rotter"}, "correct": "D", "a": "Rotter", "expl": "Rotter:\nIl concetto di Locus of Control, che definisce dove una persona colloca la causa degli eventi (interno o esterno), è stato proposto da J.B. Rotter nel 1954"}, "10.08": {"q": "Le persone che mostrano una vera e propria combinazione tra i due tipi di locus of control sono spesso indicate come:", "options": {"A": "ambi locus", "B": "bi-modali", "C": "bi-loci", "D": "locus of control"}, "correct": "C", "a": "bi-loci", "expl": "bi-loci:\nGli individui \"bi-loci\" sanno modulare tra aspetti interni ed esterni, mostrando maggiore flessibilità nel gestire lo stress e assumersi responsabilità con meno disagi emotivi."}, "10.09": {"q": "L'errore fondamentale di attribuzione è:", "options": {"A": "una modalità di giudizio distorta in maniera sistematica, che permette di descrivere le azioni o comportamenti personali ed altrui", "B": "il vizio sistematico di attribuire le cause di un comportamento umano alla personalità del singolo piuttosto che alle condizioni esterne", "C": "il vizio sistematico di attribuire le cause di un comportamento umano alle condizioni esterne piuttosto che alla personalità del singolo", "D": "una modalità di giudizio distorta in maniera sistematica che permette di descrivere le azioni altrui"}, "correct": "B", "a": "il vizio sistematico di attribuire le cause di un comportamento umano alla personalità del singolo piuttosto che alle condizioni esterne", "expl": "il vizio sistematico di attribuire le cause di un comportamento umano alla personalità del singolo piuttosto che alle condizioni esterne :\nÈ la tendenza sistematica a sopravvalutare i tratti di personalità (cause interne) dell'attore, trascurando l'influenza del contesto e delle circostanze esterne."}, "10.10": {"q": "Pettigrew nel 1979, introduce il concetto di:", "options": {"A": "errore definitivo di attribuzione", "B": "errore fondamentale di attribuzione", "C": "bias cognitivo", "D": "bias di autocompiacimento"}, "correct": "A", "a": "errore definitivo di attribuzione", "expl": "errore definitivo di attribuzione:\nPettigrew ha esteso il concetto di errore di attribuzione ai gruppi, spiegando come tendiamo a giudicare i comportamenti di chi appartiene a gruppi diversi dal nostro in base a pregiudizi legati all'appartenenza gruppale"}, "11.01": {"q": "La teoria del campo è stata formulata da:", "options": {"A": "Kant", "B": "Kurt Lewin", "C": "Conner e Norman", "D": "Max Wertheimer"}, "correct": "B", "a": "Kurt Lewin", "expl": "La teoria del campo di Kurt Lewin (1951), di matrice Gestalt, spiega il comportamento come una funzione dell'interazione tra la persona e il suo ambiente psicologico  (es C=s(P A) )"}, "11.02
