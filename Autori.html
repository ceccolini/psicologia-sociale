collaborazione\" e, in secondo luogo, \"di resistere alle pressioni trasgressive dei/lle compagni/e\". Questa duplice funzione rende l'autoefficacia sociale un importante fattore protettivo per il benessere psicologico e sociale, proteggendo sia dall'isolamento che dalle influenze negative del gruppo."}, "19.09": {"q": "Nella seguente funzione si tenta di assumere in anticipo alcuni comportamenti adulti ritenuti significativi:", "options": {"A": "Di controllo", "B": "Di leader carismatico", "C": "Di adultità", "D": "Di autoefficacia"}, "correct": "C", "a": "Di adultità", "expl": "Di adultità:\n\nLa dispensa, nell'analizzare le funzioni dei comportamenti antisociali e a rischio, elenca tra queste la \"funzione di adultità, in cui si tenta di assumere in anticipo alcuni comportamenti adulti ritenuti significativi\". Questo meccanismo spiega perché molti giovani mettono in atto condotte come il consumo di alcol, il fumo o altre trasgressioni: non si tratta solo di ribellione, ma di un tentativo precoce di conquistare uno status che percepiscono come tipico del mondo adulto, spesso fraintendendone i veri significati."}, "19.10": {"q": "Le principali funzioni della trasgressione sono:", "options": {"A": "L'esibizione sociale e il meccanismo contro-fobico", "B": "L'esibizione sessuale e il meccanismo fobico", "C": "L'accettazione del gruppo e l'identità", "D": "L'esibizione sociale e il meccanismo funzionale"}, "correct": "A", "a": "L'esibizione sociale e il meccanismo contro-fobico", "expl": "L'esibizione sociale e il meccanismo contro-fobico:\n\nLa dispensa afferma che \"per le persone in età evolutiva la trasgressione in genere ha una duplice funzione: esibizione sociale e meccanismo contro-fobico\". L'esibizione sociale riguarda il bisogno di farsi notare e di mostrare anticonformismo e coraggio per conquistare la stima altrui. Il meccanismo contro-fobico, invece, indica che l'atto trasgressivo viene vissuto come un modo per vincere la propria paura e fragilità interiore, affrontando l'ansia attraverso un'azione che appare audace e sfidante."}, "20.01": {"q": "Come spiega R. Brown (2000), lo status viene attribuito:", "options": {"A": "in relazione alle aspettative circa la competenza di ciascun membro rispetto al raggiungimento di scopi e obiettivi dell'intero gruppo", "B": "in relazione alle aspettative circa la competenza di alcunj membri rispetto al raggiungimento di scopi e obiettivi dell'intero gruppo", "C": "in relazione alle aspettative circa la competenza di ciascun membro rispetto al raggiungimento di scopi e obiettivi di una parte del gruppo", "D": "in relazione alle aspettative circa la competenza di ciascun membro rispetto al non raggiungimento di scopi e obiettivi dell'intero gruppo"}, "correct": "A", "a": "in relazione alle aspettative circa la competenza di ciascun membro rispetto al raggiungimento di scopi e obiettivi dell'intero gruppo", "expl": "in relazione alle aspettative circa la competenza di ciascun membro rispetto al raggiungimento di scopi e obiettivi dell'intero gruppo:\nSecondo R. Brown (2000), lo status non è una qualità astratta, ma si costruisce sulle aspettative che i membri del gruppo sviluppano circa le competenze di ognuno in funzione del successo collettivo. Queste aspettative si modellano attraverso un forte confronto sociale, che permette di valutare sia le proprie capacità che quelle altrui rispetto agli obiettivi comuni. Il riferimento esplicito all’“intero gruppo” è essenziale perché la teoria dello status lega la posizione di ciascuno al contributo percepito per il raggiungimento degli scopi condivisi."}, "20.02": {"q": "Si parla di ruoli sociali:", "options": {"A": "in riferimento alle aspettative non condivise sulle modalità in cui un individuo non dovrebbe comportarsi all'interno un gruppo", "B": "in riferimento alle aspettative condivise sulle modalità in cui un individuo dovrebbe comportarsi all'esterno del gruppo", "C": "in riferimento alle aspettative condivise sulle modalità in cui un individuo dovrebbe comportarsi all'interno un gruppo", "D": "in riferimento alle aspettative non condivise sulle modalità in cui un individuo dovrebbe comportarsi all'interno un gruppo"}, "correct": "C", "a": "in riferimento alle aspettative condivise sulle modalità in cui un individuo dovrebbe comportarsi all'interno un gruppo", "expl": "in riferimento alle aspettative condivise sulle modalità in cui un individuo dovrebbe comportarsi all'interno un gruppo:\nLa dispensa definisce i ruoli sociali come “aspettative condivise” sulle modalità di comportamento all’interno del gruppo, sottolineando che essi implicano una divisione del lavoro e rendono la vita del gruppo più prevedibile e ordinata. A differenza dello status, che riguarda la posizione valutata in base al prestigio, il ruolo si concentra sulle condotte attese. Questa definizione è ripresa alla lettera nel materiale, senza ambiguità."}, "20.03": {"q": "La minoranza può esercitare un'influenza indiretta e nascosta, detta:", "options": {"A": "condivisione", "B": "conversione", "C": "trasmutazione", "D": "mutamento"}, "correct": "B", "a": "conversione", "expl": "conversione"}, "20.04": {"q": "Il limite del modello di \"leader naturale\" proposto da Stogdill risiede nel fatto che:", "options": {"A": "i comportamenti delle persone non variano a seconda della situazione e a seconda del contesto, per cui i tratti di personalità risultano essere dinamici", "B": "i comportamenti delle persone non variano a seconda della situazione e a seconda del contesto, per cui i tratti di personalità risultano essere statici", "C": "i comportamenti delle persone variano a seconda della situazione e a seconda del contesto, per cui i tratti di personalità non risultano essere dinamici", "D": "i comportamenti delle persone variano a seconda della situazione e a seconda del contesto, per cui i tratti di personalità risultano essere dinamici"}, "correct": "D", "a": "i comportamenti delle persone variano a seconda della situazione e a seconda del contesto, per cui i tratti di personalità risultano essere dinamici", "expl": "i comportamenti delle persone variano a seconda della situazione e a seconda del contesto, per cui i tratti di personalità risultano essere dinamici:\nStogdill (1974) aveva individuato una lista di tratti tipici del leader, ma il suo modello fu criticato da Hollander perché i comportamenti non sono fissi: cambiano in base al contesto, rendendo i tratti di personalità dinamici. Questa critica è esplicitata nella dispensa come il limite fondamentale dell’approccio del “grande uomo”, poiché la leadership naturale si rivelò solo un’idea suggestiva del senso comune, slegata dalle condizioni situazionali."}, "20.05": {"q": "La funzione del leader emozionale è:", "options": {"A": "quella di assicurare che il clima di gruppo non sia armonioso e cooperativo all'interno del quale far procedere il gruppo", "B": "quella di assicurare che il clima di gruppo sia armonioso e cooperativo all'interno del quale far procedere il gruppo", "C": "quella di realizzare i compiti da perseguire ed è costantemente concentrato al raggiungimento degli obiettivi da parte del gruppo", "D": "quella di assicurare che il clima di gruppo sia poco armonioso e cooperativo all'interno del quale far procedere a rilento il gruppo"}, "correct": "B", "a": "quella di assicurare che il clima di gruppo sia armonioso e cooperativo all'interno del quale far procedere il gruppo", "expl": "quella di assicurare che il clima di gruppo sia armonioso e cooperativo all'interno del quale far procedere il gruppo:\nBales e Slater (1955) distinsero due funzioni fondamentali: il leader socio‑emozionale si occupa del clima relazionale, garantendo armonia e cooperazione, e facilita i rapporti interpersonali tenendo conto dei sentimenti e degli umori dei singoli. Questa figura è centrata sulla relazione, è supportiva e amichevole, e tende a sedare conflitti e tensioni. La definizione corretta richiama proprio il mantenimento di un clima positivo, condizione indispensabile per far procedere il gruppo."}, "20.06": {"q": "Il leader centrato sul compito si prefigge di:", "options": {"A": "realizzare i compiti da perseguire ed è costantemente concentrato al raggiungimento degli obiettivi da parte del gruppo", "B": "quella di assicurare che il clima di gruppo non sia armonioso e cooperativo all'interno del quale far procedere il gruppo", "C": "realizzare i compiti da perseguire e non è costantemente concentrato al raggiungimento degli obiettivi da parte del gruppo", "D": "quella di realizzare i compiti da perseguire ed è costantemente concentrato al raggiungimento degli obiettivi da parte del gruppo"}, "correct": "A", "a": "realizzare i compiti da perseguire ed è costantemente concentrato al raggiungimento degli obiettivi da parte del gruppo", "expl": "realizzare i compiti da perseguire ed è costantemente concentrato al raggiungimento degli obiettivi da parte del gruppo:\nIl leader centrato sul compito, sempre secondo la tipologia di Bales e Slater, ha l’obiettivo primario di realizzare i compiti e mantenere alta l’attenzione sugli obiettivi del gruppo. Per farlo, utilizza spesso uno stile autoritario, emette comandi e sottolinea le gerarchie, anche se questo può generare tensioni. La dispensa specifica che egli è “costantemente concentrato” sul raggiungimento degli scopi, elemento che distingue nettamente questa funzione da quella socio‑emozionale."}, "20.07": {"q": "Il leader carismatico possiede:", "options": {"A": "una visione poco chiara degli obiettivi che il gruppo dovrebbe raggiungere, una ridotta capacità di renderli chiari e non è sempre in grado di farsi seguire dai membri del gruppo", "B": "una visione poco chiara degli obiettivi che il gruppo dovrebbe raggiungere, una notevole capacità di renderli chiari ed è in grado a volte di farsi seguire dai membri del gruppo", "C": "una visione chiara degli obiettivi che il gruppo dovrebbe raggiungere, una notevole capacità di renderli chiari ed è in grado di farsi seguire dai membri del gruppo", "D": "una visione chiara degli obiettivi che il gruppo dovrebbe raggiungere, una ridotta capacità di renderli chiari ed è in grado di farsi seguire dai membri di un altro gruppo"}, "correct": "C", "a": "una visione chiara degli obiettivi che il gruppo dovrebbe raggiungere, una notevole capacità di renderli chiari ed è in grado di farsi seguire dai membri del gruppo", "expl": "una visione chiara degli obiettivi che il gruppo dovrebbe raggiungere, una notevole capacità di renderli chiari ed è in grado di farsi seguire dai membri del gruppo:\nSecondo House e Shamir (1993), il leader carismatico si distingue per l’espressività emotiva, la sicurezza e la determinazione. Egli possiede una visione chiara degli obiettivi, sa comunicarla con un linguaggio comprensibile, è ottimista e riesce a coinvolgere i membri del gruppo. La dispensa sottolinea che questa figura non ha conflitti interiori ed è convinta della correttezza delle proprie idee, qualità che gli consentono di essere seguito."}, "20.08": {"q": "Il leader permissivo è colui che:", "options": {"A": "delega alcuni compiti ad altri, distribuisce le responsabilità e concorda insieme ai membri le decisioni da seguire", "B": "si dimostra distaccato rispetto al resto del gruppo, assegna le direttive stabilendo di volta in volta i passi da compiere", "C": "fa sì che sia il gruppo a decidere le attività da svolgere e anche il compagno di lavoro", "D": "interviene il meno possibile e lascia il gruppo libero di agire"}, "correct": "D", "a": "interviene il meno possibile e lascia il gruppo libero di agire", "expl": "interviene il meno possibile e lascia il gruppo libero di agire"}, "20.09": {"q": "L'approccio situazionista si fonda sulla convinzione che il leader:", "options": {"A": "non influenza il gruppo, ma è influenzato dalle aspettative e richieste del gruppo", "B": "debba svolgere diverse funzioni in situazioni che richiedono compiti diversi", "C": "debba svolgere sempre le medesime funzioni anche in situazioni che richiedono compiti diversi", "D": "non solo influenza il gruppo, ma è egli stesso influenzato dalle aspettative e richieste del gruppo"}, "correct": "B", "a": "debba svolgere diverse funzioni in situazioni che richiedono compiti diversi", "expl": "debba svolgere diverse funzioni in situazioni che richiedono compiti diversi:\nL’approccio situazionista, come indicato nella dispensa, parte dal presupposto che il contenuto e il contesto dell’attività determinano richieste comportamentali differenti, per cui il leader deve adattare le proprie funzioni alla situazione specifica. Tra gli elementi situazionali rilevanti vi sono i climi competitivi o cooperativi, la stabilità ambientale e la grandezza del gruppo. Questo modello ha il merito di aver superato le teorie basate sui tratti, ma secondo Hollander trascura le caratteristiche personali del leader e i processi relazionali."}, "20.10": {"q": "Un leader viene legittimato quando:", "options": {"A": "viene scelto dai membri del gruppo invece che essere imposto dall'esterno", "B": "non viene scelto dai membri del gruppo ma viene imposto dall'esterno", "C": "non sa conformarsi alle norme del gruppo nelle fasi iniziali", "D": "non sa identificarsi con il suo gruppo"}, "correct": "A", "a": "viene scelto dai membri del gruppo invece che essere imposto dall'esterno", "expl": "viene scelto dai membri del gruppo invece che essere imposto dall'esterno:\nSecondo i modelli transazionali di Hollander, la legittimazione del leader si fonda su quattro condizioni: essere scelto dal gruppo (e non imposto), conformarsi alle norme nelle fasi iniziali, mostrare le competenze necessarie per raggiungere gli obiettivi e sapersi identificare con il gruppo. La scelta da parte dei membri è la prima e più evidente di queste condizioni, ed è collegata al concetto di credito idiosincratico: il leader guadagna fiducia attraverso la lealtà e le prove di abilità, e solo dopo può proporre innovazioni."}, "21.01": {"q": "La categorizzazione è:", "options": {"A": "il processo di differenziazione di qualcosa sapendo a quali altre cose è equivalente e rispetto a quali altre cose è differente", "B": "il processo di comprensione di qualcosa sapendo a quali altre cose è equivalente e rispetto a quali altre cose è differente", "C": "il processo di comprensione di qualcosa sapendo a quali altre cose è equivalente e rispetto a quali altre cose è simile", "D": "il processo di comprensione di qualcosa sapendo a quali altre cose potrebbe essere equivalente e rispetto a quali altre cose è maggiormente differente"}, "correct": "B", "a": "il processo di comprensione di qualcosa sapendo a quali altre cose è equivalente e rispetto a quali altre cose è differente", "expl": "il processo di comprensione di qualcosa sapendo a quali altre cose è equivalente e rispetto a quali altre cose è differente:\nQuesta definizione è ripresa letteralmente da McGarty, 1999. Sottolinea che categorizzare non è semplicemente differenziare, ma comprendere un oggetto collocandolo in una rete di equivalenze e differenze. È il processo mentale che ci permette di ordinare il mondo e di dare significato agli stimoli che ci circondano."}, "21.02": {"q": "I prototipi sono:", "options": {"A": "i membri più rappresentativi di una categoria", "B": "i membri meno rappresentativi di una categoria", "C": "i membri più rappresentativi di un gruppo", "D": "i membri meno rappresentativi di un gruppo"}, "correct": "A", "a": "i membri più rappresentativi di una categoria", "expl": "i membri più rappresentativi di una categoria:\nLa dispensa specifica che i prototipi sono i membri più rappresentativi di una categoria e che la tipicità, ovvero il grado di vicinanza al prototipo, è variabile. Un membro atipico viene categorizzato più lentamente o con maggiori errori. Questo concetto è fondamentale perché collega la categorizzazione alla formazione degli stereotipi sociali."}, "21.03": {"q": "L'esperimento di Tajfel e Wilkes del 1963 dimostrò:", "options": {"A": "come nel giudizio sociale la sola divisione in gruppi potesse creare un effetto di omogeneità dell'ingroup", "B": "come nel giudizio sociale la sola divisione in gruppi potesse creare un effetto di disomogeneità dell'outgroup", "C": "come nel giudizio sociale la sola divisione in gruppi potesse creare un effetto di omogeneità dell'outgroup", "D": "come nel giudizio sociale la sola divisione in gruppi non potesse creare un effetto di omogeneità dell'outgrou"}, "correct": "C", "a": "come nel giudizio sociale la sola divisione in gruppi potesse creare un effetto di omogeneità dell'outgroup", "expl": "come nel giudizio sociale la sola divisione in gruppi potesse creare un effetto di omogeneità dell'outgroup:\nNell'esperimento con le linee, i partecipanti che vedevano gli stimoli etichettati come A e B esageravano le differenze tra le due categorie. Tajfel estrapolò questo risultato al giudizio sociale, ipotizzando che la semplice divisione in gruppi crei un effetto di omogeneità dell'outgroup: la percezione che \"loro\" siano tutti uguali, a differenza del nostro gruppo. Questo fenomeno è alla base della formazione di stereotipi e pregiudizi."}, "21.04": {"q": "Secondo Tajfel, il processo di categorizzazione è sufficiente a produrre un'asimmetria valutativa, ovvero:", "options": {"A": "un favoritismo per l'outgroup e una conseguente discriminazione comportamentale nei confronti dei membri dell'ingroup", "B": "uno svantaggio per l'ingroup e un conseguente favoritismo comportamentale nei confronti dei membri dell'outgroup", "C": "un favoritismo per l'ingroup senza alcuna discriminazione comportamentale nei confronti dei membri dell'outgroup", "D": "un favoritismo per l'ingroup e una conseguente discriminazione comportamentale nei confronti dei membri dell'outgroup"}, "correct": "D", "a": "un favoritismo per l'ingroup e una conseguente discriminazione comportamentale nei confronti dei membri dell'outgroup", "expl": "un favoritismo per l'ingroup e una conseguente discriminazione comportamentale nei confronti dei membri dell'outgroup:\nLa dispensa indica che la categorizzazione, anche basata su criteri arbitrari, produce un'asimmetria valutativa. Questa si traduce in un favoritismo verso il proprio gruppo e in una discriminazione verso l'outgroup. Il paradigma del gruppo minimo di Tajfel del 1971 ha dimostrato che i partecipanti tendono ad attribuire più risorse ai membri dell'ingroup, anche in assenza di interazioni personali."}, "21.05": {"q": "Le categorie sono dunque definite prototipi e, parlando di categorie sociali, possiamo definire i prototipi come:", "options": {"A": "pregiudizi", "B": "stereotipi", "C": "intercategorie", "D": "modelli"}, "correct": "B", "a": "stereotipi", "expl": "stereotipi:\nLa dispensa afferma esplicitamente che, parlando di categorie sociali, i prototipi possono essere definiti come stereotipi (Crisp, Turner, 2017). Uno stereotipo è quindi l'insieme di attributi che rappresentano mentalmente un gruppo sociale. Questo legame è cruciale per comprendere come la categorizzazione porti alla generalizzazione di tratti a tutti i membri di un gruppo."}, "21.06": {"q": "Un prototipo è:", "options": {"A": "un insieme di attributi che descrive un gruppo e lo distingue da altri gruppi rilevanti", "B": "un insieme di attributi che non descrive un gruppo ma lo distingue da altri gruppi rilevanti", "C": "un insieme di attributi che descrive un gruppo ma non lo distingue da altri gruppi rilevanti", "D": "una caratteristica peculiare che descrive un gruppo e lo distingue da altri gruppi rilevanti"}, "correct": "A", "a": "un insieme di attributi che descrive un gruppo e lo distingue da altri gruppi rilevanti", "expl": "un insieme di attributi che descrive un gruppo e lo distingue da altri gruppi rilevanti:\nLa dispensa definisce il prototipo come un insieme di attributi – percezioni, credenze, atteggiamenti, sentimenti, comportamenti – che descrive un gruppo e lo distingue da altri gruppi rilevanti. Inoltre, i prototipi obbediscono al principio del metacontrasto. Questo significa che, quando categorizziamo, appiattiamo le differenze interne al gruppo ed enfatizziamo quelle tra i gruppi."}, "21.07": {"q": "L'errore fondamentale di attribuzione:", "options": {"A": "contribuisce in maniera residuale alla formazione di stereotipi distorti", "B": "contribuisce in maniera determinante alla formazione di stereotipi distorti", "C": "non contribuisce in maniera determinante alla formazione di stereotipi distorti", "D": "non contribuisce in maniera determinante alla formazione di pregiudizi"}, "correct": "B", "a": "contribuisce in maniera determinante alla formazione di stereotipi distorti", "expl": "contribuisce in maniera determinante alla formazione di stereotipi distorti:\nLa dispensa riporta che l'errore fondamentale di attribuzione, teorizzato da Heider nel 1958. Nel contesto delle relazioni intergruppi, questo errore porta a giudicare i comportamenti positivi dell'ingroup come dovuti a cause interne e quelli negativi a cause esterne, mentre per l'outgroup si verifica il contrario. Questo meccanismo alimenta e consolida gli stereotipi."}, "21.08": {"q": "Il pregiudizio è un fenomeno di gruppo che si caratterizza:", "options": {"A": "in termini di rapporti tra gruppi e di consolidamento di credenze non preconcette a tutti i membri di un outgroup", "B": "in termini di rapporti tra gruppi senza il consolidamento di credenze preconcette a tutti i membri di un outgroup", "C": "in termini di rapporti tra gruppi e di consolidamento di credenze preconcette a tutti i membri di un outgroup", "D": "in termini di rapporti tra gruppi e di consolidamento di credenze preconcette a tutti i membri dell'ingroup"}, "correct": "C", "a": "in termini di rapporti tra gruppi e di consolidamento di credenze preconcette a tutti i membri di un outgroup", "expl": "in termini di rapporti tra gruppi e di consolidamento di credenze preconcette a tutti i membri di un outgroup:\nQuindi un processo che si manifesta nelle dinamiche intergruppi e non solo a livello individuale. Questo sottolinea come il pregiudizio sia radicato nella struttura delle relazioni sociali."}, "21.09": {"q": "Secondo Tajfel (1981) le persone tendono a mantenere un'identità sociale positiva, e perciò:", "options": {"A": "cercano di far parte di gruppi non valutati positivamente in base al confronto sociale", "B": "cercano di far parte di gruppi valutati negativamente in base al confronto sociale", "C": "cercano di far parte di gruppi valutati positivamente indipendentemente dal confronto sociale", "D": "cercano di far parte di gruppi valutati positivamente in base al confronto sociale"}, "correct": "D", "a": "cercano di far parte di gruppi valutati positivamente in base al confronto sociale", "expl": "cercano di far parte di gruppi valutati positivamente in base al confronto sociale:\nPer raggiungere questo obiettivo, cercano di appartenere a gruppi valutati positivamente, e questa valutazione avviene attraverso il confronto sociale con altri gruppi. Il desiderio di un'identità positiva spinge quindi a favorire l'ingroup e a discriminare l'outgroup, poiché ciò aumenta l'autostima collettiva."}, "21.10": {"q": "Sherif nell'ultimo dei suoi esperimenti in campi estivi:", "options": {"A": "aggiunse una quarta fase", "B": "non aggiunse alcuna fase", "C": "non notò alcun cambiamento", "D": "notò un aumento della tensione intergruppi"}, "correct": "A", "a": "aggiunse una quarta fase", "expl": "aggiunse una quarta fase:\nSi narra che Sherif, dispiaciuto per l'elevata conflittualità generata nelle fasi di competizione, aggiunse una quarta fase al suo esperimento. In questa fase, i due gruppi dovevano cooperare per raggiungere uno scopo sovraordinato. Questo portò a una diminuzione della tensione e dell'ostilità tra i gruppi. La quarta fase è quindi un elemento distintivo del suo lavoro, che dimostra come la cooperazione possa ridurre il conflitto."}, "22.01": {"q": "Le tensioni tra cooperazione e competizione intergruppo sono simili alle tensioni tra:", "options": {"A": "le relazioni sociali tra le persone e tra i gruppi sociali", "B": "fusione e individuazione a livello interpersonale", "C": "coesione e individuazione a livello interpersonale", "D": "fusione e deindividuazione a livello intrapersonale"}, "correct": "B", "a": "fusione e individuazione a livello interpersonale", "expl": "fusione e individuazione a livello interpersonale:\nQuesta analogia è presentata all'inizio dell'introduzione della dispensa. Così come a livello individuale ogni persona vive la tensione tra il bisogno di fondersi con l'altro e quello di mantenere la propria unicità, allo stesso modo a livello intergruppi esiste una tensione analoga tra cooperazione e competizione. Questo parallelismo aiuta a comprendere che le dinamiche relazionali si ripetono su scale diverse, dal piano interpersonale a quello intergruppi. Si tratta di un'idea chiave per inquadrare la natura delle relazioni sociali."}, "22.02": {"q": "In certe relazioni tra i gruppi, a una grande omogeneità intragruppo corrisponde un altrettanto grande:", "options": {"A": "omogeneità tra gruppi diversi", "B": "disomogeneità tra gruppi diversi", "C": "differenziazione tra gruppi diversi", "D": "deumanizzazione tra membri del gruppo"}, "correct": "A", "a": "omogeneità tra gruppi diversi", "expl": "omogeneità tra gruppi diversi:\nQuesto concetto è speculare: più i membri del proprio gruppo sono simili tra loro, più si tenderà a vedere l'altro gruppo come un blocco uniforme. Allo stesso modo, quando la differenziazione tra i gruppi è elevata, aumenta anche la differenziazione all'interno di ciascun gruppo."}, "22.03": {"q": "Molte teorie sulle relazioni intergruppi sostengono che la solidarietà intra gruppo aumenta:", "options": {"A": "quando non sono in corso conflitti intergruppi", "B": "quando non sono in corso conflitti tra i membri del gruppo", "C": "quando sono in corso conflitti tra i membri del gruppo", "D": "quando sono in corso conflitti intergruppi"}, "correct": "D", "a": "quando sono in corso conflitti intergruppi", "expl": "quando sono in corso conflitti intergruppi:\nla presenza di un conflitto con un gruppo esterno tenda a rinsaldare i legami interni. Questo meccanismo è stato teorizzato da vari autori, tra cui Freud e Lewin, e rappresenta uno dei principi classici della psicologia sociale delle relazioni intergruppi. La minaccia esterna funge da collante per l'identità e la coesione del gruppo."}, "22.04": {"q": "Il seguente Autore afferma che è tipico dei dittatori inventare un nemico esterno per convogliare su di esso l'aggressività che si genera all'interno del gruppo sociale che governano:", "options": {"A": "Tajfel", "B": "Sherif", "C": "Freud", "D": "Lewin"}, "correct": "D", "a": "Lewin", "expl": "Lewin:\nLa dispensa attribuisce questa affermazione a Kurt Lewin, il quale osservò che nei regimi dittatoriali è pratica comune inventare un nemico esterno per incanalare l'aggressività interna. Lewin è un autore fondamentale per la psicologia sociale e la dinamica di gruppo, e questa sua intuizione sarà successivamente ripresa e ampliata anche da Zimbardo. Il contesto è quello delle teorie che spiegano il bisogno di un capro espiatorio per mantenere l'ordine sociale interno."}, "22.05": {"q": "E' quest'ultima la variabile decisiva affinché il conflitto si attivi:", "options": {"A": "l'identificazione della contrapposizione", "B": "la decisione ad agire", "C": "il conflitt risolvibile", "D": "il conflitto intrattabile"}, "correct": "B", "a": "la decisione ad agire", "expl": "la decisione ad agire:\nun conflitto può rimanere latente per molto tempo e che la condizione decisiva per la sua attivazione è che almeno una delle parti decida di agire per affrontare la contrapposizione. L'identificazione della contrapposizione è la prima condizione necessaria, ma è la decisione ad agire che trasforma il potenziale conflitto in conflitto reale, facendolo emergere anche solo a livello verbale."}, "22.06": {"q": "I seguenti tipi di conflitti hanno durata relativamente breve, con obiettivi poco importanti per cui è possibile che le due parti possano trovare una soluzione condivisa:", "options": {"A": "risolvibili", "B": "irrisolvibili", "C": "estremi", "D": "gestibili"}, "correct": "A", "a": "risolvibili", "expl": "risolvibili:\nhanno una durata relativamente breve e riguardano obiettivi di importanza limitata per le parti coinvolte. In questi casi, a differenza di quelli intrattabili, esiste la possibilità concreta di trovare un accordo o un compromesso. Si tratta di una categoria utile per distinguere i conflitti gestibili da quelli che invece si protraggono nel tempo senza via d'uscita."}, "22.07": {"q": "I seguenti tipi di conflitti sono prolunganti nel tempo, senza possibilità di compromesso tra le parti e con un uso estremo di violenza:", "options": {"A": "gestibili", "B": "intrattabili", "C": "risolvibili", "D": "intergruppi"}, "correct": "B", "a": "intrattabili", "expl": "intrattabili:\nsono caratterizzati da una durata prolungata nel tempo, dall'impossibilità di trovare un compromesso e dall'uso estremo della violenza. Tra le loro caratteristiche specifiche figurano l'effetto totalizzante, la natura a somma zero, il toccare parti vitali della vita delle persone coinvolte e la giustificazione della violenza tramite l'ideologia. Esempi tipici sono i conflitti religiosi o etnici."}, "22.08": {"q": "Uno dei contributi più autorevoli per la riduzione del pregiudizio fra i gruppi sociali è stata la seguente teoria:", "options": {"A": "dell'autorità", "B": "del conflitto realistico", "C": "del contatto", "D": "delle pressioni sociali"}, "correct": "C", "a": "del contatto", "expl": "del contatto:\nSecondo questa teoria, la semplice interazione tra persone appartenenti a gruppi diversi, a determinate condizioni, può ridurre la tensione e il pregiudizio etnico. Questa idea è stata alla base delle politiche di desegregazione razziale degli Stati Uniti negli anni Sessanta."}, "22.09": {"q": "Secondo il seguente Autore il solo contatto non garantisce l'accordo tra i gruppi e la diminuzione del pregiudizio:", "options": {"A": "Tajfel", "B": "Sherif", "C": "Freud", "D": "Allport"}, "correct": "D", "a": "Allport", "expl": "Allport:\nGordon Allport, nel suo celebre studio del 1954, sostiene che il solo contatto fisico tra gruppi non è sufficiente a garantire la riduzione del pregiudizio. Perché il contatto sia efficace, devono essere soddisfatte condizioni specifiche, come il raggiungimento di obiettivi comuni, lo status simile tra i partecipanti e il supporto istituzionale."}, "22.10": {"q": "Il modello di decategorizzazione di Brewer e Miller (1984) enfatizza il ruolo della percezione interpersonale durante il:", "options": {"A": "conflitto", "B": "contatto", "C": "gioco di ruolo", "D": "nazismo"}, "correct": "B", "a": "contatto", "expl": "contatto:\nSecondo questo approccio, per ottenere effetti positivi è necessario che le relazioni basate sulle categorie sociali vengano sostituite da relazioni interpersonali, in cui si vede l'altro come individuo unico. L'obiettivo è ridurre la salienza delle appartenenze di gruppo per favorire un'interazione più autentica."}, "23.01": {"q": "Il seguente Autore ha elaborato la teoria definita ontologia deterministica e materialistica:", "options": {"A": "Kant", "B": "Freud", "C": "Hobbes", "D": "Rousseau"}, "correct": "C", "a": "Hobbes", "expl": "Hobbes:\nNel paragrafo introduttivo della dispensa si legge che il filosofo Thomas Hobbes, nel suo testo \"Il Leviatano\" del 1651, sviluppò una teoria definita come ontologia deterministica e materialistica. Secondo questa visione, gli esseri umani sono naturalmente inclini all'aggressività verso i propri simili, e per questo le istituzioni sociali hanno il compito di reprimere queste tendenze antisociali per garantire una buona convivenza. Per ricordarlo, basta associare Hobbes alla sua celebre visione dell'uomo come \"lupo per gli altri uomini\"."}, "23.02": {"q": "La celebre frase \"homo homini lupus\" appartiene al seguente Autore:", "options": {"A": "Kant", "B": "Freud", "C": "Hobbes", "D": "Rousseau"}, "correct": "C", "a": "Hobbes", "expl": "Hobbes:\nLa dispensa cita espressamente l'espressione latina \"homo homini lupus\" attribuendola a Thomas Hobbes, per il quale l'uomo è un lupo divoratore per ogni altro uomo. Questa massima riassume perfettamente il suo pensiero filosofico secondo cui la natura umana è contraddistinta da un'aggressività innata. È un'espressione chiave che funge da sintesi della sua teoria sull'ordine sociale e la necessità dell'autorità."}, "23.03": {"q": "Secondo il seguente Autore è la società che corrompe l'uomo:", "options": {"A": "Kant", "B": "Freud", "C": "Hobbes", "D": "Rousseau"}, "correct": "D", "a": "Rousseau", "expl": "Rousseau:\nLa dispensa spiega che Jean-Jacques Rousseau, nel suo \"Discorso sull'origine e i fondamenti dell'ineguaglianza tra gli uomini\" del 1754, considerava la natura umana essenzialmente buona alla nascita. Secondo Rousseau, è la società che successivamente corrompe l'uomo, allontanandolo dalla sua disposizione naturale alla compassione e alla pietà. Questa visione si contrappone nettamente a quella di Hobbes, ed è utile ricordarla come l'idea del \"buon selvaggio\" corrotto dalla civiltà."}, "23.04": {"q": "Il seguente Autore afferma che l'aggressività umana è inevitabile perché frutto della tensione tra due istinti primari, eros e thanatos:", "options": {"A": "Freud", "B": "Hegel", "C": "Bentham", "D": "Comte"}, "correct": "A", "a": "Freud", "expl": "Freud:\nSigmund Freud, nel suo approccio psicologico, sostiene che l'aggressività umana deriva dalla tensione tra due istinti primari: Eros, l'istinto di vita e autoconservazione, e Thanatos, l'istinto di morte e autodistruzione. Per evitare che l'energia distruttiva di Thanatos si rivolga contro il soggetto stesso, essa viene riversata verso l'esterno sotto forma di aggressività. Questa teoria è esposta nel saggio \"Il disagio della civiltà\" del 1929, dove Freud analizza anche i limiti che la civiltà impone a tali manifestazioni."}, "23.05": {"q": "Quando l'aggressività emotiva viene messa in atto come risposta ad un attacco si parla di:", "options": {"A": "aggressività strumentale", "B": "aggressività sociale", "C": "aggressività di difesa o ritorsione", "D": "aggressività criminale"}, "correct": "C", "a": "aggressività di difesa o ritorsione", "expl": "aggressività di difesa o ritorsione:\nNel paragrafo dedicato ai vari tipi di aggressività, la dispensa specifica che si parla di aggressività di difesa o ritorsione quando l'aggressività emotiva viene messa in atto come risposta a un attacco. Questa reazione scatta quando la persona percepisce di subire una provocazione intenzionale, reale o fisica. Si tratta quindi di una risposta emotiva a una minaccia percepita, che si distingue per la sua natura reattiva e immediata."}, "23.06": {"q": "Comprende i comportamenti violenti messi in atto da soggetti psicopatici:", "options": {"A": "aggressività bizzarra", "B": "aggressività sociale", "C": "aggressività strumentale", "D": "aggressività criminale"}, "correct": "A", "a": "aggressività bizzarra", "expl": "aggressività bizzarra:\nLa dispensa definisce l'aggressività bizzarra come i comportamenti violenti messi in atto da soggetti psicopatici. Si tratta di un tipo di violenza che appare inspiegabile, strana e spesso crudelmente gratuita, riflettendo una struttura di personalità gravemente disturbata. È importante ricordare questa definizione perché la \"bizzarria\" è il tratto distintivo che la separa dalle altre forme di aggressività, che hanno invece motivazioni più comprensibili o finalizzate."}, "23.07": {"q": "Il seguente tipo di aggressività viene agita soprattutto all'interno delle relazioni intime e caratterizza quelle persone che reagiscono in modo violento con esplosioni di rabbia:", "options": {"A": "aggressività bizzarra", "B": "aggressività emotiva", "C": "aggressività strumentale", "D": "aggressività criminale"}, "correct": "B", "a": "aggressività emotiva", "expl": "aggressività emotiva:\nLa dispensa descrive l'aggressività emotiva come un tipo di violenza che viene agita soprattutto all'interno delle relazioni intime e caratterizza quelle persone che reagiscono in modo violento con esplosioni di rabbia. A differenza dell'aggressività strumentale, non è calcolata né finalizzata a un obiettivo specifico, ma è una reazione impulsiva e dettata dall'emozione del momento. Inoltre, chi la mette in atto non tiene conto delle eventuali punizioni, il che la rende particolarmente pericolosa nei contesti affettivi."}, "23.08": {"q": "Il seguente Autore ha formulato la teoria della \"degenerazione\":", "options": {"A": "Auguste Comte", "B": "William McDougall", "C": "Lombroso", "D": "Friedrik Hegel"}, "correct": "C", "a": "Lombroso", "expl": "Lombroso:\nCesare Lombroso, in Italia, formulò la teoria della \"degenerazione\" per spiegare la genesi del comportamento criminale. Con questo termine intendeva la progressiva compromissione delle funzioni mentali superiori che permettono l'adattamento alle norme etico-sociali. Secondo Lombroso, il criminale manifestava un \"atavismo\", ovvero la ricomparsa di tratti psicologici e comportamentali arcaici e amorali tipici dell'uomo primitivo, come se la persona fosse ferma a uno stadio evolutivo precedente."}, "23.09": {"q": "Il seguente modello si focalizza sulle radici cognitive delle emozioni e dei comportamenti aggressivi:", "options": {"A": "cognitivo neoassociazionista", "B": "cognitivo associazionista", "C": "cognitivo comportamentale", "D": "cognitivista"}, "correct": "A", "a": "cognitivo neoassociazionista", "expl": "cognitivo neoassociazionista:\nIl modello cognitivo neoassociazionista, proposto da Leonard Berkowitz, si focalizza sulle radici cognitive delle emozioni e dei comportamenti aggressivi. La teoria si basa sull'idea che le emozioni umane, in particolare l'aggressività, siano associate a specifiche configurazioni cognitive. Le esperienze passate, le memorie e gli stati emotivi precedenti influenzano la risposta a nuovi stimoli attraverso \"catene cognitive\", che possono attivare reazioni sia prosociali che aggressive. Questo modello integra gli aspetti emotivi con quelli cognitivi e ambientali, spiegando come i \"segnali\" scatenanti possano innescare la rabbia."}, "23.10": {"q": "Il seguente Autore affermò che la frustrazione genera rabbia, che a sua volta aumenta la probabilità della messa in atto di un comportamento aggressivo:", "options": {"A": "Freud", "B": "Hegel", "C": "Dollard e Miller", "D": "Berkowitz"}, "correct": "D", "a": "Berkowitz", "expl": "Berkowitz:\nLeonard Berkowitz, nel suo modello cognitivo neoassociazionista, affermò che la frustrazione genera rabbia e che la rabbia, a sua volta, aumenta la probabilità della messa in atto di un comportamento aggressivo. Tuttavia, egli precisò che l'aggressività si scatena solo se dall'ambiente provengono adeguati segnali scatenanti, come una persona sgradita. Berkowitz si differenzia così dalla teoria di Dollard e Miller, che postulava un rapporto biunivoco diretto tra frustrazione e aggressività, introducendo invece il ruolo fondamentale dei segnali ambientali e delle associazioni cognitive."}, "24.01": {"q": "Il seguente Autore verificò che soggetti che avevano visionato un film violento somministravano scariche elettriche pi forti rispetto a coloro che avevano visto un film inoffensivo:", "options": {"A": "Buss", "B": "Berkowitz", "C": "Freud", "D": "Bentham"}, "correct": "A", "a": "Buss", "expl": "Buss:\nBuss condusse un esperimento di laboratorio, riportato da Smith e colleghi nel 2015, in cui emerse che i soggetti esposti a un film violento somministravano scariche elettriche di intensità maggiore rispetto a chi aveva visto un contenuto inoffensivo. Questo risultato si inserisce nel filone di studi che indaga gli effetti dei modelli aggressivi veicolati dai media sul comportamento delle persone. L'esperimento conferma che l'esposizione a contenuti violenti non rimane neutrale, ma modifica la soglia di reattività aggressiva, rendendo più probabile l'adozione di risposte offensive."}, "24.02": {"q": "Secondo il seguente Autore tutti i sentimenti negativi possono indurre aggressività, proprio perché essa è una delle varianti di risposte possibili, ma può divenire la risposta predominante solo se si verificano delle particolari condizioni:", "options": {"A": "Auguste Comte", "B": "William McDougall", "C": "Norman Triplett", "D": "Berkowitz"}, "correct": "D", "a": "Berkowitz", "expl": "Berkowitz:\nBerkowitz è l'autore che ha teorizzato come gli stati emotivi negativi possano generare aggressività, ma che questa diventi la risposta prevalente solo in presenza di specifici fattori scatenanti, come la presenza di stimoli associati alla violenza. La sua prospettiva si discosta da una visione semplicistica della frustrazione-aggressività e introduce il concetto di \"indizi aggressivi\" (cue), elementi ambientali che facilitano l'emergere del comportamento violento. Nel celebre esperimento con il fucile e la racchetta, Berkowitz e LePage dimostrarono che la frustrazione aumenta la propensione alla violenza, ma solo se è presente un oggetto che simbolicamente richiama l'aggressività."}, "24.03": {"q": "In un noto esperimento è stato possibile diminuire l'accessibilità a pensieri aggressivi e ridurre la probabilità che i soggetti giudicassero un comportamento incerto come aggressivo nel seguente modo:", "options": {"A": "attraverso la persuasione degli adulti", "B": "giocando con i videogiochi prosociali", "C": "attraverso l'esempio degli insegnanti", "D": "giocando in circle time"}, "correct": "B", "a": "giocando con i videogiochi prosociali", "expl": "giocando con i videogiochi prosociali:\nLo studio condotto da Greitemeyer e Ossewald nel 2009 dimostrò che l'esposizione a videogiochi prosociali – cioè giochi che premiano la cooperazione, l'aiuto e la gentilezza – riduce l'accessibilità cognitiva ai pensieri aggressivi e abbassa la tendenza a interpretare come ostili i comportamenti ambigui. Questo dato è particolarmente significativo perché inverte la prospettiva classica sugli effetti dei videogiochi, mostrando che i contenuti positivi possono stimolare meccanismi di apprendimento sociale virtuoso. La ricerca suggerisce che condividere esperienze prosociali può favorire l'emergere di condotte altruistiche e ridurre la predisposizione all'aggressività."}, "24.04": {"q": "Il seguente Autore riteneva che l'imitazione fosse il principio alla base del comportamento sociale, soprattutto nei grandi gruppi:", "options": {"A": "Le Bon", "B": "Hegel", "C": "Tarde", "D": "Comte"}, "correct": "C", "a": "Tarde", "expl": "Tarde:\nGabriel Tarde, nel 1904, sostenne che l'imitazione costituisce il fondamento di ogni comportamento sociale, con particolare rilevanza nei contesti collettivi e nei grandi gruppi. Per Tarde, i processi imitativi sono alla base della diffusione delle norme, delle mode e delle condotte, e spiegano come le azioni individuali si allineino a quelle del gruppo. La sua teoria si contrappone a una visione puramente razionalistica dell'agire sociale e anticipa molti sviluppi successivi della psicologia sociale, in particolare quelli legati all'apprendimento osservativo e alla modellizzazione."}, "24.05": {"q": "Il seguente Autore tentava di spiegare i fenomeni suggestivi di gruppo come una sorta di ipnosi collettiva:", "options": {"A": "Hegel", "B": "Le Bon", "C": "Bentham", "D": "Comte"}, "correct": "B", "a": "Le Bon", "expl": "Le Bon:\nGustave Le Bon, nel 1895, propose che i fenomeni di suggestione all'interno delle folle agiscano come una vera e propria ipnosi collettiva. Secondo lo studioso, quando un individuo entra in una massa coesa, la sua volontà critica e la sua razionalità vengono sospese, lasciando spazio a processi di contagio emotivo e di suggestione che lo rendono ricettivo a impulsi irrazionali, anche violenti. Questa visione gettò le basi per la teoria della deindividuazione, secondo la quale la perdita dell'identità personale e della consapevolezza di sé favorisce l'emergere di comportamenti antisociali."}, "24.06": {"q": "Gustave Le Bon pubblica il volume:", "options": {"A": "Psicologia delle masse e analisi dell'Io", "B": "La psicologia sociale delle folle", "C": "Psicologia delle masse", "D": "La psicologia delle folle"}, "correct": "D", "a": "La psicologia delle folle", "expl": "La psicologia delle folle:\nIl volume pubblicato da Le Bon nel 1895 è intitolato \"Psychologie des foules\", la cui traduzione italiana è \"La psicologia delle folle\". In quest'opera, l'autore analizza i meccanismi psicologici che regolano il comportamento degli individui all'interno delle masse, descrivendo fenomeni quali il contagio emotivo, la suggestione e la perdita di responsabilità personale. Il testo rappresenta un punto di riferimento fondamentale per la psicologia sociale e ha influenzato profondamente gli studi successivi sui comportamenti collettivi e sulla deindividuazione."}, "24.07": {"q": "Secondo l'Autore lo sviluppo dell'imitazione avviene all'interno dello stadio sensomotorio e si conclude al termine di questo:", "options": {"A": "Piaget", "B": "Hegel", "C": "Le Bon", "D": "Bentham"}, "correct": "A", "a": "Piaget", "expl": "Piaget:\nJean Piaget, nel 1970, sostenne che lo sviluppo dell'imitazione si compie interamente all'interno del periodo sensomotorio, che va dalla nascita fino a circa i due anni di vita. Secondo la sua teoria, l'imitazione attraversa sei fasi distinte: la prima, nel primo mese di vita, in cui non c'è distinzione tra sé e altro; la seconda, tra il primo e il quarto mese, in cui il bambino riproduce azioni già presenti nei suoi schemi; la terza, tra i quattro e gli otto mesi, in cui inizia la coordinazione tra guardare e agire; la quarta, tra gli otto e i dodici mesi, in cui è possibile imitare espressioni facciali; la quinta, a partire dai dodici mesi, con l'imitazione estemporanea di azioni nuove; infine la sesta, tra i diciotto mesi e i due anni, in cui compare l'imitazione differita, basata sulla rappresentazione mentale dell'atto osservato."}, "24.08": {"q": "Dai risultati degli esperimenti del seguente Autore viene messo in evidenza l'esistenza di fattori situazionali che possono accentuare o ridurre la percentuale di obbedienza:", "options": {"A": "Comte", "B": "Milgram", "C": "Triplett", "D": "Hegel"}, "correct": "B", "a": "Milgram", "expl": "Milgram:\nStanley Milgram, nei suoi celebri esperimenti sull'obbedienza all'autorità condotti nel 1974, identificò cinque fattori situazionali in grado di modulare la percentuale di obbedienza. Questi sono: il prestigio dell'autorità, la prossimità della vittima, la prossimità dello sperimentatore, la libertà di scelta del soggetto e la presenza di sostegno sociale. Milgram dimostrò che l'obbedienza non è un tratto stabile della personalità, ma è influenzata dalle caratteristiche del contesto, e che persone comuni possono arrivare a infliggere sofferenza ad altri se poste in determinate condizioni relazionali e ambientali."}, "24.09": {"q": "Nel 1971 il seguente Autore riprese quanto rilevato da Le Bon e da Milgram e mise a punto un famoso esperimento:", "options": {"A": "Dollard e Miller", "B": "Berkowitz", "C": "Zimbardo", "D": "Hegel"}, "correct": "C", "a": "Zimbardo", "expl": "Zimbardo:\nNel 1971, Philip Zimbardo ideò il celebre esperimento carcerario di Stanford, integrando le intuizioni di Le Bon sulla deindividuazione e di Milgram sull'obbedienza all'autorità. L'obiettivo era indagare come le persone si comportano quando vengono definite esclusivamente dal ruolo sociale che ricoprono all'interno di un'istituzione. L'esperimento, che prevedeva la simulazione di un carcere con studenti universitari divisi in guardie e detenuti, rivelò con drammatica evidenza come il contesto e le norme di ruolo possano trasformare individui normali in soggetti capaci di condotte vessatorie e sadiche."}, "24.10": {"q": "Nell'esperimento carcerario di Stanford l'abbigliamento scelto da Zimbardo poneva entrambi i gruppi in una condizione di:", "options": {"A": "disimpegno morale", "B": "deumanizzazione", "C": "deindividuazione", "D": "disimpegno psicologico"}, "correct": "C", "a": "deindividuazione", "expl": "deindividuazione:\nZimbardo scelse per entrambi i gruppi un abbigliamento che spersonalizzava i partecipanti: i prigionieri indossavano divise con un numero stampato e catene, mentre le guardie avevano uniformi kaki, occhiali da sole riflettenti e manganelli. Questa uniformazione aveva lo scopo di annullare l'identità individuale e di favorire la deindividuazione, ossia la perdita della consapevolezza di sé e del senso di responsabilità personale. In tali condizioni, gli individui tendono a identificarsi con il gruppo di appartenenza e ad adottare comportamenti che, da soli, probabilmente non metterebbero mai in atto, come dimostrato dalle violenze verificatesi già dopo due giorni dall'inizio dell'esperimento."}, "25.01": {"q": "Secondo Olweus (1973) uno studente diventa oggetto di azioni di bullismo quando:", "options": {"A": "viene prevaricato, vittimizzato e, quindi, esposto ripetutamente nel corso del tempo ad azioni offensive messe in atto da parte di uno o più compagni", "B": "viene prevaricato e vittimizzato da parte di uno o più compagni", "C": "viene esposto ripetutamente nel corso del tempo ad azioni offensive messe in atto da parte di uno o più compagni", "D": "viene prevaricato, vittimizzato ma non esposto ripetutamente nel corso del tempo ad azioni offensive messe in atto da parte di uno o più compagni"}, "correct": "A", "a": "viene prevaricato, vittimizzato e, quindi, esposto ripetutamente nel corso del tempo ad azioni offensive messe in atto da parte di uno o più compagni", "expl": "viene prevaricato, vittimizzato e, quindi, esposto ripetutamente nel corso del tempo ad azioni offensive messe in atto da parte di uno o più compagni:\nLa definizione di Olweus del 1973 è tripartita: uno studente diventa oggetto di bullismo quando viene prevaricato, vittimizzato ed esposto ripetutamente nel tempo ad azioni offensive. Questa sequenza – prevaricazione, vittimizzazione e ripetizione – è essenziale perché introduce i tre pilastri del fenomeno che saranno poi formalizzati come intenzionalità, ripetitività e asimmetria di potere. Olweus fu tra i primi studiosi a sottolineare che non basta un singolo episodio di prepotenza per parlare di bullismo, ma occorre una condotta che si protrae nel tempo, minando progressivamente la capacità di difesa della vittima."}, "25.02": {"q": "Con il termine bullismo si indica:", "options": {"A": "una serie di comportamenti prepotenti e prevaricatori", "B": "un qualsiasi tipo di comportamento aggressivo o non consono nei confronti della vittima", "C": "la reiterazione nel tempo di comportamenti prepotenti o prevaricatori", "D": "qualsiasi tipo di comportamento prepotente non necessariamente reiterato"}, "correct": "C", "a": "la reiterazione nel tempo di comportamenti prepotenti o prevaricatori", "expl": "la reiterazione nel tempo di comportamenti prepotenti o prevaricatori:\nLa dispensa precisa che con il termine bullismo non viene indicato un qualsiasi tipo di comportamento aggressivo, ma affinché possa essere qualificato come tale è necessaria la reiterazione nel tempo di comportamenti prepotenti o prevaricatori. Questo elemento distingue il bullismo da un singolo atto di aggressione o da un conflitto episodico: la ripetitività è ciò che trasforma un gesto isolato in una dinamica persecutoria strutturata, rendendo il fenomeno più dannoso per la vittima e più radicato nel contesto relazionale in cui si verifica."}, "25.03": {"q": "Il fenomeno del bullismo è caratterizzato da tre principali componenti:", "options": {"A": "intenzionalità, saltuarietà e asimmetria nella relazione", "B": "mancanza di intenzionalità, ripetitività e asimmetria di potere nella relazione", "C": "intenzionalità, ripetitività e simmetria di potere nella relazione", "D": "intenzionalità, ripetitività e asimmetria di potere nella relazione"}, "correct": "D", "a": "intenzionalità, ripetitività e asimmetria di potere nella relazione", "expl": "intenzionalità, ripetitività e asimmetria di potere nella relazione:\nLa dispensa elenca esplicitamente le tre componenti principali del bullismo: intenzionalità, ripetitività e asimmetria di potere nella relazione. L'intenzionalità indica che il bullo agisce con lo scopo preciso di dominare e causare disagio; la ripetitività implica che le azioni dannose si protraggono nel tempo con elevata frequenza; l'asimmetria di potere descrive la situazione in cui il bullo è fisicamente o psicologicamente superiore alla vittima, che non riesce a difendersi. Questi tre elementi, interagendo tra loro, alimentano un circolo vizioso che cronicizza il fenomeno e produce ripercussioni negative sulla personalità in formazione della vittima."}, "25.04": {"q": "Con il termine cyberbullismo, o bullismo on line, si indicano:", "options": {"A": "tutti quegli atti di bullismo e di molestia effettuati tramite mezzi elettronici come le e-mail, le chat, i blog ma non i telefoni cellulari", "B": "tutti quegli atti di bullismo e di molestia effettuati tramite mezzi elettronici come le e-mail, le chat, i blog, i telefoni cellulari, i siti web o qualsiasi altra forma di comunicazione riconducibile al web", "C": "gli atti di molestia effettuati tramite i telefoni cellulari", "D": "alcuni atti di bullismo e di molestia effettuati tramite mezzi elettronici come le e-mail, le chat, i blog, i telefoni cellulari, i siti web"}, "correct": "B", "a": "tutti quegli atti di bullismo e di molestia effettuati tramite mezzi elettronici come le e-mail, le chat, i blog, i telefoni cellulari, i siti web o qualsiasi altra forma di comunicazione riconducibile al web", "expl": "tutti quegli atti di bullismo e di molestia effettuati tramite mezzi elettronici come le e-mail, le chat, i blog, i telefoni cellulari, i siti web o qualsiasi altra forma di comunicazione riconducibile al web:\nLa dispensa definisce il cyberbullismo come tutti quegli atti di bullismo e molestia effettuati tramite mezzi elettronici, includendo esplicitamente e-mail, chat, blog, telefoni cellulari, siti web e \"qualsiasi altra forma di comunicazione riconducibile al web\". La formula \"qualsiasi altra forma\" è cruciale perché rende la definizione aperta e comprensiva di tutte le possibili evoluzioni tecnologiche. Questa ampiezza riflette la natura in continua espansione del fenomeno, che si adatta ai nuovi canali di comunicazione e richiede un aggiornamento costante delle strategie di prevenzione e intervento."}, "25.05": {"q": "Il bullo ansioso presenta una personalità caratterizzata da:", "options": {"A": "una bassa insicurezza, alta autostima, ansia e instabilità emotiva", "B": "una forte insicurezza e bassa autostima", "C": "una forte insicurezza, bassa autostima, ansia e instabilità emotiva", "D": "una forte insicurezza, bassa autostima, ansia e stabilità emotiva"}, "correct": "C", "a": "una forte insicurezza, bassa autostima, ansia e instabilità emotiva", "expl": "una forte insicurezza, bassa autostima, ansia e instabilità emotiva:\nLa dispensa descrive il bullo ansioso come un individuo con una personalità caratterizzata da forte insicurezza, bassa autostima, ansia e instabilità emotiva. È importante notare che questi tratti non sono solo un dettaglio descrittivo, ma rappresentano il motore psicologico del suo comportamento: il senso di fallimento e il bisogno di attenzione lo spingono a commettere atti di prepotenza. A differenza del bullo aggressivo, quello ansioso è poco amichevole e non popolare nel gruppo dei pari, e un semplice richiamo dell'adulto può bastare per fargli emergere un senso di colpa, segno che la sua aggressività è più reattiva che strutturale."}, "25.06": {"q": "Secondo Ada Fonzi (1997) il bullismo al femminile è diverso da quello maschile:", "options": {"A": "le ragazze, infatti, prediligono un'aggressività indiretta e non fisica, quindi più sottile e spesso più dolorosa", "B": "le ragazze prediligono un'aggressività diretta e non fisica, quindi più sottile e spesso più dolorosa", "C": "le ragazze, infatti, prediligono un'aggressività indiretta e non fisica, quindi più d'impatto e spesso meno dolorosa", "D": "le ragazze, infatti, prediligono un'aggressività diretta e fisica, quindi meno sottile e spesso più dolorosa"}, "correct": "A", "a": "le ragazze, infatti, prediligono un'aggressività indiretta e non fisica, quindi più sottile e spesso più dolorosa", "expl": "le ragazze, infatti, prediligono un'aggressività indiretta e non fisica, quindi più sottile e spesso più dolorosa:\nAda Fonzi (1997) spiega che il bullismo al femminile si differenzia da quello maschile perché le ragazze prediligono un'aggressività indiretta e non fisica. Questa forma di prepotenza è più sottile e, paradossalmente, spesso più dolorosa per la vittima: le bulle emarginano le compagne più deboli, le calunniano, le ricattano, le isolano con un \"cordone di silenzio\" e le fanno sentire invisibili. L'aggressività indiretta agisce sul tessuto relazionale e sull'esclusione sociale, colpendo la vittima nella sua identità e nel suo bisogno di appartenenza, con effetti che possono essere più duraturi e difficili da individuare rispetto a quelli di un'aggressione fisica."}, "25.07": {"q": "Olweus (1993) distingue due tipi di vittime:", "options": {"A": "passiva e aggressiva", "B": "passiva o sottomessa, e oppositiva", "C": "aggressiva e provocatrice", "D": "passiva o sottomessa e provocatrice"}, "correct": "D", "a": "passiva o sottomessa e provocatrice", "expl": "passiva o sottomessa e provocatrice:\nOlweus (1993) distingue due tipi di vittime: la vittima passiva o sottomessa e la vittima provocatrice. La vittima passiva è caratterizzata da forte ansia, insicurezza, timidezza, bassa autostima e una tendenza a isolarsi e a non reagire alle vessazioni, arrivando persino a incolpare se stessa per quanto subisce. La vittima provocatrice, invece, combina tratti ansiosi con comportamenti aggressivi e provocatori che finiscono per fornire al bullo pretesti per agire; reagisce alle molestie in modo improprio e poco efficace, spesso ricorrendo alla forza senza ottenere risultati. Questa classificazione è importante perché evidenzia come le dinamiche vittimizzanti possano assumere forme diverse, richiedendo interventi altrettanto differenziati."}, "25.08": {"q": "La vittima provocatrice reagisce alle molestie del bullo ricorrendo:", "options": {"A": "all'uso sistematico della forza", "B": "in modo spesso improprio e poco efficace all'uso della forza", "C": "al dialogo e mai all'uso della forza", "D": "all'uso della forza in modo efficace"}, "correct": "B", "a": "in modo spesso improprio e poco efficace all'uso della forza", "expl": "in modo spesso improprio e poco efficace all'uso della forza:\nLa dispensa descrive la vittima provocatrice come colei che reagisce alle molestie ricorrendo all'uso della forza, ma in modo spesso improprio e poco efficace. Questa caratteristica la distingue sia dalla vittima passiva, che non reagisce affatto, sia da un ipotetico soggetto capace di difendersi adeguatamente. La sua reazione inefficace è controproducente perché fornisce al bullo valide motivazioni per continuare ad agire contro di lei, alimentando il circolo vizioso della prepotenza. Questo dettaglio è rilevante perché mostra che anche il tentativo di opporsi, se mal gestito, può peggiorare la situazione della vittima."}, "25.09": {"q": "Per quanto riguarda i bulli, tra i fattori di rischio a breve termine troviamo:", "options": {"A": "rendimento scolastico elevato, disturbi della condotta e difficoltà relazionali", "B": "comportamenti antisociali, violenza in famiglia e aggressività sul lavoro", "C": "basso rendimento scolastico, disturbi della condotta e difficoltà relazionali", "D": "ripetute bocciature, abbandono scolastico e difficoltà relazionali"}, "correct": "C", "a": "basso rendimento scolastico, disturbi della condotta e difficoltà relazionali", "expl": "basso rendimento scolastico, disturbi della condotta e difficoltà relazionali:\nLa dispensa elenca tra i fattori di rischio a breve termine per i bulli il basso rendimento scolastico, i disturbi della condotta e le difficoltà relazionali. Questi elementi sono definiti \"a breve termine\" perché rappresentano le manifestazioni più immediate e osservabili del disagio, che possono essere intercettate tempestivamente in ambito scolastico e familiare. La distinzione tra fattori di rischio a breve e a lungo termine è fondamentale in ottica preventiva: mentre quelli a breve termine segnalano una situazione di difficoltà attuale che richiede un intervento precoce, quelli a lungo termine – come i comportamenti antisociali o l'abbandono scolastico – rappresentano le possibili evoluzioni negative se il problema non viene affrontato per tempo."}, "25.10": {"q": "Tra i fattori di protezione che riguardano il bullo possiamo annoverare:", "options": {"A": "un'alta autostima", "B": "una bassa autostima", "C": "uno stile parentale coercitivo", "D": "un temperamento attivor compensare un senso di inadeguatezza."}, "correct": "A", "a": "un'alta autostima", "expl": "un'alta autostima:\nLa dispensa indica tra i fattori di protezione per il bullo un'alta autostima, insieme a una buona efficacia e a uno stile parentale supportivo ed autorevole. Un fattore di protezione è un elemento che riduce la probabilità che un individuo sviluppi comportamenti problematici nonostante la presenza di fattori di rischio. Nel caso del bullo, un'alta autostima funge da fattore protettivo perché gli consente di ricercare riconoscimento e affermazione attraverso canali positivi anziché attraverso la prepotenza e l'aggressività, riducendo il bisogno di dominare gli altri per\ncompensare un senso di inadeguatezza."}, "26.01": {"q": "Oltre alla frustrazione, all'imitazione e all'apprendimento, un ulteriore fenomeno che può causare una reazione aggressiva è:", "options": {"A": "L'esclusione sociale e il rifiuto", "B": "L'inclusione sociale", "C": "La deindividuazione", "D": "La deumanizzazione"}, "correct": "A", "a": "L'esclusione sociale e il rifiuto", "expl": "L'esclusione sociale e il rifiuto"}, "26.02": {"q": "Il seguente Autore provò che gli studenti che avevano avvertito dolore immergendo una mano nell'acqua gelata, mostravano più comportamenti aggressivi verso un loro collega:", "options": {"A": "Bandura", "B": "Zimbardo", "C": "Le Bon", "D": "Berkowitz"}, "correct": "D", "a": "Berkowitz", "expl": "Berkowitz"}, "26.03": {"q": "Il seguente processo riguarda proprio le persone che tendono a sentirsi anonime e quindi meno responsabili delle proprie azioni quando si trovano nella folla:", "options": {"A": "Di deumanizzazione", "B": "Di deindividuazione", "C": "Di categorizzazione", "D": "Di esclusione"}, "correct": "B", "a": "Di deindividuazione", "expl": "Di deindividuazione"}, "26.04": {"q": "L'esperimento che cercò di verificare se il comportamento violento e aggressivo nelle carceri è dovuto esclusivamente alla personalità dei detenuti è quello ricordato della «prigione simulata» di:", "options": {"A": "Le Bon", "B": "Berkowitz", "C": "Zimbardo", "D": "Bandura"}, "correct": "C", "a": "Zimbardo", "expl": "Zimbardo"}, "26.05": {"q": "Nel seguente libro i bambini naufragati su un'isola, dopo un incidente aereo, si dividono in gruppi e dopo essersi dipinti il volto cominciano ad agire comportamenti aggressivi con maggior facilità e disinibizione:", "options": {"A": "La prigione", "B": "Il signore degli anelli", "C": "Il signore delle mosche", "D": "Psicologia delle folle"}, "correct": "C", "a": "Il signore delle mosche", "expl": "Il signore delle mosche (Sembra Lost)"}, "26.06": {"q": "L'esperimento carcerario di Zimbardo venne condotto nell'estate del 1971 nel seminterrato dell'Istituto di psicologia dell'Università di:", "options": {"A": "Stanford, a Palo Alto", "B": "New York", "C": "Sapienza, Roma", "D": "Oxford"}, "correct": "A", "a": "Stanford, a Palo Alto", "expl": "Stanford, a Palo Alto"}, "26.07": {"q": "L'abbigliamento scelto da Zimbardo per i partecipanti al famoso esperimento della prigione di Stanford poneva entrambi i gruppi in una condizione di:", "options": {"A": "Deumanizzazione", "B": "Deindividuazione", "C": "Pregiudizio", "D": "Stereotipizzazione"}, "correct": "B", "a": "Deindividuazione", "expl": "Deindividuazione"}, "26.08": {"q": "Secondo il seguente Autore la prigione finta, nell'esperienza psicologica vissuta dai soggetti di entrambi i gruppi in un suo famoso esperimento, era diventata una prigione vera:", "options": {"A": "Bandura", "B": "Le Bon", "C": "Zimbardo", "D": "Berkowitz"}, "correct": "C", "a": "Zimbardo", "expl": "Zimbardo"}, "26.09": {"q": "Induce una perdita di responsabilità personale, ovvero la ridotta considerazione delle conseguenze delle proprie azioni, indebolisce i controlli basati sul senso di colpa, la vergogna, la paura:", "options": {"A": "Deumanizzazione", "B": "Deindividuazione", "C": "Pregiudizio", "D": "Stereotipizzazione"}, "correct": "B", "a": "Deindividuazione", "expl": "Deindividuazione"}, "26.10": {"q": "Le tesi alla base di questo esperimento vengono analizzate da Zimbardo in un suo libro del 2007, pubblicato in Italia nel 2008 con il titolo:", "options": {"A": "La prigione", "B": "Il signore degli anelli", "C": "Il signore delle mosche", "D": "L'effetto Lucifero"}, "correct": "D", "a": "L'effetto Lucifero", "expl": "L'effetto Lucifero"}, "27.01": {"q": "Operazione mentale per mezzo della quale una certa situazione viene attribuita a qualcuno (cioè a un responsabile) o a qualcosa (ad alcune circostanze o cause)?", "options": {"A": "Colpevolizzazione", "B": "Responsabilizzazione", "C": "Categorizzazione", "D": "Attribuzione"}, "correct": "D", "a": "Attribuzione", "expl": "Attribuzione:\nL’attribuzione è l’operazione mentale attraverso cui assegniamo una certa situazione a un responsabile o a delle cause. È uno dei meccanismi fondamentali nella costruzione sociale dei significati, perché ci permette di dare un senso agli eventi individuando chi o cosa li ha prodotti. Questo concetto apre la strada allo studio dell’errore fondamentale di attribuzione, che Heider ha analizzato mostrando come il senso comune tenda a sopravvalutare i fattori personali rispetto a quelli situazionali. Ricordare il termine \"attribuzione\" significa ricordare il punto di partenza di tutto il ragionamento sul giudizio degli altri."}, "27.02": {"q": "Si parla di questo errore in merito alla tendenza generale del senso comune a sottostimare il peso dei fattori situazionali e sovrastimare quello dei fattori disposizionali nel determinare i comportamenti della gente?", "options": {"A": "Errore fondamentale d'attribuzione", "B": "Bias edonico", "C": "Errore di categorizzazione", "D": "Bias di assoluzione"}, "correct": "A", "a": "Errore fondamentale d'attribuzione", "expl": "Errore fondamentale d'attribuzione:\nQuesto errore, studiato da Heider, descrive la nostra tendenza a dare più peso alla personalità e alle disposizioni interne delle persone, trascurando invece le pressioni della situazione. È chiamato \"fondamentale\" proprio perché è molto comune e radicato nel pensiero quotidiano, e porta a giudicare gli altri in base a ciò che \"sono\" piuttosto che a ciò che \"subiscono\". Nella dispensa, questo concetto è il primo passo per comprendere perché attribuiamo il male a individui malvagi invece di osservare il contesto che lo favorisce."}, "27.03": {"q": "Il seguente fenomeno non è altro che il risultato dell'interazione di fattori disposizionali, fattori situazionali e fattori sistemici?", "options": {"A": "Deumanizzazione", "B": "Effetto autocinetico", "C": "Effetto Lucifero", "D": "Deindividuazione"}, "correct": "C", "a": "Effetto Lucifero", "expl": "Effetto Lucifero:\nZimbardo definisce l’Effetto Lucifero proprio come il prodotto dell’interazione tra fattori disposizionali (come il conformismo), situazionali e sistemici (il sistema sociale che definisce norme e ruoli). Questo fenomeno spiega come una persona apparentemente buona possa compiere atti crudeli, non per sua natura, ma per l’influenza combinata di questi tre livelli. La sua particolarità è che non si riduce alla personalità, ma coinvolge l’intero contesto sociale e le sue regole implicite o esplicite."}, "27.04": {"q": "Il seguente Autore, tra gli anni '40 e '50, espone la teoria del conformismo?", "options": {"A": "Asch", "B": "Bandura", "C": "Zimbardo", "D": "Sherif"}, "correct": "A", "a": "Asch", "expl": "Asch:\nSolomon Asch condusse i suoi celebri esperimenti sul conformismo proprio tra gli anni Quaranta e Cinquanta, dimostrando come la pressione del gruppo possa spingere le persone a dare risposte palesemente sbagliate pur di non essere diverse. Il suo contributo è essenziale perché mostra che il conformismo non è solo un fenomeno superficiale, ma nasce dal bisogno di approvazione e dal timore dell’isolamento sociale. Asch ci aiuta a capire il primo dei processi psicologici che alimentano l’Effetto Lucifero."}, "27.05": {"q": "La questione dell'obbedienza all'autorità è stata evidenziata dal seguente Autore nel 1974?", "options": {"A": "Milgram", "B": "Bandura", "C": "Zimbardo", "D": "Sherif"}, "correct": "A", "a": "Milgram", "expl": "Milgram:\nStanley Milgram, nel 1974, pubblicò i risultati dei suoi esperimenti sull’obbedienza all’autorità, mostrando come persone comuni fossero disposte a infliggere scosse elettriche potenzialmente letali solo perché un’autorità glielo ordinava. Il suo lavoro è fondamentale per comprendere lo stato eteronomico, cioè quella condizione in cui ci si sente svincolati dalla responsabilità personale e si delega alla struttura sovrastante. Milgram ci insegna che l’obbedienza può avere un peso enorme nel generare comportamenti immorali, anche in individui altrimenti normali."}, "27.06": {"q": "Una condizione deresponsabilizzazione del soggetto e responsabilizzazione della struttura sociale sovrastante?", "options": {"A": "Diffusione della responsabilità", "B": "Stato eteronomico", "C": "Deumanizzazione", "D": "Deindividuazione"}, "correct": "B", "a": "Stato eteronomico", "expl": "Stato eteronomico:\nLo stato eteronomico è la condizione psicologica in cui la persona trasferisce all’esterno (alla struttura sociale, all’autorità) la responsabilità delle proprie azioni, sentendosi così sollevata dal peso della scelta morale. Compare quando si obbedisce a un’autorità, come descritto da Milgram, e porta a un annullamento dell’identità individuale. È un passaggio chiave per capire come il soggetto possa compiere atti contrari ai suoi valori senza provare senso di colpa, perché la colpa viene \"delegata\" al sistema."}, "27.07": {"q": "Nelle seguenti condizioni si assiste ad un annullamento del singolo individuo fino alla totale fusione con la massa con conseguente annientamento della propria identità?", "options": {"A": "Di dislocamento di responsabilità", "B": "Di dislocamento di personalità", "C": "Di deumanizzazione", "D": "Di eteronomia"}, "correct": "D", "a": "Di eteronomia", "expl": "Di eteronomia:\nLa dispensa afferma esplicitamente che \"in condizioni di eteronomia, si assiste ad un annullamento del singolo individuo fino alla totale fusione con la massa con conseguente annientamento della propria identità\". Questo avviene perché la persona non si sente più un individuo autonomo, ma un ingranaggio di un gruppo o di una gerarchia, e le sue capacità di pensiero critico si affievoliscono. È il meccanismo che rende possibile l’obbedienza acritica e il conformismo estremo, in cui le differenze individuali svaniscono."}, "27.08": {"q": "I seguenti tre fattori secondo Zimbardo vanno a determinare situazioni che fungono da \"bed barrel\", ovvero contenitori malvagi in cui le persone si trasformano in antisociali?", "options": {"A": "Stato eteronomico, diffusione della responsabilità, categorizzazione", "B": "Dislocamento della responsabilità, leadership autoritaria, ideologia estrema", "C": "Forti ideologie, serrata burocrazia, sistema gerarchico rigido e funzionale", "D": "Scarse ideologie, burocrazia lasca, sistema gerarchico rigido e disfunzionale"}, "correct": "C", "a": "Forti ideologie, serrata burocrazia, sistema gerarchico rigido e funzionale", "expl": "Forti ideologie, serrata burocrazia, sistema gerarchico rigido e funzionale:\nSecondo Zimbardo, l’Effetto Lucifero prolifera all’interno di un sistema politico-economico caratterizzato da questi tre elementi: ideologie potenti che giustificano il fine, una burocrazia serrata che spersonalizza, e una gerarchia rigida che impone obbedienza senza discussione. Questi fattori di mantenimento creano il terreno fertile in cui situazioni estreme possono trasformare persone normali in antisociali. Sono il \"contenitore\" che rende stabile e pervasiva la dinamica del male, poiché agiscono a livello sistemico e non solo individuale."}, "27.09": {"q": "La deumanizzazione viene anche detta?", "options": {"A": "Stato eteronomico", "B": "Deindividuazione", "C": "Despecificazione", "D": "Diffusione della responsabilità"}, "correct": "C", "a": "Despecificazione", "expl": "Despecificazione:\nLa dispensa specifica che la deumanizzazione è \"altrimenti detta despecificazione\". Questo termine sottolinea il processo con cui si spoglia l’individuo della sua specificità umana, riducendolo a un oggetto o a un essere inferiore, e così si spezza il legame empatico. La despecificazione è il meccanismo che rende più facile agire violenza contro l’altro, perché non lo si vede più come una persona con sentimenti e dignità, ma come qualcosa di anonimo e privo di valore."}, "27.10": {"q": "Predispone gli individui a sottomettersi agli ordini di figure istituzionali dotate di autorità o status elevato in un determinato contesto gerarchico e/o funzionale, anche se queste risultano immorali?", "options": {"A": "L'obbedienza", "B": "la deindividuazione", "C": "la despecificazione", "D": "La diffusione della responsabilità"}, "correct": "A", "a": "L'obbedienza", "expl": "L'obbedienza:\nNella dispensa, l’obbedienza viene definita proprio come la predisposizione a sottomettersi agli ordini di autorità o figure di status, anche quando tali ordini sono immorali. Questo processo è stato studiato da Milgram ed è uno degli ingredienti fondamentali dell’Effetto Lucifero, perché spinge le persone ad agire contro la loro coscienza pur di rispettare la gerarchia. È diversa dalla deindividuazione e dalla diffusione della responsabilità, perché riguarda specificamente il rapporto con un’autorità superiore che impartisce comandi."}, "28.01": {"q": "Tra gli studi sullo sviluppo della prosocialità e sui fattori che determinano comportamenti prosociali, uno dei primi esperimenti fu quello di:", "options": {"A": "Latané e Darley (1968)", "B": "Bandura (1997)", "C": "Zimbardo (1978)", "D": "Moscovici (1994)"}, "correct": "A", "a": "Latané e Darley (1968)", "expl": "Latané e Darley (1968):\nLatané e Darley condussero il loro esperimento nel 1968, e nella dispensa viene menzionato esplicitamente come uno dei primi studi in questo ambito. La loro ricerca si concentrò sui fattori situazionali che influenzano la probabilità di attuare comportamenti altruistici. L'esperimento, in cui i partecipanti ascoltavano una registrazione di un finto attacco epilettico, portò alla formulazione del concetto di diffusione di responsabilità, un pilastro degli studi sulla prosocialità."}, "28.02": {"q": "Latané e Darley (1968) nel loro famoso esperimento sull'empatia spiegarono i risultati ottenuti proponendo il concetto di:", "options": {"A": "Dislocamento della responsabilità", "B": "Locus of control", "C": "Diffusione di responsabilità", "D": "Deumanizzazione"}, "correct": "C", "a": "Diffusione di responsabilità", "expl": "Diffusione di responsabilità:\nIl concetto di diffusione di responsabilità, introdotto da Latané e Darley, spiega perché la presenza di altri riduce la probabilità di intervenire in una situazione di emergenza. La dispensa riporta che, non potendo osservare i comportamenti degli altri, le persone tendono a pensare che qualcun altro abbia già provveduto a prestare soccorso. Questo meccanismo è centrale per comprendere l'inerzia degli spettatori e la diminuzione dell'aiuto all'aumentare del numero dei presenti."}, "28.03": {"q": "Le ricerche del seguente Autore hanno sottolineato che, a parità di struttura di personalità, il fattore maggiormente predittivo del comportamento prosociale di aiuto è la percezione della propria efficacia:", "options": {"A": "Latané e Darley (1968)", "B": "Bandura (1997)", "C": "Zimbardo (1978)", "D": "Moscovici (1994)"}, "correct": "B", "a": "Bandura (1997)", "expl": "Bandura (1997):\nBandura, con le sue ricerche del 1997, ha evidenziato come il senso di autoefficacia sia un predittore fondamentale del comportamento prosociale. La dispensa sottolinea che, a parità di struttura di personalità, è la percezione di essere in grado di agire positivamente a fare la differenza. Maggiore è il senso di autoefficacia, maggiore è la propensione del soggetto a mettere in atto un comportamento di aiuto, poiché la persona si sente competente e capace di intervenire efficacemente."}, "28.04": {"q": "Rispetto ai fattori causali del comportamento prosociale, il seguente Autore parla di tre forme di altruismo:", "options": {"A": "Latané e Darley (1968)", "B": "Bandura (1997)", "C": "Zimbardo (1978)", "D": "Moscovici (1994)"}, "correct": "D", "a": "Moscovici (1994)", "expl": "Moscovici (1994):\nMoscovici, nel 1994, ha distinto tre forme di altruismo: partecipativo, fiduciario e normativo. L'altruismo partecipativo favorisce la vita collettiva dei membri della stessa comunità; quello fiduciario mira a costruire un legame di confidenzialità; infine, quello normativo si basa su principi di responsabilità e solidarietà regolati da norme formali. Questa tripartizione permette di comprendere come l'altruismo si manifesti in contesti sociali diversi, dalla famiglia alle istituzioni."}, "28.05": {"q": "Il seguente Autore è tra quegli studiosi che hanno cercato di dare una spiegazione al comportamento prosociale a partire proprio dal ruolo che in esso gioca l'empatia, vista come l'elemento che precede l'attuazione di una risposta d'aiuto:", "options": {"A": "Latané e Darley (1968)", "B": "Bandura (1997)", "C": "Zimbardo (1978)", "D": "Hoffman (1975)"}, "correct": "D", "a": "Hoffman (1975)", "expl": "Hoffman (1975):\nHoffman, nel 1975, è stato uno dei pionieri nel collegare l'empatia al comportamento prosociale, considerandola il precursore dell'azione di aiuto. La dispensa lo cita come lo studioso che ha cercato di spiegare la risposta d'aiuto a partire proprio dal ruolo dell'empatia. Secondo Hoffman, è l'attivazione emotiva empatica, che ci rende disponibili alla comprensione e alla simpatia, a spingere le persone a intervenire in favore di chi è in difficoltà."}, "28.06": {"q": "Con il seguente termine ci si riferisce ad una particolare attivazione emotiva che rende le persone più disponibili alla comprensione, alla tenerezza, alla simpatia nell'osservazione di un'altra persona in difficoltà:", "options": {"A": "Empatia", "B": "Simpatia", "C": "Compassione", "D": "Altruismo"}, "correct": "A", "a": "Empatia", "expl": "Empatia"}, "28.07": {"q": "Il seguente Autore afferma che le persone con uno stato d'animo negativo in relazione all'osservazione empatica dell'altro agiscono una risposta altruistica non per reale interesse della sofferenza di quella persona, ma per migliorare il proprio umore:", "options": {"A": "Latané e Darley", "B": "Bandura", "C": "Cialdini e coll.", "D": "Hoffman"}, "correct": "C", "a": "Cialdini e coll.", "expl": "Cialdini e coll.:\nCialdini e i suoi colleghi, negli studi del 197
