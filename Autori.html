rette:\nLa percezione di uno spazio blu è influenzata da molteplici fattori: aspetti propri dell'acqua come suono, colore, chiarezza e movimento; fattori meteorologici; e caratteristiche degli utenti come la fascia di età. Questi elementi interagiscono tra loro determinando il grado di attrattività e la qualità percepita dell'ambiente acquatico."}, "37.07": {"q": "La percezione di restorativeness è altamente correlata con:", "options": {"A": "la vicinanza ad uno spazio costruito", "B": "la musica come antistress rapido e a buon prezzo", "C": "il colore come antistress", "D": "la vicinanza ad uno spazio blu"}, "correct": "D", "a": "la vicinanza ad uno spazio blu", "expl": "la vicinanza ad uno spazio blu:\nDiversi contributi di ricerca hanno evidenziato che la percezione di restorativeness è altamente correlata con la vicinanza a uno spazio blu. Autori come Gelso e Peterson (2005), Herzog e Barnes (1999) e Korpela e collaboratori (2010) hanno dimostrato che gli ambienti acquatici possiedono una capacità rigenerativa particolarmente elevata."}, "37.08": {"q": "Installando una fontana all'interno di un corridoio di un centro commerciale per poterne osservare gli effetti sui passanti è stato rilevato che, quando la fontana era piena di acqua:", "options": {"A": "la durata della sosta dei passanti nelle zone adiacenti diminuiva", "B": "la durata della sosta dei passanti nelle zone adiacenti aumentava", "C": "la durata della sosta dei gruppi nelle zone adiacenti era stabile", "D": "i clienti si fidelizzavano"}, "correct": "B", "a": "la durata della sosta dei passanti nelle zone adiacenti aumentava", "expl": "la durata della sosta dei passanti nelle zone adiacenti aumentava:\nNell'esperimento condotto da Ruso e Atzwanger nel 2003, è stato osservato che quando la fontana era piena d'acqua, la durata della sosta dei passanti nelle zone adiacenti aumentava del 21,4% rispetto a quando era vuota. Questo dimostra che la presenza di acqua in un ambiente può influenzare il comportamento e il modo in cui uno spazio viene utilizzato."}, "37.09": {"q": "Introdurre una moderata quantità di erba e piante lungo i bordi dell'acqua sembrerebbe:", "options": {"A": "migliorare la qualità percepita dell'ambiente acquatico", "B": "migliorare la qualità percepita dell'ambiente verde", "C": "migliorare lo sviluppo cognitivo fino al punto in cui diviene una distrazione", "D": "aumentare le pulsazioni e l'attivazione"}, "correct": "A", "a": "migliorare la qualità percepita dell'ambiente acquatico", "expl": "migliorare la qualità percepita dell'ambiente acquatico:\nSteinwender e collaboratori (2008) hanno suggerito che introdurre una moderata quantità di erba e piante lungo i bordi dell'acqua migliora la qualità percepita dell'ambiente acquatico. Al contrario, un uso smodato di vegetazione produrrebbe l'effetto opposto, come indicato da Simonič nel 2002. Questo accorgimento rende l'inserimento di uno specchio d'acqua in un contesto urbano più naturale e piacevole."}, "37.10": {"q": "La presenza di pesci nelle acque delle fontane o delle piscine ornamentali è stata spesso:", "options": {"A": "utile per il marketing", "B": "utile per le ricerche di psicologia sociale", "C": "gradita e vista come fattore in grado di ridurre lo stress", "D": "gradita e vista come fattore in grado di ridurre la pressione sanguigna"}, "correct": "C", "a": "gradita e vista come fattore in grado di ridurre lo stress", "expl": "gradita e vista come fattore in grado di ridurre lo stress:\nLa presenza di pesci nelle acque delle fontane o delle piscine ornamentali è stata spesso gradita e vista come un fattore in grado di ridurre lo stress. Questo è emerso dagli studi di Katcher, Segal e Beck (1984) e di De Schriver e Riddick (1990), che hanno osservato come l'osservazione di pesci in ambienti acquatici artificiali produca un effetto calmante e rilassante sugli individui."}, "38.01": {"q": "Secondo Kuller e coll., l'umore di un soggetto nella propria postazione di lavoro è influenzato da:", "options": {"A": "buona temperatura", "B": "intensità luminosa", "C": "intensità del suono", "D": "buona visuale"}, "correct": "B", "a": "intensità luminosa", "expl": "intensità luminosa:\nCome riportato in bibliografia, Küller e i suoi collaboratori hanno condotto uno studio cross-culturale sull'impatto di luce e colore sull'umore in ambienti di lavoro indoor, dimostrando che la percezione soggettiva del benessere è fortemente legata alle condizioni illuminotecniche. Lo studio, pubblicato nel 2006, ha messo in luce come la luce non sia solo un fattore funzionale per la visione, ma un vero e proprio modulatore dello stato psicologico."}, "38.02": {"q": "Su quale delle seguenti attività il controllo sull'illuminazione non produce effetti positivi?", "options": {"A": "soddisfazione ambientale", "B": "prestazione lavorativa", "C": "produttività", "D": "attenzione"}, "correct": "D", "a": "attenzione", "expl": "attenzione:\nLa dispensa non fornisce elementi sufficienti per stabilire con certezza l'effetto del controllo sull'illuminazione sull'attenzione. Sebbene gli studi citati (come quelli di Kroner, Stark-Martin e Willemain del 1992) evidenzino che una corretta illuminazione possa influire positivamente sulla produttività, e la ricerca in psicologia ambientale abbia ampiamente documentato i benefici su soddisfazione e prestazione, la relazione specifica con l'attenzione non viene esplicitamente trattata nel testo.\n[VERIFICARE: il paragrafo di riferimento non menziona l'attenzione tra gli effetti positivi del controllo dell'illuminazione]"}, "38.03": {"q": "La temperatura ottimale negli ambienti di lavoro oscilla tra:", "options": {"A": "26 e 31°C", "B": "24 e 28°C", "C": "28 e 31°C", "D": "31 e 32°C"}, "correct": "A", "a": "26 e 31°C", "expl": "26 e 31°C :\nLa dispensa non fornisce un intervallo numerico specifico per la temperatura ottimale negli ambienti di lavoro. Viene menzionato il concetto di \"comfort termico\""}, "38.04": {"q": "Il livello ottimale del suono in un ambiente lavorativo oscilla tra:", "options": {"A": "50 e 65 decibel", "B": "45 e 65 decibel", "C": "45 e 55 decibel", "D": "30 e 45 decibel"}, "correct": "B", "a": "45 e 65 decibel", "expl": "45 e 65 decibel:\nLa dispensa riporta esplicitamente, citando Bonaiuto e altri autori del 2004, che il livello ottimale del suono in un ambiente lavorativo si attesta tra i 45 e i 65 decibel. Per comprendere meglio questo dato, possiamo collocarlo in una scala di riferimento: 45 decibel corrisponde a una biblioteca silenziosa o a un sussurro a distanza breve, mentre 65 decibel è paragonabile a una conversazione normale tra due persone. Questo intervallo rappresenta quindi la \"zona di comfort uditivo\" oltre la quale il suono diventa fastidio e inizia a compromettere la concentrazione."}, "38.05": {"q": "Essere in grado di accedere, anche solo con lo sguardo, ad aree verdi causa:", "options": {"A": "miglioramento dell'umore e diminuzione dello stress", "B": "aumento dell'umore e dello stress", "C": "diminuzione dell'umore e dello stress", "D": "diminuzione dell'umore e aumento dello stress"}, "correct": "A", "a": "miglioramento dell'umore e diminuzione dello stress", "expl": "miglioramento dell'umore e diminuzione dello stress:\nLa dispensa, nella sezione dedicata alla gestione degli spazi, fa riferimento agli studi che evidenziano come la visuale di spazi verdi e naturali abbia effetti positivi sul benessere psicofisico. La ricerca in psicologia ambientale ha ampiamente dimostrato che l'esposizione, anche solo visiva, a elementi naturali è associata a una riduzione dei livelli di stress e a un incremento dell'umore positivo, un effetto che è stato definito \"restorative\" dagli studiosi. Questo principio è alla base di molte raccomandazioni progettuali che suggeriscono di privilegiare, dove possibile, affacci su aree verdi negli ambienti di lavoro."}, "38.06": {"q": "La visuale più gradevole nell'ambiente di lavoro è quella:", "options": {"A": "alla porta", "B": "al muro", "C": "al corridoio", "D": "alla finestra"}, "correct": "D", "a": "alla finestra", "expl": "alla finestra:\nLa dispensa sottolinea, attraverso il riferimento alla ricerca di Heerwagen (1990), che la vista dall'ambiente di lavoro riveste un'importanza cruciale per il benessere dei lavoratori. Tra le diverse visuali possibili, quella che si apre verso l'esterno, attraverso una finestra, è la più apprezzata e la più funzionale al recupero delle risorse attentive. Una finestra non è solo un'apertura che fa entrare la luce, ma un \"contatto\" con il mondo esterno che spezza la monotonia dell'ambiente indoor e fornisce stimoli visivi variabili e rigeneranti."}, "38.07": {"q": "Bonaiuto e coll. Nella gestione degli spazi pongono attenzione:", "options": {"A": "al colore dei muri", "B": "alla disposizione del mobilio", "C": "al colore del pavimento", "D": "al numero di finestre"}, "correct": "B", "a": "alla disposizione del mobilio", "expl": "disposizione del mobilio\nVa posizionato preferibilmente lungo le pareti e lasciare libero il centro."}, "38.08": {"q": "Favretto e Fiorentini consigliano in merito ai colori più funzionali nelle aree lavoro:", "options": {"A": "colori caldi per il pavimento e chiari per le pareti", "B": "colori caldi per le pareti e chiari per il pavimento", "C": "colori freddi per il pavimento e chiari per le pareti", "D": "colori caldi per il pavimento e scuri per le pareti"}, "correct": "A", "a": "colori caldi per il pavimento e chiari per le pareti", "expl": "colori caldi per il pavimento e chiari per le pareti:\nNella loro ricerca del 1999, Favretto e Fiorentini hanno fornito indicazioni precise sulla distribuzione cromatica negli ambienti lavorativi. Per il pavimento, suggeriscono l'uso di colori caldi, ma con una precisazione importante: non eccessivamente chiari, per evitare l'abbagliamento e per nascondere meglio lo sporco. Allo stesso tempo, consigliano di evitare superfici lucide o riflettenti. Per le pareti, invece, la loro raccomandazione è opposta: utilizzare colori chiari, che aumentano la luminosità dell'ambiente e, cosa altrettanto rilevante, non distraggono il lavoratore attirando la sua attenzione fuori dal compito. Questa doppia raccomandazione (pavimento caldo ma non chiaro, pareti chiare) rappresenta un perfetto esempio di come la psicologia ambientale traduca i principi teorici in indicazioni pratiche e immediate."}, "38.09": {"q": "È più importante puntare:", "options": {"A": "alla tinta del colore", "B": "alla brillantezza del colore", "C": "alla stesura del colore", "D": "alla tonalità del colore"}, "correct": "B", "a": "alla brillantezza del colore", "expl": "alla brillantezza del colore:\nLa dispensa cita un importante studio di Gifford del 2007 per sostenere che, nella scelta cromatica di un ambiente lavorativo, l'elemento cruciale non è tanto la tonalità specifica (se sia un giallo più o meno pastello, un blu più o meno intenso), ma piuttosto la sua brillantezza. La ricerca dimostra che i colori brillanti (giallo, arancio, blu) sono associati a performance cognitive migliori rispetto ai colori spenti (nero, grigio). Nello studio di Gifford, la differenza nei punteggi del Q.I. era di ben 26 punti a favore degli ambienti brillanti. Questo suggerisce che un ambiente vivace e luminoso \"accende\" letteralmente la mente, rendendola più reattiva e performante, mentre un ambiente opaco e spento tende a \"spegnere\" le facoltà cognitive."}, "38.10": {"q": "Quale di queste discipline psicologiche non converge nella psicologia ambientale:", "options": {"A": "psicologia generale", "B": "neuroscienze", "C": "psicologia dello sviluppo", "D": "psicologia sociale"}, "correct": "C", "a": "psicologia dello sviluppo", "expl": "psicologia dello sviluppo:\nLa dispensa, nelle considerazioni conclusive, descrive esplicitamente la psicologia ambientale come un settore che abbraccia molte aree della psicologia. Viene menzionata la psicologia generale, con particolare riferimento allo studio della percezione del colore; la psicologia sociale, per i rapporti tra la persona e l'ambiente sociale; e le neuroscienze, per lo studio delle alterazioni fisiologiche. La psicologia dello sviluppo, invece, non viene citata tra le discipline che convergono nella psicologia ambientale, rendendola l'unica opzione non pertinente tra quelle elencate. Questa interdisciplinarità è proprio ciò che rende la psicologia ambientale un campo di studio particolarmente ricco e complesso, capace di integrare saperi diversi per comprendere le interazioni tra persona e ambiente."}, "39.01": {"q": "Secondo Wilson gli omicidi seriali scaturirebbero da quello che Maslow definì?", "options": {"A": "bisogno di successo", "B": "bisogno di autostima", "C": "bisogno di regolazione", "D": "bisogno di agire"}, "correct": "B", "a": "bisogno di autostima", "expl": "bisogno di autostima:"}, "39.02": {"q": "Secondo l'ipotesi psicologica della perversione, la psicopatia è il risultato di:", "options": {"A": "una riduzione dell'amigdala", "B": "una scelta consapevole del criminale", "C": "distorsioni cognitive che conducono a schemi mentali perversi", "D": "fattori genetici"}, "correct": "C", "a": "distorsioni cognitive che conducono a schemi mentali perversi", "expl": "distorsioni cognitive che conducono a schemi mentali perversi:\nAll'interno della teoria \"Bad, Cold and Dangerous\", l'ipotesi psicologica della perversione rappresenta la seconda ipotesi. Essa sostiene che la psicopatia non sia determinata unicamente dalla genetica, ma sia il risultato di un processo in cui distorsioni cognitive e schemi mentali distorti creano un terreno fertile per lo sviluppo di una personalità perversa. In altre parole, esiste una predisposizione di base, ma è l'elaborazione patologica dei propri processi mentali a trasformarla in una vera e propria psicopatia, portando l'individuo a giustificare e razionalizzare le proprie azioni antisociali."}, "39.03": {"q": "I criminali psicopatici mostrano:", "options": {"A": "scarso interesse nelle persone", "B": "bassa resistenza allo stress", "C": "estrema impulsività", "D": "scarsa pianificazione"}, "correct": "C", "a": "estrema impulsività", "expl": "estrema impulsività:\nTra le sedici caratteristiche tipiche degli psicopatici stilate da Cleckley nella sua opera \"The Mask of Sanity\", emerge con chiarezza l'estrema impulsività, unita a una totale assenza di paura. Questa combinazione li rende del tutto imprevedibili e particolarmente pericolosi, perché agiscono senza valutare le conseguenze e senza essere frenati da alcun timore. La loro impulsività, quindi, non è un semplice tratto caratteriale, ma un elemento costitutivo della loro psicopatologia, che li spinge a violare le norme sociali in modo grossolano e reiterato."}, "39.04": {"q": "Hanna Arendt sosteneva che l'assenza di responsabilità:", "options": {"A": "permette l'autoregolamentazione", "B": "prevede una dimensione etica interiore", "C": "delegittima l'autore di reato", "D": "riguarda l'incapacità di elaborare il significato del proprio agire"}, "correct": "D", "a": "riguarda l'incapacità di elaborare il significato del proprio agire", "expl": "riguarda l'incapacità di elaborare il significato del proprio agire:\nHannah Arendt, nel suo celebre saggio \"La banalità del male\", analizzando la figura di Eichmann, introdusse il concetto di \"assenza di pensiero\". Questa assenza non è intellettuale, ma etica: è l'incapacità di fermarsi a riflettere sul significato profondo delle proprie azioni e sulle loro conseguenze. L'assenza di responsabilità, quindi, è proprio questa mancanza di elaborazione interiore, che rende il male banale perché compiuto in modo meccanico e acritico, senza una reale consapevolezza del proprio agire."}, "39.05": {"q": "La psicologia investigativa nasce nel:", "options": {"A": "1985", "B": "1999", "C": "2010", "D": "1969"}, "correct": "A", "a": "1985", "expl": "1985:\nNel 1985, a Liverpool, grazie all'opera di David Canter, nasce ufficialmente la Psicologia Investigativa. Questa disciplina segna una svolta nell'approccio alle indagini, perché applica i principi e i metodi della psicologia per comprendere il comportamento criminale e per supportare le forze dell'ordine nella risoluzione dei casi. Canter, successivamente, nel 1992, sviluppò anche il Geographical Profiling, consolidando ulteriormente il ruolo della psicologia nel campo investigativo."}, "39.06": {"q": "Ai tre nuclei centrali della psicopatia, possono aggiungersi tratti o disturbi come:", "options": {"A": "disturbo dissociativo", "B": "PTSD e disturbo d'ansia", "C": "disturbo d'ansia, disturbo post-traumatico da stress", "D": "depressione, DOC, disturbo narcisistico"}, "correct": "D", "a": "depressione, DOC, disturbo narcisistico", "expl": "depressione, DOC, disturbo narcisistico:\nOltre ai tre nuclei imprescindibili della psicopatia, ovvero il deficit emozionale, la cognitività proattiva e ipertrofica e la maschera, possono presentarsi altre caratteristiche secondarie. Queste sono spesso altri disturbi di personalità o disturbi dell'umore e del comportamento, come elencati nel Manuale Diagnostico dei Disturbi Mentali (DSM-5). Tra questi, il testo cita esplicitamente la depressione, il disturbo ossessivo-compulsivo, il disturbo narcisistico e il narcisismo maligno, che si vanno a sovrapporre al quadro psicopatico di base."}, "39.07": {"q": "Secondo la psicologia investigativa:", "options": {"A": "il crimine non ha un significato prettamente sociale", "B": "ogni comportamento criminale è una transazione interpersonale", "C": "non si può fornire una descrizione dettagliata del profilo per gli interrogatori", "D": "gli schemi di interazione psicologica non sono ancorati nella struttura di personalità"}, "correct": "B", "a": "ogni comportamento criminale è una transazione interpersonale", "expl": "ogni comportamento criminale è una transazione interpersonale:\nSecondo i principi della psicologia investigativa, il crimine non è un atto isolato o privo di senso, ma un insieme di comportamenti dotati di significato che vanno letti all'interno del contesto sociale. Ogni azione criminale, quindi, è considerata una transazione interpersonale, perché tutti gli schemi di interazione psicologica sono saldamente ancorati nella struttura di personalità dell'individuo. Questo significa che il criminale, attraverso il suo agire, comunica qualcosa di sé e del suo modo di relazionarsi con gli altri, offrendo così preziose informazioni agli investigatori."}, "39.08": {"q": "Per Wilson l'omicidio per l'assassino assume valenza di:", "options": {"A": "atto compensatorio", "B": "atto riparatorio", "C": "atto regolativo", "D": "atto involontario"}, "correct": "A", "a": "atto compensatorio", "expl": "atto compensatorio:\nQuesto significa che l'assassino utilizza il crimine come uno strumento per esercitare un controllo totale e per regolare l'ambiente circostante secondo i propri desideri. L'omicidio, quindi è un gesto riparatorio, un'azione mirata a ristabilire un ordine interiore e a soddisfare un bisogno distorto di potere, che per lui rappresenta una forma di autorealizzazione negativa."}, "39.09": {"q": "Uno dei nuclei centrali della psicopatia è:", "options": {"A": "l'aggressività immotivata", "B": "il narcisismo maligno", "C": "cognitività proattiva e ipertrofica", "D": "il potere inconscio"}, "correct": "C", "a": "cognitività proattiva e ipertrofica", "expl": "cognitività proattiva e ipertrofica:\nI tre fattori imprescindibili riconosciuti in tutti i profili psicopatici sono: il deficit emozionale, la cognitività proattiva e ipertrofica e la maschera. La cognitività proattiva e ipertrofica si riferisce alla capacità dello psicopatico di sviluppare in modo esagerato la propria parte razionale e calcolatrice, in assenza di emozioni. Questo gli permette di pianificare le proprie azioni in modo freddo e strategico, di leggere le situazioni sociali con grande precisione e di manipolare gli altri senza essere ostacolato da sentimenti come il rimorso o la paura."}, "39.10": {"q": "Secondo la psicologia investigativa per tracciare il profilo criminologico è essenziale:", "options": {"A": "il passato del criminale", "B": "il singolo", "C": "la famiglia in senso stretto", "D": "il contesto sociale"}, "correct": "D", "a": "il contesto sociale", "expl": "il contesto sociale:\nAlla base della psicologia investigativa e del Geographical Profiling di David Canter, risiede la convinzione che il contesto sociale sia fondamentale per tracciare il profilo criminologico degli autori di reato, specialmente quelli più efferati. Il criminale non agisce in un vuoto sociale, ma genera azioni significative all'interno del contesto in cui è inserito e in cui si muove. Per questo motivo, ogni comportamento criminale va letto come una transazione interpersonale, e la conoscenza del contesto sociale, insieme all'analisi geografica dei luoghi del crimine, diventa uno strumento imprescindibile per risalire al colpevole."}, "40.01": {"q": "Il criminale con rabbia pervasiva mostra:", "options": {"A": "Una concezione distorta della donna e della sessualità", "B": "Una inclinazione ad infliggere traumi fisici alla vittima", "C": "Una totale disinibizione nel commettere una violenza sessuale", "D": "Una rabbia scaricata attraverso minacce"}, "correct": "C", "a": "Una totale disinibizione nel commettere una violenza sessuale", "expl": "Una totale disinibizione nel commettere una violenza sessuale:\nSecondo la classificazione di Knight e Prentky, il criminale con rabbia pervasiva è caratterizzato da una totale disinibizione, poiché la sua collera e ostilità, rivolte unicamente verso la donna, gli impediscono di provare sentimenti socioaffettivi. La sua eccitazione sessuale si manifesta sia di fronte a un atto violento che a uno consenziente, per cui l'abuso non è finalizzato al piacere sessuale ma diventa un canale di sfogo violento della propria rabbia repressa. Questa tipologia si distingue dalle altre proprio per l'assenza di un vero piacere sessuale e per la natura compulsiva e pervasiva della sua aggressività."}, "40.02": {"q": "Douglas distingue tra criminale:", "options": {"A": "Organizzato e disorganizzato", "B": "Sadico e psicopatico", "C": "Con rabbia pervasiva e palesemente sadico", "D": "Violento e Sadico"}, "correct": "A", "a": "Organizzato e disorganizzato", "expl": "Organizzato e disorganizzato:\nNel Crime Classification Manual, Douglas suddivide i serial killer sessuali in due categorie principali: organizzato e disorganizzato. Il criminale organizzato è psicopatico, con un Q.I. sopra la media e una personalità manipolatoria che gli consente di integrarsi senza destare sospetti, pianificando i crimini con scrupolosa accuratezza e lasciando poche tracce. Il disorganizzato, invece, ha un Q.I. sotto la media, appartiene a classi sociali inferiori, è inesperto, rifiuta la società e appare rigido negli schemi di apprendimento. Questa distinzione è fondamentale per comprendere le diverse modalità operative dei serial killer a sfondo sessuale."}, "40.03": {"q": "Il modello del giudizio delle distorsioni cognitive è stato proposto da:", "options": {"A": "Knight e Prentky", "B": "Ward Gannon e Keown", "C": "Douglas", "D": "De Luca"}, "correct": "B", "a": "Ward Gannon e Keown", "expl": "Ward Gannon e Keown:\nIl modello del giudizio delle distorsioni cognitive è stato teorizzato da Ward, Gannon e Keown nel 2006. Questo modello si basa sia sul contenuto che sul ruolo delle distorsioni cognitive nell'insorgenza e nel mantenimento del comportamento abusante. Esso illustra le distorsioni cognitive su tre diversi livelli analitici: il microlivello, che esamina credenze, valori e azioni singolarmente; il mesolivello, che evidenzia il rapporto tra i progetti di vita e le condizioni ambientali; e il macrolivello, che si concentra sulla relazione tra l'abusatore e l'ambiente socioculturale."}, "40.04": {"q": "Una caratteristica dei serial killer riguarda:", "options": {"A": "L'incapacità di intendere e volere", "B": "Condotte antisociali", "C": "Il bisogno di esperire piacere sessuale", "D": "Il narcisismo maligno"}, "correct": "D", "a": "Il narcisismo maligno", "expl": "Il narcisismo maligno:\nSecondo il testo, nelle figure dei serial killer a sfondo sessuale spicca un determinato disturbo psicopatologico: il narcisismo maligno. Questo concetto, elaborato da Kernberg nel 1985 e poi ripreso da Fromm, rappresenta una condizione pericolosa in cui gli aspetti distorti del sé tipici della personalità narcisista si fondono con le condotte aggressive e violente della personalità antisociale. Fromm arriva a definire questa condizione come la quintessenza del male e la radice della distruttività più feroce e disumana. Si tratta di un tratto distintivo che accomuna i serial killer sessuali."}, "40.05": {"q": "La terapia farmacologica per il trattamento degli stupratori riguarda:", "options": {"A": "Gli analoghi del GnRH", "B": "Anticonvulsivi", "C": "Benzodiazepine", "D": "Antiepilettici"}, "correct": "A", "a": "Gli analoghi del GnRH", "expl": "Gli analoghi del GnRH:\nLa terapia farmacologica per il trattamento degli autori di reati sessuali si basa sulla somministrazione di antiandrogeni, in particolare gli analoghi del GnRH, che sono ormoni sintetici in grado di ridurre significativamente l'intensità e la frequenza dell'eccitazione sessuale e del comportamento deviante. Come alternativa, il testo menziona anche gli SSRI, gli inibitori selettivi della ricaptazione della serotonina, indicati per autori adolescenti e pazienti con disturbi ossessivo-compulsivi, sintomi depressivi o parafilie lievi come l'esibizionismo."}, "40.06": {"q": "Attraverso gli agiti violenti il serial killer:", "options": {"A": "Esperisce il bisogno di essere amato", "B": "Soddisfa il proprio bisogno di rapporti sessuali", "C": "Cerca di affermare il proprio Io", "D": "Rivaluta la propria autostima"}, "correct": "C", "a": "Cerca di affermare il proprio Io", "expl": "Cerca di affermare il proprio Io:\nIl testo sottolinea che il serial killer a sfondo sessuale, o lust killer, non desidera una partner, ma una vittima da dominare e umiliare. È proprio attraverso la sottomissione, l'umiliazione e la paura della vittima che questi soggetti riescono ad affermare il proprio Io. Le pulsioni sessuali si fondono con quelle aggressive, e la violenza diventa lo strumento per esercitare una coercizione totale e decretare il destino della vittima. Questo bisogno di affermazione del sé è centrale nella dinamica psicologica del lust killer."}, "40.07": {"q": "A partire dalla Integrated Theory of Sexual Offending sono emersi:", "options": {"A": "Fattori psicologici e fattori sociali", "B": "Fattori di sviluppo cerebrale e fattori ecologici", "C": "Fattori sociali e demografici", "D": "Fattori sociali e fattori ecologici"}, "correct": "B", "a": "Fattori di sviluppo cerebrale e fattori ecologici", "expl": "Fattori di sviluppo cerebrale e fattori ecologici:\nLa ricerca condotta da Ward e Beech nel 2006, partendo dalla Integrated Theory of Sexual Offending, ha analizzato due grandi categorie di fattori che influenzano l'abuso sessuale. Da un lato, i fattori che influenzano lo sviluppo del cervello, come l'evoluzione, le variazioni genetiche e la neurobiologia; dall'altro, i fattori ecologici, che comprendono l'ambiente sociale e culturale, le circostanze personali e l'ambiente fisico. Entrambe queste categorie hanno un impatto significativo sulle funzioni neuropsicologiche che sostengono l'azione umana."}, "40.08": {"q": "Gli elementi cardine dei sex offender sono:", "options": {"A": "Potere e dominazione", "B": "Potere e bisogno di autostima", "C": "Controllo e umiliazione", "D": "Controllo e bisogno di autostima"}, "correct": "C", "a": "Controllo e umiliazione", "expl": "Controllo e umiliazione:\nSecondo il testo, per il sex offender gli elementi cardine risultano essere il controllo e l'umiliazione. Questi individui provano piacere sessuale tramite il dolore e la paura crescente della vittima, e la remissività di quest'ultima può amplificare l'aggressività dell'autore, stimolandone l'eccitazione sessuale. La violenza sessuale viene quindi considerata non come un atto di gratificazione sessuale primaria, ma come una dimostrazione di rabbia, odio, potere e controllo, in cui l'umiliazione della vittima gioca un ruolo centrale."}, "40.09": {"q": "Chi rappresenta il profilo del serial killer sessuale:", "options": {"A": "Criminale con rabbia pervasiva", "B": "Non criminale-sessuale non sadico", "C": "Non criminale sadico latente", "D": "Criminale palesemente sadico"}, "correct": "D", "a": "Criminale palesemente sadico", "expl": "Criminale palesemente sadico:\nIl testo indica esplicitamente che il criminale palesemente sadico incarna il classico profilo del serial killer a sfondo sessuale. La sua rabbia e l'inclinazione a infliggere traumi fisici alla vittima sono correlate sia a una premeditazione dell'atto aggressivo, sia a fantasie sessuali violente che lo portano ad eccitarsi sessualmente nel seviziare la propria vittima. Questa tipologia si differenzia dalle altre proprio per la combinazione di sadismo, premeditazione e piacere derivato dalla sofferenza della vittima."}, "40.10": {"q": "Il modello a 5 Domini è stato proposto da:", "options": {"A": "Abracen e colleghi", "B": "Knight e Prentky", "C": "Ward e Beech", "D": "Mastronardi e colleghi"}, "correct": "A", "a": "Abracen e colleghi", "expl": "Abracen e colleghi:\nIl \"Modello a 5 Domini\" è stato sviluppato da James Abracen e il suo team come approccio strutturato per la valutazione degli offender sessuali. Questo modello fornisce una struttura per esaminare diversi aspetti della personalità, dei comportamenti e dei fattori di rischio, al fine di informare la valutazione del rischio e la pianificazione del trattamento. I cinque domini principali sono: Storia Personale e Demografica, Storia Sessuale, Cognizioni e Distorsioni, Stili di Vita e Fattori Attuali, e Fattori di Rischio Dinamici"}, "41.01": {"q": "Tra i principi cardine del DRP 448/88 troviamo:", "options": {"A": "la de-individuazione", "B": "la de-umanizzazione", "C": "la de-stigmatizzazione", "D": "la de-responsabilizzazione"}, "correct": "C", "a": "la de-stigmatizzazione", "expl": "la de-stigmatizzazione:\nLa dispensa indica esplicitamente che il sistema di garanzie del processo minorile è improntato ai principi-cardine della minima offensività, dell'attitudine responsabilizzante, della de-stigmatizzazione e della de-istituzionalizzazione. Questi principi sono stati pensati per evitare che l'esperienza giudiziaria lasci segni indelebili sull'adolescente, orientando invece il processo come un'opportunità di crescita e di assunzione di responsabilità."}, "41.02": {"q": "Nella cornice normativa del DRP 448/88, il reo minore viene messo in condizione di co-responsabile del proprio:", "options": {"A": "cambiamento", "B": "percorso deviante", "C": "percorso peritale", "D": "futuro"}, "correct": "A", "a": "cambiamento", "expl": "cambiamento:\nLa dispensa sottolinea che nel processo minorile la persona imputata è posta nella diversa condizione di co-responsabile del proprio cambiamento, potendo assumere direttamente le decisioni che la riguardano. Questo aspetto è centrale nella filosofia del D.P.R. 448/88, che considera il processo non come qualcosa da subire, ma come un'occasione in cui l'adolescente diventa protagonista attivo del proprio percorso di crescita e responsabilizzazione"}, "41.03": {"q": "Nell'ottica del DRP 448/88, le diverse misure processuali e d'intervento previste a livello normativo sono accomunate dalla logica della:", "options": {"A": "giustizia punitiva", "B": "giustizia riparativa", "C": "giustizia sociale", "D": "equità riparativa"}, "correct": "B", "a": "giustizia riparativa", "expl": "giustizia riparativa:\nLa dispensa afferma che le diverse misure processuali e d'intervento sono accomunate dalla logica della giustizia riparativa. In questa prospettiva, la persona che ha trasgredito la norma penale deve confrontarsi con le proprie azioni sia di fronte all'apparato formale della giustizia, sia dinanzi alla società, in una prospettiva di assunzione delle conseguenze del reato che guarda al futuro e al reinserimento sociale."}, "41.04": {"q": "L'art. 9 del D.P.R. 448/88 riguarda:", "options": {"A": "la messa alla prova", "B": "gli accertamenti sulla pericolosità del reo", "C": "gli accertamenti sulla personalità della vittima", "D": "gli accertamenti sulla personalità del minorenne"}, "correct": "D", "a": "gli accertamenti sulla personalità del minorenne", "expl": "gli accertamenti sulla personalità del minorenne:\nL'articolo 9 del D.P.R. 448/88 è intitolato esattamente \"Accertamenti sulla personalità del minorenne\" e rappresenta il cuore della disciplina. Esso stabilisce che il pubblico ministero e il giudice acquisiscono elementi circa le condizioni e le risorse personali, familiari, sociali e ambientali del minorenne al fine di accertarne l'imputabilità e il grado di responsabilità, valutare la rilevanza sociale del fatto e disporre le adeguate misure penali."}, "41.05": {"q": "Secondo l'art. 9 del D.P.R. 448/88 il pubblico ministero e il giudice possono sempre assumere informazioni da persone che abbiano avuto rapporti con il minorenne e sentire il parere di esperti:", "options": {"A": "senza consenso del minore", "B": "previa autorizzazione delle parti", "C": "previa autorizzazione del tribunale", "D": "anche senza alcuna formalità"}, "correct": "D", "a": "anche senza alcuna formalità", "expl": "anche senza alcuna formalità:\nIl comma 2 dell'articolo 9 stabilisce testualmente che il pubblico ministero e il giudice possono sempre assumere informazioni da persone che abbiano avuto rapporti con il minorenne e sentire il parere di esperti, \"anche senza alcuna formalità\". Questa disposizione sottolinea la natura non burocratica e flessibile degli accertamenti, che devono essere condotti in modo da favorire un'autentica conoscenza della persona e delle sue risorse."}, "41.06": {"q": "L'osservazione e la valutazione della personalità viene svolta in primo luogo dai:", "options": {"A": "periti", "B": "servizi minorili dell'amministrazione della giustizia", "C": "servizi sociali territoriali", "D": "servizi educativi di assistenza degli enti locali"}, "correct": "B", "a": "servizi minorili dell'amministrazione della giustizia", "expl": "servizi minorili dell'amministrazione della giustizia:\nLa dispensa specifica che l'osservazione e la valutazione della personalità viene svolta in primo luogo dai servizi minorili dell'amministrazione della giustizia in collaborazione con i servizi di assistenza degli enti locali. Solo successivamente, se il giudice lo ritiene necessario per acquisire dati o valutazioni che richiedono specifiche competenze tecnico-scientifiche, viene disposto l'intervento del perito."}, "41.07": {"q": "Nel D.P.R. 448/88, la concezione della personalità è:", "options": {"A": "circolare e interpretativa", "B": "complessa e interpretativa", "C": "complessa e interattiva", "D": "complessa e interdipendente"}, "correct": "C", "a": "complessa e interattiva", "expl": "complessa e interattiva:\nLa dispensa cita esplicitamente De Leo e Patrizi (1999) per definire la concezione della personalità presente nel D.P.R. 448/88 come \"una concezione personologica moderna, di taglio pragmatico e funzionale, di orientamento psico-sociale\". Viene inoltre specificato che gli accertamenti riguardano la persona in relazione ai suoi sistemi e al contesto sociale, abbandonando i modelli di causalità lineare che esploravano solo l'intrapsichico."}, "41.08": {"q": "Nel minore deviante la capacità di stare in giudizio:", "options": {"A": "non coincide con l'imputabilità", "B": "coincide con l'imputabilità", "C": "non coincide con la responsabilità", "D": "coincide con la responsabilità"}, "correct": "A", "a": "non coincide con l'imputabilità", "expl": "non coincide con l'imputabilità:\nLa dispensa chiarisce che la capacità di stare in giudizio non può essere assimilata a quella d'imputabilità, perché richiede il possesso di requisiti psichici diversi. Mentre l'imputabilità riguarda il momento del reato e la capacità di intendere e volere in quel frangente, la capacità di stare in giudizio si riferisce alla capacità di partecipare coscientemente al processo attraverso l'esercizio di tutti i diritti previsti dalla legge."}, "41.09": {"q": "Nel minore deviante la capacità di stare in giudizio:", "options": {"A": "è strettamente correlata al diritto di autodifendersi", "B": "non è strettamente correlata al diritto di autodifendersi", "C": "è strettamente correlata al diritto di autodeterminarsi", "D": "è strettamente correlata al diritto di autodefinirsi"}, "correct": "A", "a": "è strettamente correlata al diritto di autodifendersi", "expl": "è strettamente correlata al diritto di autodifendersi:\nLa dispensa spiega che la capacità di stare in giudizio richiede il possesso della capacità di partecipare coscientemente al processo attraverso l'esercizio di tutti i diritti e le facoltà previste dalla legge e di intraprendere ogni iniziativa utile alla propria difesa, definito come diritto inviolabile all'autodifesa. L'articolo 1 del D.P.R. 448/88 sottolinea che l'adolescente deve comprendere ciò che avviene intorno e su di sé."}, "41.10": {"q": "Nel minore deviante l'imputabilità risulta compromessa quando risultano carenti:", "options": {"A": "le capacità di automonitoraggio", "B": "le capacità di autodeterminazione", "C": "le capacità di autocontrollo", "D": "la capacità d'intendere e la capacità di volere"}, "correct": "D", "a": "la capacità d'intendere e la capacità di volere", "expl": "la capacità d'intendere e la capacità di volere:\nLa dispensa richiama l'articolo 85 del codice penale, secondo cui è imputabile chi ha la capacità d'intendere e di volere. Per i minori tra i quattordici e i diciotto anni questa capacità non si presume ma va accertata caso per caso, valutando la maturità sotto il profilo intellettivo, motivazionale ed etico-morale. La dispensa precisa inoltre che il giudice deve motivare adeguatamente l'accertamento concreto di detta capacità, rapportandola agli specifici episodi criminosi."}, "42.01": {"q": "I fattori di stress possono essere differenziati in eventi traumatici caratterizzati dalla violenza o:", "options": {"A": "microtraumi relazionali", "B": "traumi emotivi", "C": "traumi fisici", "D": "traumi psichici"}, "correct": "A", "a": "microtraumi relazionali", "expl": "microtraumi relazionali:\nLa dispensa, citando Caretti e Capraro (2008), distingue i fattori di stress in due categorie: gli eventi traumatici caratterizzati dalla violenza (morte, lesioni, minacce all'integrità fisica o psicologica) e i microtraumi relazionali. Questi ultimi si collocano nelle prime fasi dello sviluppo emotivo della persona e comprendono maltrattamento, separazione precoce, mancanza di sintonizzazione affettiva e trascuratezza psicologica. Il termine \"microtraumi\" sottolinea la natura subdola e ripetuta di questi eventi, che agiscono silenziosamente sul sistema psicobiologico dell'individuo. Per ricordarlo, associa \"microtraumi\" a \"relazione\": sono ferite che avvengono nel contesto delle relazioni significative."}, "42.02": {"q": "Nel danno, l'evento traumatico può essere singolo o:", "options": {"A": "raddoppiato", "B": "prolungato", "C": "ripetuto", "D": "doppioisa, la ripetizione nel tempo logora l'equilibrio psichico in modo cronico e progressivo."}, "correct": "C", "a": "ripetuto", "expl": "ripetuto:\nQuesta distinzione è cruciale perché un trauma ripetuto nel tempo ha effetti cumulativi e può generare nella persona una nuova modalità di vivere e osservare il mondo, con un impatto negativo che si stratifica progressivamente. A differenza di un evento singolo, che produce una rottura improvvisa, la ripetizione nel tempo logora l'equilibrio psichico in modo cronico e progressivo."}, "42.03": {"q": "Viene definito come «una modificazione peggiorativa dell'equilibrio psicologico e dello stile di vita nell'ambito dei rapporti sociali, della famiglia e degli affetti in ottica relazionale ed emotiva; ciò condiziona marcatamente la qualità della vita, la sua progettualità e le aspettative»", "options": {"A": "danno morale", "B": "danno esistenziale", "C": "danno psichico", "D": "danno biologico"}, "correct": "B", "a": "danno esistenziale", "expl": "danno esistenziale:\nQuesta definizione si concentra sull'impatto che il trauma ha sulla vita vissuta della persona: i rapporti sociali, la famiglia, gli affetti, la progettualità e le aspettative. Mentre il danno psichico riguarda le funzioni mentali interne (come l'affettività o il tono dell'umore), il danno esistenziale si manifesta all'esterno, nel modo in cui la persona vive e si relaziona. Il termine \"esistenziale\" richiama l'esistenza quotidiana, il tessuto delle relazioni e il senso di realizzazione personale. La valutazione del danno esistenziale si basa su un criterio descrittivo che prende in considerazione personalità, relazioni familiari e affettive, e attività portate a termine."}, "42.04": {"q": "Viene definito come la manifestazione di \"un'alterazione della integrità psichica, ovvero una modificazione qualitativa e quantitativa delle componenti primarie psichiche, come le funzioni mentali primarie, l'affettività, i meccanismi difensivi, il tono dell'umore, le pulsioni\":", "options": {"A": "danno morale", "B": "danno esistenziale", "C": "danno psichico", "D": "danno biologico"}, "correct": "C", "a": "danno psichico", "expl": "danno psichico:\nQuesta è la definizione letterale fornita dall'Ordine degli Psicologi del Lazio (2012). A differenza del danno esistenziale, che si vede nelle relazioni e nello stile di vita, il danno psichico è un'alterazione interna all'individuo, una vera e propria modificazione qualitativa e quantitativa delle sue risorse mentali. È importante ricordare che include sia le conseguenze psichiche di un danno fisico sia le alterazioni mentali che insorgono indipendentemente da lesioni fisiche."}, "42.05": {"q": "Modale, qualitativo, cronologico e quantitativo sono criteri per la valutazione del:", "options": {"A": "danno biologico", "B": "danno fisico", "C": "nesso casuale", "D": "nesso causale"}, "correct": "D", "a": "nesso causale", "expl": "nesso causale:\nLa dispensa, citando Camerini et al. (2011), elenca questi quattro criteri come strumenti per accertare l'esistenza del nesso di causalità tra l'evento dannoso e la condizione clinica successiva. Il criterio cronologico richiede che la causa preceda il danno; il qualitativo valuta se il fatto lesivo è idoneo e proporzionato all'insorgenza di quel danno; il quantitativo considera intensità, durata e ripetitività; il modale verifica che la modalità dell'azione sia adeguata a causare quel danno. Il termine \"nesso causale\" indica il legame di causa-effetto: per questo è scritto con la \"c\" di causa, non casuale, che indicherebbe un evento fortuito."}, "42.06": {"q": "Nel caso della valutazione del danno psichico, riguardano la probabilità di cronicizzazione di un disturbo psicopatologico nel tempo e alla possibilità che vi sia un miglioramento o peggioramento di esso:", "options": {"A": "fattori predisponenti", "B": "fattori prognostici", "C": "fattori precipitanti", "D": "fattori di cronicizzazione"}, "correct": "B", "a": "fattori prognostici", "expl": "fattori prognostici:\nLa dispensa definisce i fattori prognostici come quegli elementi che riguardano \"la probabilità di cronicizzazione di un disturbo psicopatologico nel tempo e alla possibilità che vi sia un miglioramento o peggioramento di esso\". Il termine \"prognosi\" in medicina indica la previsione sull'evoluzione futura di una malattia; qui si applica allo stesso modo alla psicopatologia. I fattori prognostici aiutano il consulente a prevedere se il disturbo tenderà a stabilizzarsi, a regredire o ad aggravarsi, consentendo così una valutazione più accurata del danno e delle sue possibili conseguenze a lungo termine."}, "42.07": {"q": "Il danno deve avere entità minima, significa che dovrà essere valutata:", "options": {"A": "la causa", "B": "la complessità causale", "C": "l'apprezzabilità giuridica", "D": "la multifattorialità"}, "correct": "C", "a": "l'apprezzabilità giuridica", "expl": "l'apprezzabilità giuridica:\nLa dispensa, citando Petruccelli e Longobardi (2004), elenca tre condizioni fondamentali per affrontare il problema del danno psichico in ottica giuridica; la prima è appunto \"l'apprezzabilità giuridica (il danno deve avere entità minima)\". Questo significa che non qualsiasi alterazione psichica è risarcibile: deve superare una soglia minima di gravità per essere considerata giuridicamente rilevante. Il termine \"apprezzabilità\" richiama l'idea che il danno deve essere \"apprezzabile\", cioè valutabile e non trascurabile, agli occhi del diritto."}, "42.08": {"q": "Dovrebbe coniugare due approcci: quello categoriale che tratta la malattia in termini qualitativi e quello dimensionale, che invece ha un approccio focalizzato sulla storia dell'individuo:", "options": {"A": "diagnosi", "B": "prognosi", "C": "trattamento", "D": "consulenza tecnica"}, "correct": "A", "a": "diagnosi", "expl": "diagnosi:\nLa dispensa afferma esplicitamente che \"la diagnosi (dovrebbe coniugare due approcci: quello categoriale che tratta la malattia in termini qualitativi; quello dimensionale, che invece ha un approccio focalizzato sulla storia dell'individuo)\". L'approccio categoriale classifica il disturbo in una categoria diagnostica, mentre l'approccio dimensionale considera la posizione del paziente lungo un continuum e la sua storia personale. Coniugare questi due approcci significa fare una diagnosi che non sia solo un'etichetta, ma che tenga conto dell'unicità dell'individuo. La diagnosi è quindi il momento in cui la classificazione scientifica incontra la storia della persona."}, "42.09": {"q": "La quantificazione e misurazione dei sintomi psicopatologici riguarda:", "options": {"A": "la diagnosi", "B": "la prognosi", "C": "la valutazione del nesso causale", "D": "la valutazione dell'invalidità"}, "correct": "D", "a": "la valutazione dell'invalidità", "expl": "la valutazione dell'invalidità:\nLa dispensa, nell'elenco delle fasi della consulenza tecnica, descrive la valutazione dell'invalidità come \"la quantificazione e misurazione dei sintomi psicopatologici\". Questo passaggio è fondamentale per tradurre la sofferenza soggettiva in un dato oggettivo, espresso in percentuale, che possa essere utilizzato a fini risarcitori. Si tratta di dare un valore numerico alla gravità del disturbo, utilizzando scale e tabelle standardizzate come quelle dell'American Medical Association o dell'Ordine degli Psicologi del Lazio. Senza questa quantificazione, non sarebbe possibile procedere alla liquidazione del danno."}, "42.10": {"q": "Comprende la risposta al quesito del giudice, dell'ente assicurativo o di altra parte e la valutazione del danno:", "options": {"A": "la prognosi", "B": "il giudizio finale", "C": "la valutazione del nesso causale", "D": "la valutazione dell'invalidità"}, "correct": "B", "a": "il giudizio finale", "expl": "il giudizio finale:\nLa dispensa indica che il giudizio finale, ultima fase della consulenza tecnica, \"comprende la risposta al quesito del giudice, dell'ente assicurativo o di altra parte e la valutazione del danno\". Si tratta dell'atto conclusivo del consulente, che deve rispondere in modo chiaro e motivato alle domande poste dall'autorità richiedente, integrando tutte le valutazioni fatte nelle fasi precedenti. È il momento in cui l'intero percorso valutativo si sintetizza in un parere definitivo, che avrà conseguenze concrete sulla vita della persona e sulle decisioni giudiziarie o assicurative."}, "43.01": {"q": "I processi genetici o ambientali che possono indurre a compiere atti o comportamenti antisociali riguardano?", "options": {"A": "la criminodinamica", "B": "la psicologia investigativa", "C": "la criminogenesi", "D": "le carriere devianti"}, "correct": "C", "a": "la criminogenesi", "expl": "la criminogenesi:\nLa criminogenesi rappresenta il primo dei due macro-processi della psicologia criminologica, affiancata dalla criminodinamica. Mentre la criminodinamica studia lo sviluppo e il mutamento del crimine, la criminogenesi si concentra sull'origine, analizzando l'interazione tra predisposizioni genetiche e influenze ambientali. Questo termine deriva dal greco \"genesis\" (origine) ed è cruciale per capire perché una persona inizia a deviare. Nella dispensa viene sottolineato come questi processi siano uno degli ambiti di studio della psicologia criminale."}, "43.02": {"q": "Nel criminal profiling secondo Teten:", "options": {"A": "il metodo per identificare l'autore di un reato si deve basare sull'analisi della natura del crimine", "B": "sono fondamentali le motivazioni all'azione deviante", "C": "bisogna fornire agli investigatori adeguate tecniche, tattiche e procedure", "D": "l'azione antisociale può definirsi come un contesto ordinatore della realtà sociale del crimine"}, "correct": "A", "a": "il metodo per identificare l'autore di un reato si deve basare sull'analisi della natura del crimine", "expl": "il metodo per identificare l'autore di un reato si deve basare sull'analisi della natura del crimine:\nHoward Teten, agente istruttore dell'FBI, propose un approccio diametralmente opposto a quello di Brussel. Secondo la sua visione, la personalità del criminale si riflette nelle azioni che sceglie di compiere, pertanto analizzare la natura del crimine e il modo in cui viene commesso diventa la chiave per risalire all'autore. Questo metodo si fonda sul presupposto che gli aspetti della personalità emergano prima, durante e dopo il fatto, spostando l'attenzione sulla scena del crimine per giungere alla definizione dello stato mentale."}, "43.03": {"q": "Una delle funzioni della psicologia investigativa riguarda:", "options": {"A": "l'esecuzione penale", "B": "l'autopsia psicologica", "C": "l'apprehension", "D": "la criminodinamica"}, "correct": "B", "a": "l'autopsia psicologica", "expl": "l'autopsia psicologica:\nuna procedura avanzata che segue l'analisi vittimologica all'interno dell'iter della psicologia investigativa. Consiste nell'analizzare in modo completo la personalità e le caratteristiche della vittima per trarre inferenze deduttive sul movente, sul modus operandi e sulla firma del criminale. Questo strumento, come evidenziato da David Canter, permette di ridurre la tipologia degli ipotetici criminali, suggerisce strategie per gli interrogatori e svolge una funzione di prevenzione individuando possibili vittime future a rischio."}, "43.04": {"q": "L'inductive criminal profiling:", "options": {"A": "permette una rapida elaborazione dei profili attraverso un approccio con un impatto scientifico più incisivo", "B": "permette di ottenere un'analisi completa degli elementi", "C": "riguarda la vittima", "D": "utilizza un ragionamento atto a ricostruire precisi modelli comportamentali messi in atto dal criminale con una specifica vittima in un determinato contesto"}, "correct": "A", "a": "permette una rapida elaborazione dei profili attraverso un approccio con un impatto scientifico più incisivo", "expl": "permette una rapida elaborazione dei profili attraverso un approccio con un impatto scientifico più incisivo:\nIl metodo induttivo, tipico dell'approccio dell'FBI, si avvale dell'uso della statistica e dei dati provenienti da criminali già incarcerati per costruire rapidamente profili generali. Il suo impatto scientifico risiede nella possibilità di generalizzare pattern comportamentali su larga scala, rendendo l'elaborazione più veloce rispetto al metodo deduttivo. Tuttavia, la dispensa mette in luce che i risultati possono ridursi ad attributi generici e che le informazioni raccolte potrebbero non rappresentare accuratamente i criminali ancora in libertà."}, "43.05": {"q": "Il primo contributo sul criminal profiling è di:", "options": {"A": "Brussel", "B": "Teten", "C": "Canter", "D": "Bond"}, "correct": "D", "a": "Bond", "expl": "Bond:\nIl dottor Thomas Bond fu il primo a fornire un contributo tangibile al criminal profiling, tentando di tracciare il profilo di Jack lo Squartatore. Analizzando i segni sul corpo dell'ultima vittima, Mary Jane Kelly, durante l'autopsia, cercò di carpire il modus operandi dell'assassino. Il suo rapporto, andato perduto e poi ritrovato, descriveva l'assassino come un uomo fisicamente forte, solitario e con attacchi periodici di follia, anticipando di decenni le moderne tecniche di profiling."}, "43.06": {"q": "Per il profiler con \"over killing\" si intende:", "options": {"A": "colpi inferti dopo quello mortale", "B": "messa in scena e manipolazione volontaria della scena del crimine", "C": "l'eccesso di violenza e accanimento sul cadavere", "D": "rientra nell'input profiling"}, "correct": "C", "a": "l'eccesso di violenza e accanimento sul cadavere", "expl": "l'eccesso di violenza e accanimento sul cadavere"}, "43.07": {"q": "L'approccio antropologico in criminologia:", "options": {"A": "investiga sui fattori organici, psicologici e motivazionali che possono aver determinato la condotta criminale", "B": "rivolge la propria attenzione a quelli che sono i fattori che influenzano l'insorgere del crimine", "C": "analizza il corpo dell'uomo per individuare al suo interno elementi che ne abbiano determinato la condotta criminale", "D": "viene usato per scovare le motivazioni che hanno mosso il comportamento criminale"}, "correct": "A", "a": "investiga sui fattori organici, psicologici e motivazionali che possono aver determinato la condotta criminale", "expl": "investiga sui fattori organici, psicologici e motivazionali che possono aver determinato la condotta criminale:\nL'approccio antropologico si concentra sulla persona in quanto autrice del reato, indagando i fattori intrinseci come quelli organici, psicologici e motivazionali. Questo filone, che richiama gli studi dell'antropologia criminale, nega che il delinquente sia pienamente libero nella sua condotta ma ne afferma la pericolosità sociale. Viene contrapposto all'approccio sociologico, che guarda ai fattori macro-sociali, e a quello multifattoriale che lo ingloba in una prospettiva più ampia."}, "43.08": {"q": "Tra i livelli interpretativi dell'azione criminale troviamo:", "options": {"A": "gli atti auto-conservatori", "B": "valori e credenze", "C": "la storia lavorativa", "D": "l'agire istituzionale giudiziario"}, "correct": "D", "a": "l'agire istituzionale giudiziario", "expl": "l'agire istituzionale giudiziario:\nI livelli interpretativi dell'azione criminale sono quattro e spaziano dal macro al micro. Il livello dell'agire istituzionale giudiziario rappresenta la cornice legale e processuale entro cui il crimine viene valutato e giudicato. Gli altri livelli comprendono le dimensioni psicologiche e relazionali dell'attore, il senso che l'azione produce in termini di identità e, infine, i sistemi simbolici e sociali che orientano il significato intersoggettivo dell'azione."}, "43.09": {"q": "Con il seguente modello si classifica il crimine e si valutano i collegamenti possibili e il livello di rischio della vittima e del criminale:", "options": {"A": "profile input", "B": "decision process model", "C": "crime assessment", "D": "Routine Activity Theory"}, "correct": "C", "a": "crime assessment", "expl": "crime assessment:\nIl Crime Assessment è una delle sei fasi fondamentali dell'iter investigativo del profiler, collocata tra il Decision Process Model e il Criminal Profiling. In questa fase, il crimine viene inquadrato e classificato nella sua interezza, valutando i collegamenti tra gli eventi e analizzando il livello di rischio sia per la vittima che per l'offender. Il RAT è un suo processo."}, "43.10": {"q": "Per il profiler lo staging:", "options": {"A": "è un atto obbligato", "B": "rappresenta le reazioni contro le forze dell'ordine", "C": "messa in scena e manipolazione volontaria della scena del crimine", "D": "è il tentativo di ridurre l'impatto emozionale/psicologico del crimine"}, "correct": "C", "a": "messa in scena e manipolazione volontaria della scena del crimine", "expl": "messa in scena e manipolazione volontaria della scena del crimine"}, "44.01": {"q": "La violenza di genere è caratterizzata da:", "options": {"A": "azioni fisiche sessuali, di dipendenza economica e psicologica", "B": "azioni fisiche, azioni di coercizione economica e psicologica", "C": "azioni fisiche, sessuali, di coercizione economica e psicologica", "D": "azioni sessuali e fisiche"}, "correct": "C", "a": "azioni fisiche, sessuali, di coercizione economica e psicologica", "expl": "azioni fisiche, sessuali, di coercizione economica e psicologica:\nLa definizione di violenza di genere fornita nella dispensa, citando Baldry (2006), la descrive come una serie distinta di azioni fisiche, sessuali, di coercizione economica e psicologica. Questa quadruplice articolazione è essenziale per comprendere la natura complessa del fenomeno, che non si esaurisce nella sola sfera fisica ma si estende al controllo economico e alla manipolazione psicologica. È proprio l'insieme di queste condotte che produce nel breve e nel lungo periodo un danno sia fisico sia psicologico ed esistenziale."}, "44.02": {"q": "L'IPV è:", "options": {"A": "dimostrazione di una sola forza fisica", "B": "sconvolge i meccanismi psicologici sofisticati", "C": "non è solamente una dimostrazione di forza fisica e non coinvolge anche i meccanismi psicologici sofisticati", "D": "non è solamente una dimostrazione di forza fisica, ma coinvolge anche meccanismi psicologici sofisticati"}, "correct": "D", "a": "non è solamente una dimostrazione di forza fisica, ma coinvolge anche meccanismi psicologici sofisticati", "expl": "non è solamente una dimostrazione di forza fisica, ma coinvolge anche meccanismi psicologici sofisticati:\nL'aggressore utilizza tattiche psicologiche per esternare il suo desiderio di controllo e offesa, come manipolazione emotiva, isolamento sociale, minacce e umiliazioni. Queste strategie sono finalizzate a indebolire la vittima e mantenerla in uno stato di paura e dipendenza, rendendo l'IPV un fenomeno complesso e insidioso che va ben oltre la mera aggressione fisica."}, "44.03": {"q": "La percentuale di donne nel mondo che ha subito un maltrattamento fisico è pari a:", "options": {"A": "30-60%", "B": "20-50%", "C": "15-40%", "D": "10-20%"}, "correct": "B", "a": "20-50%", "expl": "20-50%:\nLa dispensa riporta, citando Krantz (2002), che si stima che nel mondo le donne che hanno subito maltrattamento fisico nel corso della vita siano tra il 20 e il 50 per cento. Questo dato, già di per sé allarmante, rappresenta solo una parte del problema poiché la maggior parte dei casi non viene denunciata, rendendo il fenomeno prevalentemente sommerso. La forte discrepanza tra i dati dei centri antiviolenza e il numero di denunce riportate sullo stesso territorio, come evidenziato da Gracia (2004), conferma che l'incidenza reale è probabilmente ancora più elevata."}, "44.04": {"q": "Nel 2020 sono state registrate 39.166 denunce, nel 2019 invece erano state 41.799 e la diminuzione è dovuta dalla difficoltà da parte delle vittime vissuta nel periodo del lockdown:", "options": {"A": "di contattare le forze di polizia o di recarsi in questura per denunciare", "B": "per la paura dei contagi", "C": "per la vergogna sociale", "D": "di parlare con la mascherina"}, "correct": "A", "a": "di contattare le forze di polizia o di recarsi in questura per denunciare", "expl": "di contattare le forze di polizia o di recarsi in questura per denunciare:\nLa dispensa spiega che la diminuzione delle denunce nel 2020 rispetto al 2019 è dovuta alla difficoltà da parte delle vittime, vissuta nel periodo del lockdown, di contattare le forze di polizia o di recarsi in questura per denunciare. Questo dato è significativo perché evidenzia come le restrizioni legate all'emergenza sanitaria abbiano creato ulteriori barriere per le vittime, costringendole a rimanere in isolamento con i propri aggressori. Nella fase di allentamento delle norme, tra maggio e ottobre 2020, si è effettivamente registrata una risalita nel numero delle denunce, a conferma che il calo non era dovuto a una riduzione della violenza ma alla difficoltà di accesso ai canali di denuncia."}, "44.05": {"q": "Secondo il modello della Walker alla base della dinamica violenta c'è:", "options": {"A": "attaccamento insicuro", "B": "controllo", "C": "psicopatia", "D": "paura dell'abbandono"}, "correct": "B", "a": "controllo", "expl": "controllo:\nSecondo il modello di Walker (1979), alla base della dinamica violenta vi è il controllo. Nella specifica situazione di violenza domestica, il controllo viene esercitato sia da chi maltratta, che sottomette la vittima con la violenza, sia da chi subisce, che cerca di controllare la rabbia del partner e sente il peso di una missione salvifica. Walker descrive questa dinamica come un ciclo in cui l'aggressore mira a esercitare un potere totalizzante sulla vittima, mantenendola in uno stato di dipendenza e sottomissione attraverso l'alternarsi di fasi di violenza e fasi di falsa riappacificazione."}, "44.06": {"q": "Le fasi del ciclo di violenza sono:", "options": {"A": "2", "B": "3", "C": "4", "D": "6"}, "correct": "C", "a": "4", "expl": "4:\nIl ciclo della violenza descritto da Walker (1979) si articola in quattro fasi distinte. La prima è la fase di crescita della tensione, in cui l'uomo si mostra irritabile e la donna cerca di mantenere la calma. La seconda è la fase acuta della violenza fisica, in cui l'uomo perde il controllo e la violenza si manifesta apertamente. La terza è la fase delle scuse, in cui l'aggressore minimizza l'accaduto o dà la colpa alla compagna. La quarta è la fase della luna di miele o della riconciliazione, in cui l'uomo si mostra dolce e premuroso, alimentando nella vittima la speranza di un cambiamento che purtroppo non si realizza."}, "44.07": {"q": "La teoria dell'impotenza appresa di Seligman cerca di spiegare:", "options": {"A": "cerca di spiegare il comportamento passivo tenuto da determinati soggetti in condizioni di disagio o dolore", "B": "cerca di spiegare il comportamento attivo e deviante", "C": "cerca di spiegare il comportamento psicopatico tenuto da determinati soggetti in condizioni di apparente equilibrio", "D": "cerca di spiegare il dolore dell'autore"}, "correct": "A", "a": "cerca di spiegare il comportamento passivo tenuto da determinati soggetti in condizioni di disagio o dolore", "expl": "cerca di spiegare il comportamento passivo tenuto da determinati soggetti in condizioni di disagio o dolore:\nLa teoria dell'impotenza appresa, sviluppata da Seligman (1975), cerca di spiegare il comportamento passivo tenuto da determinati soggetti in condizioni di disagio o dolore. Secondo questa teoria, un soggetto collocato in un contesto spiacevole e incontrollabile diventa passivo e accetta stimoli dolorosi, anche quando l'evitamento è possibile ed evidente. Walker (1980) adottò questa teoria per spiegare come mai le donne rimangono con i loro partner violenti, integrandola nel concetto più ampio di \"Sindrome della donna picchiata\"."}, "44.08": {"q": "I due elementi che sono compresi nella \"Sindrome della donna picchiata\" sono:", "options": {"A": "il ciclo di violenza e la sindrome dell'impotenza appresa", "B": "il ciclo di violenza e il disagio", "C": "il ciclo di violenza e non la sindrome dell'impotenza appresa", "D": "la giustificazione e il ciclo di violenza"}, "correct": "A", "a": "il ciclo di violenza e la sindrome dell'impotenza appresa", "expl": "il ciclo di violenza e la sindrome dell'impotenza appresa:\nSecondo Walker (1980), la \"Sindrome della donna picchiata\" comprende due elementi: il ciclo della violenza e la sindrome dell'impotenza appresa. Questi due elementi agiscono in sinergia: il ciclo della violenza, con le sue quattro fasi, produce nella vittima un disorientamento che le impedisce di valutare lucidamente la situazione, mentre la sindrome dell'impotenza appresa la rende passiva e incapace di cercare aiuto. La brutalità, la percezione di incontrollabilità, la mancanza di risorse e la superiore forza fisica del partner contribuiscono a creare questo senso di impotenza che intrappola la vittima nella relazione abusante."}, "44.09": {"q": "Tra i tanti tipi di investimento che trattengono la donna in un rapporto disfunzionale ritroviamo:", "options": {"A": "investimento del mulino bianco", "B": "investimento delle risorse", "C": "investimento familiare", "D": "investimento di privilegio"}, "correct": "C", "a": "investimento familiare", "expl": "investimento familiare:\nLa dispensa, citando Carver (2002), elenca diversi tipi di investimento che trattengono la donna in un rapporto disfunzionale, tra i quali compare l'investimento familiare. Questo si verifica quando la coppia ha dei figli, e le decisioni che riguardano la relazione sono condizionate dalla posizione e dalle necessità dei bambini. La donna può temere di spezzare il nucleo familiare o di privare i figli della figura paterna, e questo investimento affettivo e pratico la spinge a rimanere nella relazione nonostante le violenze subite."}, "44.10": {"q": "All'interno di una relazione violenta la donna viene:", "options": {"A": "ridicolizzata", "B": "disumanizzata", "C": "ignorata", "D": "lodata"}, "correct": "B", "a": "disumanizzata", "expl": "disumanizzata:\nAll'interno della relazione violenta, la donna viene disumanizzata, e questo processo autorizza la violenza stessa. De Zulueta (1993) individua le origini di questo meccanismo nel sistema patriarcale, che mantiene l'ineguale distinzione tra maschio e femmina. Il processo di disumanizzazione permette l'affermazione della mascolinità conducendo al rifiuto di certi aspetti di sé che sono identificati con la madre, come l'empatia e l'ascolto. Nella società patriarcale, il sé del maschio conta sulla disumanizzazione dell'altro per sopravvivere, mentre il senso di sé femminile viene definito in relazione ai bisogni del sé maschile."}, "45.01": {"q": "La relazione vittima-carnefice all'interno del contesto della violenza contro le donne rappresenta un intricato intreccio di:", "options": {"A": "dinamiche psicologiche, sociali e di potere", "B": "dinamiche psicologiche e familiari", "C": "dinamiche sociali e culturali", "D": "dinamiche economiche e di potere"}, "correct": "A", "a": "dinamiche psicologiche, sociali e di potere", "expl": "dinamiche psicologiche, sociali e di potere:\nLa relazione vittima-carnefice come un \"intricato intreccio di dinamiche psicologiche, sociali e di potere\". Questa triade è essenziale per comprendere appieno il fenomeno: la dimensione psicologica riguarda i processi mentali e le emozioni di entrambi i soggetti, quella sociale si riferisce al contesto relazionale e culturale in cui la violenza si manifesta, mentre quella di potere richiama il controllo coercitivo che l'aggressore esercita sulla vittima. È proprio questa combinazione che spiega perché le vittime rimangono intrappolate in situazioni di abuso nonostante le circostanze sfavorevoli."}, "45.02": {"q": "I risultati di una ricerca epidemiologica realizzata dall'Osservatorio Nazionale Stalking nel periodo 2001/2007 hanno dimostrato che le dinamiche dello stalking sono agite nel:", "options": {"A": "20% circa nei condomini", "B": "10% sul posto di lavoro", "C": "15% in famiglia", "D": "55% circa nelle relazioni di coppia"}, "correct": "D", "a": "55% circa nelle relazioni di coppia", "expl": "55% circa nelle relazioni di coppia:\nLa ricerca condotta dall'O.N.S. in collaborazione con il sindacato di Polizia Co.I.S.P. su un campione di 9600 interviste ha rilevato che la percentuale maggiore di dinamiche di stalking si verifica nelle relazioni di coppia, attestandosi intorno al 55%. Seguono i condomini con il 25%, il posto di lavoro con il 15% e infine la famiglia con il 5%. Questo dato è particolarmente significativo perché conferma che la grande maggioranza degli stalker ha avuto una qualche forma di relazione con la vittima, sottolineando l'importanza di studiare l'ossessività nelle intrusioni relazionali come precursore dello stalking."}, "45.03": {"q": "Nel 2004 Cupach e Spitzeberg hanno distinto cinque strategie di coping messe in atto dalla vittima di violenza:", "options": {"A": "andare incontro, andare contro, allontanarsi, movimento orientato verso l'interno, movimento orientato verso l'esterno", "B": "andare incontro, andare contro, avvicinarsi, movimento orientato verso l'interno, movimento orientato verso l'esterno", "C": "scappare, andare contro, allontanarsi, rivolgersi alle forze dell'ordine, movimento orientato verso l'esterno", "D": "andare incontro, andare contro, avvicinarsi, movimento orientato verso l'interno, trovare rifugio dalla famiglia di origine"}, "correct": "A", "a": "andare incontro, andare contro, allontanarsi, movimento orientato verso l'interno, movimento orientato verso l'esterno", "expl": "andare incontro, andare contro, allontanarsi, movimento orientato verso l'interno, movimento orientato verso l'esterno:\nCupach e Spitzberg hanno individuato cinque strategie specifiche: \"andare incontro\" consiste nel tentativo di far ragionare il molestatore; \"andare contro\" implica reazioni aggressive; \"allontanarsi\" significa non rispondere alle chiamate, cambiare numero o abitazione; il \"movimento orientato verso l'interno\" include il diniego, il sentirsi responsabile di quanto accade e l'assunzione di alcool e droghe; infine il \"movimento orientato verso l'esterno\" si manifesta nella tendenza a ricercare aiuto esterno. Questa classificazione offre uno schema utile per comprendere le diverse modalità con cui le vittime cercano di fronteggiare la violenza subita."}, "45.04": {"q": "Secondo Bruno (1998), si possono individuare dei fattori che aumentano nella donna il rischio di divenire vittima di una relazione violenta tra i quali:", "options": {"A": "cure continue in età minore", "B": "contatto e sfiducia con i genitori", "C": "maltrattamento o abuso sessuale in età minore", "D": "modelli socio-educativi che vedono la donna indipendente ma subordinata"}, "correct": "C", "a": "maltrattamento o abuso sessuale in età minore", "expl": "maltrattamento o abuso sessuale in età minore:\nTra i fattori di rischio elencati da Bruno nel 1998, rappresenta uno dei più significativi. Questi fattori non implicano una responsabilità della donna nella creazione della relazione violenta, ma si riferiscono unicamente a una maggiore vulnerabilità al fenomeno. Altri fattori menzionati includono modelli socio-educativi che vedono la donna dipendente e subordinata, cure discontinue in età minore, e la mancanza di contatto e fiducia con i genitori."}, "45.05": {"q": "Sembrerebbe essere il disturbo maggiormente studiato e rilevato nelle vittime di violenza di genere:", "options": {"A": "il Disturbo Dissociativo di personalità", "B": "il Disturbo Post Traumatico da Stress (PTSD)", "C": "il Disturbo di Ansia Generalizzata", "D": "il Disturbo Depressivo Maggiore"}, "correct": "B", "a": "il Disturbo Post Traumatico da Stress (PTSD)", "expl": "il Disturbo Post Traumatico da Stress (PTSD):\nsembrerebbe essere il maggiormente studiato e rilevato nelle vittime di violenza di genere. Viene specificato che sia l'abuso fisico che quello psicologico sono risultati correlati ai sintomi del PTSD, e che il supporto sociale emerge come fattore moderatore in questa relazione. Le donne che sviluppano sintomi di PTSD e depressione in conseguenza di traumi interpersonali sono maggiormente esposte al rischio di futura vittimizzazione."}, "45.06": {"q": "Le donne che sviluppano i sintomi del PTSD e depressione, in conseguenza di traumi interpersonali, sono risultate maggiormente esposte al rischio di:", "options": {"A": "intrusione, evitamento, euforia e iperarousal", "B": "depressione, isolamento, disforia e iperarousal", "C": "identificazione con l'aggressore", "D": "vittimizzazione futura di Intimate Partner Violence"}, "correct": "D", "a": "vittimizzazione futura di Intimate Partner Violence", "expl": "vittimizzazione futura di Intimate Partner Violence:\nLa dispensa cita esplicitamente lo studio di Iverson et al. del 2011, secondo cui le donne che sviluppano sintomi di PTSD e depressione a seguito di traumi interpersonali risultano maggiormente esposte al rischio di futura vittimizzazione da parte del partner intimo (Intimate Partner Violence)IPV). Questo dato è particolarmente rilevante perché evidenzia come gli effetti del trauma non si esauriscano nel presente, ma possano predisporre la vittima a rivivere situazioni di abuso, creando un pericoloso circolo vizioso."}, "45.07": {"q": "La \"vittimizzazione cronica\" sembrerebbe predire sintomi associati con:", "options": {"A": "depressione", "B": "l'evitamento attivo", "C": "isolamento", "D": "stordimento emotivo"}, "correct": "B", "a": "l'evitamento attivo", "expl": "l'evitamento attivo:\nLa dispensa opera una distinzione importante tra due tipologie di vittimizzazione: la \"vittimizzazione cronica\", che si verifica quando si subiscono ripetuti maltrattamenti dallo stesso autore, e la \"rivittimizzazione\", che si verifica quando si subiscono violenze da autori diversi. Mentre la rivittimizzazione sembrerebbe predire sintomi associati con l'evitamento passivo o lo stordimento emotivo, la vittimizzazione cronica sembrerebbe predire sintomi associati con l'evitamento attivo. Questa differenziazione aiuta a comprendere come le diverse esperienze traumatiche possano tradursi in risposte psicologiche differenti."}, "45.08": {"q": "Il confinamento domiciliare durante la pandemia da COVID-19 ha portato a contatti costanti tra autori e vittime, con conseguente:", "options": {"A": "diminuzione della violenza", "B": "aumento della violenza e delle segnalazioni", "C": "aumento della violenza e diminuzione delle segnalazioni", "D": "aumento delle segnalazioni"}, "correct": "C", "a": "aumento della violenza e diminuzione delle segnalazioni", "expl": "aumento della violenza e diminuzione delle segnalazioni:\nLa dispensa, citando la revisione sistematica di Kourti et al. del 2023, spiega che il lockdown ha portato a contatti costanti tra autori e vittime, con un conseguente aumento della violenza ma una parallela diminuzione delle segnalazioni. Questo paradosso è dovuto al fatto che la convivenza forzata ha di fatto costretto le potenziali vittime a rimanere vicine ai loro aggressori, che in questo modo hanno potuto esercitare un controllo costante e prevenire qualsiasi tentativo di contattare le linee di assistenza. In Italia, come evidenziato da Barchielli et al. nel 2021, si è verificata una \"emergenza all'interno di un'emergenza\"."}, "45.09": {"q": "Si può definire \"comportamento abusante\":", "options": {"A": "ogni comportamento che si realizza senza consenso, in una relazione non paritaria e come risultato di una coercizione", "B": "ogni comportamento violento", "C": "ogni comportamento che si realizza senza consenso, in una relazione paritaria", "D": "ogni comportamento violento che si realizza come risultato di una coercizione"}, "correct": "A", "a": "ogni comportamento che si realizza senza consenso, in una relazione non paritaria e come risultato di una coercizione", "expl": "ogni comportamento che si realizza senza consenso, in una relazione non paritaria e come risultato di una coercizione:\nLa dispensa fornisce una definizione precisa e articolata di comportamento abusante, specificando che deve realizzarsi senza consenso, in una relazione non paritaria e come risultato di una coercizione. Questa definizione è importante perché distingue l'abuso da un generico comportamento violento, sottolineando gli elementi costitutivi che lo caratterizzano: la mancanza di consenso, la disparità di potere nella relazione e la presenza di coercizione."}, "45.10": {"q": "Un bambino o una bambina che crescono in una famiglia in cui le modalità comportamentali sono di tipo violento:", "options": {"A": "non ne risentiranno in età adulta", "B": "non tenderanno ad acquisire tali modelli come normali o comunque possibili", "C": "non acquisiranno sicuramente tali modelli, vivendoli come da evitare", "D": "tenderanno ad acquisire tali modelli, vivendoli come normali o comunque possibili"}, "correct": "D", "a": "tenderanno ad acquisire tali modelli, vivendoli come normali o comunque possibili", "expl": "tenderanno ad acquisire tali modelli, vivendoli come normali o comunque possibili:\nLa dispensa, citando Ponzio (2004), spiega che i bambini che crescono in famiglie violente tenderanno ad acquisire tali modelli comportamentali, vivendoli come normali o comunque possibili. La frase riportata nel testo è particolarmente efficace: \"un padre violento può far soffrire e i figli possono giurare che mai saranno come lui, ma ugualmente la violenza entra nel loro mondo interno fin dall'infanzia come un modello ingiusto e doloroso ma allo stesso tempo ammissibile e concreto\". Questo vale sia per chi agisce la violenza che per chi la subisce: il comportamento violento viene considerato sopportabile, inevitabile e non disfunzionale."}};

let currentIdx = 0;
let startX = 0, startY = 0, currentX = 0, dragging = false, trackOffset = 0, swipeLocked = null;

const track = document.getElementById('track');
const mainEl = document.getElementById('main');

function escHtml(s){
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── BUILD PAGES ──────────────────────────────────────────────────────────────
function buildPages(){
  track.innerHTML = CHAPTERS.map((ch, idx) => buildPageHTML(ch, idx)).join('');
  track.style.width = (CHAPTERS.length * 100) + 'vw';
  document.querySelectorAll('.page').forEach(p => p.style.width = '100vw');
}

function buildPageHTML(ch, idx){
  const authorsHtml = ch.authors.map((a, ai) => {
    const initials = a.name.replace(/[^A-ZÀ-Ý]/g, '').slice(0,2) || a.name[0];
    const conceptsHtml = a.concepts.map(c => {
      return `<div class="concept-chip" onclick="openSheet('${ch.n}','${escAttr(a.name)}','${escAttr(c.exam)}')">
        <span class="dot" style="background:${a.color}"></span>
        <span class="txt">${escHtml(c.text)}</span>
        <span class="arr">›</span>
      </div>`;
    }).join('');

    return `<div class="author-card" id="ac-${ch.n}-${ai}" style="position:relative;--hover-color:${a.color}">
      <div class="author-head" onclick="toggleAuthor(${ch.n},${ai})">
        <div class="author-avatar" style="background:${a.color}22;border:2px solid ${a.color};color:${a.color}">${initials}</div>
        <div class="author-info">
          <div class="author-name" style="color:${a.color}">${escHtml(a.name)}</div>
          <div class="author-phrase">${escHtml(a.key_phrase)}</div>
        </div>
        <span class="author-chevron">▸</span>
      </div>
      <div class="author-body">${conceptsHtml}</div>
    </div>`;
  }).join('');

  return `<div class="page" data-idx="${idx}">
    <div class="chap-hero">
      <div class="n">Capitolo ${ch.n} di ${CHAPTERS.length}</div>
      <div class="t">${escHtml(ch.title)}</div>
    </div>
    ${authorsHtml}
  </div>`;
}

function escAttr(s){
  return String(s).replace(/'/g, "\\'");
}

// ── AUTHOR EXPAND/COLLAPSE ────────────────────────────────────────────────────
function toggleAuthor(chN, ai){
  const el = document.getElementById(`ac-${chN}-${ai}`);
  el.classList.toggle('open');
}

// ── TOP BAR + PROGRESS ────────────────────────────────────────────────────────
function renderProgress(){
  const wrap = document.getElementById('progress-wrap');
  wrap.innerHTML = CHAPTERS.map((ch, i) =>
