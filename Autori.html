3, sostengono che l'altruismo possa essere motivato da un interesse fondamentalmente egoistico, ovvero il desiderio di rimuovere il proprio disagio personale. Secondo questa visione, aiutare l'altro serve a migliorare il proprio umore, e non è dettato da una genuina preoccupazione per la sua sorte. Questa ipotesi, nota come \"sollievo dallo stato negativo\", offre una spiegazione alternativa all'altruismo, in contrapposizione al modello di empatia-altruismo di Batson."}, "28.08": {"q": "Secondo il seguente Autore a due mesi circa inizia il superamento dell'egocentrismo radicale e il neonato comincia a differenziare tra sé stesso e il mondo circostante:", "options": {"A": "Latané e Darley", "B": "Piaget", "C": "Cialdini e coll.", "D": "Bandura"}, "correct": "B", "a": "Piaget", "expl": "Piaget:\nLa dispensa si riferisce alla teoria dello sviluppo di Piaget per descrivere le prime fasi della differenziazione tra sé e il mondo. Secondo Piaget, intorno ai due mesi il neonato inizia a superare l'egocentrismo radicale, un passaggio cruciale per lo sviluppo della consapevolezza di sé. Questa acquisizione è fondamentale perché la capacità di distinguere sé dall'altro è un prerequisito essenziale per lo sviluppo dell'empatia e dei comportamenti prosociali."}, "28.09": {"q": "Nella seguente fase dello sviluppo, il neonato discrimina i familiari dagli estranei, compare la paura dell'estraneo e differenzia le persone in base all'età e al sesso:", "options": {"A": "A 1 anno e mezzo", "B": "A 2 anni", "C": "A 12 mesi", "D": "A nove mesi"}, "correct": "D", "a": "A nove mesi", "expl": "A nove mesi:\nLa dispensa specifica che a nove mesi il neonato discrimina i familiari dagli estranei, manifesta la paura dell'estraneo e inizia a differenziare le persone in base all'età e al sesso. Questi sono segnali precoci dello sviluppo sociale e della capacità di riconoscere le figure di riferimento. Questa fase è importante perché precede di poco la comparsa dei primi segni di autoriconoscimento, che avvengono tra i nove e i dodici mesi."}, "28.10": {"q": "Famosi esperimenti, svolti macchiando di rosso il naso del bambino/a ignaro di ciò e mettendolo di fronte allo specchio, hanno dimostrato come il minore sia in possesso della capacità di:", "options": {"A": "Autocontrollo", "B": "Autostima", "C": "Autoregolazione", "D": "Autoriconoscimento"}, "correct": "D", "a": "Autoriconoscimento", "expl": "Autoriconoscimento:\nL'esperimento del naso macchiato di rosso, citato nella dispensa con riferimento agli studi di Lewis e Brooks-Gunn del 1979, è un classico test per valutare l'autoriconoscimento. Se il bambino si tocca il naso vedendo l'immagine riflessa nello specchio, significa che riconosce se stesso come individuo separato. Questa capacità, che compare tra i nove e i dodici mesi, è una tappa fondamentale nello sviluppo del sé e rappresenta un prerequisito per lo sviluppo dell'empatia, in quanto richiede la differenziazione tra sé e l'altro."}, "29.01": {"q": "Nel seguente fenomeno abbiamo visto come situazioni e contesti sociali possano portare persone ordinarie a commettere atti inimmaginabili di violenza, discriminazione e indifferenza rispetto alla sofferenza altrui:", "options": {"A": "Deindividuazione", "B": "Deumanizzazione", "C": "Effetto Lucifero", "D": "Effetto autocinetico"}, "correct": "C", "a": "Effetto Lucifero", "expl": "Effetto Lucifero:\nIl testo della dispensa, nel paragrafo introduttivo, apre esplicitamente con il riferimento all'Effetto Lucifero, definendolo come il fenomeno attraverso il quale situazioni e contesti sociali possono trasformare persone comuni in autori di atti di violenza, discriminazione e indifferenza. Questo concetto è centrale nell'opera di Zimbardo e rappresenta il punto di partenza per comprendere come le forze situazionali possano influenzare il comportamento umano in direzioni distorte. L'effetto Lucifero è richiamato proprio per introdurre la riflessione su come le stesse dinamiche possano essere utilizzate per promuovere cambiamenti positivi."}, "29.02": {"q": "Una delle forme di influenza più potente è la:", "options": {"A": "Autopersuasione", "B": "Autosuggestione", "C": "Autoinganno", "D": "Autosabotaggio"}, "correct": "A", "a": "Autopersuasione", "expl": "Autopersuasione:\nLa dispensa afferma chiaramente che una delle forme di influenza più potenti è l'autopersuasione, cioè il processo in cui le persone vengono incoraggiate a impegnarsi in pensieri personali e processi decisionali autonomi. Questo concetto è collocato subito dopo la descrizione delle fonti esterne di influenza come pubblicità, propaganda e pressione del gruppo, sottolineando che il potere più grande risiede nella capacità di auto-convincersi. L'autopersuasione è fondamentale perché rende il cambiamento di opinione più stabile e duraturo, essendo generato internamente anziché imposto dall'esterno."}, "29.03": {"q": "Zimbardo si riferisce a questo fenomeno, contrapponendolo a quello che Hannah Arendt ha definito \"La banalità del male\":", "options": {"A": "La banalità di Lucifero", "B": "La banalità dell'eroismo", "C": "La banalità del bene", "D": "L'altruismo banale"}, "correct": "B", "a": "La banalità dell'eroismo", "expl": "La banalità dell'eroismo:\nZimbardo definisce esplicitamente il fenomeno come \"La banalità dell'eroismo\", in contrapposizione diretta al celebre concetto di Hannah Arendt sulla \"banalità del male\" utilizzato per descrivere criminali come Adolf Eichmann. L'accostamento è volutamente provocatorio: così come il male può essere commesso da persone terribilmente normali, allo stesso modo l'eroismo può essere alla portata di chiunque, se il contesto sa ispirare l'immaginazione eroica. Questo concetto ribalta la visione tradizionale dell'eroe come figura eccezionale, aprendo la strada all'idea che tutti possano compiere azioni eroiche."}, "29.04": {"q": "Consiste in una strategia di persuasione per convincere qualcuno a fare qualcosa introducendo prima una richiesta più piccola:", "options": {"A": "\"Strategia di persuasione\"", "B": "\"Chiusa una porta si apre un portone\"", "C": "\"Tecnica del piede di porco\"", "D": "\"Tecnica del piede nella porta\""}, "correct": "D", "a": "\"Tecnica del piede nella porta\"", "expl": "\"Tecnica del piede nella porta\":\nLa dispensa descrive la tecnica del piede nella porta come una strategia di persuasione che consiste nel formulare prima una richiesta più piccola per ottenere poi l'adesione a una richiesta più grande. La spiegazione offerta è molto chiara: si tratta di una tecnica di vendita che permette di mettere il piede per bloccare la porta del cliente così che non possa chiuderla e debba stare ad ascoltare il resto della proposta. Zimbardo propone poi un uso innovativo di questo principio, applicandolo al bene per stabilizzare comportamenti prosociali graduali."}, "29.05": {"q": "Il governo, le istituzioni sociali e educative possono impegnarsi riprogettando e programmando sistemi educativi e di intervento sociale che, secondo il seguente Autore, possono essere utili per facilitare il pensiero critico e la condotta responsabile:", "options": {"A": "Zimbardo", "B": "Bandura", "C": "Le Bon", "D": "Milgram"}, "correct": "A", "a": "Zimbardo", "expl": "Zimbardo:\nIl paragrafo \"Come resistere all'influenza indesiderata\" si apre con un riferimento esplicito a Zimbardo (2007), indicando che governi e istituzioni possono riprogettare i sistemi educativi seguendo le sue indicazioni per facilitare pensiero critico e condotta responsabile. L'intero elenco di dodici strategie che segue è attribuito direttamente a Zimbardo, che viene quindi identificato come l'autore di riferimento per questo approccio. È lui a suggerire, ad esempio, di insegnare ai bambini a disubbidire all'autorità ingiusta e a gratificare il modellamento sociale del comportamento morale."}, "29.06": {"q": "Incoraggiare il rispetto delle diversità e l'apprezzamento della variabilità umana (riducendo i cosiddetti in-group biases e la discriminazione) rientra tra le strategie del seguente Autore per promuovere l'eroismo:", "options": {"A": "Zimbardo", "B": "Bandura", "C": "Le Bon", "D": "Milgram"}, "correct": "A", "a": "Zimbardo", "expl": "Zimbardo:\nNel paragrafo dedicato alle strategie per resistere all'influenza indesiderata, la dispensa elenca dodici indicazioni attribuite a Zimbardo, e al punto quattro si legge esplicitamente: \"Incoraggiare il rispetto delle diversità e l'apprezzamento della variabilità umana (riducendo i cosiddetti in-group biases e la discriminazione)\". Questo conferma che Zimbardo è l'autore che propone questa strategia nell'ambito del suo programma per facilitare il pensiero critico e la condotta responsabile. La riduzione dei pregiudizi verso l'out-group è un elemento chiave per contrastare la deumanizzazione."}, "29.07": {"q": "Essere modesti nella propria autostima e percepirsi pertanto come vulnerabili rappresenta uno dei suggerimenti offerti dal seguente Autore che possono aiutare anche le persone a resistere all'influenza sociale non desiderata:", "options": {"A": "Piaget", "B": "Bandura", "C": "Zimbardo", "D": "Milgram"}, "correct": "C", "a": "Zimbardo", "expl": "Zimbardo: (12, 20, 10)\nLa dispensa, nel paragrafo \"Come resistere all'influenza indesiderata\", presenta un elenco di venti suggerimenti pratici per le singole persone, tutti attribuiti al professor Zimbardo (2007). Al secondo punto di questo elenco si trova esattamente l'indicazione: \"Essere modesti nella propria autostima e percepirsi pertanto come vulnerabili\". Questo consiglio si collega al precedente punto che invita a non alimentare l'illusione dell'invulnerabilità personale: riconoscere la propria vulnerabilità è il primo passo per non farsi manipolare."}, "29.08": {"q": "Secondo Zimbardo, la chiave per la resistenza sta nello sviluppo delle seguenti abilità:", "options": {"A": "Turning points, sensitività situazionale, strade intelligenti", "B": "Consapevolezza, sensitività situazionale, strade intelligenti", "C": "Responsabilità, sensitività situazionale, strade intelligenti", "D": "Consapevolezza, sensitività situazionale, autocontrollo"}, "correct": "B", "a": "Consapevolezza, sensitività situazionale, strade intelligenti", "expl": "Consapevolezza, sensitività situazionale, strade intelligenti:\nNel paragrafo \"Costruire resistenza e resilienza\", la dispensa riporta testualmente che la chiave per la resistenza sta nello sviluppo delle abilità di consapevolezza, sensitività situazionale e strade intelligenti, secondo quanto indicato da Zimbardo (2007). Queste tre abilità costituiscono il fondamento su cui si basa l'intero programma in dieci passi per costruire la resistenza all'influenza indesiderata. La consapevolezza permette di riconoscere le dinamiche in atto, la sensitività situazionale aiuta a leggere il contesto, mentre le strade intelligenti rappresentano le strategie concrete per agire."}, "29.09": {"q": "Per Zimbardo assumersi la responsabilità delle decisioni e delle azioni personali per promuovere il senso di essere attori e guidatori consapevoli della propria vita rappresenta:", "options": {"A": "Una via d'uscita", "B": "Una strada senza uscita", "C": "Una strategia della resistenza", "D": "Una via alternativa"}, "correct": "C", "a": "Una strategia della resistenza", "expl": "Una strategia della resistenza:\nNel paragrafo \"Costruire resistenza e resilienza\", la dispensa descrive un programma in dieci passi, e al terzo punto si legge testualmente: \"Sono responsabile: assumersi la responsabilità delle decisioni e delle azioni personali per promuovere il senso di essere attori e guidatori consapevoli della propria vita\". Questo passo è presentato come una delle strategie della resistenza, non come una via d'uscita o una semplice alternativa. La responsabilizzazione personale è centrale per contrastare la tendenza a delegare le proprie scelte a forze esterne o a figure di autorità."}, "29.10": {"q": "Zimbardo mette a punto un programma che consiste in un insieme di regole iniziali per costruire la resistenza e la resilienza contro l'influenza indesiderata, articolato in:", "options": {"A": "3 punti", "B": "15 punti", "C": "5 punti", "D": "10 punti"}, "correct": "D", "a": "10 punti", "expl": "10 punti: (12,20,10)\nLa dispensa conclude la sezione \"Costruire resistenza e resilienza\" affermando che Zimbardo ha messo a punto un programma a 10 punti, definendolo come un insieme di regole iniziali per costruire la resistenza e la resilienza contro l'influenza indesiderata e contro i tentativi illegittimi di persuasione. Questo programma è stato presentato nel dettaglio attraverso i dieci passi che vanno da \"Ho fatto un errore!\" a \"Io posso oppormi ai sistemi ingiusti\". La struttura in dieci punti richiama la completezza del decalogo, suggerendo che ogni passaggio è essenziale per sviluppare una difesa efficace."}, "30.01": {"q": "Il seguente approccio rappresenta una scuola di pensiero interessata alla modalità di funzionamento del comportamento umano posto di fronte ai problemi dell'esistenza e della convivenza tra le persone:", "options": {"A": "Comportamentale", "B": "Sistemico", "C": "Analitico", "D": "Strategico"}, "correct": "D", "a": "Strategico", "expl": "Strategico:\nLa dispensa apre il primo capitolo affermando che \"l'approccio strategico rappresenta una scuola di pensiero interessata alla modalità di funzionamento del comportamento umano posto di fronte ai problemi dell'esistenza e della convivenza tra le persone\". L'analisi di questo approccio si incentra sul modo in cui le persone si rapportano alla realtà, a loro stesse, agli altri e al mondo, da un punto di vista relazionale e percettivo. Per ricordarlo, basti pensare che l'aggettivo \"strategico\" richiama l'idea di una pianificazione finalizzata al raggiungimento di obiettivi concreti nella gestione dei problemi quotidiani."}, "30.02": {"q": "Costituiscono il focus dell'intervento strategico:", "options": {"A": "Il cambiamento e la ristrutturazione delle relazioni", "B": "L'analisi del passato e la ristrutturazione delle relazioni", "C": "Il training autogeno e la ristrutturazione delle relazioni", "D": "La pragmatica dell'analisi profonda e la ristrutturazione"}, "correct": "A", "a": "Il cambiamento e la ristrutturazione delle relazioni", "expl": "Il cambiamento e la ristrutturazione delle relazioni:\nLa dispensa specifica che \"il cambiamento e la ristrutturazione delle relazioni costituiscono il focus dell'intervento strategico\". Si tratta di un approccio pragmatico, essenzialmente interpersonale, rivolto al raggiungimento di precisi obiettivi. L'intervento non mira all'analisi del profondo della persona o alle cause sottostanti il problema, bensì a facilitare il cambiamento della situazione di sofferenza e ad acquisire la capacità di affrontare in modo adeguato i disagi futuri."}, "30.03": {"q": "Il seguente Autore ha ideato e definito diverse strategie e metodi di intervento per la risoluzione, in tempi brevi, delle problematiche di ordine psichico e comportamentale, ampliando la tecnica psicoterapeutica con concezioni e applicazioni innovative circa i fenomeni dell'ipnosi e della suggestione:", "options": {"A": "Watzlawick", "B": "Erickson", "C": "Freud", "D": "Piaget."}, "correct": "B", "a": "Erickson", "expl": "Erickson:\nMilton Erickson è riconosciuto per aver ideato e definito diverse strategie e metodi di intervento per la risoluzione, in tempi brevi, delle problematiche di ordine psichico e comportamentale, ampliando la tecnica psicoterapeutica con concezioni e applicazioni innovative circa i fenomeni dell'ipnosi e della suggestione. La bibliografia della dispensa riporta numerose opere di Erickson, tra cui \"Experiencing hypnosis\" e \"The february man\", a testimonianza della sua influenza sull'approccio strategico e sulla terapia breve"}, "30.04": {"q": "Lo studio della comunicazione trova un nuovo inquadramento teorico nel corso degli anni Sessanta all'interno della:", "options": {"A": "NY University", "B": "Columbia University", "C": "Scuola di Palo Alto", "D": "Sapienza"}, "correct": "C", "a": "Scuola di Palo Alto", "expl": "Scuola di Palo Alto:\nLa dispensa afferma che \"lo studio della comunicazione trova un nuovo inquadramento teorico nel corso degli anni Sessanta all'interno della Scuola di Palo Alto e del suo gruppo di ricerca composto da Gregory Bateson, Paul Watzlawick, Janet Helmick Beavin, Don D. Jackson ed altri\". Questo gruppo di ricerca, attivo in California, rivoluzionò il modo di intendere la comunicazione umana, spostando l'attenzione dall'individuo isolato alle interazioni e alle relazioni."}, "30.05": {"q": "Adotta una visione prettamente relazionale della comunicazione che viene considerata oggetto privilegiato nello studio delle relazioni tra l'individuo e il suo ambiente:", "options": {"A": "NY University", "B": "Columbia University", "C": "Scuola di Palo Alto", "D": "Sapienza"}, "correct": "C", "a": "Scuola di Palo Alto", "expl": "Scuola di Palo Alto:\nLa dispensa specifica che \"la Scuola di Palo Alto adotta una visione prettamente relazionale della comunicazione che viene considerata oggetto privilegiato nello studio delle relazioni tra l'individuo e il suo ambiente\". Questo aspetto è centrale per comprendere la svolta teorica operata dagli studiosi di Palo Alto: la comunicazione non è più vista come un semplice scambio di informazioni, ma come il tessuto stesso che costituisce e definisce le relazioni umane."}, "30.06": {"q": "La seguente pubblicazione di Paul Watzlawick è considerata una tappa fondamentale all'interno dell'approccio strategico:", "options": {"A": "La pragmatica della comunicazione umana", "B": "L'uomo di febbraio", "C": "La terapia breve strategica", "D": "L'approccio strategico"}, "correct": "A", "a": "La pragmatica della comunicazione umana", "expl": "La pragmatica della comunicazione umana:\nLa dispensa sottolinea che \"la pubblicazione di Paul Watzlawick 'La pragmatica della comunicazione umana' (1967) è considerata una tappa fondamentale all'interno dell'approccio\". Nelle prime pagine, l'autore propone un interessante parallelismo tra comunicazione e matematica, in particolare tra il concetto di relazione e quello di funzione matematica. L'opera è considerata il testo fondativo della pragmatica della comunicazione e ha influenzato profondamente la psicoterapia e lo studio delle relazioni interpersonali."}, "30.07": {"q": "Costituiscono l'assunto su cui poggia l'intera teoria della pragmatica della comunicazione e risultano di estrema utilità non solo in ambito strettamente clinico, ma anche nella comprensione di ciò che avviene nel mondo della relazione:", "options": {"A": "Le pragmatiche", "B": "Le strategie", "C": "Gli stereotipi", "D": "Gli assiomi"}, "correct": "D", "a": "Gli assiomi", "expl": "Gli assiomi:\nLa dispensa, nel capitolo dedicato alla pragmatica della comunicazione umana, illustra i cinque assiomi formulati da Watzlawick, Beavin e Jackson. Gli assiomi sono principi di base, evidenti di per sé, che non hanno bisogno di dimostrazione. Essi costituiscono l'assunto su cui poggia l'intera teoria della pragmatica della comunicazione e risultano di estrema utilità non solo in ambito strettamente clinico, ma anche nella comprensione di ciò che avviene nel mondo della relazione. Tra questi, il primo assioma afferma che \"non si può non comunicare\"."}, "30.08": {"q": "Afferma \"non è possibile non comunicare\", nel senso che qualsiasi interazione umana è di per sé una forma di comunicazione:", "options": {"A": "Primo assioma", "B": "Secondo assioma", "C": "Terzo assioma", "D": "Quarto assioma"}, "correct": "A", "a": "Primo assioma", "expl": "Primo assioma:\nLa dispensa spiega che il primo assioma è il celeberrimo \"non si può non comunicare\": ogni comportamento, in una situazione di interazione, ha un valore di messaggio. Anche il silenzio comunica, così come l'immobilità. Non esiste il non-comportamento, e quindi non esiste la non-comunicazione. Ogni azione, o inazione, è una forma di messaggio che influenza l'altro, rendendo la comunicazione un fenomeno inevitabile in qualsiasi contesto relazionale."}, "30.09": {"q": "Asserisce che \"ogni comunicazione ha un aspetto di contenuto ed un aspetto di relazione tale che il secondo qualifichi il primo ed è quindi metacomunicazione\":", "options": {"A": "Primo assioma", "B": "Secondo assioma", "C": "Terzo assioma", "D": "Quarto assioma"}, "correct": "B", "a": "Secondo assioma", "expl": "Secondo assioma:\nLa dispensa descrive il secondo assioma come quello che distingue tra livello di contenuto e livello di relazione: il livello di contenuto è l'informazione trasmessa, mentre il livello di relazione definisce come il messaggio deve essere interpretato e qualifica il tipo di legame tra i comunicanti. Ogni comunicazione ha un aspetto di \"notizia\" e un aspetto di \"comando\": la \"notizia\" è il contenuto, il \"comando\" è l'istruzione su come prendere quella notizia. Questo aspetto relazionale è la metacomunicazione, ovvero la comunicazione sulla comunicazione."}, "30.10": {"q": "Decreta che \"la natura di una relazione dipende dalla punteggiatura delle sequenze di comunicazione tra i comunicanti\":", "options": {"A": "Primo assioma", "B": "Secondo assioma", "C": "Terzo assioma", "D": "Quarto assioma"}, "correct": "C", "a": "Terzo assioma", "expl": "Terzo assioma:\nLa dispensa cita esplicitamente il terzo assioma, che riguarda l'interazione e gli scambi di messaggi tra comunicanti, e decreta che \"la natura di una relazione dipende dalla punteggiatura delle sequenze di comunicazione tra i comunicanti\". La punteggiatura è l'organizzazione che diamo alla sequenza degli eventi, stabilendo quale evento è la causa e quale l'effetto. Nelle relazioni conflittuali, ognuno punteggia la sequenza a modo proprio, generando circoli viziosi. La dispensa fa l'esempio del marito che si chiude nel silenzio perché la moglie brontola, e della moglie che brontola perché il marito è chiuso nel silenzio."}, "30.10a": {"q": "Il quarto assioma della comunicazione introduce la distinzione tra due modalità comunicative. Quali sono?", "options": {"A": "Il modulo verbale e il modulo non verbale", "B": "Il modulo digitale e il modulo analogico", "C": "Il modulo diretto e il modulo indiretto", "D": "Il modulo conscio e il modulo inconscio"}, "correct": "B", "a": "Il modulo digitale e il modulo analogico", "expl": "Il modulo digitale e il modulo analogico:\nLa dispensa spiega che il quarto assioma introduce due modalità di comunicazione: il modulo digitale e il modulo analogico. Il modulo digitale è quello delle parole, dei simboli linguistici, ed è il nostro strumento principale per comunicare contenuti. Il modulo analogico è invece tutto ciò che non è verbale: gesti, espressioni facciali, posture, tono della voce, il ritmo. Viene chiamato analogico perché non è un simbolo arbitrario, ma è qualcosa che assomiglia a ciò che rappresenta, come una smorfia di dolore che è \"analogica\" al dolore stesso. Il modulo analogico è il veicolo principale per comunicare la relazione, mentre il digitale trasmette i contenuti. La dispensa sottolinea che la traduzione del materiale analogico in materiale digitale rappresenta un passaggio difficoltoso, a causa della natura ambigua del modulo analogico che non può esprimere facilmente negazioni e congiunzioni, dando luogo a innumerevoli conflitti di relazione dovuti all'errata interpretazione digitale del messaggio analogico."}, "30.10b": {"q": "Il quinto assioma della comunicazione afferma che gli scambi comunicativi possono essere di due tipi. Quali sono?", "options": {"A": "Verbali e non verbali", "B": "Simmetrici e complementari", "C": "Diretti e indiretti", "D": "Consci e inconsci"}, "correct": "B", "a": "Simmetrici e complementari", "expl": "Simmetrici e complementari:\nLa dispensa descrive il quinto assioma specificando che gli scambi di comunicazione possono essere simmetrici o complementari. La relazione simmetrica è basata sull'uguaglianza: i comunicanti tendono a rispecchiare il comportamento dell'altro; se uno è assertivo, l'altro lo è, se uno è passivo, l'altro lo è. Nelle relazioni simmetriche si possono sviluppare escalation competitive. La relazione complementare è invece basata sulla differenza: il comportamento di uno completa quello dell'altro; uno è più dominante, l'altro più sottomesso, uno dà indicazioni e l'altro le esegue. La dispensa precisa che questi due modi di relazionarsi non sono buoni o cattivi in sé, ma diventano patologici quando si cristallizzano in modo rigido, impedendo qualsiasi flessibilità nella comunicazione e nella relazione."}, "31.01": {"q": "Nel seguente approccio il linguaggio del terapeuta rappresenta il mezzo di elezione per favorire il cambiamento:", "options": {"A": "Approccio costruzionista", "B": "Approccio costruttivista", "C": "Approccio strategico", "D": "Approccio comportamentista"}, "correct": "C", "a": "Approccio strategico", "expl": "Approccio strategico:\nNel documento si legge che, partendo dal presupposto dell'autodeterminazione della persona, \"il linguaggio del terapeuta rappresenta il mezzo di elezione per favorire il cambiamento del punto di vista del cliente\". Questo passaggio è collocato all'interno della descrizione dell'approccio strategico alla comunicazione, che si fonda sul costruttivismo sociale ma se ne distingue per la centralità attribuita all'uso strategico del linguaggio come strumento di intervento terapeutico."}, "31.02": {"q": "È orientata in direzione di un obiettivo da raggiungere)la de-strutturazione del sintomo)passando per sotto-obiettivi concreti e ragionevoli, stabiliti congiuntamente da terapeuta e cliente:", "options": {"A": "La comunicazione strategica", "B": "La seduzione strategica", "C": "La pragmatica strategica", "D": "La pragmatica comunicativa"}, "correct": "A", "a": "La comunicazione strategica", "expl": "La comunicazione strategica:\nLa dispensa afferma testualmente che \"la comunicazione strategica è orientata in direzione di un obiettivo da raggiungere – la de-strutturazione del sintomo – passando per sotto-obiettivi concreti e ragionevoli, stabiliti congiuntamente da terapeuta e cliente\". Questo passaggio è cruciale perché definisce l'essenza operativa dell'approccio: non si tratta di una generica comunicazione terapeutica, ma di una comunicazione che ha una direzione precisa e che procede per tappe concordate, rendendo il cliente parte attiva nel processo di cambiamento."}, "31.03": {"q": "In psicoterapia strategica, al posto di un linguaggio descrittivo e indicativo tipico della spiegazione e della descrizione delle cose e degli eventi, viene adoperato un linguaggio:", "options": {"A": "Pragmatico e comunicativo", "B": "Pragmatico e strategico", "C": "Seduttivo e ingiuntivo", "D": "Suggestivo e ingiuntivo"}, "correct": "D", "a": "Suggestivo e ingiuntivo", "expl": "Suggestivo e ingiuntivo:\nIl testo specifica che \"in psicoterapia strategica, al posto di un linguaggio descrittivo e indicativo tipico della spiegazione e della descrizione delle cose e degli eventi, viene adoperato un linguaggio suggestivo e ingiuntivo che, attraverso le prescrizioni, induce a eseguire azioni ed esperire emozioni\". Questo tipo di linguaggio è l'unico in grado di aggirare la resistenza al cambiamento, perché non si limita a spiegare ma agisce direttamente sull'esperienza del cliente, provocando ristrutturazioni cognitive attraverso l'esecuzione di compiti e l'emersione di emozioni nuove."}, "31.04": {"q": "La seguente tecnica risulta di estrema importanza per catturare il cliente e aggirare le sue resistenze:", "options": {"A": "Tecnica della prescrizione di resistenza", "B": "Tecnica del ricalco", "C": "Tecnica dello specchio riflesso", "D": "Tecnica dell'ancoraggio"}, "correct": "B", "a": "Tecnica del ricalco", "expl": "Tecnica del ricalco:\nLa dispensa afferma che \"la tecnica del ricalco [...] risulta di estrema importanza per catturare il cliente e aggirare le sue resistenze\". Il ricalco è presentato come una tecnica fondamentale perché consente al terapeuta di entrare nel sistema rappresentativo del cliente, utilizzando il suo stesso linguaggio e la sua stessa modalità di rapportarsi alla realtà. Questo crea un'aggancio empatico che riduce le difese e rende il cliente più ricettivo agli interventi successivi."}, "31.05": {"q": "La seguente tecnica si esplica anche nel riprodurre la comunicazione non verbale, le posture ed i movimenti del cliente:", "options": {"A": "Della prescrizione di resistenza", "B": "Del ricalco", "C": "Dello specchio riflesso", "D": "Dell'ancoraggio"}, "correct": "B", "a": "Del ricalco", "expl": "Del ricalco:\nLa dispensa spiega che \"la tecnica del ricalco si esplica anche nel riprodurre la comunicazione non verbale, le posture ed i movimenti del cliente che in tal modo si sentirà maggiormente accolto e rilassato\". Il ricalco non è quindi solo verbale, ma coinvolge l'intero comportamento del terapeuta, che sincronizza la propria postura e i propri movimenti con quelli del cliente, creando un'alleanza non verbale che favorisce l'instaurarsi di un clima di fiducia e collaborazione."}, "31.06": {"q": "La comunicazione indiretta si realizza facendo ricorso al seguente tipo di linguaggio, fatto di aneddoti, metafore e aforismi dal forte potere evocativo e suggestivo:", "options": {"A": "Analogico", "B": "Dialogico", "C": "Digitale", "D": "Seduttivo"}, "correct": "A", "a": "Analogico", "expl": "Analogico:\nIl testo chiarisce che \"la comunicazione indiretta si realizza facendo ricorso al linguaggio analogico fatto di aneddoti, metafore e aforismi dal forte potere evocativo e suggestivo\". Il linguaggio analogico agisce attraverso meccanismi di proiezione e identificazione, minimizzando la resistenza del cliente perché il messaggio arriva in modo velato, senza richieste dirette. Le metafore e gli aneddoti producono confusione nei processi mentali rigidi del cliente, generando una frattura nel suo sistema concettuale e comportamentale."}, "31.07": {"q": "La seguente tecnica consente di cambiare lo sfondo concettuale ed emozionale in cui il cliente colloca il suo disagio, ponendolo all'interno di una cornice alternativa dove la situazione problematica può trovare una spiegazione perfino migliore:", "options": {"A": "Della prescrizione di resistenza", "B": "Del ricalco", "C": "Della ristrutturazione", "D": "Dell'ancoraggio"}, "correct": "C", "a": "Della ristrutturazione", "expl": "Della ristrutturazione:\nSecondo il documento, \"la tecnica della ristrutturazione consente di cambiare lo sfondo concettuale ed emozionale in cui il cliente colloca il suo disagio, ponendolo all'interno di una cornice alternativa dove la situazione problematica può trovare una spiegazione perfino migliore\". Questa tecnica, basata sugli studi di Watzlawick e colleghi, agisce sulla realtà di secondo ordine, cioè sui significati attribuiti ai fatti, senza modificare i fatti stessi. Se il problema può essere visto diversamente, può essere ridotto o eliminato, perché la sofferenza è intimamente legata alla prospettiva di chi la vive."}, "31.08": {"q": "La seguente tecnica permette di modificare la rigidità percettiva e reattiva attraverso azioni e comunicazioni paradossali illogiche e impreviste che producono quel salto di livello logico alla base del cambiamento auspicato:", "options": {"A": "Del ricalco", "B": "Del paradosso", "C": "Della ristrutturazione", "D": "Dell'ancoraggio"}, "correct": "B", "a": "Del paradosso", "expl": "Del paradosso:\nLa dispensa afferma che \"la tecnica del paradosso permette di modificare la rigidità percettiva e reattiva attraverso azioni e comunicazioni paradossali illogiche e impreviste che producono quel salto di livello logico alla base del cambiamento auspicato\". Un esempio fornito è l'amplificazione delle fissazioni del cliente, fino a portarlo a rassicurare il terapeuta. Il paradosso è una delle tecniche più caratteristiche dell'approccio strategico perché agisce direttamente sulla logica del sintomo, creando una situazione in cui il cliente non può più rispondere con i consueti schemi comportamentali."}, "31.09": {"q": "Come spiegano i seguenti Autori, la nozione di comportamento, generalmente considerata sinonimo della nozione di azione, ne costituisce l'aspetto osservabile, mentre l'azione rappresenta un comportamento dotato di significato e di intenzione:", "options": {"A": "Petruccelli e coll.", "B": "Le Bon e coll.", "C": "Bruner e coll.", "D": "De Leo e coll."}, "correct": "D", "a": "De Leo e coll.", "expl": "De Leo e coll.:\nIl testo riporta che, \"come spiegano De Leo e collaboratori (2004), la nozione di comportamento, generalmente considerata sinonimo della nozione di azione, ne costituisce l'aspetto osservabile, mentre l'azione rappresenta un comportamento dotato di significato e di intenzione\". Questa distinzione è fondamentale perché sposta l'attenzione dalla semplice osservazione dei movimenti alla comprensione del significato che l'individuo attribuisce alle proprie azioni, introducendo la dimensione psicologica e intenzionale dell'agire umano."}, "31.10": {"q": "I seguenti Autori, all'interno del teorema Goal-directed-action, descrivono l'azione come un triangolo concettuale in cui ogni lato rappresenta un livello che si interconnette con gli altri realizzando interazioni gerarchiche e retroattive:", "options": {"A": "Von Cranach e Harré", "B": "Le Bon e coll.", "C": "Bruner e coll.", "D": "De Leo e coll."}, "correct": "A", "a": "Von Cranach e Harré", "expl": "Von Cranach e Harré:\nIl documento specifica che \"Von Cranach e Harré (1982), all'interno del teorema Goal-directed-action (Azione diretta allo scopo o GDA), descrivono l'azione come un triangolo concettuale in cui ogni lato rappresenta un livello che si interconnette con gli altri realizzando interazioni gerarchiche e retroattive\". Le tre dimensioni della GDA sono: il comportamento osservabile, le cognizioni coscienti (piani, scopi, strategie, emozioni) e i significati sociali. Questo modello integrato permette di comprendere l'azione nella sua completezza, considerando simultaneamente l'aspetto manifesto, quello mentale e quello sociale."}, "32.01": {"q": "Gli studi sulla spiegazione dell'azione deviante si inseriscono in un'ottica:", "options": {"A": "sociocostruzionista", "B": "interazionista", "C": "sociocognitivista", "D": "psicocostruzionista"}, "correct": "A", "a": "sociocostruzionista", "expl": "sociocostruzionista:\nLa dispensa indica che gli studi sulla spiegazione dell'azione deviante, a partire dagli anni Sessanta, hanno abbandonato un'ottica psicopatologica ed esterna per abbracciare un'ottica socio-costruzionista, che considera l'attore deviante come costruttore consapevole delle sue azioni in interazione reciproca con l'ambiente. Questa prospettiva è centrale nella svolta teorica descritta nell'introduzione."}, "32.02": {"q": "L'azione deviante comunicativa considera la devianza da un punto di vista:", "options": {"A": "costruzionista", "B": "ecologico", "C": "sistemico", "D": "relazionale"}, "correct": "B", "a": "ecologico", "expl": "ecologico:\nLa dispensa afferma esplicitamente che la letteratura specialistica considera attualmente la devianza da un punto di vista ecologico, il quale permette di guardare al fenomeno dal suo interno e concentra l'attenzione sui messaggi metacomunicativi dell'azione intesa come atto sociale che veicola significati sull'identità del suo autore."}, "32.03": {"q": "L'azione deviante comunicativa ha permesso di cogliere la persona nella sua integrità di sistema complesso in:", "options": {"A": "comunicazione ricorsivamente costruttivista", "B": "comunicazione ricorsivamente sistemica", "C": "comunicazione ipnotica e ingiuntiva", "D": "comunicazione ricorsivamente autoreferenziale"}, "correct": "D", "a": "comunicazione ricorsivamente autoreferenziale", "expl": "comunicazione ricorsivamente autoreferenziale:\nLa dispensa specifica che la prospettiva comunicativa ha permesso di cogliere il soggetto nella sua integrità di sistema complesso in comunicazione ricorsivamente autoreferenziale con sé stesso e reciproca con i sistemi relazionali in cui è immerso, in primis la famiglia e la società."}, "32.04": {"q": "De Leo e coll. (2004: 7) considerano la devianza come:", "options": {"A": "una forma potente, disfunzionale ed estrema di responsabilità", "B": "una forma potente, particolare ed estrema di discomunicazione", "C": "una forma potente, particolare ed estrema di comunicazione", "D": "una forma potente di discomunicazione"}, "correct": "C", "a": "una forma potente, particolare ed estrema di comunicazione", "expl": "una forma potente, particolare ed estrema di comunicazione:"}, "32.05": {"q": "Permette di individuare al suo interno la storia personale dell'autore di reato, il significato soggettivo dell'azione rispetto alla continuazione del suo Sé e le sue aspettative circa le conseguenze del suo agire criminoso:", "options": {"A": "analisi dell'azione criminale di tipo sistemico", "B": "analisi dell'azione deviante di tipo sequenziale", "C": "analisi dell'azione criminale di tipo ricorsivo", "D": "analisi dell'azione deviante di tipo sistemico"}, "correct": "B", "a": "analisi dell'azione deviante di tipo sequenziale", "expl": "analisi dell'azione deviante di tipo sequenziale:"}, "32.06": {"q": "In interazione con gli effetti strumentali anticipati e con i significati sociali convenzionali, orienta il sistema agente e ne organizza il significato dell'azione rispetto ai contesti ed ai sistemi in cui è inserito:", "options": {"A": "la funzione strumentale-espressiva", "B": "la funzione strumentale-comunicazionale", "C": "la funzione espressivo-comunicazionale", "D": "la funzione sistemico-comunicazionale"}, "correct": "C", "a": "la funzione espressivo-comunicazionale", "expl": "la funzione espressivo-comunicazionale:"}, "32.07": {"q": "I seguenti effetti della comunicazione attraverso i quali ridefinire l'azione stessa, stabilire i ruoli, gli obiettivi ed i poteri sono:", "options": {"A": "effetti strumentali", "B": "effetti di sistema", "C": "effetti di significato", "D": "effetti di relazione"}, "correct": "D", "a": "effetti di relazione", "expl": "effetti di relazione:\nLa dispensa descrive gli effetti di relazione della comunicazione attraverso i quali ridefinire l'azione stessa, stabilire i ruoli, gli obiettivi ed i poteri. Viene spiegato che l'azione deviante può comunicare diversi messaggi di relazione, come nel caso dell'autore di violenza carnale che comunica alla vittima il modo con cui costruisce il suo rapporto e i suoi vissuti di deprivazione."}, "32.08": {"q": "Nell'ottica dell'azione deviante comunicativa il reo viene definito:", "options": {"A": "anaffettivo", "B": "attivo generatore di sistemi", "C": "attivo generatore di significati", "D": "passivo generatore di significati"}, "correct": "C", "a": "attivo generatore di significati", "expl": "attivo generatore di significati:\nLa dispensa, nel paragrafo sulle funzioni comunicative della devianza, definisce l'individuo come \"un uomo attivo, [agency], generatore di significati, in interazione costante e negoziata con il sociale\". Questa definizione è un presupposto fondamentale dell'approccio comunicativo e si contrappone a visioni passive o psicopatologiche del deviante."}, "32.09": {"q": "Sarà possibile arrivare alla goal-directed-action attraverso l'analisi del:", "options": {"A": "le cognizioni inconsce", "B": "la narrazione del reo", "C": "i comportamenti coscienti", "D": "la narrazione conscia"}, "correct": "B", "a": "la narrazione del reo", "expl": "la narrazione del reo:\nLa dispensa spiega che sarà possibile arrivare alla goal-directed-action, ovvero all'azione orientata a uno scopo, attraverso l'analisi della narrazione dell'autore di reato. Questo passaggio è centrale nel paragrafo sulle funzioni comunicative della devianza, dove si sottolinea come la struttura narrativa del parlante rispecchi la struttura della sua mente e ne influenzi l'esperienza soggettiva."}, "32.10": {"q": "Si può considerare un sunto del passato, del presente e del futuro del soggetto deviante:", "options": {"A": "la pragmatica comunicativa", "B": "la pratica comunicativa", "C": "l'azione comunicativa", "D": "l'azione ricorsiva"}, "correct": "C", "a": "l'azione comunicativa", "expl": "l'azione comunicativa:\nIstanze temporali che si esprimono nel fare, dove confluiscono e interagiscono emozioni, cognizioni, relazioni e simboli sociali nella costruzione dell'esperienza e della riferibilità del reale. Shotter (1984) e Von Cranach e Harré (1982)."}, "33.01": {"q": "Il conflitto è un processo che:", "options": {"A": "si dispiega nel tempo e che può trasformarsi", "B": "rimane statico nel tempo", "C": "si dispiega nel tempo e che non può trasformarsi", "D": "si sviluppa nel qui e ora"}, "correct": "A", "a": "si dispiega nel tempo e che può trasformarsi", "expl": "si dispiega nel tempo e che può trasformarsi:\npuò attraversare fasi diverse e cambiare forma, potendo rimanere latente per anni o degenerare improvvisamente."}, "33.02": {"q": "Lo psicologo sociale Muzafer Sherif (1966) negli studi sul campo estivo di Robber's Cave sul pregiudizio, ha dimostrato come gli atteggiamenti e i comportamenti delle persone riflettano:", "options": {"A": "gli interessi soggettivi del gruppo di appartenenza", "B": "gli interessi oggettivi del singolo individuo", "C": "gli interessi oggettivi del gruppo di appartenenza", "D": "gli interessi oggettivi dell'outgroup"}, "correct": "C", "a": "gli interessi oggettivi del gruppo di appartenenza", "expl": "gli interessi oggettivi del gruppo di appartenenza:\nL'esperimento di Robber's Cave è un classico della psicologia sociale che evidenzia come la competizione per interessi contrastanti generi ostilità verso l'outgroup, mentre il perseguimento di scopi comuni favorisca la cooperazione e atteggiamenti amichevoli."}, "33.03": {"q": "Per rappresentare l'identità sociale, Tajfel (1981) propone una rappresentazione del comportamento umano:", "options": {"A": "statico", "B": "posto lungo un continuum teorico", "C": "dicotomico", "D": "nel qui e ora"}, "correct": "B", "a": "posto lungo un continuum teorico", "expl": "posto lungo un continuum teorico:\nTajfel propone una rappresentazione del comportamento umano posto lungo un continuum teorico. Questo continuum ha agli estremi il comportamento interpersonale e il comportamento intergruppi, e permette di comprendere come il comportamento si sposti da un polo all'altro in base al contesto sociale e al grado di salienza dell'appartenenza categoriale."}, "33.04": {"q": "Se l'identità sociale viene minacciata:", "options": {"A": "vi possono essere reazioni aggressive che comunque non portano a conflitti sociali anche estremi", "B": "vi possono essere reazioni quasi mai aggressive", "C": "vi possono essere reazioni aggressive che portano a conflitti personali anche estremi", "D": "vi possono essere reazioni aggressive che portano a conflitti sociali anche estremi"}, "correct": "D", "a": "vi possono essere reazioni aggressive che portano a conflitti sociali anche estremi", "expl": "vi possono essere reazioni aggressive che portano a conflitti sociali anche estremi:\nvi possono essere reazioni aggressive che portano a conflitti sociali anche estremi. Questo passaggio conclude il paragrafo sui conflitti intergruppi e collega direttamente la minaccia all'identità di gruppo con l'escalation conflittuale, sottolineando il ruolo centrale dell'identità sociale come fattore scatenante di dinamiche aggressive su larga scala."}, "33.05": {"q": "I conflitti risolvibili hanno:", "options": {"A": "una durata prolungata nel tempo e presentano obiettivi scarsamente importanti per le parti in gioco", "B": "una durata illimitata nel tempo", "C": "una durata limitata nel tempo e presentano obiettivi scarsamente importanti per le parti in gioco", "D": "una durata limitata nel tempo e presentano obiettivi molto importanti per le parti in gioco"}, "correct": "C", "a": "una durata limitata nel tempo e presentano obiettivi scarsamente importanti per le parti in gioco", "expl": "una durata limitata nel tempo e presentano obiettivi scarsamente importanti per le parti in gioco:\nLa dispensa distingue i conflitti estremi in risolvibili e intrattabili, descrivendo i conflitti risolvibili come quelli che hanno una durata limitata nel tempo e presentano obiettivi scarsamente importanti per le parti in gioco. In questi conflitti, le parti intravedono una possibile soluzione e hanno interesse a risolverlo attraverso una mediazione, evitando la violenza estrema e la polarizzazione Noi/Loro."}, "33.06": {"q": "I conflitti intrattabili sono caratterizzati da:", "options": {"A": "obiettivi importanti, molta animosità, ma senza una spirale di violenza estrema", "B": "obiettivi importanti, molta animosità e una spirale di violenza estrema", "C": "obiettivi importanti ma poca animosità", "D": "obiettivi poco importanti, poca animosità e saltuariamente da violenza"}, "correct": "B", "a": "obiettivi importanti, molta animosità e una spirale di violenza estrema", "expl": "obiettivi importanti, molta animosità e una spirale di violenza estrema:\nQuesti conflitti sono prolungati nel tempo perché nessuna parte coinvolta può vincere, si tratta di giochi a somma zero senza spazio per compromessi, e sono spesso associati a questioni di identità nazionale, religiosa o etnica."}, "33.07": {"q": "I conflitti a somma zero sono:", "options": {"A": "senza compromessi: se uno vince, l'altro perde tutto", "B": "caratterizzati dal compresso", "C": "conflitti in cui non perde nessuno", "D": "conflitti in cui uno vince, ma l'altro non perde tutto"}, "correct": "A", "a": "senza compromessi: se uno vince, l'altro perde tutto", "expl": "senza compromessi: se uno vince, l'altro perde tutto:\nconflitti senza compromessi: se uno vince, l'altro perde tutto. Questa caratteristica è tipica dei conflitti intrattabili, dove non c'è spazio per nessun tipo di mediazione o soluzione intermedia, e contribuisce a rendere questi conflitti particolarmente distruttivi e prolungati nel tempo."}, "33.08": {"q": "Deumanizzazione ed oggettivazione sono strettamente collegati ai concetti di:", "options": {"A": "ingroup e outgroup", "B": "pregiudizio e interdipendenza", "C": "stereotipo e conflitto", "D": "pregiudizio e stereotipo"}, "correct": "D", "a": "pregiudizio e stereotipo", "expl": "pregiudizio e stereotipo:\nQuesti fenomeni rivestono un ruolo importante a livello di relazione intergruppi relativamente al concetto di attribuzione di colpa, e l'analisi degli atteggiamenti intergruppi è spesso predittiva dei fattori cognitivi e affettivi che intervengono nella strutturazione delle relazioni stesse."}, "33.09": {"q": "Nella disumanizzazione animalistica:", "options": {"A": "i soggetti sono considerati carenti dei tratti della «natura umana»", "B": "i soggetti sono privi di tratti come il calore e l'emotività e sono percepiti come oggetti, robot o macchine", "C": "il soggetto è percepito come carente dei tratti cosiddetti «unicamente umani»", "D": "il soggetto è percepito come carente dei tratti cosiddetti «unicamente non umani»"}, "correct": "C", "a": "il soggetto è percepito come carente dei tratti cosiddetti «unicamente umani»", "expl": "il soggetto è percepito come carente dei tratti cosiddetti «unicamente umani»:\nLa dispensa, citando Haslam (2006), spiega che nella deumanizzazione animalistica vengono negate le caratteristiche unicamente umane (UH), che definiscono il confine fra esseri umani e animali. Di conseguenza, l'altro viene considerato rozzo, stupido, ignorante, senza controllo di sé, con comportamenti spinti da appetiti e istinti, immaturo e arretrato, quindi simile a un animale."}, "33.10": {"q": "Nella disumanizzazione meccanicistica:", "options": {"A": "i soggetti sono considerati carenti dei tratti della «natura umana»", "B": "le persone viste e classificate come rozze e schiave degli istinti saranno pertanto considerate simili ad animali", "C": "i soggetti non sono considerati carenti dei tratti della «natura umana»", "D": "il soggetto è percepito come carente dei tratti cosiddetti «unicamente umani»"}, "correct": "A", "a": "i soggetti sono considerati carenti dei tratti della «natura umana»", "expl": "i soggetti sono considerati carenti dei tratti della «natura umana»:\nLa dispensa, sempre basandosi sul modello di Haslam (2006), afferma che nella deumanizzazione meccanicistica vengono negate le caratteristiche tipiche della natura umana (HN). L'altro viene percepito come emotivamente inerte e distaccato, freddo, indifferente e privo di empatia, rigido e passivo a livello cognitivo, privo di ogni curiosità e flessibilità, quindi simile a una macchina o un automa."}, "34.01": {"q": "Lo stereotipo consiste:", "options": {"A": "nell'attribuzione ad un individuo di caratteristiche basate su aspettative e associazioni riguardanti l'outgroup", "B": "nell'attribuzione ad un individuo di caratteristiche basate su aspettative e associazioni riguardanti il gruppo di appartenenza", "C": "nell'attribuzione ad un individuo di caratteristiche basate su convinzioni personali", "D": "nell'attribuzione ad un individuo di caratteristiche basate su pregiudizi"}, "correct": "B", "a": "nell'attribuzione ad un individuo di caratteristiche basate su aspettative e associazioni riguardanti il gruppo di appartenenza", "expl": "nell'attribuzione ad un individuo di caratteristiche basate su aspettative e associazioni riguardanti il gruppo di appartenenza:\n\nLo stereotipo non è una convinzione personale né un pregiudizio, ma una generalizzazione cognitiva condivisa. Da un punto di vista funzionale, giustifica le nostre reazioni emotive e comportamentali verso una categoria; da un punto di vista culturale, è fondato sul consenso sociale e include un sistema di credenze collettivamente condivise."}, "34.02": {"q": "Il pregiudizio consiste:", "options": {"A": "in una reazione emotiva nei confronti di un individuo basata su un'opinione nei confronti del gruppo come totalità", "B": "in una reazione cognitiva nei confronti di un individuo basata su un'opinione nei confronti del gruppo come totalità", "C": "in una reazione emotiva nei confronti di un individuo basata su un'opinione personale", "D": "in una reazione emotiva negativa nei confronti di un individuo"}, "correct": "A", "a": "in una reazione emotiva nei confronti di un individuo basata su un'opinione nei confronti del gruppo come totalità", "expl": "in una reazione emotiva nei confronti di un individuo basata su un'opinione nei confronti del gruppo come totalità:\n\nuna reazione emotiva, non cognitiva, rivolta a un individuo e fondata su un'opinione preconcetta riguardante il gruppo nel suo insieme. Secondo Allport, il pregiudizio pone la persona in una posizione di svantaggio ingiustificato dalla sua condotta. Può includere sia reazioni negative che positive, contrariamente a quanto suggerisce l'opzione che lo limita alla sola negatività."}, "34.03": {"q": "Si crea grazie all'unione amplificata di Stereotipo + Pregiudizio:", "options": {"A": "la categorizzazione", "B": "la rimozione", "C": "la dissociazione", "D": "la discriminazione"}, "correct": "D", "a": "la discriminazione", "expl": "la discriminazione:\n\nLa discriminazione si crea dall'unione amplificata di stereotipo e pregiudizio. Mentre lo stereotipo è la componente cognitiva e il pregiudizio quella emotiva, la discriminazione rappresenta la componente comportamentale. Allport ha descritto le fasi del rifiuto dell'outgroup, che culminano nella discriminazione e, nei casi estremi, nello sterminio."}, "34.04": {"q": "L'elemento particolare delle nuove forme di razzismo è il fatto che:", "options": {"A": "il rifiuto del proprio gruppo ed accettazione degli altri", "B": "il rifiuto del proprio gruppo", "C": "le persone rinnegano le vecchie espressioni di razzismo e si dichiarano assolutamente egualitarie", "D": "l'accettazione assoluta e incondizionata degli altri gruppi"}, "correct": "C", "a": "le persone rinnegano le vecchie espressioni di razzismo e si dichiarano assolutamente egualitarie", "expl": "le persone rinnegano le vecchie espressioni di razzismo e si dichiarano assolutamente egualitarie:\n\nle nuove forme di razzismo è il paradosso per cui le persone rinnegano le vecchie espressioni di razzismo e si dichiarano egualitarie, ma nei fatti continuano a rifiutare gli altri gruppi. Questo fenomeno è al centro del razzismo simbolico e moderno, dove l'ostilità si manifesta in modo nascosto, ad esempio opponendosi a riforme pubbliche a favore delle minoranze."}, "34.05": {"q": "Il razzismo simbolico tende:", "options": {"A": "a legittimare forme discriminatorie in virtù dei valori di disuguaglianza", "B": "a legittimare forme discriminatorie in virtù dei valori di uguaglianza, per cui se tutti siamo uguali non è giusto agevolare in alcun modo le minoranze", "C": "a legittimare forme discriminatorie in virtù dei valori di uguaglianza, per cui se tutti siamo uguali è giusto agevolare in ogni modo le minoranze", "D": "a legittimare forme discriminatorie in virtù dei valori di supremazia, per cui non tutti siamo uguali"}, "correct": "B", "a": "a legittimare forme discriminatorie in virtù dei valori di uguaglianza, per cui se tutti siamo uguali non è giusto agevolare in alcun modo le minoranze", "expl": "a legittimare forme discriminatorie in virtù dei valori di uguaglianza, per cui se tutti siamo uguali non è giusto agevolare in alcun modo le minoranze:\n\nMazzara spiega che il razzismo simbolico tende a legittimare forme discriminatorie appellandosi proprio ai valori di uguaglianza. Il ragionamento è: se tutti siamo uguali, non è giusto agevolare in alcun modo le minoranze. In questo modo, chi si oppone alle azioni positive o alle riforme per l'eguaglianza può farlo senza apparire razzista, anzi presentandosi come difensore di un'uguaglianza formale."}, "34.06": {"q": "Le caratteristiche del pregiudizio sottile sono:", "options": {"A": "freddezza e distanza", "B": "freddezza e dissociazione", "C": "calore e vicinanza", "D": "distanza e categorizzazione"}, "correct": "A", "a": "freddezza e distanza", "expl": "freddezza e distanza:\n\nSecondo Pettigrew e Meertens, il pregiudizio sottile si caratterizza proprio per freddezza e distanza. Si esprime in modo indiretto, socialmente accettabile, e consente di mantenere un'immagine di sé come persona non discriminante. Le sue tre componenti sono: difesa dei valori tradizionali, esagerazione delle differenze culturali, e rifiuto di provare emozioni positive verso l'outgroup. La freddezza e la distanza sono il tratto distintivo che lo differenzia dal pregiudizio manifesto."}, "34.07": {"q": "Il pregiudizio manifesto si contraddistingue essenzialmente per:", "options": {"A": "l'evitamento e la discriminazione", "B": "il rifiuto esplicito degli altri gruppi, considerati una minaccia", "C": "il rifiuto esplicito del proprio gruppo, considerato una minaccia", "D": "il rifiuto implicito degli altri gruppi, considerati una minaccia"}, "correct": "B", "a": "il rifiuto esplicito degli altri gruppi, considerati una minaccia", "expl": "il rifiuto esplicito degli altri gruppi, considerati una minaccia:\n\nAlla base vi è la credenza che l'outgroup sia geneticamente inferiore, il che giustifica il rifiuto e lo svantaggio sociale. Paradossalmente, questa convinzione porta a negare l'esistenza della discriminazione, perché lo svantaggio viene considerato un fenomeno naturale."}, "34.08": {"q": "L'orientamento alla dominanza sociale (SDO, Social Dominance Orientation), è definito come quella tendenza:", "options": {"A": "a non considerare l'esistenza caratterizzata dalla competizione tra gruppi e dal desiderio di sostenere il dominio dei gruppi superiori su quelli inferiori", "B": "caratterizzata dal desiderio di sostenere il dominio dei gruppi superiori su quelli inferiori", "C": "a considerare l'esistenza caratterizzata dalla cooperazione tra gruppi", "D": "a considerare l'esistenza caratterizzata dalla competizione tra gruppi e dal desiderio di sostenere il dominio dei gruppi superiori su quelli inferiori"}, "correct": "D", "a": "a considerare l'esistenza caratterizzata dalla competizione tra gruppi e dal desiderio di sostenere il dominio dei gruppi superiori su quelli inferiori", "expl": "a considerare l'esistenza caratterizzata dalla competizione tra gruppi e dal desiderio di sostenere il dominio dei gruppi superiori su quelli inferiori:\n\nSecondo Sidanius e Pratto, la SDO è la tendenza a vedere l'esistenza come una competizione tra gruppi e a desiderare che i gruppi superiori dominino su quelli inferiori. È il costrutto centrale della teoria della dominanza sociale, che descrive le società come sistemi di gerarchie fondate sui gruppi. La SDO riflette la tendenza individuale a classificare i gruppi lungo la dimensione superiore/inferiore e a favorire politiche che mantengono la disuguaglianza."}, "34.09": {"q": "L'omofobia consiste:", "options": {"A": "nella paura e nell'avversione irrazionale nei confronti solo dell'omosessualità", "B": "nell'amore irrazionale nei confronti dell'omosessualità, della bisessualità e della transessualità", "C": "nella paura e nell'avversione irrazionale nei confronti dell'omosessualità, della bisessualità e della transessualità basata sul pregiudizio", "D": "nella paura e nell'avversione irrazionale nei confronti dell'omosessualità, della bisessualità e della transessualità non basata sul pregiudizio"}, "correct": "C", "a": "nella paura e nell'avversione irrazionale nei confronti dell'omosessualità, della bisessualità e della transessualità basata sul pregiudizio", "expl": "nella paura e nell'avversione irrazionale nei confronti dell'omosessualità, della bisessualità e della transessualità basata sul pregiudizio"}, "34.10": {"q": "Pettigrew e Tropp (2005) in merito al pregiudizio sostengono empiricamente l'idea secondo la quale:", "options": {"A": "il \"contatto intergruppo\" riduce il pregiudizio", "B": "il \"contatto intergruppo\" agevola il pregiudizio", "C": "il \"contatto intergruppo\" non ha effetti sul pregiudizio", "D": "il \"contatto intergruppo\" non riduce il pregiudizio"}, "correct": "A", "a": "il \"contatto intergruppo\" riduce il pregiudizio", "expl": "il \"contatto intergruppo\" riduce il pregiudizio:\nPettigrew e Tropp sostengono empiricamente l'idea che il contatto intergruppo riduce il pregiudizio. Questa conclusione è in linea con quanto già affermato da Allport e confermato da studi successivi, che mostrano come anche il contatto indiretto o persino il semplice immaginare un'interazione positiva con un membro dell'outgroup possano migliorare l'opinione verso l'intero gruppo."}, "35.01": {"q": "La psicologia ambientale:", "options": {"A": "studia il comportamento umano e il benessere delle persone in relazione alle caratteristiche economiche e culturali degli ambienti", "B": "studia il rapporto tra l'essere umano, gli animali e la natura", "C": "studia il comportamento umano e il benessere delle persone in relazione alle caratteristiche fisiche e sociali degli ambienti", "D": "studia il comportamento umano e il benessere delle persone in relazione alle caratteristiche fisiche e sociali dei luoghi naturali"}, "correct": "C", "a": "studia il comportamento umano e il benessere delle persone in relazione alle caratteristiche fisiche e sociali degli ambienti", "expl": "studia il comportamento umano e il benessere delle persone in relazione alle caratteristiche fisiche e sociali degli ambienti:\n\nLa psicologia ambientale è la disciplina che indaga l'interrelazione tra ambiente e affettività, cognizione e comportamento. Essa si concentra sulle caratteristiche fisiche e sociali degli ambienti, non su quelle economiche, culturali o esclusivamente naturali. Questo settore della psicologia, nato alla fine degli anni Sessanta, studia come l'ambiente fisico influenza i comportamenti umani in contesti come alberghi, ristoranti, ospedali e negozi."}, "35.02": {"q": "La psicologia architettonica:", "options": {"A": "richiede un esame approfondito delle reazioni degli architetti al fine di rendere gli ambienti più complessi", "B": "richiede un esame approfondito (valutazioni) delle reazioni degli occupanti/fruitori/utilizzatori in merito agli spazi", "C": "richiede esclusivamente un esame generico delle reazioni dei lavoratori in merito agli spazi di lavoro", "D": "si occupa di depotenziare il controllo personale degli utenti, facendogli modificare lo spazio"}, "correct": "B", "a": "richiede un esame approfondito (valutazioni) delle reazioni degli occupanti/fruitori/utilizzatori in merito agli spazi", "expl": "richiede un esame approfondito (valutazioni) delle reazioni degli occupanti/fruitori/utilizzatori in merito agli spazi:\n\nLa psicologia architettonica si distingue dalla psicologia ambientale proprio per questo aspetto: mentre la psicologia ambientale studia il comportamento umano e il benessere in relazione alle caratteristiche degli ambienti, la psicologia architettonica richiede un esame approfondito, attraverso valutazioni adeguate, delle reazioni di chi occupa, fruisce o utilizza gli spazi. Secondo Gifford, i suoi obiettivi includono creare ambienti che rispondano alle esigenze, soddisfare gli utenti e potenziare il controllo personale, non depotenziarlo."}, "35.03": {"q": "Un fenomeno psicologico che agevola)implicitamente)i designer, gli architetti, i pubblicitari e i consulenti del colore nello scegliere il colore giusto per uno specifico oggetto o spazio è detto:", "options": {"A": "percezione dell'unicità dell'oggetto", "B": "fenomeno della costanza della percezione", "C": "fenomeno della costanza percettiva-visiva", "D": "percezione dell'affordance"}, "correct": "D", "a": "percezione dell'affordance", "expl": "percezione dell'affordance:\n\nIl concetto di affordance, introdotto da Gibson nel 1979, si riferisce alla capacità di un oggetto o di uno spazio di \"farsi capire\" a prima vista, di risuonare immediatamente. Secondo questa prospettiva, uno spazio ben progettato contiene al suo interno le informazioni necessarie per la percezione a un livello basilare, senza dover ricorrere alle informazioni conservate nella memoria a lungo termine. È questo il fenomeno che guida designer, architetti e pubblicitari nella scelta cromatica."}, "35.04": {"q": "La tendenza a considerare un oggetto dello stesso colore anche in seguito a un cambiamento della luce da esso riflessa è:", "options": {"A": "il fenomeno della costanza percettiva-visiva", "B": "il fenomeno della costanza della visione", "C": "il fenomeno della costanza della percezione", "D": "il fenomeno della costanza del colore"}, "correct": "D", "a": "il fenomeno della costanza del colore", "expl": "il fenomeno della costanza del colore:\n\nLa costanza del colore è definita proprio come la tendenza a considerare un oggetto dello stesso colore anche quando la luce da esso riflessa cambia. Questo fenomeno deriva da tre fattori: la familiarità con il colore dell'oggetto, la distinzione cognitiva tra pigmenti della superficie ed effetti dell'illuminazione, e l'effetto di adattamento, cioè la riduzione della reattività dei neuroni dopo esposizione prolungata a un tipo di illuminazione."}, "35.05": {"q": "Fodor e Pylyshyn (1981) hanno sottolineato come la percezione coinvolga:", "options": {"A": "sia il vedere che il vedere come", "B": "solo il vedere come", "C": "solo il vedere", "D": "sia il vedere che il sentire"}, "correct": "A", "a": "sia il vedere che il vedere come", "expl": "sia il vedere che il vedere come:\n\nFodor e Pylyshyn hanno sottolineato come la percezione coinvolga due aspetti: il \"vedere\", cioè la percezione diretta, e il \"vedere come\", cioè l'interpretazione di ciò che si vede. La percezione non è quindi un processo passivo ma richiede sia l'input sensoriale che la sua rielaborazione cognitiva. Questo principio si applica alla percezione degli spazi architettonici, dove forme, linee, volumi e colori devono contenere informazioni sufficienti per la comprensione immediata."}, "35.06": {"q": "Nella ricerca condotta da Eysenck, la maggior parte dei soggetti coinvolti nello studio preferiva subito dopo il blu il colore:", "options": {"A": "giallo", "B": "rosso", "C": "rosa", "D": "verde"}, "correct": "B", "a": "rosso", "expl": "rosso:\n\nNello studio di Eysenck del 1941, la gerarchia di preferenza dei colori era la seguente: al primo posto il blu, seguito dal rosso, poi il verde, il viola, l'arancione e infine il giallo. Questa gerarchia fu successivamente riconfermata anche dallo studio di Guilford e Smith del 1959. È utile ricordare l'ordine completo perché aiuta a collocare correttamente la posizione di ciascun colore nella scala delle preferenze."}, "35.07": {"q": "Cimbalo, Beck e Sendziak (1978) in un loro studio avevano osservato che:", "options": {"A": "bambini e giovani adulti non mostrano differenze nell'identificare i colori", "B": "bambini e giovani adulti mostrano differenze nell'identificare il colore blu, considerato un colore \"felice\" dal gruppo dei bambini e \"triste\" dal gruppo dei giovani adulti", "C": "i giovani adulti identificano il giallo, l'arancio ed il verde come colori che trasmettono felicità, mentre per i bambini trasmettevano tristezza", "D": "bambini e giovani adulti mostrano differenze nell'identificare il colore blu, considerato un colore \"triste\" dal gruppo dei bambini e \"felice\" dal gruppo dei giovani adulti"}, "correct": "B", "a": "bambini e giovani adulti mostrano differenze nell'identificare il colore blu, considerato un colore \"felice\" dal gruppo dei bambini e \"triste\" dal gruppo dei giovani adulti", "expl": "bambini e giovani adulti mostrano differenze nell'identificare il colore blu, considerato un colore \"felice\" dal gruppo dei bambini e \"triste\" dal gruppo dei giovani adulti:\n\nQuesto dato è specifico e distintivo rispetto alle altre opzioni."}, "35.08": {"q": "Rispetto alle differenze di genere, Valdez e Mehrabian (1994) hanno osservato che le donne:", "options": {"A": "preferiscono il colore rosa", "B": "preferiscono i colori caldi", "C": "sembrerebbero essere più sensibili alle tonalità di colore rispetto agli uomini", "D": "sembrerebbero essere più sensibili alle variazioni di colore rispetto agli uomini"}, "correct": "D", "a": "sembrerebbero essere più sensibili alle variazioni di colore rispetto agli uomini", "expl": "sembrerebbero essere più sensibili alle variazioni di colore rispetto agli uomini:\n\nLa formulazione esatta del testo della dispensa è fondamentale: parla di \"variazioni di colore\", non di \"tonalità\" o di preferenze per colori specifici come il rosa o i colori caldi. Questa sensibilità differenziale è l'unico dato riportato riguardo alle differenze di genere."}, "35.09": {"q": "Secondo Berman (2007), il colore che riconduce mentalmente alla felicità, ma che possiede anche caratteristiche che potrebbero comportare un incremento dell'attenzione e dell'appetito è il colore:", "options": {"A": "arancione", "B": "verde", "C": "giallo", "D": "rosso"}, "correct": "A", "a": "arancione", "expl": "arancione:\n\nCome il giallo, l'arancione riconduce mentalmente alla felicità (come osservato anche da Cimbalo et al., 1978), ma possiede anche caratteristiche aggiuntive. Secondo Berman (2007), l'arancione potrebbe comportare un incremento dell'attenzione e dell'appetito. È questa la combinazione specifica che distingue l'arancione dagli altri colori citati nella domanda."}, "35.10": {"q": "Secondo Mccandles (2009) il colore associato alla felicità per la cultura indiana è:", "options": {"A": "rosso", "B": "bianco", "C": "verde", "D": "giallo"}, "correct": "C", "a": "verde", "expl": "verde:\n\nSecondo Mccandles (2009), la felicità è associata a colori diversi a seconda della cultura di appartenenza: giallo per la cultura occidentale, verde per quella indiana, [bianco] per gli indiani d'America, rosso per quella cinese."}, "36.01": {"q": "Colori piacevoli, musiche gradevoli e accorgimenti interni sono necessari per creare un ambiente positivo capace di influenzare:", "options": {"A": "il comportamento oggettivo", "B": "l'atteggiamento", "C": "il comportamento soggettivo", "D": "l'ambiente"}, "correct": "C", "a": "il comportamento soggettivo", "expl": "il comportamento soggettivo :\n\nLa dispensa specifica che colori piacevoli, musiche gradevoli e accorgimenti interni sono necessari per creare un ambiente positivo capace di influenzare il comportamento soggettivo. Questo concetto è introdotto da Guèguen (2010) e si basa sull'ipotesi che la stimolazione positiva dei sensi induca stati psicologici positivi nelle persone, concretizzandosi in comportamenti particolari. L'aggettivo \"soggettivo\" sottolinea che non si tratta di una risposta meccanica e uniforme, ma di un processo che coinvolge le percezioni e le emozioni individuali."}, "36.02": {"q": ") Chi definisce la progettazione sociale come \"una forma di totalitarismo e di controllo del comportamento umano\"", "options": {"A": "Heimsath", "B": "Guèguen", "C": "Baker", "D": "Levy e Grewal"}, "correct": "A", "a": "Heimsath", "expl": "Heimsath :\n\nL'affermazione attribuita a Heimsath (1977) . Questa precisazione per mettere in guardia da un fraintendimento degli studi sull'atmosfera: non si tratta di manipolare le persone, ma di creare condizioni ambientali che possano favorire determinate esperienze, nel rispetto della complessità del comportamento umano."}, "36.03": {"q": ") Gli effetti che crea la musica nell'ascoltatore sono:", "options": {"A": "piacere ed eccitamento", "B": "piacere ed incitamento", "C": "eccitamento ed incitamento", "D": "piacere e appagamento"}, "correct": "B", "a": "piacere ed incitamento", "expl": "piacere ed incitamento :\n\nLa dispensa afferma che la musica crea nell'ascoltatore due effetti: il piacere , inteso come possibilità che il cliente ritorni, e l'incitamento , inteso come probabilità che il cliente inciti gli altri ad usufruire del servizio ricevuto. Questa distinzione è rilevante perché collega la risposta emotiva individuale (il piacere) a una conseguenza sociale e comportamentale (l'incitamento degli altri)."}, "36.04": {"q": ") Lo scopo dei responsabili dei bar a diffondere musiche ad alto volume è quello di:", "options": {"A": "spingere il cliente a non consumare", "B": "spingere il cliente a consumare più velocemente", "C": "spingere il cliente a consumare più lentamente", "D": "spingere il cliente ad andarsene"}, "correct": "B", "a": "spingere il cliente a consumare più velocemente", "expl": "spingere il cliente a consumare più velocemente :\n\nSecondo quanto riportato nella dispensa, i responsabili di bar e discoteche hanno tutto l'interesse a diffondere musiche dal ritmo sostenuto al fine di spingere i clienti a consumare più velocemente e probabilmente in quantità maggiori. Questa indicazione è tratta da Lammers (2003) e si basa sull'effetto che il ritmo musicale ha sul comportamento di consumo, accelerando i tempi di consumazione."}, "36.05": {"q": ") La ricerca su volontari a cui è stato somministrata per 15 minuti musica rock è stata condotta da:", "options": {"A": "Baker", "B": "Heimsath", "C": "Lammers", "D": "McCraty"}, "correct": "D", "a": "McCraty", "expl": "McCraty :\n\nLa ricerca in cui ad alcuni volontari fu chiesto di ascoltare per 15 minuti musica rock e new age è stata condotta da McCraty, Atkinson, Rein e Watkins (1996) . In questo studio, i ricercatori rilevarono misure fisiologiche come ritmo cardiaco, pressione arteriosa e immunoglobulina alfa-salivare (S-IgA) prima e dopo l'ascolto, dimostrando che la musica funge da antistress rapido ed economico."}, "36.06": {"q": ") La definizione di \"fidelity\" è:", "options": {"A": "relazioni a breve termine che le aziende mirano ad instaurare per conquistare nuovi clienti", "B": "relazioni a breve termine che l'individuo mira ad instaurare per conquistare nuovi clienti", "C": "relazioni a lungo termine che le aziende mirano ad instaurare per conquistare nuovi clienti", "D": "relazioni a lungo termine che l'individuo mira ad instaurare per conquistare nuovi clienti"}, "correct": "C", "a": "relazioni a lungo termine che le aziende mirano ad instaurare per conquistare nuovi clienti", "expl": "relazioni a lungo termine che le aziende mirano ad instaurare per conquistare nuovi clienti :\n\nIl termine \"fidelity\" si riferisce alle relazioni a lungo termine che le aziende mirano ad instaurare al fine di conquistare nuovi clienti. La dispensa precisa che tali tecniche di marketing assicurano la fidelizzazione del cliente puntando sulla fiducia e sulla qualità. Il focus è quindi sull'azienda come soggetto attivo che costruisce legami duraturi con il consumatore."}, "36.07": {"q": ") I questionari somministrati a Teheran per la ricerca sul marketing e la fidelizzazione sono stati:", "options": {"A": "450", "B": "300", "C": "350", "D": "400"}, "correct": "A", "a": "450", "expl": "450 :\n\nLa ricerca condotta da Saaedi, Raei, Pour e Mehdi (2013) a Teheran ha previsto la distribuzione di 450 questionari tra gli acquirenti di abbigliamento. Di questi, 434 sono stati opportunamente riempiti e utilizzati per l'analisi. Questo dettaglio numerico è importante perché testimonia la consistenza del campione su cui è stata verificata l'assenza di un effetto significativo della musica sul tempo speso per la ricerca del negozio e la correlazione inversa con la tendenza al riacquisto."}, "36.08": {"q": ") Maria Montessori ha dato vita alle:", "options": {"A": "scuole per bambini", "B": "case dei bambini", "C": "case dei gruppi infantili", "D": "kinder garden"}, "correct": "B", "a": "case dei bambini", "expl": "case dei bambini :\n\nMaria Montessori ha contribuito a dare valore e importanza all'ambiente fisico nelle scuole dell'infanzia, definite proprio \"case dei bambini\" . In queste strutture, la scelta degli arredi e dei materiali non è casuale ma è dettata dallo scopo di permettere \"il libero svolgimento delle attività del fanciullo\". La denominazione \"case dei bambini\" sottolinea l'idea di un ambiente domestico e accogliente, pensato su misura per le esigenze dei più piccoli."}, "36.09": {"q": ") Il progetto più noto della scuola dell'infanzia in Italia che rispecchia la filosofia educativa del pedagogo Loris Malaguzzi è stato svolto a:", "options": {"A": "Roma", "B": "Reggio Calabria", "C": "Reggio Emilia", "D": "Venezia"}, "correct": "C", "a": "Reggio Emilia", "expl": "Reggio Emilia :\n\nL'esperienza italiana di Reggio Emilia è stata riconosciuta a livello internazionale come istituzione ed esperienza all'avanguardia nell'educazione dell'infanzia. Questo progetto rispecchia la filosofia educativa del pedagogo Loris Malaguzzi , il quale sottolinea l'importanza dell'ambiente educativo attraverso la predisposizione di laboratori che consentano la libera espressione intellettiva da parte del bambino."}, "36.10": {"q": ") L'ambiente scolastico rappresenta:", "options": {"A": "un elemento neutro", "B": "un \"terzo insegnante\"", "C": "un \"primo insegnante\"", "D": "un \"secondo insegnante\""}, "correct": "B", "a": "un \"terzo insegnante\"", "expl": "un \"terzo insegnante\" :\n\nSecondo Malaguzzi (1984) , l'ambiente scolastico non è un elemento neutro nel processo di apprendimento, poiché le sue caratteristiche fisiche equivalgono a un \"terzo insegnante\" . La sua importanza è alla stregua del primo insegnante, l'adulto, e del secondo, i pari. Questa metafora sottolinea il ruolo attivo e formativo che gli spazi, gli arredi e i materiali svolgono nel processo educativo, influenzando l'apprendimento in modo continuo e silenzioso."}, "37.01": {"q": "Il seguente termine cerca di descrivere una forma di amore e sensibilità verso la natura e gli esseri viventi:", "options": {"A": "zoolife", "B": "biolife", "C": "zoofinia", "D": "biofilia"}, "correct": "D", "a": "biofilia", "expl": "biofilia:\nIl termine \"biofilia\" è stato introdotto da Wilson nel 1984 per descrivere una forma di amore e sensibilità verso la natura e gli esseri viventi. Secondo Wilson, questa forte esigenza di mantenere uno stretto legame con la natura è una caratteristica insita nel nostro patrimonio evolutivo. Tale predisposizione, come suggerito da Kellert e Derr nel 1998, rappresenta uno strumento fondamentale per lo sviluppo fisico e mentale degli esseri umani."}, "37.02": {"q": "La capacità di rigenerazione cognitiva da parte degli ambienti fisici e di facilitare il recupero dallo stress psicofisico e dalla fatica mentale è detta:", "options": {"A": "welness", "B": "restorativeness", "C": "restaurativeness", "D": "biofilia"}, "correct": "B", "a": "restorativeness", "expl": "restorativeness:\nIl termine \"restorativeness\" indica la capacità di un ambiente di facilitare il recupero dallo stress psicofisico e dalla fatica mentale, producendo un effetto rigenerativo. Questo concetto è centrale nella psicologia ambientale e viene misurato attraverso strumenti come la Perceived Restorativeness Scale (PRS), validata in Italia da Pasini, Berto, Scopelliti e Carrus nel 2009. La restorativeness si manifesta quando un ambiente riesce a ripristinare le risorse attentive ed emotive della persona."}, "37.03": {"q": "In generale, la vegetazione riesce ad attivare:", "options": {"A": "aumento di sensazioni di stress e frustrazione", "B": "peggioramento dei livelli attentivi", "C": "sensazioni di piacevolezza e riduzione delle emozioni negative", "D": "alti livelli di aggressività"}, "correct": "C", "a": "sensazioni di piacevolezza e riduzione delle emozioni negative", "expl": "sensazioni di piacevolezza e riduzione delle emozioni negative:\nLa vegetazione attiva sensazioni di piacevolezza e calma, migliora l'umore e riduce emozioni negative come paura, frustrazione e tristezza. Groeneweggen e collaboratori (2006) hanno evidenziato che il contatto con il verde abbassa i livelli di aggressività. Inoltre, le scene naturali fungono da distrazioni gradevoli da pensieri dolorosi e migliorano i livelli attentivi, come sostenuto da Kaplan e Kaplan nel 1989."}, "37.04": {"q": "MacKerron e Mourato (2013) hanno trovato una correlazione positiva tra l'esposizione ad ambienti verdi o naturali nella vita quotidiana e il senso di:", "options": {"A": "concetto di salutogenesi", "B": "concetto di restorativeness", "C": "concetto di rigenerazione", "D": "benessere soggettivo momentaneo (Subjective WellBeing)"}, "correct": "D", "a": "benessere soggettivo momentaneo (Subjective WellBeing)", "expl": "benessere soggettivo momentaneo (Subjective WellBeing):\nMacKerron e Mourato nel 2013 hanno individuato una correlazione positiva tra l'esposizione ad ambienti verdi o naturali e il senso di benessere soggettivo momentaneo, noto come Subjective WellBeing (SWB). Questo benessere è riconducibile a una valutazione globale positiva della propria vita, al senso di auto-realizzazione e al piacere prodotto dall'esperienza in sé."}, "37.05": {"q": "Nell'ambito della ricerca in psicologia ambientale, oltre all'uso di self-report, per valutare lo stato psico-fisico, vengono utilizzati anche:", "options": {"A": "indicatori clinici", "B": "indicatori ambientali", "C": "indicatori psico-sociali", "D": "indicatori cognitivi"}, "correct": "A", "a": "indicatori clinici", "expl": "indicatori clinici:\nNella ricerca in psicologia ambientale, oltre ai self-report come la Perceived Restorativeness Scale (PRS), vengono utilizzati anche indicatori clinici per valutare lo stato psico-fisico."}, "37.06": {"q": "Le caratteristiche che rendono la percezione di uno spazio blu maggiormente attraente sono legate a:", "options": {"A": "aspetti propri dell'acqua", "B": "fattori meteorologici", "C": "fascia di età dei soggetti che ne usufruiscono", "D": "tutte le precedenti risposte sono corrette"}, "correct": "D", "a": "tutte le precedenti risposte sono corrette", "expl": "tutte le precedenti risposte sono cor
