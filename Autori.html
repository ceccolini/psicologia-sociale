": {"q": "Nel Modello Valore-Aspettativa le principali determinanti del comportamento umano risultano essere:", "options": {"A": "gli atteggiamenti e le credenze", "B": "gli atteggiamenti", "C": "le credenze", "D": "gli atteggiamenti e gli stati interiori"}, "correct": "A", "a": "gli atteggiamenti e le credenze", "expl": "gli atteggiamenti e le credenze:\nNel Modello Valore-Aspettativa, le decisioni verso un comportamento dipendono dalla combinazione tra le credenze (probabilità del risultato) e il valore (valutazione del rischio) attribuito all'azione"}, "11.03": {"q": "Il modello integrato di Conner e Norman consta delle seguenti fasi:", "options": {"A": "precontemplazione, fase motivazionale, fase dell'azione e fase di mantenimento", "B": "fase motivazionale, stadio della pianificazione, fase dell'azione e fase di mantenimento", "C": "precontemplazione, fase motivazionale, stadio della pianificazione, fase dell'azione e fase di mantenimento", "D": "precontemplazione, stadio della pianificazione, fase dell'azione e fase di mantenimento"}, "correct": "C", "a": "precontemplazione, fase motivazionale, stadio della pianificazione, fase dell'azione e fase di mantenimento", "expl": "precontemplazione, fase motivazionale, stadio della pianificazione, fase dell'azione e fase di mantenimento:\n\nIl modello di Conner e Norman descrive il processo di cambiamento attraverso cinque stadi sequenziali: precontemplazione, fase motivazionale, stadio della pianificazione, fase dell'azione e infine fase di mantenimento"}, "11.04": {"q": "Il modello dell'Individuo come Economizzatore di Risorse fu proposto da:", "options": {"A": "Kurt Lewin", "B": "Ross", "C": "Asch", "D": "Taylor"}, "correct": "D", "a": "Taylor", "expl": "Taylor:\npropose nel 1981 il modello dell'individuo come economizzatore di risorse, evidenziando come le persone preferiscano utilizzare scorciatoie di pensiero per risparmiare energia cognitiva"}, "11.05": {"q": "Le euristiche della rappresentatività sono impiegate:", "options": {"A": "quando c'è bisogno di valutare velocemente l'appartenenza di qualcosa o qualcuno", "B": "per valutare la frequenza o la probabilità che un particolare evento si verifichi", "C": "per formulare delle ipotesi o immaginare scenari ipotetici relativi a come potrebbero evolversi o come avrebbero potuto evolversi certi eventi", "D": "per ricordare con più facilità esempi positivi del proprio comportamento"}, "correct": "A", "a": "quando c'è bisogno di valutare velocemente l'appartenenza di qualcosa o qualcuno", "expl": "quando c'è bisogno di valutare velocemente l'appartenenza di qualcosa o qualcuno:\nL'euristica della rappresentatività viene usata per categorizzare rapidamente oggetti o persone in base alla loro somiglianza con schemi mentali o prototipi precostituiti"}, "11.06": {"q": "Le euristiche della disponibilità sono utilizzate:", "options": {"A": "per formulare delle ipotesi o immaginare scenari ipotetici relativi a come potrebbero evolversi o come avrebbero potuto evolversi certi eventi", "B": "per valutare la frequenza o la probabilità che un particolare evento si verifichi", "C": "per ricordare con più facilità esempi positivi del proprio comportamento", "D": "quando c'è bisogno di valutare velocemente l'appartenenza di qualcosa o qualcuno"}, "correct": "B", "a": "per valutare la frequenza o la probabilità che un particolare evento si verifichi", "expl": "per valutare la frequenza o la probabilità che un particolare evento si verifichi:\nL'euristica della disponibilità ci porta a stimare la probabilità di un evento basandoci sulla facilità e rapidità con cui esempi simili ci vengono in mente"}, "11.07": {"q": "L'euristica della simulazione viene utilizzata:", "options": {"A": "quando c'è bisogno di valutare velocemente l'appartenenza di qualcosa o qualcuno", "B": "per ricordare con più facilità esempi positivi del proprio comportamento", "C": "per formulare delle ipotesi o immaginare scenari ipotetici relativi a come potrebbero evolversi o come avrebbero potuto evolversi certi eventi", "D": "per valutare la frequenza o la probabilità che un particolare evento si verifichi"}, "correct": "C", "a": "per formulare delle ipotesi o immaginare scenari ipotetici relativi a come potrebbero evolversi o come avrebbero potuto evolversi certi eventi", "expl": "per formulare delle ipotesi o immaginare scenari ipotetici relativi a come potrebbero evolversi o come avrebbero potuto evolversi certi eventi:\nL'euristica della simulazione è legata al pensiero controfattuale e serve a immaginare come gli eventi avrebbero potuto svilupparsi diversamente (\"se non fosse successo così...\")"}, "11.08": {"q": "Il Modello configurazionale è stato proposto da:", "options": {"A": "Kurt Lewin", "B": "J. Bruner", "C": "Kelley", "D": "S. Asch"}, "correct": "D", "a": "S. Asch", "expl": "Solomon Asch ha elaborato il Modello configurazionale, secondo il quale le persone formano impressioni globali e coerenti degli altri assemblando le informazioni sui tratti di personalità in una \"gestalt\" unitaria"}, "11.09": {"q": "Il Modello della covarianza è stato proposto da:", "options": {"A": "Taylor", "B": "Kelley", "C": "S. Asch", "D": "J. Bruner"}, "correct": "B", "a": "Kelley", "expl": "Il modello della covarianza di Kelley (1972) spiega il processo di attribuzione causale analizzando come un effetto vari costantemente in presenza di una specifica causa attraverso tre criteri: distintività, coerenza e consenso"}, "11.10": {"q": "Secondo il modello descrittivo dell'economizzatore delle risorse cognitive gli errori commessi dalle persone sarebbero legati a fattori:", "options": {"A": "cognitivi e non motivazionali", "B": "motivazionali", "C": "cognitivi e motivazionali", "D": "ambientali"}, "correct": "A", "a": "cognitivi e non motivazionali", "expl": "cognitivi e non motivazionali:\nSecondo il modello di Taylor, gli errori di giudizio (bias) derivano dai limiti intrinseci della nostra capacità cognitiva e dal ricorso frequente a scorciatoie, piuttosto che da desideri o spinte motivazionali"}, "12.01": {"q": "Le rappresentazioni sociali vengono definite come:", "options": {"A": "l'elaborazione che un gruppo o una comunità crea di un oggetto sociale in modo da permettere ai propri membri di comportarsi e di comunicare in maniera comprensibile", "B": "l'elaborazione che un gruppo o una comunità crea di un oggetto sociale in modo da non permettere ai propri membri di comportarsi e di comunicare in maniera comprensibile", "C": "l'elaborazione che un gruppo o una comunità crea di un oggetto sociale in modo da permettere ai propri membri di comportarsi ma non di comunicare in maniera comprensibile", "D": "l'elaborazione che un gruppo o una comunità crea di un oggetto sociale"}, "correct": "A", "a": "l'elaborazione che un gruppo o una comunità crea di un oggetto sociale in modo da permettere ai propri membri di comportarsi e di comunicare in maniera comprensibile", "expl": "l'elaborazione che un gruppo o una comunità crea di un oggetto sociale in modo da permettere ai propri membri di comportarsi e di comunicare in maniera comprensibile:\nLe rappresentazioni sociali sono strumenti creati dalla comunità per rendere il mondo comprensibile e comunicabile\nEsse permettono agli individui di orientarsi e agire all'interno della realtà sociale in modo condiviso"}, "12.02": {"q": "L'ipotesi dell'interesse stabilisce che:", "options": {"A": "le rappresentazioni sociali rappresentano dei mezzi utili a risolvere tensioni psichiche o emotive scaturite da insuccessi o dalla mancata integrazione sociale", "B": "ogni rappresentazione sociale consiste nel fatto che è comunque elaborata da un gruppo per il quale l'oggetto di rappresentazione è socialmente rilevante", "C": "una persona o un gruppo tendono a creare immagini nel tentativo di accordare obiettivi contrapposti tra due gruppi sociali o tra la persona e la società", "D": "le rappresentazioni sociali sono filtri utilizzati dai gruppi nei confronti di informazioni provenienti dall'esterno, al fine di controllare la lealtà dei propri membri"}, "correct": "C", "a": "una persona o un gruppo tendono a creare immagini nel tentativo di accordare obiettivi contrapposti tra due gruppi sociali o tra la persona e la società", "expl": "una persona o un gruppo tendono a creare immagini nel tentativo di accordare obiettivi contrapposti tra due gruppi sociali o tra la persona e la società:\nSecondo questa ipotesi, i gruppi creano immagini per conciliare obiettivi diversi o conflittuali\nSpesso queste immagini sono distorsioni della realtà volte a favorire la posizione di chi detiene maggiore potere"}, "12.03": {"q": "L'ipotesi dell'equilibrio suggerisce che:", "options": {"A": "ogni rappresentazione sociale consiste nel fatto che è comunque elaborata da un gruppo per il quale l'oggetto di rappresentazione è socialmente rilevante", "B": "le rappresentazioni sociali rappresentano dei mezzi utili a risolvere tensioni psichiche o emotive scaturite da insuccessi o dalla mancata integrazione sociale", "C": "le rappresentazioni sociali sono filtri utilizzati dai gruppi nei confronti di informazioni provenienti dall'esterno, al fine di controllare la lealtà dei propri membri", "D": "una persona o un gruppo tendono a creare immagini nel tentativo di accordare obiettivi contrapposti tra due gruppi sociali o tra la persona e la società"}, "correct": "B", "a": "le rappresentazioni sociali rappresentano dei mezzi utili a risolvere tensioni psichiche o emotive scaturite da insuccessi o dalla mancata integrazione sociale", "expl": "le rappresentazioni sociali rappresentano dei mezzi utili a risolvere tensioni psichiche o emotive scaturite da insuccessi o dalla mancata integrazione sociale:\nQuesta ipotesi vede le rappresentazioni come compensazioni immaginarie\nIl loro scopo è quello di alleviare tensioni emotive e ricostruire un equilibrio interno compromesso da insuccessi o difficoltà di integrazione"}, "12.04": {"q": "Secondo l'ipotesi del controllo:", "options": {"A": "una persona o un gruppo tendono a creare immagini nel tentativo di accordare obiettivi contrapposti tra due gruppi sociali o tra la persona e la società", "B": "le rappresentazioni sociali rappresentano dei mezzi utili a risolvere tensioni psichiche o emotive scaturite da insuccessi o dalla mancata integrazione sociale", "C": "ogni rappresentazione sociale consiste nel fatto che è comunque elaborata da un gruppo per il quale l'oggetto di rappresentazione è socialmente rilevante", "D": "le rappresentazioni sociali sono filtri utilizzati dai gruppi nei confronti di informazioni provenienti dall'esterno, al fine di controllare la lealtà dei propri membri"}, "correct": "D", "a": "le rappresentazioni sociali sono filtri utilizzati dai gruppi nei confronti di informazioni provenienti dall'esterno, al fine di controllare la lealtà dei propri membri", "expl": "le rappresentazioni sociali sono filtri utilizzati dai gruppi nei confronti di informazioni provenienti dall'esterno, al fine di controllare la lealtà dei propri membri:\nIn questa visione, le rappresentazioni funzionano come filtri informativi\nI gruppi le usano per manipolare il pensiero e controllare che i membri rimangano leali ai valori del gruppo"}, "12.05": {"q": "Secondo Moscovici l'ancoraggio è un processo in cui:", "options": {"A": "la memoria tende a predominare sulla logica, sul passato e sul futuro", "B": "la memoria tende a predominare sulla logica, sul futuro e sul presente", "C": "la memoria tende a predominare sulla logica, sul passato e sul presente", "D": "la memoria tende a non predominare sulla logica, sul passato e sul presente"}, "correct": "C", "a": "la memoria tende a predominare sulla logica, sul passato e sul presente", "expl": "la memoria tende a predominare sulla logica, sul passato e sul presente:\nL'ancoraggio permette di comprendere il nuovo basandosi su ciò che è già noto\nMoscovici afferma che in questo processo la memoria ha la meglio sulla logica, legando l'oggetto sconosciuto a schemi del passato e del presente"}, "12.06": {"q": "Lo studio delle rappresentazioni sociali passa attraverso l'analisi di due processi:", "options": {"A": "l'ancoraggio e l'oggettivazione", "B": "l'ancoraggio e la classificazione", "C": "la classificzione e l'oggettivazione", "D": "la denominazione e el'etichettamento"}, "correct": "A", "a": "l'ancoraggio e l'oggettivazione", "expl": "l'ancoraggio e l'oggettivazione:\nI due processi fondamentali sono l'ancoraggio (classificazione in categorie note) e l'oggettivazione (trasformazione di un concetto astratto in un'immagine concreta)\nEntrambi servono a rendere familiare ciò che è nuovo o insolito"}, "12.07": {"q": "Per nucleo centrale si intende:", "options": {"A": "una componente negoziabile che determina la natura, il significato e l'organizzazione della rappresentazione sociale", "B": "una componente non negoziabile che determina la natura e l'organizzazione della rappresentazione sociale", "C": "una componente negoziabile che determina il significato e l'organizzazione della rappresentazione sociale", "D": "una componente non negoziabile che determina la natura, il significato e l'organizzazione della rappresentazione sociale"}, "correct": "D", "a": "una componente non negoziabile che determina la natura, il significato e l'organizzazione della rappresentazione sociale", "expl": "una componente non negoziabile che determina la natura, il significato e l'organizzazione della rappresentazione sociale:\nIl nucleo centrale è l'elemento fondamentale attorno a cui si sviluppa la rappresentazione sociale\nÈ considerato non negoziabile perché costituisce la base sociale su cui si fonda il consenso del gruppo e definisce l'identità stessa della rappresentazione"}, "12.08": {"q": "Il nucleo centrale delle rappresentazioni sociali svolge le seguenti funzioni:", "options": {"A": "funzione stabilizzatrice e funzione organizzatrice", "B": "funzione stabilizzatrice, funzione generatrice e funzione organizzatrice", "C": "funzione generatrice e funzione organizzatrice", "D": "funzione stabilizzatrice, funzione generatrice e funzione periferica"}, "correct": "B", "a": "funzione stabilizzatrice, funzione generatrice e funzione organizzatrice", "expl": "funzione stabilizzatrice, funzione generatrice e funzione organizzatrice:\nIl nucleo assolve a tre compiti precisi: stabilizza la rappresentazione garantendo coerenza; genera il significato degli elementi (anche di quelli periferici); e organizza il legame tra il centro e la periferia della struttura"}, "12.09": {"q": "Il metodo del rifiuto per indagare la struttura delle rappresentazioni sociali fu proposto da:", "options": {"A": "Abric e Tafani", "B": "Moliner", "C": "Flament", "D": "Moscovici"}, "correct": "C", "a": "Flament", "expl": "Flament:\nQuesto metodo fu introdotto da Flament nel 1982\nAttraverso uno studio sul \"gruppo ideale\", Flament chiese ai partecipanti di immaginare l'oggetto della rappresentazione privandolo di alcune caratteristiche per capire quali fossero essenziali (nucleari) e quali accessorie (periferiche)"}, "12.10": {"q": "Il metodo dello scenario ambiguo per indagare la struttura delle rappresentazioni sociali fu proposto da:", "options": {"A": "Abric e Tafani", "B": "Moliner", "C": "Flament", "D": "Moscovici"}, "correct": "A", "a": "Abric e Tafani", "expl": "Abric e Tafani:\nIl metodo dello scenario ambiguo è stato proposto da Abric e Tafani nel 1995\nSi basa su tre fasi (raccolta opinioni, descrizione vaga dell'oggetto e giudizio finale) per individuare gli elementi del nucleo centrale, come nel loro celebre studio sulle rappresentazioni dell'impresa"}, "13.01": {"q": "Un atteggiamento è definito come:", "options": {"A": "una disposizione individuale, positiva o negativa, verso qualcosa o qualcuno", "B": "una disposizione di gruppo, positiva o negativa, verso qualcosa o qualcuno", "C": "una disposizione individuale positiva verso qualcosa o qualcuno", "D": "una disposizione individuale negativa verso qualcosa o qualcuno"}, "correct": "A", "a": "una disposizione individuale, positiva o negativa, verso qualcosa o qualcuno", "expl": "una disposizione individuale, positiva o negativa, verso qualcosa o qualcuno:\nSecondo il senso comune, l'atteggiamento rappresenta una disposizione propria dell'individuo che può avere una valenza sia favorevole (positiva) che contraria (negativa) nei confronti di un oggetto, una persona o una situazione"}, "13.02": {"q": "Allport (1920) definisce gli atteggiamenti sociali come:", "options": {"A": "uno stato mentale o neurologico di prontezza, non organizzata per mezzo dell'esperienza, che esercita un'influenza di controllo o dinamica sulle risposte di una persona nei confronti di ogni oggetto o situazione con cui entra in rapporto", "B": "uno stato mentale che esercita un'influenza di controllo o dinamica sulle risposte di una persona nei confronti di ogni oggetto o situazione con cui entra in rapporto", "C": "uno stato mentale o neurologico di prontezza, organizzata per mezzo dell'esperienza, che esercita un'influenza di controllo o dinamica sulle risposte di una persona nei confronti di ogni oggetto o situazione con cui entra in rapporto", "D": "uno stato mentale o neurologico di prontezza, organizzata per mezzo dell'esperienza, che non esercita un'influenza di controllo o dinamica sulle risposte di una persona nei confronti di ogni oggetto o situazione con cui entra in rapporto"}, "correct": "C", "a": "uno stato mentale o neurologico di prontezza, organizzata per mezzo dell'esperienza, che esercita un'influenza di controllo o dinamica sulle risposte di una persona nei confronti di ogni oggetto o situazione con cui entra in rapporto", "expl": "uno stato mentale o neurologico di prontezza, organizzata per mezzo dell'esperienza, che esercita un'influenza di controllo o dinamica sulle risposte di una persona nei confronti di ogni oggetto o situazione con cui entra in rapporto:\nAllport introduce una visione innovativa definendo l'atteggiamento come uno stato di prontezza mentale e neurologico. Questo stato non è innato, ma viene organizzato attraverso l'esperienza e guida in modo attivo (dinamico) il modo in cui rispondiamo agli stimoli del mondo sociale"}, "13.03": {"q": "Per processi cognitivi caldi intendiamo:", "options": {"A": "i pensieri e gli umori", "B": "le emozioni e i pensieri", "C": "solo gli stati d'animo", "D": "le emozioni, gli stati d'animo e gli umori"}, "correct": "D", "a": "le emozioni, gli stati d'animo e gli umori", "expl": "le emozioni, gli stati d'animo e gli umori:\nNella formazione e nel mantenimento degli atteggiamenti, i \"processi caldi\" si riferiscono alla sfera affettiva, che comprende specificamente emozioni, stati d'animo e umori, distinguendosi dai processi puramente razionali o \"freddi\""}, "13.04": {"q": "Billig nel 1987 illustra come:", "options": {"A": "atteggiamenti e contesto non risultino strettamente legati tra loro", "B": "atteggiamenti e contesto risultino strettamente legati tra loro", "C": "atteggiamenti e contesto risultino in parte legati tra loro", "D": "atteggiamenti e contesto non abbiano punti di contatto"}, "correct": "B", "a": "atteggiamenti e contesto risultino strettamente legati tra loro", "expl": "atteggiamenti e contesto risultino strettamente legati tra loro:\nBillig sostiene che gli atteggiamenti non possono esistere nel vuoto; essi sono prese di posizione all'interno di discussioni pubbliche. Pertanto, senza un contesto argomentativo e sociale, l'atteggiamento stesso non avrebbe ragione di esistere"}, "13.05": {"q": "Gli atteggiamenti, secondo LaPiere, sono il risultato di:", "options": {"A": "disposizioni mentali decontestualizzate che non ignorano le specificità della vita quotidiana", "B": "disposizioni mentali contestualizzate che ignorano le specificità della vita quotidiana", "C": "disposizioni mentali decontestualizzate che ignorano le specificità della vita quotidiana", "D": "disposizioni mentali decontestualizzate che prendono in esame le specificità della vita quotidiana"}, "correct": "C", "a": "disposizioni mentali decontestualizzate che ignorano le specificità della vita quotidiana", "expl": "disposizioni mentali decontestualizzate che ignorano le specificità della vita quotidiana:\nLaPiere ha dimostrato che le persone spesso dichiarano atteggiamenti teorici (decontestualizzati) che non corrispondono al loro comportamento reale, poiché quest'ultimo dipende fortemente dalle circostanze specifiche della situazione"}, "13.06": {"q": "Wickler (1971) raccolse 31 ricerche dalle quali emerse:", "options": {"A": "una bassissima correlazione tra misure di atteggiamenti e misure di comportamenti", "B": "una altissima correlazione tra misure di atteggiamenti e misure di comportamenti", "C": "una bassissima correlazione tra misure di atteggiamenti e ambiente", "D": "una altissima correlazione tra misure di atteggiamenti e contesto di riferimento"}, "correct": "A", "a": "una bassissima correlazione tra misure di atteggiamenti e misure di comportamenti", "expl": "una bassissima correlazione tra misure di atteggiamenti e misure di comportamenti:\nDall'analisi di Wickler emerse che conoscere l'atteggiamento di una persona non permetteva quasi mai di prevederne con precisione il comportamento, evidenziando una forte discrepanza tra i due"}, "13.07": {"q": "Secondo la teoria della pianificazione del comportamento:", "options": {"A": "le persone tendono a formare i propri atteggiamenti attraverso un processo bifasico nel quale si combinano quattro fattori", "B": "le persone tendono a formare i propri atteggiamenti attraverso un processo monofasico nel quale si combinano tre fattori", "C": "le persone tendono a formare i propri atteggiamenti attraverso un processo bifasico nel quale si combinano due fattori", "D": "le persone tendono a formare i propri atteggiamenti attraverso un processo bifasico nel quale si combinano tre fattori"}, "correct": "D", "a": "le persone tendono a formare i propri atteggiamenti attraverso un processo bifasico nel quale si combinano tre fattori", "expl": "le persone tendono a formare i propri atteggiamenti attraverso un processo bifasico nel quale si combinano tre fattori:\nLa teoria di Ajzen prevede un processo in due fasi dove atteggiamenti, norme soggettive e percezione di controllo si combinano per influenzare le intenzioni, che a loro volta determinano l'azione"}, "13.08": {"q": "I modi d'interazione tra le persone e gli oggetti si suddividono in:", "options": {"A": "modi situati e modi non connotati culturalmente", "B": "modi situati e modi connotati culturalmente", "C": "modi non situati e modi connotati culturalmente", "D": "modi non situati e modi non connotati culturalmente"}, "correct": "B", "a": "modi situati e modi connotati culturalmente", "expl": "modi situati e modi connotati culturalmente:\nGli atteggiamenti dipendono da come interagiamo con l'oggetto in situazioni specifiche (modi situati) e dai significati che la nostra comunità di appartenenza attribuisce a quell'oggetto (modi connotati culturalmente)"}, "13.09": {"q": "Secondo Hannerz le culture dovrebbero essere considerate come:", "options": {"A": "strutture di significato che non viaggiano su reti di comunicazione sociale non interamente situate in alcun singolo territorio", "B": "strutture di significato che viaggiano su reti di comunicazione sociale", "C": "strutture di significato che viaggiano su reti di comunicazione sociale non interamente situate in alcun singolo territorio", "D": "strutture di significato che viaggiano su reti di comunicazione sociale interamente situate in alcun singolo territorio"}, "correct": "C", "a": "strutture di significato che viaggiano su reti di comunicazione sociale non interamente situate in alcun singolo territorio", "expl": "strutture di significato che viaggiano su reti di comunicazione sociale non interamente situate in alcun singolo territorio:\nHannerz propone una visione della cultura come un insieme di significati dinamici che circolano attraverso reti di relazioni sociali, superando i confini di un singolo territorio fisico"}, "13.10": {"q": "Nel 1997 Pontecorvo, Ochs e Fasullo hanno condotto un importante studio intitolato:", "options": {"A": "la Costruzione Sociale Del Gusto", "B": "la Costruzione Sociale Del Senso", "C": "la Costruzione Sociale Del Cibo", "D": "la Costruzione Sociale Della Tavola"}, "correct": "A", "a": "la Costruzione Sociale Del Gusto", "expl": "la Costruzione Sociale Del Gusto:\nLo studio ha analizzato le conversazioni durante i pasti in famiglie italiane e americane, dimostrando come il gusto non sia solo una preferenza individuale, ma venga costruito socialmente attraverso il discorso e l'interazione a tavola"}, "14.01": {"q": "Il pregiudizio secondo D'Atena (2005) consiste:", "options": {"A": "nella tendenza alla generalizzazione arbitraria e all'ipersemplificazione, basata spesso su conoscenze superficiali e poco articolate", "B": "nella generalizzazione arbitraria e all'ipersemplificazione, non basata su conoscenze superficiali e poco articolate", "C": "nella tendenza alla generalizzazione arbitraria e all'ipersemplificazione, basata su conoscenze approfondite e piuttosto articolate", "D": "solo nell'ipersemplificazione, basata spesso su conoscenze superficiali e poco articolate"}, "correct": "A", "a": "nella tendenza alla generalizzazione arbitraria e all'ipersemplificazione, basata spesso su conoscenze superficiali e poco articolate", "expl": "nella tendenza alla generalizzazione arbitraria e all'ipersemplificazione, basata spesso su conoscenze superficiali e poco articolate:\nSecondo D'Atena, il pregiudizio è un errore di valutazione che nasce dal semplificare eccessivamente la realtà e dal generalizzare in modo arbitrario partendo da informazioni scarse o superficiali"}, "14.02": {"q": "Pettigrew e Meertens (1995) distinsero i pregiudizi in:", "options": {"A": "manifesti o diretti, e inconsci o indiretti", "B": "manifesti o diretti, e sottili o subdoli", "C": "diretti e indiretti", "D": "sottili e subdoli"}, "correct": "B", "a": "manifesti o diretti, e sottili o subdoli", "expl": "manifesti o diretti, e sottili o subdoli:\nGli autori identificano due forme: quella manifesta (rifiuto esplicito e intenzionale) dell'altro gruppo e quella sottile (automatica e ambigua), che è più difficile da cogliere perché espressa in forme socialmente più accettabili"}, "14.03": {"q": "Il pregiudizio, come atteggiamento, è il risultato di:", "options": {"A": "due componenti", "B": "più componenti", "C": "tre componenti", "D": "una sola componente"}, "correct": "C", "a": "tre componenti", "expl": "tre componenti:\nIl pregiudizio è inteso come un atteggiamento complesso composto da tre elementi fondamentali: la componente affettiva, quella conoscitiva e la tendenza all'azione"}, "14.04": {"q": "La componente conoscitiva del pregiudizio nasce:", "options": {"A": "in assenza di contatti diretti con i soggetti sottoposti a giudizio ed è spesso formata da conoscenze congruenti tra loro", "B": "dal contatto diretto con i soggetti sottoposti a giudizio ed è spesso formata da conoscenze congruenti tra loro", "C": "dal contatto diretto con i soggetti sottoposti a giudizio ed è spesso formata da conoscenze incongruenti tra loro", "D": "in assenza di contatti diretti con i soggetti sottoposti a giudizio ed è spesso formata da conoscenze incongruenti tra loro"}, "correct": "D", "a": "in assenza di contatti diretti con i soggetti sottoposti a giudizio ed è spesso formata da conoscenze incongruenti tra loro", "expl": "in assenza di contatti diretti con i soggetti sottoposti a giudizio ed è spesso formata da conoscenze incongruenti tra loro:\nQuesta componente si sviluppa senza aver mai conosciuto direttamente le persone giudicate; è fatta di informazioni incoerenti (incongruenti) che riflettono la natura irrazionale del pregiudizio stesso"}, "14.05": {"q": "B. Mazzara (1996) spiega l'irrazionalità del pregiudizio attraverso:", "options": {"A": "la teoria della frustrazione-aggressività", "B": "le teorie psicodinamiche che si riferiscono all'istinto e ai meccanismi inconsci di difesa", "C": "la teoria del dogmatismo e della congruenza delle credenze", "D": "la teoria dell'identità sociale"}, "correct": "B", "a": "le teorie psicodinamiche che si riferiscono all'istinto e ai meccanismi inconsci di difesa", "expl": "le teorie psicodinamiche che si riferiscono all'istinto e ai meccanismi inconsci di difesa:\nMazzara utilizza l'approccio psicodinamico per spiegare come l'ostilità del pregiudizio derivi da conflitti interni inconsci che l'individuo sposta e canalizza verso l'esterno"}, "14.06": {"q": "Il primo autore a parlare di ingroup ed outgroup fu:", "options": {"A": "W.G. Sumner", "B": "S. Fiske", "C": "G. Allport", "D": "J. Bruner"}, "correct": "A", "a": "W.G. Sumner", "expl": "W.G. Sumner:\nche nel 1906 a introdusse questi termini, spiegando come l'appartenenza al proprio gruppo (ingroup) generi lealtà, mentre l'altro gruppo (outgroup) sia percepito con ostilità"}, "14.07": {"q": "La teoria dell'identità sociale sostiene:", "options": {"A": "che le persone tendono a mantenere un'identità sociale negativa, e perciò cercano di far parte di gruppi valutati positivamente in base al confronto sociale", "B": "che le persone tendono a mantenere un'identità sociale negativa, e perciò cercano di far parte di gruppi valutati negativamente in base al confronto sociale", "C": "che le persone tendono a mantenere un'identità sociale positiva, e perciò cercano di far parte di gruppi valutati positivamente in base al confronto sociale", "D": "che le persone tendono a mantenere un'identità sociale positiva, e perciò non cercano di far parte di gruppi valutati positivamente in base al confronto sociale"}, "correct": "C", "a": "che le persone tendono a mantenere un'identità sociale positiva, e perciò cercano di far parte di gruppi valutati positivamente in base al confronto sociale", "expl": "che le persone tendono a mantenere un'identità sociale positiva, e perciò cercano di far parte di gruppi valutati positivamente in base al confronto sociale:\nLa teoria di Tajfel e Turner afferma che cerchiamo di mantenere un'immagine di noi stessi positiva identificandoci con gruppi che consideriamo superiori o migliori degli altri attraverso il confronto sociale"}, "14.08": {"q": "In alcuni studi psicosociali di Villano (2016) uno stesso evento di cronaca (un automobilista ubriaco che investe un pedone) viene giudicato:", "options": {"A": "più grave se il nome del conducente è romeno, e non lo è meno se il nome del presunto automobilista è italiano", "B": "allo stesso modo a presecindere se il nome del conducente è romeno o italiano", "C": "meno grave se il nome del conducente è romeno, mentre lo è di più se il nome del presunto automobilista è italiano", "D": "più grave se il nome del conducente è romeno, mentre lo è meno se il nome del presunto automobilista è italiano"}, "correct": "D", "a": "più grave se il nome del conducente è romeno, mentre lo è meno se il nome del presunto automobilista è italiano", "expl": "più grave se il nome del conducente è romeno, mentre lo è meno se il nome del presunto automobilista è italiano:\nQuesto studio dimostra come il pregiudizio influenzi il giudizio morale: lo stesso reato è percepito come più grave se commesso da un membro di un gruppo discriminato (come i migranti) rispetto a un membro del proprio gruppo"}, "14.09": {"q": "Quel fenomeno per cui ci si presenta liberi da pregiudizi nello spazio pubblico è definito:", "options": {"A": "frontstage", "B": "backstage", "C": "performativity", "D": "razzismo fluido"}, "correct": "A", "a": "frontstage", "expl": "frontstage:\nIl termine frontstage (palcoscenico) indica la dimensione pubblica in cui le persone controllano il proprio comportamento per apparire non razziste, a differenza del backstage (dietro le quinte) dove emergono le idee reali"}, "14.10": {"q": "La performativity è:", "options": {"A": "la presentazione non intenzionale di un'immagine alterata di sé rispetto alle questioni etniche", "B": "la presentazione intenzionale di un'immagine alterata di sé rispetto alle questioni etniche", "C": "la presentazione intenzionale di un'immagine reale di sé rispetto alle questioni etniche", "D": "la presentazione intenzionale di un'immagine non alterata di sé rispetto alle questioni etniche"}, "correct": "B", "a": "la presentazione intenzionale di un'immagine alterata di sé rispetto alle questioni etniche", "expl": "la presentazione intenzionale di un'immagine alterata di sé rispetto alle questioni etniche:\nLa performativity è l'atto intenzionale di costruire un'immagine di sé \"di facciata\" e alterata, per mostrarsi privi di pregiudizi davanti agli altri e proteggere la propria reputazione sociale"}, "15.01": {"q": "Lippman (1922) definisce gli stereotipi come:", "options": {"A": "delle generalizzazioni, spesso improprie e insensate, utili a classificare vari gruppi sociali, dove si tende ad attribuire a chiunque faccia parte di quella specifica categoria, le stesse e identiche caratteristiche", "B": "delle generalizzazioni utili a classificare vari gruppi sociali, dove non si tende ad attribuire a chiunque faccia parte di quella specifica categoria, le stesse e identiche caratteristiche", "C": "delle generalizzazioni, assolutamente sensate, utili a classificare vari gruppi sociali, dove si tende ad attribuire a chiunque faccia parte di quella specifica categoria, le stesse e identiche caratteristiche", "D": "delle generalizzazioni, spesso improprie e insensate, non utili a classificare vari gruppi sociali, dove si tende ad attribuire a chiunque faccia parte di quella specifica categoria, le stesse e identiche caratteristiche"}, "correct": "A", "a": "delle generalizzazioni, spesso improprie e insensate, utili a classificare vari gruppi sociali, dove si tende ad attribuire a chiunque faccia parte di quella specifica categoria, le stesse e identiche caratteristiche", "expl": "delle generalizzazioni, spesso improprie e insensate, utili a classificare vari gruppi sociali, dove si tende ad attribuire a chiunque faccia parte di quella specifica categoria, le stesse e identiche caratteristiche:\nLippman vede lo stereotipo come una semplificazione della realtà necessaria perché il mondo è troppo complesso, ma che porta a ignorare le differenze individuali all'interno di un gruppo"}, "15.02": {"q": "Secondo G. Allport (1954) gli stereotipi sono frutto di due processi distinti:", "options": {"A": "categorizzazione e semplificazione", "B": "categorizzazione e generalizzazione", "C": "semplificazione e generalizzazione", "D": "schematizzazione e generalizzazione"}, "correct": "B", "a": "categorizzazione e generalizzazione", "expl": "categorizzazione e generalizzazione:\nAllport spiega che prima ordiniamo mentalmente le informazioni (categorizzazione) e poi estendiamo le caratteristiche di quella categoria a tutti i suoi membri (generalizzazione)"}, "15.03": {"q": "Secondo la teoria dell'identità sociale, lo stereotipo altro non sarebbe che:", "options": {"A": "la valutazione che gli individui hanno di sé stessi che non si basa sul loro gruppo di appartenenza", "B": "la valutazione che gli individui hanno degli altri sulla base del loro gruppo di appartenenza", "C": "la valutazione che gli individui hanno di sé stessi sulla base del loro gruppo di appartenenza", "D": "la valutazione che gli individui hanno degli altri sulla base di caratteristiche simili alle proprie"}, "correct": "C", "a": "la valutazione che gli individui hanno di sé stessi sulla base del loro gruppo di appartenenza", "expl": "la valutazione che gli individui hanno di sé stessi sulla base del loro gruppo di appartenenza:\nIn questa teoria, lo stereotipo serve a definire chi siamo noi in relazione al gruppo a cui sentiamo di appartenere"}, "15.04": {"q": "Lo stereotipo, inteso come tendenza ad attribuire ad un individuo caratteristiche tipiche di un gruppo attraverso un processo di schematizzazione (D'Atena, 2005), è un processo automatico che implica:", "options": {"A": "la classificazione e la discriminazione", "B": "la discriminazione e l'attribuzione", "C": "la classificazione e l'attribuzione", "D": "la classificazione, la discriminazione e l'attribuzione"}, "correct": "D", "a": "la classificazione, la discriminazione e l'attribuzione", "expl": "la classificazione, la discriminazione e l'attribuzione:\nIl processo è tripartito: si organizzano le persone (classificazione), si creano contrapposizioni (discriminazione) e si assegnano tratti fissi (attribuzione)"}, "15.05": {"q": "Gli stereotipi assolvono a differenti funzioni (Schimmenti, D'Atena, 2008):", "options": {"A": "la funzione di economia del pensiero e la funzione di identità sociale", "B": "la funzione di economia del pensiero, la funzione psicodinamica e la funzione di identità sociale", "C": "la funzione psicodinamica e la funzione di identità sociale", "D": "la funzione di economia del pensiero e la funzione psicodinamica"}, "correct": "B", "a": "la funzione di economia del pensiero, la funzione psicodinamica e la funzione di identità sociale", "expl": "la funzione di economia del pensiero, la funzione psicodinamica e la funzione di identità sociale:\nGli stereotipi servono a risparmiare fatica mentale, a proteggere l'ego proiettando sugli altri ciò che non accettiamo di noi e a rafforzare il senso di appartenenza al proprio gruppo"}, "15.06": {"q": "Gli stereotipi possono essere indeboliti e modificati con:", "options": {"A": "l'accumularsi di informazioni discordanti, che potrebbero influenzare questo graduale processo di cambiamento", "B": "l'accumularsi di informazioni concordanti, che potrebbero influenzare questo graduale processo di cambiamento", "C": "l'accumularsi di informazioni discordanti, che potrebbero influenzare questo repentino processo di cambiamento", "D": "l'accumularsi di informazioni non discordanti, che potrebbero influenzare questo graduale processo di cambiamento"}, "correct": "A", "a": "l'accumularsi di informazioni discordanti, che potrebbero influenzare questo graduale processo di cambiamento", "expl": "l'accumularsi di informazioni discordanti, che potrebbero influenzare questo graduale processo di cambiamento:\nIl cambiamento non è mai immediato, ma avviene lentamente quando riceviamo molte prove che smentiscono ciò che pensavamo"}, "15.07": {"q": "Gli stereotipi risultano essere:", "options": {"A": "poco resistenti, sono schemi facilmente modificabili", "B": "non molto resistenti e questo accade se di fronte si hanno informazioni che potrebbero totalmente disconfermarli", "C": "molto resistenti, sono schemi difficilmente modificabili e questo non accade anche se di fronte si hanno informazioni che potrebbero totalmente disconfermarli", "D": "molto resistenti, sono schemi difficilmente modificabili e questo accade anche se di fronte si hanno informazioni che potrebbero totalmente disconfermarli"}, "correct": "D", "a": "molto resistenti, sono schemi difficilmente modificabili e questo accade anche se di fronte si hanno informazioni che potrebbero totalmente disconfermarli", "expl": "molto resistenti, sono schemi difficilmente modificabili e questo accade anche se di fronte si hanno informazioni che potrebbero totalmente disconfermarli:\nTendiamo a ignorare o dimenticare le informazioni contrarie per mantenere coerente la nostra visione del mondo; lo stereotipo resiste anche davanti alla realtà contraria"}, "15.08": {"q": "Il mantenimento dello stereotipo nel corso del tempo e la sua rigidità derivano anche dall'effetto che viene definito come:", "options": {"A": "effetto Pigmalione", "B": "effetto di priming", "C": "profezia che si auto-avvera", "D": "effetto recency"}, "correct": "C", "a": "profezia che si auto-avvera", "expl": "profezia che si auto-avvera:\nLe nostre aspettative (stereotipi) ci portano a comportarci in un modo che spinge gli altri a reagire proprio come ci aspettiamo, confermando così lo stereotipo iniziale"}, "15.09": {"q": "Il modello del continuum (Fiske, Lin & Neuberg, 1999), sulla formazione delle impressioni, descrive i processi che portano:", "options": {"A": "alla definizione dello stereotipo", "B": "dallo stereotipo all'individuazione", "C": "dallo stereotipo al pregiudizio", "D": "dall'individuazione allo stereotipo"}, "correct": "B", "a": "dallo stereotipo all'individuazione", "expl": "dallo stereotipo all'individuazione:\nmodello spiega come passiamo da una conoscenza superficiale basata su categorie preconfezionate (stereotipo) a una conoscenza profonda della persona come individuo unico (individuazione)"}, "15.10": {"q": "Gli psicologi sociali sostengono che quando gli altri diventano rilevanti per noi, tendiamo:", "options": {"A": "a non categorizzarli unicamente, ma siamo più motivati e riflessivi nel costruire le nostre impressioni nei loro confronti", "B": "a categorizzarli unicamente, e non siamo motivati e riflessivi nel costruire le nostre impressioni nei loro confronti", "C": "a non categorizzarli unicamente, ma non siamo più motivati e riflessivi nel costruire le nostre impressioni nei loro confronti", "D": "a categorizzarli attraverso le nostre impressioni nei loro confronti"}, "correct": "A", "a": "a non categorizzarli unicamente, ma siamo più motivati e riflessivi nel costruire le nostre impressioni nei loro confronti", "expl": "a non categorizzarli unicamente, ma siamo più motivati e riflessivi nel costruire le nostre impressioni nei loro confronti:\nSe una persona è importante per noi, non ci accontentiamo delle etichette sociali, ma investiamo energia mentale per analizzare ogni suo singolo attributo e valutarne la reale personalità"}, "16.01": {"q": "L’influenza sociale può essere definita come:", "options": {"A": "il cambiamento che si verifica solo nei pensieri e giudizi in presenza di altre persone", "B": "il cambiamento che si verifica solo nei comportamenti in presenza di altre persone", "C": "il cambiamento che si verifica nei pensieri, giudizi e comportamenti in assenza di altre persone", "D": "il cambiamento che si verifica nei pensieri, giudizi e comportamenti in presenza di altre persone"}, "correct": "D", "a": "il cambiamento che si verifica nei pensieri, giudizi e comportamenti in presenza di altre persone", "expl": "il cambiamento che si verifica nei pensieri, giudizi e comportamenti in presenza di altre persone:\nL'influenza sociale è un termine generale che descrive come la presenza (reale o immaginata) di altri modifichi non solo ciò che facciamo, ma anche come pensiamo e valutiamo la realtà. Rappresenta l'effetto che un singolo o un gruppo esercita sugli atteggiamenti e i comportamenti dell'individuo"}, "16.02": {"q": "Il conformismo descrive un cambiamento:", "options": {"A": "di atteggiamento di comportamento in risposta a un ordine diretto o esplicito", "B": "di atteggiamento o di comportamento in reazione ad una norma sociale implicita, anziché esplicita", "C": "di atteggiamento o di comportamento in reazione ad una norma sociale esplicita, anziché implicita", "D": "di atteggiamento di comportamento in risposta a un ordine indiretto o implicito"}, "correct": "B", "a": "di atteggiamento o di comportamento in reazione ad una norma sociale implicita, anziché esplicita", "expl": "di atteggiamento o di comportamento in reazione ad una norma sociale implicita, anziché esplicita:\nIl conformismo si verifica quando ci adeguiamo a pressioni di gruppo \"invisibili\" o non scritte. Non c'è nessuno che ci ordina cosa fare, ma modifichiamo il nostro modo di essere per allinearci alle norme sottintese del contesto sociale"}, "16.03": {"q": "L'obbedienza consiste in un cambiamento:", "options": {"A": "di atteggiamento di comportamento in risposta a un ordine indiretto o implicito", "B": "di atteggiamento o di comportamento in reazione ad una norma sociale esplicita, anziché implicita", "C": "di atteggiamento di comportamento in risposta a un ordine diretto o esplicito", "D": "di atteggiamento o di comportamento in reazione ad una norma sociale implicita, anziché esplicita"}, "correct": "C", "a": "di atteggiamento di comportamento in risposta a un ordine diretto o esplicito", "expl": "di atteggiamento di comportamento in risposta a un ordine diretto o esplicito:\nA differenza del conformismo, l'obbedienza scatta quando riceviamo un comando specifico da una figura di autorità. Il cambiamento avviene perché stiamo seguendo una direttiva precisa e palese."}, "16.04": {"q": "Nella prima fase dell'esperimento di Sherif:", "options": {"A": "alla persona seduta a quattro metri e mezzo dal punto luminoso, viene chiesto di quanti centimetri si sposti il puntino", "B": "alla persona posta a quattro metri e mezzo dal punto luminoso insieme ad altre due persone, viene chiesto loro di quanti centimetri si sposta il puntino", "C": "la persona viene chiamata al giudizio sullo spostamento del puntino isolatamente dagli altri", "D": "dopo un certo numero di prove i giudizi espressi dai tre soggetti sperimentali si uniformano ed emerge una norma di gruppo"}, "correct": "A", "a": "alla persona seduta a quattro metri e mezzo dal punto luminoso, viene chiesto di quanti centimetri si sposti il puntino", "expl": "alla persona seduta a quattro metri e mezzo dal punto luminoso, viene chiesto di quanti centimetri si sposti il puntino:\nIn questa fase iniziale, Sherif voleva stabilire una linea di base individuale. Ogni partecipante, da solo, sviluppava la propria stima personale dello spostamento del punto luminoso (effetto autocinetico), che tendeva a diventare stabile dopo diverse prove"}, "16.05": {"q": "Nella seconda fase dell'esperimento di Sherif:", "options": {"A": "il movimento espresso in centimetri varia da persona a persona, ma si stabilizza con l'aumentare delle prove", "B": "alla persona posta a quattro metri e mezzo dal punto luminoso insieme ad altre due persone, viene chiesto loro di quanti centimetri si sposta il puntino", "C": "alla persona seduta a quattro metri e mezzo dal punto luminoso, viene chiesto di quanti centimetri si sposti il puntino", "D": "la persona viene chiamata al giudizio sullo spostamento del puntino isolatamente dagli altri"}, "correct": "B", "a": "alla persona posta a quattro metri e mezzo dal punto luminoso insieme ad altre due persone, viene chiesto loro di quanti centimetri si sposta il puntino", "expl": "alla persona posta a quattro metri e mezzo dal punto luminoso insieme ad altre due persone, viene chiesto loro di quanti centimetri si sposta il puntino:\nQui entra in gioco la dimensione sociale: i partecipanti non sono più soli ma in gruppi di tre. Il risultato fondamentale fu che i loro giudizi individuali iniziarono a convergere verso una media comune, creando una vera \"norma di gruppo\""}, "16.06": {"q": "Nella terza fase dell'esperimento di Sherif:", "options": {"A": "alla persona posta a quattro metri e mezzo dal punto luminoso insieme ad altre due persone, viene chiesto loro di quanti centimetri si sposta il puntino", "B": "alla persona seduta a quattro metri e mezzo dal punto luminoso, viene chiesto di quanti centimetri si sposti il puntino", "C": "il movimento espresso in centimetri varia da persona a persona, ma si stabilizza con l'aumentare delle prove", "D": "la persona viene chiamata al giudizio sullo spostamento del puntino isolatamente dagli altri"}, "correct": "D", "a": "la persona viene chiamata al giudizio sullo spostamento del puntino isolatamente dagli altri", "expl": "la persona viene chiamata al giudizio sullo spostamento del puntino isolatamente dagli altri:\nSherif riportò i soggetti a una condizione di isolamento per vedere se la norma di gruppo persistesse. Scoprì che le persone continuavano a dare la risposta concordata in gruppo, dimostrando di aver interiorizzato quell'influenza sociale come propria"}, "16.07": {"q": "I risultati dell'esperimento di Asch non confermarono le sue aspettative:", "options": {"A": "il 56% dei partecipanti si conformò almeno una volta alla maggioranza, dando come loro una risposta errata nonostante le proprie perplessità", "B": "il 36% dei partecipanti si conformò almeno una volta alla maggioranza, dando come loro una risposta errata nonostante le proprie perplessità", "C": "il 76% dei partecipanti si conformò almeno una volta alla maggioranza, dando come loro una risposta errata nonostante le proprie perplessità", "D": "il 66% dei partecipanti si conformò almeno una volta alla maggioranza, dando come loro una risposta errata nonostante le proprie perplessità"}, "correct": "C", "a": "il 76% dei partecipanti si conformò almeno una volta alla maggioranza, dando come loro una risposta errata nonostante le proprie perplessità", "expl": "il 76% dei partecipanti si conformò almeno una volta alla maggioranza, dando come loro una risposta errata nonostante le proprie perplessità:\nAsch si aspettava che, di fronte a un compito visivo ovvio e non ambiguo, le persone restassero indipendenti. Invece, la pressione del gruppo fu così forte che circa tre quarti dei partecipanti cedette almeno una volta, preferendo dare una risposta palesemente errata pur di non dissentire dalla maggioranza"}, "16.08": {"q": "La psicologia odierna concorda sull'esistenza di fattori che più di altri determinano la tendenza all'uniformità e più precisamente:", "options": {"A": "le norme sociali, i modelli, il confronto sociale e l'autoconsapevolezza", "B": "i modelli, il confronto sociale e l'autoconsapevolezza", "C": "le norme sociali, il confronto sociale e l'autoconsapevolezza", "D": "le norme sociali, i modelli e il confronto sociale"}, "correct": "A", "a": "le norme sociali, i modelli, il confronto sociale e l'autoconsapevolezza", "expl": "le norme sociali, i modelli, il confronto sociale e l'autoconsapevolezza:\nLa tendenza all'uniformità non è un semplice istinto, ma è guidata da quattro fattori chiave: le norme sociali (regole informali apprese), i modelli (imitazione di comportamenti efficaci), il confronto sociale (usare gli altri per validare le proprie opinioni) e l'autoconsapevolezza (che ci rende sensibili a come gli altri ci percepiscono)"}, "16.09": {"q": "Deutsch e Gerard idearono la teoria della dipendenza, secondo la quale:", "options": {"A": "i membri di un gruppo sono cognitivamente dipendenti tra loro e dalle norme che il gruppo difende", "B": "i membri di un gruppo sono cognitivamente e socialmente dipendenti tra loro e dalle norme che il gruppo difende", "C": "i membri di un gruppo sono socialmente dipendenti tra loro e dalle norme che il gruppo difende", "D": "i membri di un gruppo sono cognitivamente e socialmente dipendenti tra loro"}, "correct": "B", "a": "i membri di un gruppo sono cognitivamente e socialmente dipendenti tra loro e dalle norme che il gruppo difende", "expl": "i membri di un gruppo sono cognitivamente e socialmente dipendenti tra loro e dalle norme che il gruppo difende:\nQuesta teoria sottolinea che l'individuo nel gruppo non agisce mai in modo totalmente isolato. La dipendenza è doppia: cognitiva, perché usiamo gli altri per capire la realtà, e sociale, perché cerchiamo l'approvazione del gruppo seguendo i suoi standard e le sue norme"}, "16.10": {"q": "L'influenza normativa:", "options": {"A": "dà luogo a cambiamenti duraturi nelle convinzioni della persona", "B": "utilizza il pensiero e il comportamento degli altri per trarre informazioni sulla realtà", "C": "produce spesso cambiamenti finalizzati ad evitare il conflitto e produce un'acquiescenza conformistica", "D": "non produce cambiamenti finalizzati ad evitare il conflitto"}, "correct": "C", "a": "produce spesso cambiamenti finalizzati ad evitare il conflitto e produce un'acquiescenza conformistica", "expl": "produce spesso cambiamenti finalizzati ad evitare il conflitto e produce un'acquiescenza conformistica:\nL'influenza normativa scatta quando vogliamo ottenere conseguenze positive o evitare il rifiuto del gruppo. Questo porta all'acquiescenza, ovvero ci si adegua pubblicamente alla maggioranza per \"quieto vivere\", anche se privatamente si continua a pensare in modo diverso (a differenza dell'influenza informativa che cambia le convinzioni nel profondo)"}, "17.01": {"q": "Secondo il concetto di norme sociali:", "options": {"A": "le relazioni sociali tra le persone sono agevolate da norme o regole informali apprese sin dall'infanzia, tanto da sembrarci naturali", "B": "le persone prendono a modello o imitano il comportamento altrui", "C": "le relazioni sociali tra le persone non sono agevolate da norme o regole informali apprese sin dall'infanzia, tanto da sembrarci naturali", "D": "le persone aderiscono al giudizio degli altri, ritenendo che questi posseggano un maggior numero di informazioni"}, "correct": "A", "a": "le relazioni sociali tra le persone sono agevolate da norme o regole informali apprese sin dall'infanzia, tanto da sembrarci naturali", "expl": "le relazioni sociali tra le persone sono agevolate da norme o regole informali apprese sin dall'infanzia, tanto da sembrarci naturali.\n\nSpiegazione: La dispensa definisce le norme sociali come regole informali apprese sin dall'infanzia che agevolano le relazioni e appaiono naturali."}, "17.02": {"q": "Quando si parla di conformismo:", "options": {"A": "non ci si riferisce a quella sorta di uguaglianza realizzata quando la persona cede alle pressioni sociali che la obbligano ad essere simile alle altre persone", "B": "ci si riferisce a quella sorta di uguaglianza realizzata quando la persona cede alle pressioni sociali che la obbligano ad essere simile alle altre persone", "C": "ci si riferisce a quella sorta di uguaglianza realizzata quando la persona non cede alle pressioni sociali che la obbligano ad essere simile alle altre persone", "D": "ci si riferisce a quelle persone che non cedono alle pressioni sociali che le obbligano ad essere simili alle altre persone"}, "correct": "B", "a": "ci si riferisce a quella sorta di uguaglianza realizzata quando la persona cede alle pressioni sociali che la obbligano ad essere simile alle altre persone", "expl": "ci si riferisce a quella sorta di uguaglianza realizzata quando la persona cede alle pressioni sociali che la obbligano ad essere simile alle altre persone.\n\nSpiegazione: Il conformismo è definito come l'uguaglianza che si realizza quando si cede alle pressioni sociali per essere simili agli altri."}, "17.03": {"q": "I motivi per cui una persona aderisce all'opinione della maggioranza sono:", "options": {"A": "infuenza dell'informazione e confronto sociale", "B": "norme sociali e pressioni normative", "C": "pressioni normative e obbedienza all'autorità", "D": "infuenza dell'informazione e pressioni normative"}, "correct": "D", "a": "infuenza dell'informazione e pressioni normative", "expl": "infuenza dell'informazione e pressioni normative.\n\nSpiegazione: La dispensa indica che i due motivi sono l'influenza dell'informazione e le pressioni normative"}, "17.04": {"q": "Per pressioni normative intendiamo:", "options": {"A": "l'adesione al giudizio degli altri, ritenendo che questi posseggano un maggior numero di informazioni", "B": "il bisogno di ognuno di non piacere e di non essere accettato dalle altre persone che ci circondano", "C": "il bisogno di ognuno di piacere e di essere accettato dalle altre persone che ci circondano", "D": "la mancata adesione al giudizio degli altri, ritenendo che questi non posseggano un maggior numero di informazioni"}, "correct": "C", "a": "il bisogno di ognuno di piacere e di essere accettato dalle altre persone che ci circondano", "expl": "il bisogno di ognuno di piacere e di essere accettato dalle altre persone che ci circondano.\n\nSpiegazione: Le pressioni normative sono definite come il bisogno di piacere e di essere accettati dagli altri."}, "17.05": {"q": "L'esperimento di Milgram è noto anche come:", "options": {"A": "l'esperimento Eichmann", "B": "l'esperimento dell'Interaction Laboratory", "C": "l'esperimento Perry", "D": "l'esperimento Yale"}, "correct": "A", "a": "l'esperimento Eichmann", "expl": "l'esperimento Eichmann.\n\nSpiegazione: La dispensa afferma che l'esperimento di Milgram è noto anche come \"l'esperimento Eichmann\"."}, "17.06": {"q": "L'esperimento di Milgram dimostra come:", "options": {"A": "l'obbedienza è il risultato di un processo che si verifica quando una persona non entra a far parte di un sistema gerarchico ma si trova in uno stato di eteronomia", "B": "l'obbedienza è il risultato di un processo che si verifica quando una persona entra a far parte di un sistema gerarchico e si trova in uno stato di autonomia", "C": "l'obbedienza non è il risultato di un processo che si verifica quando una persona entra a far parte di un sistema gerarchico e si trova in uno stato di eteronomia", "D": "l'obbedienza è il risultato di un processo che si verifica quando una persona entra a far parte di un sistema gerarchico e si trova in uno stato di eteronomia"}, "correct": "D", "a": "l'obbedienza è il risultato di un processo che si verifica quando una persona entra a far parte di un sistema gerarchico e si trova in uno stato di eteronomia", "expl": "l'obbedienza è il risultato di un processo che si verifica quando una persona entra a far parte di un sistema gerarchico e si trova in uno stato di eteronomia.\n\nSpiegazione: Milgram conclude che l'obbedienza si verifica quando si entra in un sistema gerarchico, portando a uno stato di eteronomia."}, "17.07": {"q": "I soggetti dell'esperimento di Milgram mostrarono una totale obbedienza nel:", "options": {"A": "55% dei casi", "B": "65% dei casi", "C": "35% dei casi", "D": "85% dei casi"}, "correct": "B", "a": "65% dei casi", "expl": "65% dei casi.\n\nSpiegazione: La dispensa riporta che il 65% dei soggetti (26 su 40) mostrò obbedienza totale."}, "17.08": {"q": "Nell'esperimento di Milgram, alla creazione dello stato eteronomico concorrono i seguenti fattori:", "options": {"A": "percezione di legittimità dell'autorità, adesione al sistema di autorità e le pressioni sociali", "B": "percezione di legittimità dell'autorità e le pressioni sociali", "C": "adesione al sistema di autorità e le pressioni sociali", "D": "percezione di legittimità dell'autorità, adesione al sistema di autorità ma non le pressioni sociali"}, "correct": "A", "a": "percezione di legittimità dell'autorità, adesione al sistema di autorità e le pressioni sociali", "expl": "percezione di legittimità dell'autorità, adesione al sistema di autorità e le pressioni sociali.\n\nSpiegazione: La dispensa elenca questi tre fattori come concorrenti alla creazione dello stato eteronomico."}, "17.09": {"q": "I vari esperimenti riprodotti da Milgram sul tema dell'autorità e obbedienza, rilevano l'esistenza dei seguenti fattori situazionali che possono accentuare o ridurre la percentuale di obbedienza:", "options": {"A": "il prestigio, la prossimità della vittima, la prossimità dello sperimentatore e il sostegno sociale", "B": "la prossimità della vittima, la prossimità dello sperimentatore, libertà di scelta e il sostegno sociale", "C": "il prestigio, la prossimità della vittima, la prossimità dello sperimentatore, libertà di scelta e il sostegno sociale", "D": "il prestigio, la prossimità dello sperimentatore, libertà di scelta e il sostegno sociale"}, "correct": "C", "a": "il prestigio, la prossimità della vittima, la prossimità dello sperimentatore, libertà di scelta e il sostegno sociale", "expl": "il prestigio, la prossimità della vittima, la prossimità dello sperimentatore, libertà di scelta e il sostegno sociale.\n\nSpiegazione: La dispensa enumera tutti questi cinque fattori come influenti sul grado di obbedienza."}, "17.10": {"q": "Francois Rochat (2014), psicologo dell'Università di Fribourg, sostiene che, pur con difetti ed errori, l'effetto Milgram:", "options": {"A": "non spiega quel che avvenne col Nazismo", "B": "spiega quel che avvenne col Fascismo", "C": "spiega solo parzialmente quel che avvenne col Nazismo", "D": "spiega quel che avvenne col Nazismo"}, "correct": "D", "a": "spiega quel che avvenne col Nazismo", "expl": "spiega quel che avvenne col Nazismo.\n\nSpiegazione: La dispensa cita Rochat sostenendo che l'effetto Milgram spiega quanto avvenne con il Nazismo."}, "18.02": {"q": "I concetti fondamentali della definizione di gruppo secondo Lewin sono:", "options": {"A": "l'interdipendenza e la totalità dinamica", "B": "l'interdipendenza e l'ambiente sociale", "C": "la totalità dinamica e il campo psicologico", "D": "il campo psicologico e il suo ambiente"}, "correct": "A", "a": "l'interdipendenza e la totalità dinamica", "expl": "l'interdipendenza e la totalità dinamica:\nLewin definisce il gruppo a partire da due pilastri. Il primo è l'interdipendenza, ovvero il fatto che ogni membro influenza gli altri e ne viene influenzato, creando una rete di azioni e reazioni. Il secondo è la totalità dinamica, che indica come il gruppo non sia statico ma in continua trasformazione, a causa dei mutamenti nei soggetti e nelle loro relazioni."}, "18.01": {"q": "Lewin studiando i gruppi, introduce il termine \"dinamiche di gruppo\" intendendo con esse che:", "options": {"A": "come la persona e il suo ambiente formano un campo psicologico, diversamente il gruppo e il suo ambiente non formano un campo sociale", "B": "come la persona e il suo ambiente formano un campo psicologico, così il gruppo e il suo ambiente formano un campo sociale", "C": "come la persona e il suo ambiente formano un campo sociale, così il gruppo e il suo ambiente formano un campo psicologico", "D": "come la persona e il suo gruppo formano un campo psicologico, così la persona e il suo ambiente formano un campo sociale"}, "correct": "B", "a": "come la persona e il suo ambiente formano un campo psicologico, così il gruppo e il suo ambiente formano un campo sociale", "expl": "come la persona e il suo ambiente formano un campo psicologico, così il gruppo e il suo ambiente formano un campo sociale:\nLewin estende la sua Teoria del Campo al contesto sociale, affermando che, esattamente come la persona e il suo ambiente costituiscono un campo psicologico, allo stesso modo il gruppo e il suo ambiente formano un campo sociale. Da qui deriva l'idea che le dinamiche di gruppo siano l'equivalente sociale delle dinamiche individuali, e che per comprenderle occorra analizzare l'interdipendenza tra il gruppo e il suo contesto."}, "18.03": {"q": "Per gruppi estesi si intendono:", "options": {"A": "quei gruppi in cui ogni singolo membro conosce personalmente gli altri e interagisce frequentemente con loro come la famiglia, una classe scolastica, un gruppo di amici", "B": "famiglia, una classe scolastica o un gruppo di amici", "C": "tutte le collettività organizzate, le organizzazioni sociali come partiti politici, sette religiose, imprese, sindacati e gruppi nei quali si ha una strutturazione orizzontale e verticale", "D": "tutte le collettività organizzate, le organizzazioni sociali come partiti politici, sette religiose, imprese, sindacati e gruppi nei quali non si ha una strutturazione orizzontale e verticale"}, "correct": "C", "a": "tutte le collettività organizzate, le organizzazioni sociali come partiti politici, sette religiose, imprese, sindacati e gruppi nei quali si ha una strutturazione orizzontale e verticale", "expl": "tutte le collettività organizzate, le organizzazioni sociali come partiti politici, sette religiose, imprese, sindacati e gruppi nei quali si ha una strutturazione orizzontale e verticale:\nI gruppi estesi sono le grandi organizzazioni sociali, caratterizzate da una struttura interna che prevede sia una dimensione orizzontale (tra pari) che verticale (gerarchica). Rientrano in questa categoria partiti, sindacati, imprese e sette religiose, cioè tutte quelle realtà in cui i membri non si conoscono tutti personalmente e le relazioni sono regolate da ruoli e funzioni."}, "18.04": {"q": "I gruppi primari sono:", "options": {"A": "costituiti da membri tenuti insieme da uno scopo o da un fine, per tale ragione ogni membro viene valorizzato per il suo contributo al gruppo", "B": "categorie sociali, folle o aggregati di persone", "C": "costituiti da un insieme di persone che interagiscono direttamente tra loro, legandosi tramite vincoli di natura non emotiva", "D": "costituiti da un insieme di persone che interagiscono direttamente tra loro, legandosi tramite vincoli di natura emotiva"}, "correct": "D", "a": "costituiti da un insieme di persone che interagiscono direttamente tra loro, legandosi tramite vincoli di natura emotiva", "expl": "costituiti da un insieme di persone che interagiscono direttamente tra loro, legandosi tramite vincoli di natura emotiva:\nI gruppi primari, come la famiglia o un gruppo di amici, si fondano su relazioni faccia a faccia e su legami affettivi profondi. All'interno di essi vige un forte senso di appartenenza e un clima di sostegno reciproco, in cui la persona viene accettata per ciò che è, al di là delle sue competenze, e i bisogni individuali trovano soddisfazione."}, "18.05": {"q": "Secondo D. Levine e Moreland (1990) i principali ruoli all'interno del gruppo sono:", "options": {"A": "nuovo arrivato, capro espiatorio e leader", "B": "nuovo arrivato e leader", "C": "capro espiatorio e leader", "D": "nuovo arrivato, coordinatore e leader"}, "correct": "A", "a": "nuovo arrivato, capro espiatorio e leader", "expl": "nuovo arrivato, capro espiatorio e leader:\nLevine e Moreland individuano tre figure centrali nella dinamica di gruppo. Il nuovo arrivato è colui da cui ci si aspetta ansia e conformismo; il capro espiatorio è il bersaglio su cui il gruppo proietta le proprie ombre; il leader è la persona che detiene il maggior potere di influenza e assume le iniziative."}, "18.06": {"q": "Il capro espiatorio:", "options": {"A": "rappresenta per il gruppo una figura marginale, in quanto consente ai membri di svincolarsi da aspetti negativi legati all'immagine di sé", "B": "rappresenta per il gruppo una figura sia essenziale che funzionale, in quanto consente ai membri di svincolarsi da aspetti negativi legati all'immagine di sé", "C": "rappresenta per il gruppo una figura essenziale ma non funzionale, in quanto consente ai membri di svincolarsi da aspetti negativi legati all'immagine di sé", "D": "rappresenta per il gruppo una figura esclusivamente funzionale, in quanto consente ai membri di svincolarsi da aspetti negativi legati all'immagine di sé"}, "correct": "B", "a": "rappresenta per il gruppo una figura sia essenziale che funzionale, in quanto consente ai membri di svincolarsi da aspetti negativi legati all'immagine di sé", "expl": "rappresenta per il gruppo una figura sia essenziale che funzionale, in quanto consente ai membri di svincolarsi da aspetti negativi legati all'immagine di sé:\nIl capro espiatorio svolge un ruolo prezioso per il gruppo: permette agli altri membri di scaricare su di lui le parti negative della propria immagine, alleggerendo il senso di colpa o di inadeguatezza. Per questo è considerato una figura indispensabile, poiché la sua presenza aiuta a mantenere l'equilibrio emotivo del gruppo e a preservare l'autostima collettiva."}, "18.07": {"q": "L'effetto Ringelmann:", "options": {"A": "è un fenomeno che si verifica quando la persona, facendo affidamento sul proprio impegno, aumenta lo sforzo circa la sua singola prestazione", "B": "è un fenomeno che si verifica quando la persona, facendo affidamento sull'impegno degli altri membri, aumenta il proprio sforzo circa la sua singola prestazione", "C": "è un fenomeno che si verifica quando la persona, non facendo affidamento sull'impegno degli altri membri, non riduce il proprio sforzo circa la sua singola prestazione", "D": "è un fenomeno che si verifica quando la persona, facendo affidamento sull'impegno degli altri membri, riduce il proprio sforzo circa la sua singola prestazione"}, "correct": "D", "a": "è un fenomeno che si verifica quando la persona, facendo affidamento sull'impegno degli altri membri, riduce il proprio sforzo circa la sua singola prestazione", "expl": "è un fenomeno che si verifica quando la persona, facendo affidamento sull'impegno degli altri membri, riduce il proprio sforzo circa la sua singola prestazione:\nNoto anche come \"pigrizia sociale\", l'effetto Ringelmann descrive la tendenza a impegnarsi meno in un compito collettivo, confidando nel lavoro degli altri. Gli esperimenti classici – come quelli sul tiro della corda – hanno dimostrato che lo sforzo individuale diminuisce all'aumentare del numero dei partecipanti, perché ciascuno si sente meno responsabile del risultato finale."}, "18.08": {"q": "In merito alla presa di decisione del gruppo, D.R. Forsyth (1990) individua una serie di fasi nel processo di elaborazione e attuazione di una decisione che sono:", "options": {"A": "2", "B": "3", "C": "4", "D": "6"}, "correct": "C", "a": "4", "expl": "4:\nForsyth descrive un processo decisionale articolato in quattro momenti sequenziali: Orientamento, in cui il gruppo definisce il problema e la strategia; Discussione, per raccogliere informazioni e valutare le alternative; Presa della decisione, quando si sceglie la soluzione; Implementazione, che consiste nell'attuare la decisione e nel monitorarne le conseguenze. Questo schema offre una mappa chiara per comprendere come i gruppi arrivano a una scelta."}, "18.09": {"q": "Secondo Asch i fenomeni di gruppo devono essere considerati come:", "options": {"A": "condizione delle azioni dei singoli individui e prodotto delle azioni dei singoli individui", "B": "condizione delle azioni dei singoli individui e non come prodotto delle azioni dei singoli individui", "C": "prodotto delle azioni dei singoli individui e non come condizione delle azioni dei singoli individui", "D": "condizione delle azioni del gruppo e prodotto delle azioni del gruppo"}, "correct": "A", "a": "condizione delle azioni dei singoli individui e prodotto delle azioni dei singoli individui", "expl": "condizione delle azioni dei singoli individui e prodotto delle azioni dei singoli individui:\nAsch supera la visione di una \"mente di gruppo\" separata dagli individui, e propone una doppia natura dei fenomeni collettivi. Da un lato, essi sono la condizione che rende possibili le azioni dei singoli, perché il contesto sociale definisce il campo entro cui ciascuno agisce. Dall'altro, sono il prodotto di quelle stesse azioni, poiché è l'interazione concreta tra persone a generare le dinamiche di gruppo."}, "18.10": {"q": "Nel 1965, D.T. Campbell propose la sua teoria del conflitto realistico, secondo la quale:", "options": {"A": "il conflitto esistente fra i gruppi non solo il risultato di situazioni di competizioni dovute a risorse limitate", "B": "il conflitto esistente fra i gruppi non è altro che il risultato di situazioni di competizioni dovute a risorse limitate", "C": "il conflitto esistente fra i gruppi dipende dalle aspettative dei singoli individui verso il gruppo di appartenenza", "D": "il conflitto esistente fra i gruppi è influenzato marginalmente dalle risorse limitate"}, "correct": "B", "a": "il conflitto esistente fra i gruppi non è altro che il risultato di situazioni di competizioni dovute a risorse limitate", "expl": "il conflitto esistente fra i gruppi non è altro che il risultato di situazioni di competizioni dovute a risorse limitate:\nCampbell spiega l'ostilità tra gruppi come una conseguenza diretta della competizione per risorse scarse – ad esempio territorio, denaro o prestigio. Quando due gruppi mirano allo stesso obiettivo limitato, l'interesse di uno diventa necessariamente la perdita dell'altro, e questo genera conflitto. La teoria si chiama \"realistica\" proprio perché riconduce il conflitto a ragioni concrete e materiali, non a mere differenze psicologiche o culturali."}, "19.01": {"q": "Costituisce la capacità di assumere punti di vista diversi dal proprio:", "options": {"A": "Empatia", "B": "Interdipendenza", "C": "Abilità di role-taking", "D": "Abilità di role-playing"}, "correct": "C", "a": "Abilità di role-taking", "expl": "Abilità di role-taking:\n\nLa dispensa introduce esplicitamente questo concetto nel primo paragrafo dell'Introduzione, affermando che \"gli scambi sociali dell'età scolare concorrono allo sviluppo delle abilità sociali, in particolare si sviluppa la capacità di assumere punti di vista diversi dal proprio, ovvero l'abilità di role-taking\". Si tratta di una competenza fondamentale che si affina proprio attraverso le interazioni con i coetanei, permettendo al bambino di comprendere prospettive differenti dalla propria e gettando le basi per relazioni sociali più mature e collaborative."}, "19.02": {"q": "In quale periodo dello sviluppo progredisce il pensiero di tipo ipotetico-deduttivo:", "options": {"A": "Adolescenza", "B": "Preadolescenza", "C": "Pubertà", "D": "Senso-motorio"}, "correct": "A", "a": "Adolescenza", "expl": "Adolescenza:\n\nLa dispensa, nel descrivere i cambiamenti caratteristici dell'adolescenza, elenca tra questi \"progredisce il pensiero di tipo ipotetico-deduttivo\". Questo passaggio evolutivo è collocato specificamente in questa fase, distinguendola dalla preadolescenza e dalla pubertà, e indica lo sviluppo di una capacità di ragionamento più astratta e formale, tipica del pensiero operatorio formale di cui parlano gli studi sullo sviluppo cognitivo."}, "19.03": {"q": "Durante l'adolescenza un elemento di cruciale importanza è costituito da:", "options": {"A": "La competizione con gli altri in quanto simili a sé", "B": "L'identificazione e dal rispecchiamento nel caregiver", "C": "La cooperazione di gruppo", "D": "L'identificazione e dal rispecchiamento negli altri in quanto simili a sé"}, "correct": "D", "a": "L'identificazione e dal rispecchiamento negli altri in quanto simili a sé", "expl": "L'identificazione e dal rispecchiamento negli altri in quanto simili a sé:\n\nLa dispensa sottolinea che \"Durante l'adolescenza un elemento di cruciale importanza è costituito dall'identificazione e dal rispecchiamento negli altri in quanto simili a sé\". Questo processo avviene prevalentemente all'interno del gruppo dei pari, che svolge una fondamentale \"funzione di specchio\". Attraverso meccanismi di proiezione e identificazione, l'adolescente sperimenta nuove strategie cognitive e comportamentali, e il gruppo diventa un contesto privilegiato per la costruzione dell'idea di sé."}, "19.04": {"q": "Per Bruner (1984) l'apprendimento è essenzialmente un'attività che si svolge in comune e, allo stesso tempo, che coinvolge:", "options": {"A": "La costruzione cooperativa della conoscenza", "B": "La costruzione sociale della conoscenza", "C": "La costruzione competitiva della conoscenza", "D": "La co-costruzione del Sé sociale"}, "correct": "B", "a": "La costruzione sociale della conoscenza", "expl": "La costruzione sociale della conoscenza:\n\nLa dispensa cita testualmente Bruner (1984) affermando che \"l'apprendimento è essenzialmente un'attività che si svolge in comune e, allo stesso tempo, che coinvolge la costruzione sociale della conoscenza\". Questo concetto è fondamentale per comprendere il passaggio da una visione individualistica dell'apprendimento a una visione situata e sociale, in cui la conoscenza non viene semplicemente trasmessa ma viene attivamente costruita attraverso l'interazione e la condivisione con gli altri."}, "19.05": {"q": "Nel 1984 Damon ha verificato i principi del:", "options": {"A": "Apprendimento sociale", "B": "Peer tutoring", "C": "Apprendimento tra pari", "D": "Peer mentoring"}, "correct": "C", "a": "Apprendimento tra pari", "expl": "Apprendimento tra pari:\n\nLa dispensa riporta che \"Nel 1984 W. Damon ha verificato i principi dell'apprendimento tra pari (peer learning) e ha dimostrato che questa strategia può sostenere l'autostima, risvegliare l'interesse verso obiettivi di cambiamento, incrementare il rendimento scolastico e incoraggiare il comportamento pro-sociale\". Questo contributo è centrale per comprendere come le interazioni tra coetanei possano essere strutturate per favorire lo sviluppo di competenze sia cognitive che sociali."}, "19.06": {"q": "Il seguente Autore ha elaborato il modello dell'apprendimento di squadra (student team learning) che si caratterizza soprattutto per l'attenzione rivolta alla motivazione estrinseca, ovvero la prospettiva del conseguimento di qualche ricompensa:", "options": {"A": "Robert Slavin", "B": "Albert Bandura", "C": "Gordon Alport", "D": "Sigmund Freud"}, "correct": "A", "a": "Robert Slavin", "expl": "Robert Slavin:\n\nLa dispensa menziona Slavin come autore che ha dimostrato gli effetti positivi dell'educazione tra pari sul rendimento degli studenti nel contesto scolastico. Nello specifico, il testo cita che \"Nello specifico del contesto scolastico, gli effetti positivi dell'educazione tra pari sul rendimento degli studenti sono stati dimostrati anche da Slavin (1983)\". Il modello di apprendimento di squadra (student team learning) è infatti associato al suo lavoro, caratterizzandosi per l'attenzione alla motivazione e al conseguimento di ricompense come leva per l'impegno e il successo collettivo."}, "19.07": {"q": "Il modello che si fonda su l'interdipendenza positiva, l'interazione diretta costruttiva, le abilità sociali, la responsabilità individuale e la valutazione del lavoro di gruppo è:", "options": {"A": "Il modello dell'apprendimento tra pari (peer learning) di Damon verificato nel 1984", "B": "Il modello di apprendimento cooperativo del learning together elaborato da Johnson et al. nel 1996", "C": "Il modello di apprendimento cooperativo del learning together elaborato da Damone nel 1996", "D": "Il modello di apprendimento cooperativo del learning together di Damon verificato nel 1984"}, "correct": "B", "a": "Il modello di apprendimento cooperativo del learning together elaborato da Johnson et al. nel 1996", "expl": "Il modello di apprendimento cooperativo del learning together elaborato da Johnson et al. nel 1996:\n\nLa dispensa descrive dettagliatamente i pilastri fondamentali dell'apprendimento cooperativo, specificando che per un'efficace collaborazione occorrono: una reale interdipendenza positiva tra i membri, un impegno nel mutuo aiuto, un senso di responsabilità per il gruppo e attenzione alle abilità sociali e interpersonali. Questi elementi, insieme alla valutazione di gruppo, costituiscono la struttura portante del modello \"learning together\" elaborato da Johnson e colleghi, che la dispensa richiama esplicitamente come riferimento per le comunità di apprendimento."}, "19.08": {"q": "La convinzione di saper gestire con efficacia i rapporti interpersonali costituisce un elemento protettivo ai fini del benessere e sviluppo psicologico e sociale in quanto consente:", "options": {"A": "Di modulare relazioni competitive tra pari, di conflitto e collaborazione, di non resistere alle pressioni del gruppo", "B": "Di mantenere relazioni positive di efficacia, di controllo e collaborazione reciproca, di resistere alle pressioni del gruppo", "C": "Di instaurare e mantenere relazioni positive di amicizia, di accettazione reciproca e collaborazione, di non resistere alle pressioni trasgressive del gruppo", "D": "Di instaurare e mantenere relazioni positive di amicizia, di accettazione reciproca e collaborazione, di resistere alle pressioni trasgressive dei/lle compagni/e"}, "correct": "D", "a": "Di instaurare e mantenere relazioni positive di amicizia, di accettazione reciproca e collaborazione, di resistere alle pressioni trasgressive dei/lle compagni/e", "expl": "Di instaurare e mantenere relazioni positive di amicizia, di accettazione reciproca e collaborazione, di resistere alle pressioni trasgressive dei/lle compagni/e:\n\nLa dispensa afferma che la convinzione di saper gestire con efficacia i rapporti interpersonali (cioè l'autoefficacia sociale percepita) consente, in primo luogo, \"di instaurare e mantenere relazioni positive di amicizia, di accettazione reciproca e
