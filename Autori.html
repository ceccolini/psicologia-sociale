    `<div class="pdot${i===currentIdx?' active':i<currentIdx?' done':''}" onclick="goTo(${i})"></div>`
  ).join('');
}

function updateTopbar(){
  const ch = CHAPTERS[currentIdx];
  document.getElementById('cap-num-badge').textContent = ch.n;
  document.getElementById('cap-title').textContent = ch.title;
  document.getElementById('cap-sub').textContent = ch.authors.length + ' autori chiave';
  renderProgress();

  const prevBtn = document.getElementById('nav-prev');
  const nextBtn = document.getElementById('nav-next');
  prevBtn.classList.toggle('disabled', currentIdx === 0);
  nextBtn.classList.toggle('disabled', currentIdx === CHAPTERS.length-1);
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function goTo(idx, animate=true){
  idx = Math.max(0, Math.min(CHAPTERS.length-1, idx));
  currentIdx = idx;
  track.style.transition = animate ? 'transform .28s cubic-bezier(.22,.61,.36,1)' : 'none';
  track.style.transform = `translateX(-${idx*100}vw)`;
  updateTopbar();
}

// ── TOUCH SWIPE ───────────────────────────────────────────────────────────────
mainEl.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  currentX = startX;
  dragging = true;
  swipeLocked = null; // ancora da determinare: 'h' (orizzontale, swipe capitolo) o 'v' (verticale, scroll contenuto)
  track.style.transition = 'none';
}, {passive:true});

mainEl.addEventListener('touchmove', e => {
  if(!dragging) return;
  currentX = e.touches[0].clientX;
  const touchY = e.touches[0].clientY;
  const dx = currentX - startX;
  const dy = touchY - startY;

  if(swipeLocked === null){
    // Determina la direzione del gesto dopo un piccolo spostamento minimo
    if(Math.abs(dx) > 6 || Math.abs(dy) > 6){
      swipeLocked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
    }
  }

  if(swipeLocked === 'h'){
    const base = -currentIdx * window.innerWidth;
    track.style.transform = `translateX(${base+dx}px)`;
  }
  // se swipeLocked === 'v' (o ancora null), non tocchiamo il track:
  // lasciamo che il browser scrolli verticalmente .page in modo nativo
}, {passive:true});

mainEl.addEventListener('touchend', () => {
  if(!dragging) return;
  dragging = false;
  if(swipeLocked !== 'h'){
    // era uno scroll verticale (o un tap): non cambiare capitolo, ripristina la posizione
    goTo(currentIdx, false);
    return;
  }
  const dx = currentX - startX;
  const threshold = window.innerWidth * 0.18;
  if(dx < -threshold && currentIdx < CHAPTERS.length-1){
    goTo(currentIdx+1);
  } else if(dx > threshold && currentIdx > 0){
    goTo(currentIdx-1);
  } else {
    goTo(currentIdx);
  }
});

// Mouse drag support (desktop): con blocco di direzione e soglia,
// così un click, una selezione di testo o uno scroll verticale NON cambiano capitolo.
let mouseDown = false, mouseStartY = 0, mouseLocked = null;
mainEl.addEventListener('mousedown', e => {
  mouseDown = true; startX = e.clientX; mouseStartY = e.clientY; currentX = startX;
  mouseLocked = null;
});
window.addEventListener('mousemove', e => {
  if(!mouseDown) return;
  currentX = e.clientX;
  const dx = currentX - startX;
  const dy = e.clientY - mouseStartY;
  if(mouseLocked === null){
    if(Math.abs(dx) > 8 || Math.abs(dy) > 8){
      mouseLocked = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      if(mouseLocked === 'h') track.style.transition = 'none';
    }
  }
  if(mouseLocked === 'h'){
    const base = -currentIdx * window.innerWidth;
    track.style.transform = `translateX(${base+dx}px)`;
  }
});
window.addEventListener('mouseup', () => {
  if(!mouseDown) return;
  mouseDown = false;
  if(mouseLocked !== 'h') return; // click o movimento verticale: nessun cambio capitolo
  const dx = currentX - startX;
  const threshold = window.innerWidth * 0.18;
  if(dx < -threshold && currentIdx < CHAPTERS.length-1) goTo(currentIdx+1);
  else if(dx > threshold && currentIdx > 0) goTo(currentIdx-1);
  else goTo(currentIdx);
});

// ── LISTA CAPITOLI OVERLAY ────────────────────────────────────────────────────
function openList(){
  renderList('');
  document.getElementById('list-overlay').classList.add('show');
}
function closeList(){
  document.getElementById('list-overlay').classList.remove('show');
}
function renderList(query){
  const q = query.toLowerCase();
  const body = document.getElementById('list-body');
  const filtered = CHAPTERS.filter(ch =>
    !q || ch.title.toLowerCase().includes(q) || ch.authors.some(a => a.name.toLowerCase().includes(q))
  );
  body.innerHTML = filtered.map(ch => {
    const idx = CHAPTERS.indexOf(ch);
    const authorNames = ch.authors.map(a => a.name).join(' · ');
    return `<div class="list-item" onclick="goTo(${idx});closeList()">
      <div class="list-num">${ch.n}</div>
      <div class="list-info">
        <div class="list-title">${escHtml(ch.title)}</div>
        <div class="list-authors">${escHtml(authorNames)}</div>
      </div>
    </div>`;
  }).join('');
}

// ── DETTAGLIO CONCETTO (bottom sheet) ─────────────────────────────────────────
function openSheet(chN, authorName, examId){
  const item = QUESTIONS[examId];
  if(!item) return;

  const ch = CHAPTERS.find(c => c.n == chN);
  const author = ch ? ch.authors.find(a => a.name === authorName) : null;
  const color = author ? author.color : '#58a6ff';

  document.getElementById('sheet-author').textContent = authorName;
  document.getElementById('sheet-author').style.color = color;
  document.getElementById('sheet-question').textContent = item.q;

  const optsEl = document.getElementById('sheet-options');
  optsEl.innerHTML = Object.entries(item.options).map(([letter, txt]) => {
    const isCorrect = letter === item.correct;
    return `<div class="sheet-opt${isCorrect?' correct':''}">
      <span class="letter">${letter}</span>
      <span class="txt">${escHtml(txt)}</span>
    </div>`;
  }).join('');

  document.getElementById('sheet-explain-text').textContent = item.expl;

  document.getElementById('detail-backdrop').classList.add('show');
  document.getElementById('detail-sheet').classList.add('show');
}

function closeSheet(){
  document.getElementById('detail-backdrop').classList.remove('show');
  document.getElementById('detail-sheet').classList.remove('show');
}

// Swipe down to close sheet
let sheetStartY = 0, sheetDragging = false;
const sheetEl = document.getElementById('detail-sheet');
const sheetBodyEl = document.getElementById('sheet-body');
sheetEl.addEventListener('touchstart', e => {
  sheetStartY = e.touches[0].clientY;
  // Avvia il drag-per-chiudere SOLO se il contenuto è già in cima:
  // così lo scroll della spiegazione non fa scendere/chiudere la tendina.
  sheetDragging = sheetBodyEl.scrollTop <= 0;
}, {passive:true});
sheetEl.addEventListener('touchmove', e => {
  if(!sheetDragging) return;
  const dy = e.touches[0].clientY - sheetStartY;
  if(dy > 0) sheetEl.style.transform = `translateY(${dy}px)`;
}, {passive:true});
sheetEl.addEventListener('touchend', e => {
  if(!sheetDragging) return;
  sheetDragging = false;
  const dy = (e.changedTouches[0].clientY - sheetStartY);
  sheetEl.style.transform = '';
  if(dy > 100) closeSheet();
});

// ── HIDE SWIPE HINT AFTER FIRST INTERACTION ───────────────────────────────────
let hintShown = true;
function hideHintOnce(){
  if(hintShown){
    hintShown = false;
    const hint = document.getElementById('swipe-hint');
    hint.style.transition = 'opacity .4s';
    hint.style.opacity = '0';
    setTimeout(()=> hint.remove(), 500);
  }
}
mainEl.addEventListener('touchstart', hideHintOnce, {once:true});
mainEl.addEventListener('mousedown', hideHintOnce, {once:true});

// ── CREDITS MODAL ─────────────────────────────────────────────────────────────
let creditsLoaded = false;
function openCredits(){
  const iframe = document.getElementById('credits-iframe');
  if(!creditsLoaded){
    iframe.src = 'Credits.html';
    creditsLoaded = true;
  }
  document.getElementById('credits-backdrop').classList.add('show');
  document.getElementById('credits-modal').classList.add('show');
}
function closeCredits(){
  document.getElementById('credits-backdrop').classList.remove('show');
  document.getElementById('credits-modal').classList.remove('show');
}

// ── KEYBOARD NAVIGATION (desktop) ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Se una modale/sheet è aperta, ESC la chiude e le freccette non cambiano capitolo
  const sheetOpen = document.getElementById('detail-sheet').classList.contains('show');
  const creditsOpen = document.getElementById('credits-modal').classList.contains('show');
  const listOpen = document.getElementById('list-overlay').classList.contains('show');

  if(e.key === 'Escape'){
    if(sheetOpen) closeSheet();
    else if(creditsOpen) closeCredits();
    else if(listOpen) closeList();
    return;
  }
  if(sheetOpen || creditsOpen || listOpen) return;

  if(e.key === 'ArrowRight') goTo(currentIdx+1);
  else if(e.key === 'ArrowLeft') goTo(currentIdx-1);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
buildPages();
goTo(0, false);

window.addEventListener('resize', () => goTo(currentIdx, false));
</script>
