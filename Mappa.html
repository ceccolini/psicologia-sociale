o e la loro assertività. È una delle misure preventive contro l'obbedienza cieca che porta all'effetto Lucifero.", "29|Milgram|Incoraggiare rispetto delle diversità: riduzione in-group biases": "D.316: incoraggiare il rispetto delle diversità e l'apprezzamento della variabilità umana è possibile riducendo i cosiddetti in-group biases e la discriminazione. Favorire il contatto interculturale e la valorizzazione delle differenze.", "30|Watzlawick|Pragmatica della comunicazione (1967)": "D.344-345: Watzlawick (1967) — la «Pragmatica della comunicazione umana» offre un parallelismo tra comunicazione e matematica. Come la matematica ha i suoi assiomi, la comunicazione ha i suoi 5 assiomi fondamentali. La Scuola di Palo Alto si occupa prevalentemente della funzione pragmatica della comunicazione.", "30|Watzlawick|Parallelismo comunicazione-matematica": "D.345: il parallelismo proposto da Watzlawick tra comunicazione e matematica — la comunicazione ha principi fondamentali (assiomi) che regolano tutti gli scambi comunicativi, proprio come la matematica ha i suoi assiomi. I 5 assiomi descrivono le leggi universali della comunicazione.", "30|Watzlawick|1° assioma: non si può non comunicare": "D.346-348: il 1° assioma di Watzlawick — non si può non comunicare. Qualsiasi comportamento in presenza di un altro ha valore di messaggio, anche il silenzio e l'immobilità. Il presupposto: l'impossibilità di non avere un comportamento. Concetto chiave dalla teoria cibernetica: retroazione (D.347).", "30|Watzlawick|4° assioma: comunicazione digitale o analogica": "D.350: il 4° assioma di Watzlawick — gli esseri umani comunicano sia in modo digitale (linguaggio verbale, simbolico, preciso) che analogico (comunicazione non verbale, gestica, tonale, meno precisa ma più emotiva). La disconferma equivale al messaggio «tu non esisti» (D.349).", "30|Watzlawick|Presupposto: impossibilità di non avere comportamento": "D.346: il presupposto dell'approccio pragmatico — è impossibile non avere un comportamento. Poiché tutto il comportamento è comunicazione (1° assioma), e non si può non avere un comportamento, è impossibile non comunicare.", "30|Watzlawick|Concetto di retroazione (cibernetica)": "D.347: il concetto chiave sviluppato dalla teoria cibernetica è la retroazione (feedback) — la risposta del ricevente influenza il messaggio del mittente in un circolo ricorsivo. Non esiste comunicazione lineare ma solo comunicazione circolare con feedback.", "30|Watzlawick|Disconferma = messaggio 'tu non esisti'": "D.349: la disconferma — la risposta più patogena nella comunicazione, che equivale al messaggio «tu non esisti», negando la realtà dell'altro come persona. Si distingue dal rifiuto («non sei d'accordo con me»: almeno ti riconosco).", "30|Erickson|L'approccio strategico deve i suoi natali a Erickson": "D.343: l'approccio strategico deve i suoi natali e il suo sviluppo all'opera di Milton Erickson, ipnoterapeuta americano, le cui tecniche di comunicazione indiretta e paradossale hanno ispirato la Scuola di Palo Alto e l'approccio strategico alla comunicazione.", "31|Watzlawick|Linguaggio = mezzo per favorire il cambiamento": "D.351: nell'approccio strategico il linguaggio rappresenta il mezzo di elezione per favorire il cambiamento — il terapeuta usa il linguaggio per modificare il punto di vista del cliente, renderlo consapevole e responsabile. L'obiettivo: de-strutturazione del sintomo (D.352).", "31|Watzlawick|Obiettivo: de-strutturazione del sintomo": "D.352: l'obiettivo dell'approccio strategico — de-strutturazione del sintomo: non eliminarlo reprimendolo, ma cambiare la struttura del problema che lo mantiene, rendendo il sintomo non più necessario. Si usa linguaggio suggestivo e ingiuntivo anziché descrittivo (D.353).", "31|Watzlawick|Tecnica della ristrutturazione: cornice alternativa": "D.355: la ristrutturazione — cambia lo sfondo concettuale ed emozionale in cui il cliente colloca il suo disagio, ponendolo in una cornice alternativa. Lo stesso evento, visto in una cornice diversa, acquista un significato completamente diverso. Tecnica cognitivo-comunicativa fondamentale.", "31|Watzlawick|Tecnica del paradosso: modifica la rigidità percettiva": "D.356: la tecnica del paradosso — modifica la rigidità percettiva e reattiva attraverso azioni e comunicazioni paradossali, illogiche e impreviste. Esempio: prescrivere il sintomo («sii ansioso per 30 minuti al giorno») porta paradossalmente alla sua riduzione.", "31|Watzlawick|Linguaggio suggestivo e ingiuntivo": "D.353: nell'approccio strategico, al posto del linguaggio descrittivo e indicativo tipico della spiegazione razionale, viene adoperato un linguaggio suggestivo e ingiuntivo — non spiega ma evoca, non descrive ma prescrive comportamenti in modo indiretto. La tecnica del ricalco usa il linguaggio del cliente (D.354).", "31|Watzlawick|Tecnica del ricalco: linguaggio e autorappresentazione": "D.354: la tecnica del ricalco — il terapeuta utilizza il linguaggio e il modo in cui la persona si rappresenta e si relaziona con se stessa e con la realtà. Il terapeuta «ricalca» il sistema di significati del cliente per poi guidarlo verso cambiamenti.", "31|Watzlawick|Dichiarazione di impotenza: con soggetti che vanificano la terapia": "D.357: la dichiarazione di impotenza è indicata con soggetti che vanificano il lavoro terapeutico — il terapeuta dichiara di non essere in grado di aiutarli, paradossalmente stimolando la loro motivazione al cambiamento attraverso la provocazione del contrario.", "31|Von Cranach & Harré|Goal-directed-action: triangolo concettuale gerarchico": "D.358: Von Cranach e Harré — la Goal-directed-action (GDA) descrive l'azione come un triangolo concettuale in cui ogni lato rappresenta un livello (comportamento manifesto, cognizioni coscienti, processi inconsci) che si interconnette con gli altri in interazioni gerarchiche e retroattive.", "31|De Leo|Cognizioni coscienti: piani, scopi, strategie": "D.359: De Leo — le cognizioni coscienti comprendono piani d'azione, scopi o obiettivi, strategie, intenzioni, valori ed emozioni con cui la persona prepara e porta avanti l'azione. Guidano il comportamento sociale a livello sia conscio che inconscio.", "31|De Leo|Aspetti trascurati dalla GDA: pragmatico-strumentali ed espressivo-comunicativi": "D.360: De Leo identifica i due aspetti trascurati dalla GDA di Von Cranach (1982): gli effetti pragmatico-strumentali (conseguenze concrete dell'azione sull'ambiente) e gli effetti espressivo-comunicativi (i messaggi che l'azione veicola sull'identità e le aspettative dell'autore).", "32|De Leo|Devianza = forma potente ed estrema di comunicazione": "D.364: De Leo e colleghi (2004) — la devianza è una forma potente, particolare ed estrema di comunicazione: l'azione deviante veicola significati sull'identità del suo autore e sulle sue aspettative circa le conseguenze del suo agire criminoso.", "32|De Leo|Analisi dell'azione deviante: tipo sequenziale": "D.365: l'analisi dell'azione deviante di tipo sequenziale permette di individuare al suo interno la storia personale dell'autore di reato, il significato soggettivo dell'azione rispetto alla continuazione del suo Sé e le sue aspettative circa le conseguenze del suo agire criminoso.", "32|De Leo|Il reo = attivo generatore di significati": "D.368: in questa prospettiva il reo viene definito come attivo generatore di significati — non è una vittima passiva della società o di forze biologiche, ma un soggetto che attraverso l'azione deviante comunica qualcosa di specifico. Sarà possibile arrivare alla GDA attraverso la narrazione del reo (D.369).", "32|De Leo|L'azione comunicativa: sunto passato/presente/futuro del reo": "D.370: l'azione comunicativa del reo si può considerare un sunto del passato, del presente e del futuro del soggetto deviante — include la sua storia, la sua situazione attuale e le sue aspettative sulle conseguenze. È la chiave interpretativa dell'azione deviante.", "32|De Leo|Funzione espressivo-comunicazionale": "D.366: la funzione espressivo-comunicazionale dell'azione deviante, in interazione con gli effetti strumentali anticipati e con i significati sociali convenzionali, orienta il sistema agente e ne organizza il significato dell'azione rispetto ai contesti e ai sistemi in cui è inserito.", "32|De Leo|Effetti di relazione: ruoli, obiettivi, poteri": "D.367: gli effetti di relazione sono quelli attraverso cui si ridefinisce l'azione stessa stabilendo ruoli, obiettivi e poteri — l'azione deviante non è solo uno strumento per ottenere qualcosa (effetti strumentali) ma anche un modo per posizionarsi nelle relazioni.", "32|Von Cranach|Goal-directed-action (GDA)": "D.358: la GDA di Von Cranach descrive l'azione umana come diretta a scopi: triangolo concettuale con tre livelli (comportamento manifesto, cognizioni coscienti, processi inconsci) che si interconnettono gerarchicamente. De Leo aggiunge la dimensione espressivo-comunicativa trascurata dalla GDA (D.360).", "32|Von Cranach|Cognizioni coscienti guidano il comportamento": "D.359: nella GDA di Von Cranach le cognizioni coscienti — piani, obiettivi, strategie, intenzioni — guidano il comportamento sociale a livello consapevole. De Leo aggiunge che anche i processi inconsci (valori, emozioni profonde) orientano l'azione.", "32|Van Dijk|Il discorso = azione sociale compiuta attraverso il linguaggio": "D.391: Van Dijk — il discorso è l'azione sociale compiuta da coloro che utilizzano il linguaggio per comunicare fra loro e nell'ambito della società e della cultura. Il linguaggio non descrive solo la realtà ma la costruisce e la trasforma.", "33|Tajfel|Conflitti = dimensione naturale": "D.373: Tajfel — i conflitti sono una dimensione naturale dell'esistenza umana e sociale: non sono patologie da eliminare ma espressione normale della differenziazione tra gruppi e della difesa dell'identità sociale. Possono essere risolvibili o intrattabili (D.377).", "33|Tajfel|Continuum interpersonale/intergruppi": "D.374: Tajfel propone un continuum teorico del comportamento umano — a un estremo il comportamento interpersonale (guidato da caratteristiche individuali), all'altro il comportamento intergruppi (guidato dall'appartenenza categoriale). Nei conflitti estremi si parla di effetto totalizzante (D.378).", "33|Tajfel|Meccanismo: identità collega i due estremi": "D.375: il meccanismo che collega i due estremi del continuum interpersonale/intergruppi è quello dell'identità — attraverso il processo di identificazione con il proprio gruppo e di differenziazione dagli altri gruppi, il comportamento si sposta dall'interpersonale all'intergruppi.", "33|Turner|Senso del Noi e solidarietà = gruppo psicologico": "D.376: Turner — il senso del «Noi» e lo spirito di solidarietà indicano la formazione di un gruppo psicologico. Quando le persone si percepiscono come «noi» contrapposti a «loro», si è formata un'identità collettiva condivisa che va al di là della semplice aggregazione fisica.", "33|Bar-Tal|Delegittimazione: desiderio di elevare e differenziare il proprio gruppo": "D.379: Bar-Tal — la delegittimazione ha origine dal desiderio di elevare e differenziare il proprio gruppo e/o di sfruttare gli altri gruppi. Si esclude l'outgroup dalle norme morali condivise attraverso etichette negative estreme. Può portare alla deumanizzazione (D.380).", "33|Freud|Aggressività inevitabile: eros vs thanatos": "D.253: per Freud l'aggressività umana è inevitabile perché deriva dalla tensione strutturale tra eros (pulsione di vita e costruzione) e thanatos (pulsione di morte e distruzione). Queste due forze sono in perenne conflitto e non possono essere eliminate, solo sublimate.", "33|Freud|Relazioni sociali = frustrazione civile": "D.254: per Freud le relazioni sociali sono dominate da una frustrazione civile — la civiltà richiede la rinuncia alle pulsioni, producendo una frustrazione strutturale che è la base dei conflitti sociali e collettivi.", "34|Allport|Pregiudizio manifesto: rifiuto esplicito degli altri gruppi": "D.387: il pregiudizio manifesto si contraddistingue per il rifiuto esplicito degli altri gruppi — atteggiamenti di ostilità intenzionali, visibili e diretti verso l'outgroup percepito come minaccioso. Si oppone al pregiudizio sottile che è implicito, freddo e distante (D.386).", "34|Allport|Pregiudizio pone la vittima in svantaggio": "D.383: l'effetto ultimo del pregiudizio — porre l'oggetto in una posizione di svantaggio non giustificata dalla sua condotta. La persona viene discriminata non per quello che ha fatto ma per il gruppo di appartenenza. Il pregiudizio riluttante è la forma più indiretta (D.384).", "34|Pettigrew & Meertens|Pregiudizio sottile: freddezza e distanza": "D.386: Pettigrew e Meertens (1995) — il pregiudizio sottile si caratterizza per freddezza e distanza emotiva: si esprime non con l'ostilità aperta ma con la mancanza di calore, l'enfatizzazione delle differenze culturali e la negazione di emozioni positive verso l'outgroup.", "34|McConahay|Razzismo riluttante: forma indiretta": "D.384-385: McConahay — il razzismo riluttante (o simbolico/moderno): le persone rinnegano le vecchie espressioni esplicite di razzismo e si dichiarano assolutamente egualitarie, ma di fatto esprimono il pregiudizio in forme più sottili (opposizione alle politiche di discriminazione positiva).", "34|McConahay|Le persone rinnegano il vecchio razzismo ma non sono egualitarie": "D.385: il razzismo moderno di McConahay — le persone rinnegano le vecchie espressioni di razzismo e si dichiarano assolutamente egualitarie, ma esprimono il pregiudizio in forme più sottili. L'elemento particolare è la negazione del vecchio razzismo combinata con nuove forme di esclusione.", "34|Sidanius & Pratto|Orientamento alla dominanza sociale (SDO)": "D.388: Sidanius e Pratto — l'orientamento alla dominanza sociale (SDO): tendenza a considerare l'esistenza caratterizzata dalla competizione tra gruppi e dal desiderio di sostenere il dominio dei gruppi superiori sugli inferiori. Alto SDO predice molte forme di pregiudizio e discriminazione.", "34|Sidanius & Pratto|Tendenza a sostenere il dominio dei gruppi superiori sugli inferiori": "D.388: l'SDO si manifesta nella tendenza ad accettare e promuovere la gerarchia tra gruppi — chi ha alto SDO tende a sostenere politiche che mantengono la disuguaglianza tra gruppi percepiti come superiori e inferiori.", "34|Devine|Modello della dissociazione": "D.381-382: Patricia Devine propone il Modello della Dissociazione — tutti sono esposti agli stessi stereotipi culturali, ma chi è motivato a ridurre il pregiudizio impara a sopprimere le risposte automatiche stereotipate. Stereotipo (cognitivo) + pregiudizio (emotivo) → discriminazione (comportamentale).", "34|Devine|Stereotipo (cogn.) + pregiudizio (emotivo) → discriminazione (comportamento)": "D.381-382: il Modello della Dissociazione di Devine distingue tre componenti: stereotipo (attribuzione di caratteristiche basata sul gruppo — componente cognitiva), pregiudizio (reazione emotiva verso l'individuo basata sul gruppo — componente affettiva), discriminazione (svantaggio comportamentale).", "35|Eysenck|Ricerca: colore blu preferito dalla maggioranza": "D.406: nella ricerca di Eysenck, la maggior parte dei soggetti preferiva il colore blu. Il blu è associato a calma, fiducia e affidabilità. La percezione visiva del colore corrisponde alla sintesi di due diversi processi: bottom-up e top-down (D.403).", "35|Carruthers et al.|72% valuta positivo il colore giallo (2010)": "D.407: nella ricerca di Carruthers e colleghi (2010), il 72% dei partecipanti aveva valutato come positivo il colore giallo. Il giallo è associato a ottimismo, energia e chiarezza. Il fenomeno della costanza del colore (D.404) e la percezione dell'affordance (D.405) sono concetti chiave di questo capitolo.", "35|Valdez & Mehrabian|Le donne più sensibili alle variazioni di colore (1994)": "D.408: Valdez e Mehrabian (1994) — rispetto alle differenze di genere, le donne sembrerebbero essere più sensibili alle variazioni di colore rispetto agli uomini.", "35|Hill & Barton|Completo rosso può incentivare alla vittoria (2005)": "D.409: Hill e Barton (2005) — a parità di altri fattori, vestire un completo rosso durante le competizioni sportive può incentivare una squadra alla vittoria: il rosso è associato a dominanza, aggressività e forza.", "35|Baker|Influenzare il comportamento del consumatore tramite l'ambiente (1986)": "D.412: gli studi di Baker (1986) in psicologia ambientale dimostrano come sia possibile influenzare il comportamento del consumatore attraverso informazioni apparentemente casuali dell'ambiente — colori, musica, illuminazione creano stati psicologici positivi.", "36|Baker|Studi su influenza dell'ambiente sul consumatore": "D.412: Baker (1986) — l'ambiente fisico interno (\"Atmospheric\") può influenzare il comportamento del consumatore: colori piacevoli, musica gradevole e altri elementi sensoriali creano stati psicologici positivi che si traducono in comportamenti specifici come maggiore permanenza e acquisti impulsivi.", "36|Lammers|Musica a ritmo sostenuto → consumare di più e più velocemente": "D.413: Lammers (2003) — i responsabili di bar e discoteche avrebbero tutto l'interesse a diffondere musiche dal ritmo sostenuto al fine di spingere i clienti a consumare più velocemente e probabilmente in quantità maggiori. Il ritmo della musica modula la velocità dei comportamenti.", "36|Cain-Smith & Curnow|Volume alto della musica → meno tempo nel negozio": "D.414: Cain-Smith e Curnow (1966) — il tempo che un potenziale acquirente trascorre nel negozio è minore in condizione di volume alto della musica diffusa. Musica ad alto volume = clienti che comprano più velocemente e se ne vanno prima.", "36|McCraty et al.|Le donne trovano il negozio più piacevole con musica lenta": "D.416: McCraty e colleghi (1996) — le donne trovavano un negozio più piacevole e più di lusso se in esso il tempo della musica era lento. La musica lenta è associata a un'esperienza di acquisto più rilassata e piacevole per le consumatrici.", "36|McCraty et al.|La musica è un antistress rapido ed economico": "D.417: McCraty e colleghi (1996) — la musica è un antistress rapido e a buon prezzo: riduce il cortisolo e migliora il tono dell'umore in tempi brevi e con costi minimi. Studio di Hui e Dube (1997, D.415) conferma: la musica ha impatto positivo sull'emozione del cliente.", "36|Malaguzzi|Ambiente scolastico = 'terzo insegnante'": "D.420: Loris Malaguzzi, fondatore del metodo Reggio Emilia — l'ambiente scolastico non è un elemento neutro nel processo di apprendimento: le sue caratteristiche fisiche equivalgono a un «terzo insegnante» (dopo i docenti e i coetanei). I risultati di Wright e colleghi (D.419) confermano l'impatto sull'arricchimento cognitivo.", "36|Hui & Dube|Musica come antistress: impatto positivo sull'emozione del cliente": "D.415: Hui e Dube (1997) — la musica, oltre a fungere da antistress, ha un impatto positivo sull'emozione del cliente e la sua percezione, tale da elicitare un comportamento tendente all'acquisto. La fidelity (D.418) riguarda le relazioni a lungo termine con i clienti.", "37|Wilson|Introduce il termine 'biofilia'": "D.421: Edward O. Wilson (1984) introduce il termine «biofilia» per descrivere una forma di amore e sensibilità verso la natura e gli esseri viventi, considerata caratteristica insita nel patrimonio evolutivo umano. La restorativeness (D.422) è la capacità di rigenerazione cognitiva degli ambienti naturali.", "37|Wilson|Amore e sensibilità verso la natura: patrimonio evolutivo": "D.421: secondo Wilson, la predisposizione dell'essere umano verso la natura (biofilia) non è acquisita ma fa parte del patrimonio evolutivo: milioni di anni di vita in ambienti naturali hanno selezionato questa affinità biologica verso la natura.", "37|Kaplan & Kaplan|Restorativeness: rigenerazione cognitiva degli ambienti": "D.422: Kaplan e Kaplan — la restorativeness è la capacità di rigenerazione cognitiva da parte degli ambienti fisici e di facilitare il recupero dallo stress psicofisico e dalla fatica mentale. Il concetto di salutogenesi (D.423) è una visione olistica che considera l'interazione tra fattori biologici, psicologici, socio-culturali ed ecologici.", "37|Kaplan & Kaplan|Salutogenesi: interazione biolog./psicol./socio-culturale/ecologica": "D.423: la salutogenesi è una visione olistica del processo di salute che tiene conto della costante interazione tra fattori biologici, psicologici, socio-culturali ed ecologici. Gli ambienti verdi e blu contribuiscono positivamente a tutti questi fattori.", "37|MacKerron & Mourato|Correlazione positiva: ambienti naturali → benessere soggettivo (2013)": "D.424: MacKerron e Mourato (2013) — trovano una correlazione positiva tra l'esposizione ad ambienti verdi o naturali nella vita quotidiana e il senso di benessere soggettivo momentaneo (Subjective WellBeing). Le persone si sentono significativamente meglio quando si trovano in natura.", "38|Küller et al.|Intensità luminosa → influenza fortemente l'umore (2006)": "D.432: Küller e colleghi (2006) — variando l'intensità luminosa all'interno della postazione di lavoro si influenza fortemente l'umore: luce fioca = umore basso; all'aumentare dell'intensità l'umore del lavoratore migliora. Una corretta illuminazione influisce su buon umore e salute psicofisica (D.431).", "38|Areni & Kim|Fonte di luce può canalizzare l'attenzione (1994)": "D.433: Areni e Kim (1994) — una fonte di luce può aiutare a canalizzare l'attenzione di una persona verso un determinato elemento dell'ambiente. L'illuminazione mirata è uno strumento di guida percettiva utile nei contesti di apprendimento e acquisto.", "38|Bonaiuto et al.|Arredi disposti lungo le pareti, non al centro (2004)": "D.435: Bonaiuto e colleghi (2004) — gli arredi vanno disposti lungo le pareti anziché al centro delle stanze: favorisce la circolazione, riduce la percezione di affollamento e migliora il comfort degli ambienti di lavoro e apprendimento.", "38|Gifford|QI di 26 punti in più in stanze con colori brillanti (2007)": "D.436: Gifford (2007) — i punteggi del QI erano di 26 punti maggiori se ottenuti in stanze dipinte con colori brillanti (giallo, arancio o blu) rispetto a stanze con colori spenti. Il colore dell'ambiente influenza significativamente le prestazioni cognitive.", "38|Pellegrini|Variazioni tonali del colore → aumento comportamenti cooperativi (1985)": "D.437: Pellegrini (1985) — le variazioni del tono del colore all'interno di un ambiente lavorativo sono spesso associate a un aumento dei comportamenti cooperativi tra i lavoratori. Il design cromatico degli spazi influenza anche le relazioni sociali sul lavoro.", "39|Douglas|Distingue criminale organizzato e disorganizzato": "D.443: Douglas distingue due profili criminali — il criminale organizzato (pianifica il crimine, controlla la scena, seleziona le vittime, rimuove le prove) e il disorganizzato (impulsivo, scena caotica, vittima casuale, molte prove lasciate). Questa distinzione guida il criminal profiling.", "39|Ward-Gannon & Keown|Modello del giudizio delle distorsioni cognitive": "D.444: Ward, Gannon e Keown propongono il modello del giudizio delle distorsioni cognitive per comprendere come i criminali giustifichino i loro comportamenti. Al mesolivello si evidenzia il rapporto tra i progetti di vita e le condizioni ambientali.", "39|Arendt|Assenza di responsabilità = incapacità di elaborare il proprio agire": "D.454: Arendt — l'assenza di responsabilità riguarda l'incapacità di elaborare il significato del proprio agire. Eichmann non era un mostro ma qualcuno che aveva smesso di pensare — la «banalità del male». Chiunque smetta di riflettere criticamente può diventare complice del male.", "39|Simon|Atti crudeli evolvono da processi psicologici comuni": "D.458: Simon — gli stati mentali che permettono di compiere atti crudeli evolvono da processi psicologici comuni a tutti. Non servono disturbi mentali speciali o nature malvagie eccezionali. Tutti noi abbiamo un lato oscuro più o meno sopito.", "39|Cleckley|Gli psicopatici agiscono per manipolare gli altri": "D.459: Cleckley — gli psicopatici agiscono con lo scopo di manipolare gli altri. Il nucleo centrale della psicopatia è la «maschera della sanità mentale» (D.456): l'apparenza normale che nasconde la mancanza di empatia e l'uso strumentale degli altri. I criminali psicopatici mostrano estrema impulsività (D.453).", "39|Cleckley|Nucleo centrale della psicopatia: la maschera": "D.456: il concetto chiave di Cleckley — la «maschera»: lo psicopatico appare normale, addirittura affascinante, ma nasconde una totale mancanza di empatia, rimorso e legami emotivi profondi. La maschera permette di ingannare e manipolare gli altri senza essere scoperti.", "40|Canter|Inventore della psicologia investigativa": "D.455: David Canter è l'inventore della psicologia investigativa — disciplina che applica i principi della psicologia all'investigazione criminale. Per Canter ogni comportamento criminale è una transazione interpersonale (D.457): rispecchia il modo in cui il criminale si relaziona agli altri nella vita quotidiana.", "40|Canter|Ogni comportamento criminale = transazione interpersonale": "D.457: secondo la psicologia investigativa di Canter, ogni comportamento criminale è una transazione interpersonale — il modo in cui il criminale tratta la vittima riflette le sue relazioni interpersonali abituali. Analizzando il crimine si può inferire la personalità del criminale.", "40|Teten|Il metodo: analisi della natura del crimine per identificare l'autore": "D.482: Teten — il metodo per identificare l'autore di un reato si basa sull'analisi della natura del crimine: le caratteristiche specifiche del crimine (modalità, firma, vittimologia) permettono di inferire le caratteristiche del criminale. La Routine Activity Theory rientra nel decision process model (D.486).", "40|Brussell|Dallo stato mentale del criminale → scena del crimine": "D.489: Brussell — si parte dallo stato mentale e psicologico del criminale per poi sovrapporlo e rapportarlo alla scena del crimine. Approccio deduttivo: dal profilo psicologico si interpreta la scena. Lo staging è la messa in scena sul luogo del crimine (D.490).", "40|Wilson|Si rifà ai bisogni progressivi di Maslow": "D.451: Wilson — nell'analisi dei crimini a sfondo sessuale si rifà ai bisogni progressivi di Maslow: i crimini sessuali possono essere compresi in relazione alla gerarchia dei bisogni. Le variazioni dimensionali dell'amigdala implicano la totale assenza di rimorso (D.452).", "41|De Leo|Devianza come forma estrema di comunicazione": "D.364: De Leo — la devianza minorile è una forma potente ed estrema di comunicazione: il comportamento deviante veicola messaggi sul Sé del minore, sulle sue relazioni e sui suoi bisogni insoddisfatti. Il D.P.R. 448/88 (D.461) prevede tra i suoi principi la de-stigmatizzazione.", "41|De Leo|Analisi sequenziale dell'azione deviante": "D.365: l'analisi sequenziale dell'azione deviante di De Leo permette di ricostruire la storia personale del minore, il significato soggettivo delle sue azioni e le sue aspettative sulle conseguenze. Il reo minore è messo in condizione di co-responsabile del proprio cambiamento (D.462).", "41|De Leo|Reo = attivo generatore di significati": "D.368: nella prospettiva di De Leo, il reo minore è un attivo generatore di significati — attraverso le sue azioni comunica qualcosa di specifico sul proprio Sé. L'art. 9 del D.P.R. 448/88 (D.464) riguarda gli accertamenti sulla personalità del minorenne.", "42|Carver|Dissonanza cognitiva applicata alle relazioni violente (2002)": "D.519: Carver (2002) applica la teoria della dissonanza cognitiva alle relazioni violente — la donna sperimenta una dissonanza tra la credenza nel valore della relazione e la realtà degli abusi. Per ridurre la tensione cognitiva, minimizza gli abusi o spera nel cambiamento del partner. Alla base della dinamica violenta vi è il controllo (D.518).", "42|Carver|Investimento emozionale trattiene la donna nel rapporto disfunzionale": "D.520: Carver — l'investimento emozionale (sentimenti, pianti, preoccupazioni, anni di vita condivisi) trattiene la donna in un rapporto disfunzionale spingendola a credere che la relazione valga la pena nonostante gli abusi. È un fattore psicologico potentissimo nel mantenere la vittima.", "42|Cupach & Spitzeberg|5 strategie di coping della vittima di violenza (2004)": "D.533: Cupach e Spitzeberg (2004) distinguono 5 strategie di coping messe in atto dalla vittima di violenza. Il disturbo più frequente nelle vittime è il Post Traumatic Stress Disorder — PTSD (D.534). Le difficoltà nel coping rientrano tra le conseguenze dell'abuso psicologico (D.537).", "43|Canter|Inventore della psicologia investigativa": "D.455: David Canter è l'inventore della psicologia investigativa — disciplina che applica i principi della psicologia alla comprensione e all'investigazione dei crimini. Ogni comportamento criminale è una transazione interpersonale che riflette le relazioni abituali del criminale (D.457).", "43|Canter|Ogni comportamento criminale = transazione interpersonale": "D.457: per Canter, il comportamento criminale è una transazione interpersonale — il modo in cui il criminale tratta la vittima rispecchia il suo modo abituale di relazionarsi agli altri. Analizzando il crimine si inferisce la personalità del criminale.", "43|Douglas|Criminale organizzato vs disorganizzato": "D.443: Douglas distingue il criminale organizzato (pianifica, controlla la scena, seleziona la vittima, rimuove prove) dal criminale disorganizzato (impulsivo, scena caotica, vittima casuale, lascia molte prove). Questa distinzione guida il profiling criminale.", "43|Brussell|Dallo stato mentale del criminale → scena del crimine": "D.489: Brussell — si parte dallo stato mentale e psicologico del criminale per poi sovrapporlo alla scena del crimine. È un approccio deduttivo: dal profilo psicologico si interpreta la scena. L'autopsia psicologica (D.483) è una delle fasi della psicologia investigativa.", "43|Teten|Analisi della natura del crimine per identificare l'autore": "D.482: Teten — il metodo per identificare l'autore si basa sull'analisi della natura del crimine. Le caratteristiche specifiche permettono di inferire le caratteristiche del criminale. L'inductive criminal profiling (D.484) permette una rapida elaborazione dei profili con approccio scientifico incisivo.", "43|Bond|Primo contributo sul criminal profiling": "D.485: Bond ha fornito il primo contributo sul criminal profiling — è considerato un precursore della disciplina, avendo per primo tentato di costruire profili psicologici dei criminali sulla base delle caratteristiche del crimine. L'approccio antropologico (D.487) investiga sui fattori organici e motivazionali.", "44|Carver|Dissonanza cognitiva applicata alle relazioni violente (2002)": "D.519: Carver (2002) — dissonanza cognitiva nelle relazioni violente: la donna sperimenta tensione tra la credenza nel valore della relazione e la realtà degli abusi. Per ridurre la dissonanza, minimizza gli abusi o spera nel cambiamento. Alla base della dinamica violenta vi è il controllo (D.518).", "44|Carver|Investimento emozionale trattiene la donna": "D.520: Carver — l'investimento emozionale (sentimenti, pianti, preoccupazioni, anni condivisi) trattiene la donna in un rapporto disfunzionale spingendola a credere che la relazione valga la pena nonostante gli abusi. Caratterizzato da sentimenti e investimento emotivo continuo.", "44|Cupach & Spitzeberg|5 strategie di coping della vittima (2004)": "D.533: Cupach e Spitzeberg (2004) distinguono 5 strategie di coping della vittima. L'ossessività è un precursore potenzialmente comune per lo stalking (D.532). I contenuti prevalenti nelle comunicazioni degli stalker riguardano l'amore o il desiderio (D.538). Il PTSD è il disturbo più frequente (D.534).", "44|Cupach & Spitzeberg|Ossessività come precursore dello stalking": "D.532: Cupach e Spitzeberg — l'ossessività è un precursore potenzialmente comune per lo stalking. Le dinamiche dello stalking sono agite prevalentemente nelle relazioni di coppia (D.531). È importante studiare questo elemento nelle intrusioni relazionali prima che degenerino in stalking.", "44|Walker|Ciclo della violenza: tensione → esplosione → luna di miele": "D.511: Walker descrive il ciclo della violenza in tre fasi: tensione (accumulo di tensioni, piccole provocazioni) → esplosione (episodio acuto di violenza) → luna di miele (riconciliazione, scuse, promesse di cambiamento). L'alternanza tra queste fasi crea dipendenza emotiva nella vittima (trauma bonding).", "45|Carver|Dissonanza cognitiva nella relazione violenta": "D.519-520: nella relazione violenta (Carver) la teoria della dissonanza cognitiva spiega perché la vittima rimane. C'è una dissonanza tra «questa persona mi ama» (credenza) e «questa persona mi maltratta» (realtà). Per ridurre la dissonanza si minimizzano gli abusi o si valorizzano i momenti positivi della luna di miele.", "45|Cupach & Spitzeberg|5 strategie di coping della vittima": "D.533-537: le cinque strategie di coping della vittima (Cupach e Spitzeberg, 2004) rappresentano i modi in cui le vittime cercano di fronteggiare la situazione abusante. Il PTSD è il disturbo più frequente (D.534). Vittime croniche (D.535) vs rivittimizzate (D.536). Difficoltà nel coping = conseguenze dell'abuso psicologico (D.537).", "45|Walker|Ciclo della violenza (fase luna di miele → attaccamento paradossale)": "D.511: il ciclo della violenza di Walker (tensione → esplosione → luna di miele) spiega il trauma bonding: l'alternanza tra violenza e momenti positivi crea un attaccamento paradossale alla figura maltrattante, simile alla sindrome di Stoccolma. La relazione vittima-carnefice è un intreccio complesso di dinamiche psicologiche e di potere.", "45|Seligman|Impotenza appresa nelle vittime di violenza": "D.525: Seligman — l'impotenza appresa (learned helplessness): le vittime di violenza ripetuta, non riuscendo a sfuggire agli abusi nonostante i tentativi, imparano che le loro azioni non hanno effetto sulla situazione e smettono di provare a cambiare le cose. Spiega psicologicamente perché non se ne vanno.", "16|Lewin, Lippit & White|Stile autoritario, democratico, laissez-faire": "D.230: Lewin, Lippit e White (1939) classificano gli stili di leadership: autoritario (il leader decide tutto, impartisce ordini), democratico (decisioni prese con il gruppo, leader che facilita), laissez-faire (leadership permissiva — nominale ma non sostanziale).", "16|Moscovici|Distingue tra potere e influenza": "D.224: Moscovici distingue potere (capacità di imporre attraverso risorse e coercizione) da influenza (capacità di cambiare atteggiamenti e comportamenti senza coercizione). Le minoranze influenzano attraverso coerenza nel tempo, non attraverso potere formale.", "27|Zimbardo|Non sacrificare libertà personali per sicurezza": "D.320: Zimbardo — non sacrificare mai le libertà personali di base per la promessa di una sicurezza, perché i sacrifici sono reali e immediati, mentre la sicurezza promessa è un concetto astratto, un'illusione distante. Un principio cardine contro l'influenza autoritaria.", "42|Carver|Teoria della dissonanza cognitiva applicata alle relazioni violente (2002)": "D.519: Carver (2002) applica la teoria della dissonanza cognitiva alle relazioni violente — la donna sperimenta una dissonanza tra la credenza nel valore della relazione e la realtà degli abusi. Per ridurre la tensione cognitiva, minimizza gli abusi o spera nel cambiamento del partner. Alla base della dinamica violenta vi è il controllo (D.518)."};

// ── STATE ──────────────────────────────────────────────────────────────────────
let currentChapter=CHAPTERS[0],openAuthorIdx=null,selectedConcept=null;
let tick=0,nodes=[],hoveredNode=null;

// ── SIDEBAR ────────────────────────────────────────────────────────────────────
function renderSidebar(filter){
  const list=document.getElementById('chapter-list');list.innerHTML='';
  const q=(filter||'').toLowerCase();
  CHAPTERS.forEach(ch=>{
    if(q&&!ch.title.toLowerCase().includes(q)&&!ch.authors.some(a=>a.name.toLowerCase().includes(q)))return;
    const btn=document.createElement('button');
    btn.className='ch-btn'+(ch.n===currentChapter.n?' active':'');
    btn.innerHTML=`<span class="ch-num">Cap. ${ch.n}</span><span class="ch-title">${ch.title}</span><span class="ch-authors">${ch.authors.map(a=>a.name).join(', ')}</span>`;
    btn.addEventListener('click',()=>selectChapter(ch));
    list.appendChild(btn);
  });
}
document.getElementById('search').addEventListener('input',e=>renderSidebar(e.target.value));

function selectChapter(ch){
  currentChapter=ch;openAuthorIdx=null;selectedConcept=null;
  hideExplain();renderSidebar(document.getElementById('search').value);
  renderTopBar();renderAuthorPanel();renderLegend();computeLayout();
}

// ── TOP BAR ───────────────────────────────────────────────────────────────────
function renderTopBar(){
  document.getElementById('cap-badge').textContent='Cap. '+currentChapter.n;
  document.getElementById('cap-title').textContent=currentChapter.title;
  const total=currentChapter.authors.reduce((s,a)=>s+a.concepts.length,0);
  document.getElementById('cap-stats').textContent=currentChapter.authors.length+' autori · '+total+' concetti';
}

// ── LEGEND ─────────────────────────────────────────────────────────────────────
function renderLegend(){
  document.getElementById('legend').innerHTML=currentChapter.authors.map(a=>
    `<span class="legend-item"><span class="legend-dot" style="background:${a.color}"></span>${a.name} <span style="color:#484f58">(${a.concepts.length})</span></span>`
  ).join('');
}

// ── AUTHOR PANEL ──────────────────────────────────────────────────────────────
function renderAuthorPanel(){
  const body=document.getElementById('ap-body');body.innerHTML='';
  currentChapter.authors.forEach((a,ai)=>{
    const block=document.createElement('div');block.className='author-block';
    const tog=document.createElement('button');
    tog.className='author-toggle';
    tog.style.color=openAuthorIdx===ai?a.color:'#e6edf3';
    tog.style.borderColor=openAuthorIdx===ai?a.color:'#21262d';
    tog.style.background=openAuthorIdx===ai?a.color+'18':'transparent';
    tog.innerHTML=`<span class="author-dot" style="background:${a.color}"></span><span class="author-name" style="color:${openAuthorIdx===ai?a.color:'#e6edf3'}">${a.name}</span><span class="author-count">${openAuthorIdx===ai?'▲':'▼'} ${a.concepts.length}</span>`;
    tog.addEventListener('click',()=>{openAuthorIdx=openAuthorIdx===ai?null:ai;renderAuthorPanel();});
    const cl=document.createElement('div');
    cl.className='concepts-list'+(openAuthorIdx===ai?' open':'');
    a.concepts.forEach((c,ci)=>{
      const isSel=selectedConcept&&selectedConcept.author.name===a.name&&selectedConcept.concept.text===c.text;
      const btn=document.createElement('button');
      btn.className='concept-btn'+(isSel?' selected':'');
      btn.style.borderLeftColor=isSel?a.color:a.color+'44';
      btn.style.background=isSel?a.color+'18':'transparent';
      btn.innerHTML=`<span class="concept-text">${isSel?'<span style="color:'+a.color+'">▶ </span>':''}${c.text}</span><span class="concept-exam" style="color:${a.color}">${c.exam}</span>`;
      btn.addEventListener('click',()=>{
        selectedConcept={author:a,concept:c,chapter:currentChapter};
        renderAuthorPanel();showExplain(a,c);
      });
      cl.appendChild(btn);
    });
    block.appendChild(tog);block.appendChild(cl);body.appendChild(block);
  });
}

// ── EXPLANATION PANEL ─────────────────────────────────────────────────────────
function showExplain(author,concept){
  const panel=document.getElementById('explain-panel');
  const inner=document.getElementById('ep-inner');
  panel.classList.remove('hidden');
  inner.style.borderLeftColor=author.color+'55';
  inner.style.boxShadow='-6px 0 28px '+author.color+'18';
  document.getElementById('ep-header').style.background='#161b22';
  document.getElementById('ep-author-name').style.color=author.color;
  document.getElementById('ep-dot').style.background=author.color;
  document.getElementById('ep-aname').textContent=author.name;
  const box=document.getElementById('ep-concept-box');
  box.style.background='#21262d';box.style.border='1px solid '+author.color+'66';
  document.getElementById('ep-concept-text').textContent=concept.text;
  const examEl=document.getElementById('ep-concept-exam');
  examEl.textContent=concept.exam;examEl.style.color=author.color;
  const key=currentChapter.n+'|'+author.name+'|'+concept.text;
  const explanation=EXPLANATIONS[key]||'Spiegazione non disponibile per questo concetto.';
  document.getElementById('ep-text').textContent=explanation;
}

function hideExplain(){
  document.getElementById('explain-panel').classList.add('hidden');
  selectedConcept=null;
}
document.getElementById('ep-close').addEventListener('click',hideExplain);

// ── CANVAS / MIND MAP ─────────────────────────────────────────────────────────
const canvas=document.getElementById('cv');
const ctx=canvas.getContext('2d');
const tooltip=document.getElementById('tooltip');

function resize(){
  const wrap=document.getElementById('canvas-wrap');
  const dpr=window.devicePixelRatio||1;
  canvas.width=wrap.clientWidth*dpr;canvas.height=wrap.clientHeight*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);computeLayout();
}

function computeLayout(){
  const W=canvas.width/(window.devicePixelRatio||1);
  const H=canvas.height/(window.devicePixelRatio||1);
  const cx=W/2,cy=H/2;
  nodes=[];
  nodes.push({type:'center',x:cx,y:cy,r:50,label:'Cap. '+currentChapter.n,sub:currentChapter.title});
  currentChapter.authors.forEach((a,ai)=>{
    const angle=(2*Math.PI*ai/currentChapter.authors.length)-Math.PI/2;
    const aR=Math.min(W,H)*0.28;
    const ax=cx+aR*Math.cos(angle),ay=cy+aR*Math.sin(angle);
    nodes.push({type:'author',x:ax,y:ay,r:30,label:a.name,color:a.color,ai});
    a.concepts.forEach((c,ci)=>{
      const nC=a.concepts.length;
      const spread=Math.min(Math.PI*0.55,nC*0.18);
      const cAngle=angle+(ci-(nC-1)/2)*(spread/Math.max(nC-1,1));
      const cR=aR+112+(ci%2)*18;
      nodes.push({type:'concept',x:cx+cR*Math.cos(cAngle),y:cy+cR*Math.sin(cAngle),r:6,label:c.text,exam:c.exam,color:a.color,ai});
    });
  });
}

function wrapText(ctx,text,x,y,maxW,lh){
  const words=text.split(' ');let line='',lines=[];
  words.forEach(w=>{const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;});
  lines.push(line);
  const sy=y-(lines.length-1)*lh/2;
  lines.forEach((l,i)=>ctx.fillText(l,x,sy+i*lh));
}

function draw(){
  tick++;
  const W=canvas.width/(window.devicePixelRatio||1);
  const H=canvas.height/(window.devicePixelRatio||1);
  ctx.clearRect(0,0,W,H);
  const center=nodes[0];
  // edges
  currentChapter.authors.forEach((a,ai)=>{
    const aN=nodes.find(n=>n.type==='author'&&n.ai===ai);if(!aN)return;
    ctx.beginPath();ctx.moveTo(center.x,center.y);ctx.lineTo(aN.x,aN.y);
    ctx.strokeStyle=a.color+'55';ctx.lineWidth=2;ctx.stroke();
    nodes.filter(n=>n.type==='concept'&&n.ai===ai).forEach(cn=>{
      ctx.beginPath();ctx.moveTo(aN.x,aN.y);ctx.lineTo(cn.x,cn.y);
      ctx.strokeStyle=a.color+'3a';ctx.lineWidth=1.2;ctx.stroke();
    });
  });
  // concept nodes
  nodes.filter(n=>n.type==='concept').forEach(n=>{
    const hov=hoveredNode===n;
    ctx.save();ctx.beginPath();ctx.arc(n.x,n.y,hov?9:6,0,Math.PI*2);
    ctx.fillStyle=n.color;ctx.globalAlpha=hov?1:0.8;ctx.fill();ctx.restore();
    ctx.save();ctx.font=hov?'bold 10px monospace':'9.5px monospace';
    ctx.fillStyle=hov?'#fff':'#c9d1d9';ctx.globalAlpha=hov?1:0.82;ctx.textAlign='center';
    wrapText(ctx,n.label,n.x,n.y+16,115,11);ctx.restore();
  });
  // author nodes
  nodes.filter(n=>n.type==='author').forEach(n=>{
    const hov=hoveredNode===n;const pulse=hov?Math.sin(tick*0.05)*3:0;const r=n.r+pulse;
    const g=ctx.createRadialGradient(n.x,n.y,r*.3,n.x,n.y,r*1.8);
    g.addColorStop(0,n.color+'44');g.addColorStop(1,'transparent');
    ctx.beginPath();ctx.arc(n.x,n.y,r*1.8,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle='#161b22';ctx.fill();
    ctx.strokeStyle=n.color;ctx.lineWidth=hov?2.5:1.8;ctx.stroke();
    ctx.font='bold 10px monospace';ctx.fillStyle=n.color;ctx.textAlign='center';ctx.textBaseline='middle';
    wrapText(ctx,n.label,n.x,n.y,52,11);ctx.textBaseline='alphabetic';
  });
  // center
  const pc=Math.sin(tick*0.03)*4;const rc=center.r+pc;
  const gc=ctx.createRadialGradient(center.x,center.y,rc*.1,center.x,center.y,rc*2);
  gc.addColorStop(0,'#1f6feb66');gc.addColorStop(1,'transparent');
  ctx.beginPath();ctx.arc(center.x,center.y,rc*2,0,Math.PI*2);ctx.fillStyle=gc;ctx.fill();
  ctx.beginPath();ctx.arc(center.x,center.y,rc,0,Math.PI*2);
  ctx.fillStyle='#161b22';ctx.fill();ctx.strokeStyle='#58a6ff';ctx.lineWidth=2.5;ctx.stroke();
  ctx.font='bold 11px monospace';ctx.fillStyle='#58a6ff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(center.label,center.x,center.y-7);
  ctx.font='9px monospace';ctx.fillStyle='#8b949e';
  wrapText(ctx,center.sub,center.x,center.y+8,rc*1.8,10);ctx.textBaseline='alphabetic';
  requestAnimationFrame(draw);
}

// Touch support for canvas
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const touch=e.changedTouches[0];
  const rect=canvas.getBoundingClientRect();
  const x=touch.clientX-rect.left,y=touch.clientY-rect.top;
  for(const n of nodes){
    const dx=n.x-x,dy=n.y-y;
    if(Math.sqrt(dx*dx+dy*dy)<(n.type==='concept'?28:n.r+10)){
      if(n.type==='concept'){
        // Find author for this concept
        const a=currentChapter.authors[n.ai];
        const c=a.concepts.find(cc=>cc.text===n.label);
        if(c){selectedConcept={author:a,concept:c,chapter:currentChapter};renderAuthorPanel();showExplain(a,c);}
      }
      break;
    }
  }
},{passive:false});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left,y=e.clientY-rect.top;
  let found=null;
  for(const n of nodes){const dx=n.x-x,dy=n.y-y;if(Math.sqrt(dx*dx+dy*dy)<(n.type==='concept'?20:n.r+5)){found=n;break;}}
  hoveredNode=found;canvas.style.cursor=found?'pointer':'default';
  if(found&&found.type==='concept'){
    tooltip.style.display='block';tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-18)+'px';
    tooltip.style.borderColor=found.color;
    document.getElementById('tooltip-exam').style.color=found.color;
    document.getElementById('tooltip-exam').textContent=found.exam;
    document.getElementById('tooltip-text').textContent=found.label;
  }else tooltip.style.display='none';
});
canvas.addEventListener('mouseleave',()=>{hoveredNode=null;tooltip.style.display='none';});
window.addEventListener('resize',resize);


// ── SERVICE WORKER (PWA offline cache) ───────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── SIDEBAR TOGGLE for iPad ───────────────────────────────────────────────────
(function(){
  const sidebar=document.getElementById('sidebar');
  const toggleBtn=document.createElement('button');
  toggleBtn.id='sidebar-toggle';
  toggleBtn.textContent='☰';
  toggleBtn.style.cssText='position:fixed;top:12px;left:12px;z-index:500;background:#161b22;border:1px solid #21262d;border-radius:6px;color:#58a6ff;font-size:18px;width:36px;height:36px;cursor:pointer;display:none;align-items:center;justify-content:center;';
  document.body.appendChild(toggleBtn);

  let sidebarOpen=true;
  function checkLayout(){
    if(window.innerWidth<900){
      toggleBtn.style.display='flex';
      if(sidebarOpen){
        sidebar.style.cssText='width:260px;min-width:260px;position:fixed;left:0;top:0;height:100vh;z-index:400;transition:transform .25s ease;';
      } else {
        sidebar.style.cssText='width:260px;min-width:260px;position:fixed;left:0;top:0;height:100vh;z-index:400;transition:transform .25s ease;transform:translateX(-100%);';
      }
    } else {
      toggleBtn.style.display='none';
      sidebar.style.cssText='width:220px;min-width:220px;position:relative;transform:none;';
    }
  }
  toggleBtn.addEventListener('click',()=>{sidebarOpen=!sidebarOpen;checkLayout();});
  window.addEventListener('resize',checkLayout);
  checkLayout();
})();

// ── INIT ──────────────────────────────────────────────────────────────────────
renderSidebar();renderTopBar();renderAuthorPanel();renderLegend();resize();draw();
</script>
