const EXPLANATIONS={"1|Allport|Def. psicologia sociale": "Allport (1985): studia come pensieri, sentimenti e comportamenti degli individui siano influenzati dalla presenza reale, immaginaria o implicita di altri. È la definizione fondamentale. D.492/D.542: chi ha dato questa definizione → risposta: Allport.", "1|Allport|Presenza reale/immaginaria/implicita degli altri": "Allport distingue tre forme: presenza reale (fisica), immaginaria (nella mente), implicita (basta sapere che esistono). Gli altri ci influenzano anche quando non ci sono fisicamente. D.551 chiede esattamente questa tripartizione.", "1|Allport|Atteggiamenti come stati inferibili": "D.157: Allport considera gli atteggiamenti come stati mentali di prontezza organizzati tramite l'esperienza, non osservabili direttamente ma inferibili dal comportamento. Variabile interveniente stimolo→risposta.", "1|Norman Triplett|1° esperimento di psicologia sociale": "D.7: Triplett (1897) — i ciclisti pedalano più veloci in gara che da soli. Replica in laboratorio con bambini che avvolgono lenze in coppia: vanno più veloci. È il primo esperimento sistematico di psicologia sociale.", "1|Norman Triplett|Social labouring / facilitazione sociale": "D.7: social labouring o facilitazione sociale — la presenza di altri che svolgono lo stesso compito migliora la prestazione su compiti semplici o già appresi. Opposto del social loafing di Ringelmann.", "1|Ringelmann|Pigrizia sociale (social loafing)": "D.8/D.203: Ringelmann (1880) — più persone tirano una fune insieme, ognuna tira con meno forza. Social loafing: in gruppo l'impegno individuale cala perché ci si sente anonimi. L'individuo riduce il proprio sforzo circa la sua singola prestazione.", "1|Ringelmann|In gruppo → sforzo individuale ridotto": "D.203: conclusione di Ringelmann — nel gruppo il contributo del singolo si riduce. Contrasto con Triplett: presenza altrui MIGLIORA la prestazione quando il contributo è identificabile (Triplett), PEGGIORA quando ci si sente parte anonima (Ringelmann).", "1|Le Bon|La psicologia delle folle": "D.6: Le Bon pubblica nel 1895 \"La psicologia delle folle\" — analizza come nella folla le persone vengano dominate da una mentalità collettiva primitiva. Precursore della ricerca sull'influenza sociale.", "1|Le Bon|Suggestione come ipnosi collettiva": "D.265: Le Bon spiega il comportamento della folla con la suggestione, ritenuta una sorta di ipnosi collettiva. Le persone perdono senso critico e responsabilità individuale nella folla.", "1|Bentham|Approccio centrato sulla persona": "D.4: Bentham (1748-1832) è il fondatore dell'approccio centrato sulla persona, basato sul principio di utilità — le azioni umane servono a produrre piacere e ad evitare il dolore (edonismo utilitaristico).", "1|Bentham|Principio di utilità: piacere vs dolore": "D.4: il principio di utilità di Bentham — si fa ciò che produce più piacere e meno dolore. Anticipa le moderne teorie della motivazione individuale. Mnemonico: Bentham = Bilancio piacere-dolore.", "1|Hegel|Approccio centrato sul sociale": "D.5: Hegel (1770-1831) è il fondatore dell'approccio centrato sul sociale — lo Stato è l'incarnazione della mente sociale, l'individuo si comprende solo nel contesto collettivo. Il Tutto precede le parti.", "1|Hegel|Stato = incarnazione della mente sociale": "D.5: per Hegel lo Stato è l'espressione concreta della mente collettiva di un popolo. Anticipa il concetto di «mente di gruppo». Contrasto con Bentham: Hegel → il sociale precede l'individuale.", "1|McDougall|Introduction to Social Psychology (1908)": "D.9: McDougall (1908) — \"Introduction to Social Psychology\". Oggetto: l'individuo e come si pone col mondo esterno. Tesi: i comportamenti sociali derivano da istinti innati. Prima delle due opere fondative con il testo di Ross.", "1|McDougall|Comportamenti sociali da istinti innati": "D.9: McDougall — i comportamenti sociali derivano da tendenze innate o istinti biologicamente determinati. Posizione opposta a Ross. Mnemonico: McDougall → biologico → tutto innato.", "1|Ross|Social Psychology (1908)": "D.10: Ross (1908) — \"Social Psychology\". Oggetto: l'influenza del sociale sul comportamento degli individui. Opposto a McDougall. Mnemonico: Ross → ruolo della società → contesto sociale determina il comportamento.", "1|Ross|L'influenza del sociale sul comportamento": "D.10: per Ross le altre persone, anche non fisicamente presenti, hanno un potere determinante sul comportamento. Anticipa i temi dell'influenza sociale del Novecento. Contesto sociale >> biologia per Ross.", "2|G.H. Mead|Padre dell'interazionismo simbolico": "D.31/D.541: George Herbert Mead (1863-1931) è il fondatore dell'interazionismo simbolico. Il comportamento individuale è mediato dai significati che i soggetti attribuiscono alla situazione, non dagli stimoli diretti.", "2|G.H. Mead|Comportamento mediato dai significati": "D.32: presupposto centrale di Mead — gli esseri umani non reagiscono agli stimoli direttamente, ma attraverso la mediazione dei significati. Prima interpretano il significato dello stimolo, poi agiscono. Distingue l'interazionismo dal behaviorismo.", "2|G.H. Mead|Sé = interazione tra Io (I) e Me": "D.39: per Mead il Sé è un dialogo interno tra Io (I) — la parte spontanea e creativa — e Me — la parte interiorizzata delle aspettative sociali (il giudice interno). Mnemonico: I = Impulso; Me = immagine degli altri interiorizzata.", "2|G.H. Mead|Altro generalizzato (ego-alter)": "D.40: l'altro generalizzato è la rappresentazione interiorizzata delle aspettative della collettività — «la società nella mia mente». Si costruisce attraverso il gioco organizzato (game) quando il bambino considera il punto di vista di tutti.", "2|G.H. Mead|L'atto = unità funzionale della condotta": "D.37: per Mead l'atto è l'unità minima del comportamento intenzionale. Fasi: impulso → percezione → manipolazione → consumazione. L'atto termina con la consumazione (D.38).", "2|G.H. Mead|Linguaggio = strumento dell'atto sociale": "D.63: per Mead l'acquisizione del linguaggio è lo strumento che permette di partecipare a un atto sociale. Attraverso i simboli linguistici condivisi si coordinano le azioni e si costruiscono significati comuni.", "2|Watson|Psicologia studia condizioni obiettive del comportamento": "D.11: Watson fonda il comportamentismo — la psicologia ha il compito di studiare le condizioni obiettive che determinano il comportamento, non la coscienza. Motto behaviourista: stimolo → risposta, niente altro.", "2|Watson|Comportamentismo orientato all'oggettività": "D.13: il comportamentismo di Watson è orientato verso l'oggettività — studia solo stimoli e risposte osservabili, esclusa la mente. Rende la psicologia rigorosa ma ignora i processi cognitivi.", "2|Watson|Teorico del versante comportamentista": "D.333/D.334: Watson è il teorico del versante comportamentista della psicolinguistica. Il pensiero è «discorso subvocalico» — attività motoria interiorizzata al di sotto dell'espressione vocale, del tutto interiorizzato.", "2|Pavlov|Condizionamento classico": "D.14: Pavlov mette a punto il condizionamento classico. Uno stimolo neutro (campanella) associato ripetutamente allo stimolo naturale (cibo) produce da solo la risposta (salivazione). Meccanismo base dell'apprendimento associativo.", "2|Pavlov|Riflesso condizionato": "D.15: il riflesso condizionato — associazione appresa tra stimolo condizionato e risposta che prima era prodotta solo dallo stimolo naturale. Il cane saliva alla campanella dopo averla associata al cibo.", "2|Pavlov|Stimolo incondizionato + stimolo condizionato": "D.16: il condizionamento si verifica con l'associazione di uno stimolo incondizionato (naturale: cibo) a uno condizionato (artificiale: campanella) in un organismo. Dopo ripetizioni, lo stimolo artificiale produce da solo la risposta naturale.", "2|Skinner|Condizionamento operante": "D.17: Skinner mette a punto il condizionamento operante — il comportamento è modellato dalle sue conseguenze. Rinforzo positivo → il comportamento si ripete; punizione → si estingue. L'organismo opera attivamente sull'ambiente.", "2|Skinner|Processo di selezione adattativa": "D.18: il condizionamento operante è visto come un processo di selezione adattativa — i comportamenti con conseguenze positive vengono selezionati, quelli negativi eliminati. Analogia con la selezione naturale darwiniana.", "2|Markus & Zajonc|Modello O-S-O-R (1985)": "D.25: Markus e Zajonc (1985) propongono il modello O-S-O-R — Organismo-Stimolo-Organismo-Risposta. Il primo O = stato iniziale (conoscenze, aspettative); il secondo O = elaborazione cognitiva. Supera il semplice S-R behaviourista aggiungendo i processi interni.", "2|Markus & Zajonc|Gli stati interni hanno ruolo attivo": "D.26: nel modello O-S-O-R gli stati interni dell'organismo (credenze, aspettative, schemi) hanno un ruolo attivo — compiono una selezione sia degli stimoli che delle risposte. Non siamo macchine passive: la mente media l'esperienza.", "3|Bandura|Padre della teoria dell'apprendimento sociale": "D.51: Bandura è il fondatore della teoria dell'apprendimento sociale, basata sul determinismo triadico reciproco: ambiente, persona (cognitiva, fisica, affettiva) e comportamento si influenzano reciprocamente. L'apprendimento avviene anche per osservazione e imitazione.", "3|Bandura|Bobo Doll Experiment (3 gruppi)": "D.52/53: Bobo Doll Experiment (1961) — 3 gruppi: adulto aggressivo / adulto pacifico / controllo senza adulto. I bambini esposti al modello aggressivo mostrano più aggressività e usano più giocattoli violenti. Dimostra l'apprendimento osservativo senza rinforzo diretto.", "3|Bandura|Apprendimento osservativo/vicariante": "D.54: l'apprendimento vicariante (osservativo) di Bandura — si apprende osservando le conseguenze del comportamento degli altri (modelli), senza sperimentarle direttamente. «Vicariante» = al posto di qualcun altro.", "3|Bandura|Acquisizione tramite elaborazione cognitiva": "D.55: per Bandura l'apprendimento consiste nell'acquisizione di conoscenze attraverso l'elaborazione cognitiva delle informazioni osservate. Non è meccanico come nel condizionamento: la mente elabora attivamente.", "3|Bandura|Simbolizzazione come capacità chiave": "D.60: la simbolizzazione è la capacità chiave per l'apprendimento sociale — rappresentare internamente esperienze tramite immagini e parole consente di imparare anche in assenza del modello e di riprodurre il comportamento in seguito.", "3|Bandura|Determinismo triadico reciproco": "D.88: il determinismo triadico reciproco di Bandura — comportamento, persona (cognitiva/biologica/affettiva) e ambiente si influenzano reciprocamente in rete circolare. L'autoregolazione opera attraverso un set di sottofunzioni psicologiche secondo questa teoria.", "3|Piaget|Cooperazione sociale → sviluppo morale": "D.61/D.555: Piaget — la cooperazione sociale è il motore dello sviluppo morale. Attraverso l'interazione con i pari (non con gli adulti) il bambino supera l'egocentrismo morale e capisce che le regole sono accordi tra persone.", "3|Piaget|Fase senso-motoria: 0-24 mesi": "D.62: la fase senso-motoria (0-24 mesi) è il primo stadio di Piaget — il bambino conosce il mondo tramite sensi e azioni motorie, senza simboli o linguaggio. È il periodo in cui si sviluppa la permanenza dell'oggetto.", "3|Piaget|Imitazione nello stadio sensomotorio": "D.266: Piaget — lo sviluppo dell'imitazione avviene all'interno dello stadio sensomotorio. Il bambino prima imita solo movimenti già nel proprio repertorio, poi impara a imitare movimenti nuovi osservandoli.", "3|Piaget|A 2 mesi: superamento egocentrismo radicale": "D.308: secondo la teoria dello sviluppo di Piaget, a circa 2 mesi inizia il superamento dell'egocentrismo radicale — il bambino comincia a distinguere sé stesso dall'ambiente e ad avere prime interazioni contingenti.", "3|Erikson|Ogni fase = crisi cognitivo-sociale": "D.64: Erikson identifica 8 fasi dello sviluppo psicosociale, ciascuna caratterizzata da una crisi cognitivo-sociale — tensione tra due forze opposte (es. fiducia vs sfiducia) che se risolta positivamente produce crescita psicologica.", "3|Erikson|8 stadi dello sviluppo psicosociale": "D.64: i famosi 8 stadi di Erikson coprono tutto l'arco della vita: fiducia/sfiducia → autonomia/vergogna → iniziativa/colpa → industriosità/inferiorità → identità/confusione → intimità/isolamento → generatività/stagnazione → integrità/disperazione.", "3|Bronfenbrenner|Modello ecologico dello sviluppo": "D.65: Bronfenbrenner propone il modello ecologico — lo sviluppo avviene in sistemi concentrici: microsistema (famiglia, scuola), mesosistema (interazioni tra microsistemi), esosistema (contesti indiretti come il lavoro dei genitori), macrosistema (cultura).", "3|Bronfenbrenner|Microsistema famiglia = primo mediatore": "D.66: il microsistema famiglia è il primo elemento di mediazione tra la persona e il mondo circostante. È nel contesto familiare che il bambino fa le prime esperienze relazionali e costruisce i primi schemi di interazione.", "3|Bronfenbrenner|Esosistema: aree in cui la persona non partecipa": "D.67: l'esosistema comprende aree della vita sociale alle quali la persona non partecipa direttamente, ma che la influenzano comunque — es. il posto di lavoro dei genitori, il consiglio scolastico.", "4|Bowlby|Padre della teoria dell'attaccamento": "D.41/D.554: Bowlby è il padre della teoria dell'attaccamento — spiega il legame emotivo tra bambino e caregiver. Si ispirò a Darwin (valore evolutivo di sopravvivenza), Harlow (scimmie e madri artificiali) e Lorenz (imprinting).", "4|Bowlby|Ispiratori: Darwin, Harlow, Lorenz": "D.42/D.545: Bowlby si ispirò a Darwin (il legame ha valore evolutivo di sopravvivenza), Harlow (le scimmie preferiscono la madre morbida alla madre-cibo), Lorenz (l'imprinting dimostra la criticità dei legami precoci).", "4|Bowlby|Scopo dell'attaccamento: protezione dai pericoli": "D.43: lo scopo primario del sistema di attaccamento è la protezione dai pericoli esterni. Il bambino cerca la vicinanza della figura di attaccamento (base sicura) quando si sente minacciato. Non è solo bisogno di nutrimento ma di sicurezza.", "4|Bowlby|Primi legami → modelli operativi interni": "D.50: i primi legami vengono interiorizzati come modelli operativi interni (MOI) — rappresentazioni mentali di sé, degli altri e delle relazioni che guidano le aspettative nelle relazioni future. Attaccamento sicuro o insicuro si riflette nei rapporti adulti.", "4|Ainsworth|Strange Situation: valutazione attaccamento": "D.47: Ainsworth mette a punto la Strange Situation — procedura standardizzata (laboratorio, madre, bambino, estraneo, separazioni e riunioni) per classificare lo stile di attaccamento del bambino in Tipo A, B o C.", "4|Ainsworth|Attaccamento sicuro = Tipo B": "D.48: lo stile di attaccamento sicuro è classificato come Tipo B — il bambino usa la madre come base sicura per esplorare, protesta alla separazione ma si calma facilmente al ritorno. È lo stile più adattivo.", "4|Ainsworth|Stile insicuro-evitante: il bambino evita la madre": "D.49: nello stile insicuro-evitante (Tipo A) il bambino evita la madre al ritorno — non piange alla separazione e la ignora quando torna. Ha imparato che la madre non risponde ai suoi bisogni e ha soppresso le espressioni di attaccamento.", "4|James|Sé come conoscitore + Sé come oggetto": "D.69: William James (1890) distingue due aspetti del Sé: il Sé come conoscitore (I/Io) — la parte che esperisce — e il Sé come oggetto di conoscenza (Me) — le caratteristiche che ci si attribuisce. Mnemonico: I = chi conosce; Me = ciò che conosce di sé.", "4|James|Egocentralità: focalizzazione sul Sé nei giudizi": "D.70: l'egocentralità permette alla persona di mantenere la focalizzazione sui contenuti del Sé durante i processi di giudizio e memoria. Valutiamo gli eventi in relazione a noi stessi e ricordiamo meglio ciò che ci riguarda.", "4|James|Self-serving bias: successi interni, fallimenti esterni": "D.74: il self-serving bias — tendenza ad attribuire i successi a cause interne (abilità, impegno) e i fallimenti a cause esterne (sfortuna). Protegge l'autostima. Mnemonico: mi prendo il merito dei successi, do la colpa agli altri dei fallimenti.", "4|Festinger|Teoria del confronto sociale (1954)": "D.71/72: Festinger (1954) — le persone hanno bisogno di valutare le proprie opinioni e abilità e lo fanno confrontandosi con gli altri in assenza di standard oggettivi. Il confronto sociale è il meccanismo principale per definire il Sé.", "4|Festinger|Ci definiamo confrontandoci con chi ci circonda": "D.71: secondo Festinger, non sappiamo se siamo bravi o intelligenti in assoluto — lo sappiamo solo rispetto agli altri. I confronti possono essere verso l'alto (motivante) o verso il basso (protegge l'autostima).", "4|Festinger|Convinzioni e comportamenti sono soggettivi": "D.72: per Festinger, convinzioni, sentimenti e comportamenti sono soggettivi — non hanno validità oggettiva assoluta. Per questo abbiamo bisogno degli altri per valutarli: il confronto sociale fornisce il punto di riferimento esterno.", "4|Bronfenbrenner|Modello ecologico": "D.65-67: il modello ecologico di Bronfenbrenner vede lo sviluppo del Sé come progressivo adattamento tra individuo in crescita e sistemi ambientali concentrici: microsistema, mesosistema, esosistema, macrosistema, cronosistema.", "4|Bronfenbrenner|Micro/eso/macro/cronosistema": "D.65-67: microsistema (famiglia, classe — contatti diretti), esosistema (lavoro dei genitori — contesti indiretti), macrosistema (cultura e valori societari), cronosistema (cambiamenti nel tempo: divorzi, crisi). Ogni livello influenza lo sviluppo.", "4|Brewers & Gardner|Sé individuale, relazionale e collettivo (1996)": "D.73: Brewers e Gardner (1996) propongono tre livelli del Sé: individuale (tratti personali unici), relazionale (definito dalle relazioni intime), collettivo (definito dall'appartenenza a gruppi). Il contesto attiva quale forma del Sé è più saliente.", "5|Festinger|Confronto sociale: verso l'alto e verso il basso": "D.71-72: Festinger identifica due direzioni del confronto: verso l'alto (con chi è migliore — motivante ma può abbassare l'autostima) e verso il basso (con chi è peggio — protegge l'autostima). Nelle prestazioni scolastiche/lavorative entrambi si attivano.", "5|Festinger|Punto di riferimento esterno oggettivo": "D.72: il confronto sociale fornisce un punto di riferimento esterno oggettivo. Quando non esiste uno standard fisico misurabile, gli altri diventano il nostro termometro. Trasforma le valutazioni soggettive in qualcosa di più ancorato.", "5|Baumeister|Autostima = aspetto valutativo della coscienza riflessiva": "D.104: Baumeister (1998) — l'autostima è un aspetto valutativo della coscienza riflessiva, la dimensione in cui valutiamo il nostro valore come persone. Non è descrittiva (\"sono alto\") ma valutativa (\"sono degno di essere amato\").", "5|Bandura|Autoefficacia (capacità) ≠ autostima (valore)": "D.107/D.552: Bandura distingue autoefficacia (giudizi di capacità personale — \"sono in grado di fare X?\") da autostima (giudizi di valore personale — \"sono una persona valida?\"). Si può avere alta autoefficacia in matematica e bassa autostima globale.", "5|Bandura|Self-handicapping: strategia di autoimpedimento": "D.78: il self-handicapping è una strategia difensiva del Sé — si creano deliberatamente ostacoli alla propria prestazione per avere una scusa in caso di fallimento (\"ho fallito perché ero stanco\"). È classificato come strategia di autoimpedimento.", "5|Brewers & Gardner|Sé individuale, relazionale, collettivo": "D.73: tripartizione di Brewers e Gardner — Sé individuale (tratti unici), Sé relazionale (definito dalle relazioni importanti), Sé collettivo (definito dall'appartenenza a gruppi). Culture individualiste enfatizzano il Sé individuale, collettiviste il collettivo.", "6|Bandura|Cognitive self-management": "D.81: l'autoregolazione e l'autocontrollo costituiscono il processo del cognitive self-management — la gestione cognitiva di se stessi. È la metacognizione in azione: usare la propria mente per orchestrare e dirigere il comportamento verso obiettivi.", "6|Bandura|Autoregolazione = metacognizione in azione": "D.82: l'autoregolazione è la metacognizione in azione — pensare al proprio pensiero e usarla per pianificare, monitorare e correggere il comportamento. Chi sa autoregolarsi ottiene risultati scolastici migliori e maggiore resistenza alle difficoltà.", "6|Bandura|Distingue: controllare / controllo / convinzioni di controllo": "D.84: Bandura distingue tre livelli: (1) il controllare = la regolazione effettiva in atto; (2) il controllo = la possibilità potenziale; (3) le convinzioni di controllo = la credenza soggettiva di essere capace di controllare. Tre cose diverse che non sempre coincidono.", "6|Bandura|Convinzioni di contingenza + competenza": "D.86: le convinzioni di controllo si compongono di convinzioni di contingenza (\"se faccio X, accadrà Y\" — aspettative sui risultati) e convinzioni di competenza (\"sono in grado di fare X\" — aspettative di efficacia). Entrambe sono necessarie per l'azione efficace.", "6|Bandura|Sistema cognitivo autoregolativo": "D.89-90: il sistema cognitivo autoregolativo include la capacità di individuare obiettivi soddisfacenti e la capacità di riaggiustare e ridefinire le aspirazioni sulla base dei propri standard di prestazione. È un sistema di feedback continuo tra obiettivi, prestazioni e standard.", "6|Bandura|Determinismo Triadico Reciproco": "D.88: il DTR di Bandura — l'autoregolazione opera attraverso l'interazione reciproca tra fattori personali cognitivi/biologici/affettivi, comportamento e ambiente. Non è lineare causa→effetto ma una rete di influenze bidirezionali.", "6|Bandura|Condizionamento = esperienza di contingenza": "D.87: l'abituazione, il condizionamento classico e quello strumentale sono esperienze di contingenza — l'organismo apprende le relazioni causali tra eventi. Le convinzioni di contingenza si formano attraverso queste esperienze di apprendimento.", "7|Bandura|Autoefficacia = credenza contesto/compito specifica": "D.91/D.105: l'autoefficacia percepita (Bandura, 1986) è una credenza specifica per contesto e compito — non una valutazione globale delle proprie capacità ma la percezione di essere competenti in quel contesto specifico con quel compito specifico.", "7|Bandura|Importante mediatore della motivazione": "D.92: l'autoefficacia è un importante mediatore della motivazione — se credi di poter riuscire, sei più motivato a impegnarti; se non ci credi, rinunci prima. Catena: alta autoefficacia → maggiore motivazione → maggiore impegno → migliore prestazione.", "7|Bandura|Non innata: si costruisce gradatamente": "D.93/D.544: l'autoefficacia non è presente dalla nascita ma si costruisce gradatamente nel corso della vita attraverso esperienze dirette, osservazione di modelli, feedback verbale e stati emotivi. Cresce in adolescenza e declina in tarda maturità.", "7|Bandura|Fonti: successi/fallimenti passati": "D.94: la prima e più potente fonte dell'autoefficacia sono i successi e i fallimenti passati — i successi la aumentano, i fallimenti ripetuti la diminuiscono. Le altre 5 fonti: esperienze vicarie, capacità immaginativa, persuasione verbale, stato fisiologico, stato emotivo.", "7|Bandura|Grandezza, forza, generalizzazione": "D.95-96: l'autoefficacia varia lungo tre dimensioni — grandezza (quante difficoltà crescenti si ritiene di affrontare), forza (quanto si è convinti, correlata alla persistenza), generalizzazione (in quante situazioni simili si estende la credenza di efficacia).", "7|Bandura|Autoefficacia collettiva: motiva i gruppi": "D.97: l'autoefficacia collettiva è la credenza condivisa dai membri di un gruppo di poter raggiungere obiettivi comuni con elevati standard di competenza. Permette di motivare i gruppi verso traguardi ambiziosi. Mnemonico: team efficace = team che crede in sé come unità.", "7|Bandura|Predice % problemi risolti a scuola": "D.98-99: le convinzioni degli studenti circa la propria efficacia predicono la percentuale di problemi risolti e l'incremento delle abilità di studio. Non è solo la capacità reale ma la credenza nella propria capacità a determinare il successo scolastico.", "7|Bandura|Capacità immaginativa come fonte": "D.546: la capacità immaginativa è una delle sei fonti dell'autoefficacia — permette di anticipare mentalmente situazioni, proprie reazioni ed emozioni, e conseguenze delle azioni. Simulare mentalmente un successo aumenta l'autoefficacia percepita.", "7|Bandura|Si sviluppa in adolescenza e declina in maturità": "D.544: l'autoefficacia tendenzialmente si sviluppa e cresce dalla prima alla tarda adolescenza e declina dalla prima alla tarda maturità. Il picco coincide con il periodo di massima acquisizione di competenze e identità.", "8|Baumeister|Autostima = aspetto valutativo della coscienza riflessiva": "D.104: Baumeister (1998) — l'autostima è un aspetto valutativo della coscienza riflessiva: la dimensione in cui valutiamo il nostro valore come persone. Non è descrittiva ma valutativa: quanto mi piaccio, quanto mi reputo degno.", "8|Bandura|Autostima = giudizi di valore personale": "D.107/D.552: per Bandura l'autoefficacia riguarda i giudizi di capacità personale (\"posso fare X?\"), mentre l'autostima riguarda i giudizi di valore personale (\"sono una persona che vale?\"). Costrutti distinti: autoefficacia è compito-specifica, autostima è globale.", "8|Bandura|Vs autoefficacia = giudizi di capacità": "D.107: distinzione chiave per l'esame — autoefficacia = \"sono capace di?\" (giudizi di capacità, specifici per compito); autostima = \"valgo come persona?\" (giudizi di valore, globali). Entrambi influenzano la motivazione ma in modo diverso.", "8|James|Self-serving bias": "D.74: il self-serving bias — tendenza ad attribuire i successi a cause interne (abilità, impegno) e i fallimenti a cause esterne (sfortuna, difficoltà). Serve a proteggere e mantenere alta l'autostima. Distorsione attributiva sistematica.", "8|James|Affiliazione mirata per sentirsi più sicuri di sé": "D.75: l'affiliazione mirata permette di frequentare altri che aiuteranno a sentirsi più sicuri di sé — si scelgono amici e partner che valorizzano. È una strategia di protezione dell'autostima attraverso la selezione delle relazioni.", "9|Bandura|Agentività + autoefficacia + disimpegno morale": "D.111: Bandura — la spiegazione della condotta si articola in tre elementi: agentività umana (capacità di agire intenzionalmente), autoefficacia percepita (credere di essere in grado) e disimpegno morale (meccanismi per disattivare i propri standard morali).", "9|Bandura|Agentività = atti compiuti intenzionalmente": "D.112-113: l'agentività umana (human agency) è la facoltà di generare azioni mirate a determinati scopi in modo intenzionale. Si distingue dagli effetti non intenzionali delle proprie azioni: molte azioni producono conseguenze non previste.", "9|Bandura|Disimpegno morale: strategie per svincolarsi dalle norme": "D.115: il disimpegno morale è un insieme di strategie cognitive-sociali per svincolarsi dalle norme e dalla responsabilità morale — meccanismi mentali che disattivano i propri standard etici per giustificare comportamenti che altrimenti si disapproverebbero.", "9|Bandura|Giustificazione morale → ridefinizione della condotta": "D.116: la giustificazione morale ridefinisce la condotta — un comportamento immorale viene presentato come moralmente giusto perché serve a fini elevati. Classico esempio: \"la violenza è necessaria per difendere la patria\".", "9|Bandura|Attribuzione di colpa → rivalutazione vittima": "D.117: l'attribuzione di colpa provoca una rivalutazione della vittima — si afferma che la vittima ha provocato o meritato il danno, alleggerendo la responsabilità dell'aggressore. La vittima diventa \"colpevole della propria sventura\".", "9|Bandura|Minimizzazione delle conseguenze": "D.118: la minimizzazione delle conseguenze determina una distorsione nel rapporto causa-effetto — si nega o minimizza il danno causato (\"non era poi così grave\"). Rompe il nesso causale tra azione e conseguenze.", "9|Bandura|Scala del Disimpegno Morale = 32 item": "D.120: la Scala del Disimpegno Morale è composta da 32 item che misurano i diversi meccanismi di disimpegno. È lo strumento standardizzato per valutare la propensione agli 8 meccanismi individuati da Bandura.", "9|Bandura|Incoraggiare ammissione degli errori contrasta disimpegno": "D.317: incoraggiare l'ammissione degli errori aiuta a contrastare il disimpegno morale — chi riconosce i propri errori non può ricorrere ai meccanismi di giustificazione o attribuzione di colpa. È uno dei 10 passi di Zimbardo.", "10|Heider|'Psicologia Ingenua' (senso comune)": "D.121: Heider introduce il concetto di Psicologia Ingenua o del Senso Comune — la tendenza umana quotidiana a cercare le cause degli eventi e costruire una teoria implicita della realtà sociale. Agiamo come scienziati naif della vita quotidiana.", "10|Heider|Errore fondamentale di attribuzione (FAE)": "D.122/D.237: il FAE è il bias più importante — tendenza sistematica a sopravvalutare i fattori disposizionali (carattere, personalità) e sottovalutare i fattori situazionali nel spiegare il comportamento altrui. Esempio: \"è aggressivo per carattere\" invece di \"è frustrato per la situazione\".", "10|Heider|Attribuzione causale = individuare cause": "D.124: l'attribuzione causale è il processo mediante cui individuiamo le cause di azioni ed eventi. Tre elementi cardine: l'evento (cosa è successo), l'attore (chi ha agito), l'osservatore (chi interpreta). Molte analisi causali avvengono in modo implicito.", "10|Heider|Forze personali = potere + tentare": "D.130: le forze personali si compongono di potere (la capacità effettiva di compiere l'azione) e tentare (la motivazione/sforzo profuso). Sono in relazione moltiplicativa: se uno dei due è zero, l'effetto delle forze personali è zero.", "10|Weiner|Criteri: stabilità e controllabilità": "D.123: Weiner propone due criteri per classificare le cause di successi e fallimenti: stabilità (la causa è stabile o variabile nel tempo?) e controllabilità (è sotto il controllo della persona?). Incrociati con il locus (interno/esterno) formano una griglia classificatoria.", "10|Jones & Davis|Teoria dell'inferenza corrispondente": "D.126: Jones e Davis — dall'osservazione del comportamento altrui inferiamo le intenzioni e le disposizioni stabili dell'attore. Limite: la teoria si riferisce solo all'eteroattribuzione (spiegare il comportamento degli altri), non all'autoattribuzione.", "10|Jones & Davis|Si riferisce solo all'eteroattribuzione": "D.126: limite chiave della teoria — si applica solo all'eteroattribuzione (spiegare il comportamento degli ALTRI), non all'autoattribuzione. Le inferenze sulle intenzioni dipendono dalla libertà di scelta dell'attore (D.129).", "10|Jones & Davis|Inferenze sull'intenzione: libertà di scelta": "D.129: le inferenze sull'intenzione dell'attore riguardano la libertà di scelta — più l'azione è stata scelta liberamente, più ci dice qualcosa di stabile sulla persona. Un'azione forzata dalla situazione ci dice poco sul carattere.", "10|Rotter|Locus of control: interno ed esterno": "D.127: Rotter introduce il locus of control — tendenza a percepire i propri risultati come controllati internamente (proprie capacità e impegno) o esternamente (fortuna, destino, altri). Predice molti comportamenti e stati psicologici.", "10|Rotter|Locus esterno → tratti depressivi": "D.125: chi ha locus of control esterno tende a manifestare tratti depressivi — si sente impotente, senza controllo sulla propria vita, con ridotta motivazione al cambiamento. Il locus interno si associa a maggiore benessere e proattività.", "11|Lewin|Padre della teoria del campo": "D.139: Lewin è il padre della teoria del campo psicologico — il comportamento (C) è funzione della persona (P) e dell'ambiente (A) come sistema dinamico: C = S(PA). Approccio gestaltico che rifiuta le spiegazioni lineari in favore di un sistema di forze interagenti.", "11|Lewin|C = S(PA): comportamento = spazio di vita": "D.131-132: la formula di Lewin C = S(PA) — il Comportamento è funzione dello Spazio di vita, che dipende dalla Persona e dall'Ambiente. Lo spazio di vita è la realtà come percepita soggettivamente dall'individuo, non quella fisica oggettiva.", "11|Lewin|I dittatori inventano un nemico esterno": "D.244: Lewin afferma che è tipico dei dittatori \"inventare\" un nemico esterno per convogliare su di esso l'aggressività generata all'interno del gruppo che governano. Il nemico esterno è uno strumento politico di coesione interna.", "11|Markus & Zajonc|Euristiche = scorciatoie di pensiero": "D.133: le euristiche sono scorciatoie di pensiero — strategie cognitive rapide e automatiche che permettono di prendere decisioni veloci senza elaborare tutte le informazioni disponibili. Economiche cognitivamente ma producono errori sistematici.", "11|Markus & Zajonc|Euristica della rappresentatività": "D.134: l'euristica della rappresentatività valuta velocemente l'appartenenza a una categoria in base alla somiglianza al prototipo. Esempio: \"Steve sembra più un bibliotecario che un contadino\" → si stereotipa in base alla rappresentatività.", "11|Markus & Zajonc|Euristica della disponibilità → frequenza": "D.136: l'euristica della disponibilità valuta la frequenza — si stima la frequenza di eventi in base a quanto facilmente esempi vengono in mente. Ciò che è più disponibile mentalmente ci sembra più frequente (es. sovrastimiamo il rischio di incidenti aerei dopo notizie).", "11|Markus & Zajonc|Euristica della simulazione: scenari ipotetici": "D.135: l'euristica della simulazione serve per formulare ipotesi o immaginare scenari ipotetici sulle possibili evoluzioni di un evento — si simula mentalmente come sarebbe andata diversamente (pensiero controfattuale: \"se avessi...allora\").", "11|Markus & Zajonc|Effetto Primacy: prime informazioni guidano la percezione": "D.137: l'effetto Primacy — le prime informazioni ricevute guidano la percezione e la valutazione della personalità. La prima impressione organizza l'elaborazione delle informazioni successive, che vengono integrate nella cornice già formata.", "12|Moscovici|Ancoraggio e oggettivazione": "D.144: Moscovici individua i due processi generatori delle RS — ancoraggio (rendere familiare l'estraneo inserendolo in categorie esistenti) e oggettivazione (tradurre idee astratte in immagini concrete). Lo studio delle RS passa attraverso l'analisi di questi due processi.", "12|Moscovici|Le RS ricostruiscono la realtà": "D.148: le RS non costruiscono la realtà da zero ma la ricostruiscono — partono da fenomeni rilevanti già esistenti e riorganizzano ciò che è stato formulato da altri. Sono lenti attraverso cui reinterpretiamo il già noto.", "12|Moscovici|Sistema integrato di valori, nozioni e pratiche": "D.150: le RS sono un sistema integrato di valori, nozioni e pratiche — non solo conoscenze astratte ma orientamenti per l'azione quotidiana. Permettono ai membri di un gruppo di comportarsi e comunicare in modo comprensibile.", "12|Moscovici|L'oggettivazione evidenzia l'aspetto iconico": "D.147: l'oggettivazione evidenzia l'aspetto iconico di una categoria — traduce concetti astratti in immagini concrete. Esempio: la psicanalisi → immagine iconica del lettino del terapeuta. È il processo che rende visibile l'invisibile.", "12|Abric & Tafani|Metodo della messa in discussione": "D.142: il metodo della messa in discussione di Abric e Tafani — si chiede di immaginare l'oggetto della RS senza una delle sue caratteristiche e valutare se cambia fondamentalmente la rappresentazione. Se sì, quella caratteristica è nel nucleo centrale.", "12|Abric & Tafani|Nucleo centrale: funzione stabilizzatrice": "D.143: il nucleo centrale svolge la funzione stabilizzatrice — è il sistema di elementi condivisi, stabili e resistenti al cambiamento che conferisce identità e continuità alla RS. Senza il nucleo, la rappresentazione si disgrega.", "12|Abric & Tafani|Funzione generatrice: crea significati periferici": "D.145: la funzione generatrice del nucleo centrale crea o trasforma il significato degli altri elementi periferici della RS. È il nucleo che dà senso agli elementi periferici, non il contrario.", "12|Abric & Tafani|Elementi periferici = concretizzazioni del nucleo": "D.146: gli elementi periferici sono le concretizzazioni del significato astratto del nucleo centrale — più flessibili, legati al contesto individuale, proteggono il nucleo dall'impatto con la realtà. Possono variare senza disgregare la RS.", "12|Thomas & Znaniecki|Atteggiamenti = stato mentale verso un valore": "D.151: Thomas e Znaniecki — gli atteggiamenti sono processi mentali individuali che determinano le risposte di ogni essere umano al suo mondo sociale: uno stato mentale dell'individuo verso un valore.", "13|Fishbein & Ajzen|Teoria dell'azione ragionata": "D.156: Fishbein e Ajzen propongono la Teoria dell'Azione Ragionata — il comportamento è determinato dall'intenzione, che dipende dall'atteggiamento verso il comportamento (valutazione personale) e dalla norma soggettiva (aspettative altrui percepite).", "13|Allport|Atteggiamenti come stati inferibili": "D.157: Allport (1920) — gli atteggiamenti sono stati mentali di prontezza organizzati tramite l'esperienza, non osservabili direttamente ma inferibili dal comportamento. Sono variabili interveniente tra stimolo e risposta.", "13|LaPiere|Atteggiamenti = disposizioni mentali decontestualizzate": "D.155: LaPiere — gli atteggiamenti come disposizioni mentali decontestualizzate: valutazioni generali verso oggetti, senza considerare il contesto specifico. Il suo famoso studio dimostrò che atteggiamenti dichiarati e comportamenti reali spesso non corrispondono.", "13|Billig|Atteggiamenti e contesto strettamente legati": "D.160: Billig — atteggiamenti e contesto sono strettamente legati. Gli atteggiamenti non sono entità stabili nella mente ma vengono costruiti e espressi nelle pratiche discorsive, variando con il contesto interazionale.", "13|Thomas & Znaniecki|Atteggiamenti = stato mentale verso un valore": "D.151: Thomas e Znaniecki — gli atteggiamenti sono stati mentali dell'individuo verso un valore. Prima definizione sociologica degli atteggiamenti: qualsiasi realtà con contenuto empirico accessibile ai membri di un gruppo e con un significato.", "13|Thomas & Znaniecki|Due modi di interazione: situati e culturalmente connotati": "D.152: Thomas e Znaniecki identificano due modi di interazione degli atteggiamenti con il contesto: modi situati (legati alla situazione specifica) e modi connotati culturalmente (legati ai valori e norme culturali condivisi del gruppo).", "14|Allport|Teoria del contatto": "D.250: Allport (1954) propone l'ipotesi del contatto — il pregiudizio si riduce attraverso il contatto tra gruppi, ma solo in condizioni ottimali: parità di status, obiettivi comuni, cooperazione, supporto istituzionale. Senza queste condizioni il contatto può aumentare i pregiudizi.", "14|Allport|Pregiudizio pone la vittima in svantaggio": "D.383: l'effetto ultimo del pregiudizio è porre l'oggetto in una posizione di svantaggio non giustificata dalla sua condotta — la persona viene discriminata non per quello che ha fatto ma per il gruppo di appartenenza.", "14|Allport|Fasi del rifiuto: verbale → evitamento → sterminio": "D.383: Allport individua le fasi progressive del rifiuto dell'outgroup — rifiuto verbale (insulti, slur) → evitamento → segregazione → aggressione fisica → sterminio. Il pregiudizio può degenerare in violenza sistematica.", "14|Dollard & Miller|Teoria frustrazione-aggressività": "D.167/D.260: Dollard e Miller — la frustrazione (blocco di un obiettivo) produce sempre aggressività, e l'aggressività è sempre prodotta dalla frustrazione. Questa aggressività può spostarsi verso un capro espiatorio, spiegando il pregiudizio.", "14|Dollard & Miller|Frustrazione e aggressività: rapporto biunivoco": "D.260: per Dollard e Miller frustrazione e aggressività hanno un rapporto biunivoco — ogni frustrazione produce aggressività E ogni aggressività presuppone una frustrazione previa. Doppia implicazione.", "14|Krech|3 componenti del pregiudizio (cognitiva, affettiva, comportamentale)": "D.161-162: Krech e colleghi identificano 3 componenti del pregiudizio: cognitiva (stereotipi e credenze), affettiva (sentimenti di avversione), comportamentale (discriminazione e evitamento). La \"componente di ostilità\" NON è una delle tre nominate da Krech.", "14|Mazzara|Irrazionalità del pregiudizio: prospettiva psicodinamica": "D.163: Mazzara spiega l'irrazionalità del pregiudizio con una prospettiva psicodinamica — il pregiudizio è un meccanismo di difesa, una proiezione delle proprie angosce sull'outgroup. Questa base irrazionale lo rende molto resistente al cambiamento razionale.", "14|Anderson|'Benign bigotry': miti del pregiudizio sottile": "D.168-170: Anderson (2010) analizza i miti del pregiudizio sottile, etichettandolo come \"benign bigotry\" (fanatismo benevolo) — forme di pregiudizio che si nascondono dietro miti apparentemente positivi (es. \"le società multietniche funzionano\") ma che in realtà escludono.", "15|Lippmann|Primo a trattare gli stereotipi (1922)": "D.171: Walter Lippmann (1922) è il primo autore ad usare il termine \"stereotipo\" in senso psicologico nel saggio \"Opinione Pubblica\". Il termine viene dalla tipografia (stampo rigido che non cambia). Descrive come le preconcezioni determinino la percezione.", "15|Lippmann|Stereotipi: generalizzazioni per classificare gruppi": "D.174: Lippmann — gli stereotipi sono generalizzazioni, spesso improprie e insensate, utili a classificare vari gruppi sociali attribuendo a chiunque faccia parte di quella categoria le stesse identiche caratteristiche. È classificazione automatica.", "15|Tajfel|Stereotipo = processo cognitivo neutro, presente in tutti": "D.177: Tajfel — lo stereotipo è un processo cognitivo neutro, né positivo né negativo, presente in ciascun individuo. È il modo in cui la mente categorizza la realtà per renderla gestibile. Il problema non è lo stereotipo in sé ma il suo contenuto e le sue conseguenze.", "15|Tajfel|Accentuazione somiglianza intracategoriale": "D.234: effetto della categorizzazione di Tajfel — aumento della somiglianza percepita tra elementi della stessa categoria. I membri dell'outgroup ci sembrano \"tutti uguali\" anche quando non lo sono. È uno dei meccanismi alla base degli stereotipi distorcenti.", "15|Tajfel|Accentuazione differenza intercategoriale": "D.235: l'altro effetto della categorizzazione di Tajfel — percepiamo le differenze tra ingroup e outgroup come più grandi di quanto siano realmente. Insieme all'accentuazione intracategoriale produce distorsioni percettive sistematiche.", "15|Fiske & Neuberg|Modello del continuum: stereotipo → individuazione": "D.176: Fiske e Neuberg propongono il Modello del Continuum — i processi dalla categorizzazione automatica (stereotipizzazione) all'individuazione della persona specifica si dispongono lungo un continuum. Si usa più o meno stereotipo a seconda della motivazione e capacità di elaborare le informazioni.", "15|Bargh et al.|Priming a livello inconscio (1996)": "D.172: Bargh e colleghi (1996) studiano il priming inconscio — l'attivazione automatica di categorie stereotipate avviene al di sotto della soglia di consapevolezza. Esporre brevemente immagini di un gruppo influenzava i giudizi successivi senza consapevolezza da parte dei soggetti.", "15|Rudman & Borgida|2 gruppi: sperimentale e di controllo (1995)": "D.173: Rudman e Borgida (1995) suddividono il campione in 2 gruppi: sperimentale (esposto a materiale stereotipato) e di controllo. Dimostrano l'influenza dell'esposizione agli stereotipi sui giudizi successivi.", "16|Sherif|Primo ricercatore sull'influenza sociale": "D.182: Muzafer Sherif (1906-1988) è il primo a occuparsi della ricerca sui processi di influenza sociale. Usa l'effetto autocinetico (punto di luce immobile in stanza buia che sembra muoversi) per studiare come emergono le norme di giudizio in gruppo.", "16|Sherif|Effetto autocinetico: norma percettiva di gruppo": "D.184-185: nell'esperimento di Sherif con l'effetto autocinetico — i soggetti prima esprimono giudizi molto variabili individualmente, poi in gruppo convergono verso una norma condivisa. Conclusione: il contatto con gli altri influenza la percezione del singolo creando una norma percettiva.", "16|Sherif|Distanza da frustrazione-aggressività": "D.239: Sherif prende le distanze dagli studiosi della personalità e dalla scuola della frustrazione-aggressività per studiare le relazioni intergruppi empiricamente. Ha fondato le proprie teorie su ricerche svolte in campi estivi per ragazzi tra il 1948 e il 1952.", "16|Sherif|Ricerche nei campi estivi 1948-52": "D.240: le ricerche di Sherif nei campi estivi (1948-52) — divide i ragazzi in gruppi e osserva come si sviluppino conflitti e cooperazione intergruppi attraverso attività competitive e cooperative (esperimento di Robbers Cave). Fondamentali per la psicologia intergruppi.", "16|Asch|Conformismo in situazioni non ambigue": "D.183/D.298: Asch (1907-1996) indaga il conformismo in situazioni non ambigue — a differenza di Sherif, usa il giudizio di lunghezze di linee con risposta obiettivamente chiara. Nonostante la chiarezza, il 33% dei soggetti si conforma alle risposte errate della maggioranza.", "16|Asch|Situazione sperimentale chiara (linee)": "D.186: la situazione sperimentale di Asch è chiara e non ambigua: confronto di lunghezze di linee con risposta ovvia. I complici danno risposte palesemente errate. Molti si conformano nonostante l'evidenza oggettiva. È la chiave di differenza rispetto a Sherif.", "16|Asch|Il gruppo dà il messaggio alla persona": "D.187: la deduzione di Asch — la persona definisce il proprio comportamento e il suo giudizio tenendo conto del messaggio che il gruppo le dà su quella situazione. Il giudizio altrui diventa informazione sociale a cui si dà peso anche quando contraddice l'evidenza sensoriale.", "16|Asch|Campo reciprocamente condiviso": "D.208: il campo reciprocamente condiviso di Asch — le persone in interazione condividono uno spazio psicologico comune che rende possibile l'influenza reciproca. È la base della coesione sociale e dell'influenza normativa nel gruppo.", "16|Lewin, Lippit & White|Stili: autoritario, democratico, laissez-faire": "D.230: Lewin, Lippit e White (1939) classificano gli stili di leadership: autoritario (il leader decide tutto, impartisce ordini), democratico (decisioni prese con il gruppo, leader che facilita), laissez-faire (leadership permissiva — nominale ma non sostanziale).", "16|Moscovici|Distingue potere e influenza": "D.224: Moscovici distingue potere (capacità di imporre attraverso risorse e coercizione) da influenza (capacità di cambiare atteggiamenti e comportamenti senza coercizione). Le minoranze influenzano attraverso coerenza nel tempo, non attraverso potere formale.", "16|Moscovici|Influenza minoritaria: coerenza nel tempo": "D.224: Moscovici studia l'influenza minoritaria — le minoranze possono influenzare la maggioranza attraverso coerenza, certezza e persistenza nel tempo. La minoranza produce conversione (cambiamento privato profondo) anziché sola compliance (conformismo superficiale).", "17|Milgram|Scopo: quanto si spinge nell'infliggere punizioni": "D.194: lo scopo dell'esperimento di Milgram era verificare fino a che punto un essere umano si spinge nell'infliggere punizioni dolorose a un innocente per obbedienza all'autorità scientifica. Risultato sconvolgente: il 65% arriva alle scosse massime (450V).", "17|Milgram|Sesso dei soggetti è irrilevante": "D.195: in esperimenti successivi è stato dimostrato che il sesso dei soggetti è irrilevante — sia uomini che donne obbediscono allo stesso modo. L'obbedienza all'autorità non è un fenomeno di genere ma un meccanismo psicologico universale.", "17|Milgram|Incapacità di contrastare i desideri del 'capo'": "D.196: nella situazione di Milgram, tutto dipenderebbe dall'incapacità dei soggetti di contrastare i desideri del \"capo\" (lo sperimentatore) — la struttura gerarchica e l'autorità percepita inibiscono la capacità di resistenza individuale.", "17|Milgram|Reazione automatica all'autorità = scorciatoia": "D.197: la reazione automatica all'autorità è la tendenza inconsapevole a usare le informazioni di un'autorità riconosciuta come scorciatoia per decidere come comportarsi. È un'euristica: si delega la decisione a chi si considera esperto e legittimo.", "17|Milgram|Presenza fisica dell'autorità → più obbedienza": "D.198: la presenza fisica dell'autorità impatta significativamente — se il leader è fisicamente presente si obbedisce di più; se controlla qualcuno senza potere legittimo, si obbedisce meno. Prossimità e legittimità sono i due fattori chiave.", "17|Milgram|Libertà di scelta riduce l'intensità della scossa": "D.199: la libertà di scelta impatta — l'intensità della scossa somministrata diminuiva se al soggetto veniva lasciato libero di scegliere quale scossa somministrare. Il senso di responsabilità personale aumenta quando si ha potere di scelta.", "17|Milgram|Sostegno sociale → maggiore opposizione agli ordini": "D.200: il sostegno sociale impatta — se c'è sostegno sociale (altri che si ribellano), il soggetto riesce a fare una maggiore opposizione verso l'ordine impartitogli. La presenza di dissenso altrui legittima il proprio dissenso.", "17|Milgram|Stato eteronomico: assenza di autonomia": "D.269/290-291: nello stato eteronomico di Milgram i soggetti perdono la propria autonomia comportamentale — una condizione in cui si estinguono le caratteristiche intellettive in funzione della propagazione del pensiero dell'autorità. L'individuo percepisce il comportamento come non suo (eterodirezione, D.300).", "17|Milgram|Gente normale può rendersi complice di distruzione": "D.268: conclusione fondamentale di Milgram — \"gente normale può, da un momento all'altro, rendersi complice di un processo di distruzione\". Non servono persone patologicamente malvagie: basta un sistema autoritario che crea lo stato eteronomico.", "17|Milgram|Potere della situazione → atti antisociali": "D.299: Milgram afferma che il potere della situazione induce le persone a compiere atti antisociali — non è la personalità del singolo ma le forze situazionali (sistema, autorità, contesto) a produrre obbedienza distruttiva.", "17|Zimbardo|Esperimento carcerario di Stanford": "D.284-289: Zimbardo (1971) — 24 studenti sani assegnati casualmente ai ruoli di guardie e prigionieri in una prigione simulata. Dopo pochi giorni le guardie diventano sadiche e i prigionieri sviluppano crisi emotive. Interrotto al 6° giorno (previsto il 14°).", "17|Zimbardo|Abbigliamento = deindividuazione": "D.284: nell'esperimento di Stanford, l'abbigliamento — uniforme per le guardie, camice senza nome per i prigionieri — poneva entrambi i gruppi in una condizione di deindividuazione: l'identità individuale veniva soppressa a favore dell'identità di ruolo.", "17|Zimbardo|I soggetti dimenticarono la propria identità": "D.285-286: le persone di Stanford entrarono così profondamente nei ruoli da dimenticare le loro identità personali e il proprio senso di umanità. I soggetti assunsero così rapidamente i rispettivi ruoli da costringere i ricercatori a sospendere l'esperimento.", "17|Zimbardo|Ruolo istituzionale → adozione delle norme": "D.289: assumere un ruolo istituzionale induce ad assumere le norme e le regole dell'istituzione come unico valore guida — il ruolo diventa più potente della persona. Spiega gli abusi nelle istituzioni totali (carceri, ospedali psichiatrici).", "17|Zimbardo|Eterodirezione: comportamento percepito come non proprio": "D.300: l'eterodirezione — l'individuo percepisce il proprio comportamento come non suo, dettato dall'esterno dall'autorità. Meccanismo di deresponsabilizzazione centrale: «stavo solo seguendo gli ordini». Base psicologica dell'obbedienza distruttiva.", "18|Lewin|Gruppo: interdipendenza e totalità dinamica": "D.201: Lewin definisce il gruppo attraverso due concetti — interdipendenza (ogni membro modifica gli altri e a sua volta viene modificato) e totalità dinamica (la struttura del gruppo si modifica continuamente). Non è la somiglianza ma l'interdipendenza a definire il gruppo.", "18|Lewin|Dinamiche di gruppo: campo sociale": "D.201: Lewin introduce il termine «dinamiche di gruppo» — come la persona e il suo ambiente formano un campo psicologico, così il gruppo e il suo ambiente formano un campo sociale. Le forze all'interno di questo campo determinano i comportamenti dei membri.", "18|DeGrada|Alta gruppalità = sentimenti positivi tra membri": "D.202: De Grada definisce un gruppo come ad alta gruppalità se i componenti nutrono sentimenti positivi nei confronti degli altri membri — la coesione emotiva è il segno di un gruppo ben funzionante con forte identità collettiva.", "18|Pruitt & Kimmel|Dilemma del prigioniero": "D.204: il dilemma del prigioniero di Pruitt e Kimmel — due soggetti devono scegliere se cooperare o tradire senza conoscere la scelta dell'altro. Il risultato ottimale per entrambi è la cooperazione, ma la razionalità individuale spinge al tradimento. Modello base dei conflitti cooperazione/competizione.", "18|Campbell|Teoria del conflitto realistico": "D.209: Campbell propone la teoria del conflitto realistico di gruppo — i conflitti intergruppi nascono dalla competizione reale per risorse limitate (territorio, potere, risorse economiche). Non è solo un problema di percezione o pregiudizio, ma di interessi concreti in conflitto.", "18|Asch|Campo reciprocamente condiviso": "D.208: il campo reciprocamente condiviso di Asch — in un gruppo le persone condividono un campo psicologico comune che rende possibile l'influenza reciproca. È la base su cui si costruisce la norma di gruppo e il conformismo.", "18|Janis|Pensiero di gruppo: guardiani della mente": "D.210: Irving Janis descrive il groupthink (pensiero di gruppo) — in gruppi molto coesi la pressione alla conformità porta a decisioni irrazionali. Elemento caratteristico: i «guardiani della mente» (mindguards) proteggono il gruppo da informazioni che metterebbero in discussione le decisioni già prese.", "19|Bruner|Apprendimento = attività in comune (1984)": "D.214: Bruner (1984) — l'apprendimento è essenzialmente un'attività che si svolge in comune e coinvolge la costruzione sociale della conoscenza. Non si apprende da soli ma insieme agli altri, costruendo significati condivisi.", "19|Bruner|Costruzione sociale della conoscenza": "D.214: la costruzione sociale della conoscenza di Bruner — la conoscenza non è ricevuta passivamente ma costruita attivamente nell'interazione sociale. Il gruppo dei pari è il contesto privilegiato di questa costruzione condivisa.", "19|Damon|Verifica i principi del peer learning (1984)": "D.215: William Damon (1984) verifica empiricamente i principi del peer learning (apprendimento tra pari) — l'interazione tra coetanei produce apprendimento più efficace di quello adulto-bambino in certi contesti, perché la parità facilita il confronto cognitivo.", "19|Johnson et al.|Modello 'learning together' (1996)": "D.217: Johnson e colleghi (1996) elaborano il modello di apprendimento cooperativo \"learning together\" — basato su 5 elementi: interdipendenza positiva, interazione diretta costruttiva, abilità sociali, responsabilità individuale e valutazione del lavoro di gruppo.", "19|Johnson et al.|Interdipendenza positiva + interazione costruttiva": "D.217: nel modello «learning together» — interdipendenza positiva (il successo di uno dipende dal successo degli altri) e interazione diretta costruttiva (i membri si aiutano e si incoraggiano). Questi elementi distinguono la cooperazione dalla semplice coabitazione.", "19|Johnson et al.|Abilità sociali + responsabilità individuale": "D.217: nel modello «learning together» — abilità sociali (comunicazione, gestione dei conflitti) e responsabilità individuale (ognuno contribuisce e viene valutato individualmente). Senza responsabilità individuale si cade nel social loafing di Ringelmann.", "20|Lewin, Lippit & White|Stili: autoritario, democratico, laissez-faire": "D.230: Lewin, Lippit e White (1939) classificano gli stili di leadership: autoritario (il leader decide da solo), democratico (decisioni prese con il gruppo, leader che facilita), laissez-faire (leadership permissiva — nominale ma non sostanziale).", "20|Bales & Slater|Leader socio-emozionale": "D.228: Bales e Slater distinguono due tipi di leader nel piccolo gruppo: il leader orientato al compito (task leader) e il leader socio-emozionale — estremamente dotato di espressività emotiva — che si occupa del benessere relazionale del gruppo.", "20|Stogdill|Leader: fiducia in sé e forte senso d'identità": "D.223: gli studi di Stogdill sull'approccio dei tratti indicano che il leader deve mostrare fiducia in sé stesso e forte senso d'identità. Tuttavia, non esiste un profilo universale del leader efficace — il contesto è determinante.", "20|Moscovici|Distingue potere e influenza": "D.224: Moscovici distingue potere (capacità di imporre attraverso risorse e coercizione) da influenza (capacità di cambiare atteggiamenti e comportamenti senza coercizione). Il leader carismatico agisce sull'influenza più che sul potere formale.", "20|Fiedler|Modello della contingenza (punteggi LCP)": "D.222: Fiedler propone il modello della contingenza — l'efficacia del leader dipende dalla corrispondenza tra il suo stile (misurato con i punteggi LCP — Least Preferred Coworker) e le caratteristiche della situazione. Non esiste uno stile universalmente migliore.", "21|Tajfel|Docente Bristol: studi sui rapporti intergruppi": "D.231: Henri Tajfel (1919-1982), sopravvissuto ad Auschwitz e docente dell'Università di Bristol, concentrò i suoi studi sui rapporti intergruppi e sulla categorizzazione sociale. La sua esperienza della discriminazione lo spinse a studiare scientificamente questi meccanismi.", "21|Tajfel|Esperimento con 8 linee di diversa lunghezza": "D.232: esperimento di Tajfel e Wilkes (1963) — ai partecipanti venivano presentate 8 linee di diversa lunghezza. Chi riceveva gli stimoli nella condizione di «classificazione» (linee etichettate per categoria) mostrava accentuazione delle differenze tra categorie e somiglianze interne.", "21|Tajfel|Accentuazione somiglianza intracategoriale": "D.234: accentuazione della somiglianza intracategoriale — percepiamo i membri dello stesso gruppo come più simili tra loro di quanto siano realmente. L'outgroup ci sembra «tutto uguale». È uno dei meccanismi alla base degli stereotipi.", "21|Tajfel|Accentuazione differenza intercategoriale": "D.235: accentuazione della differenza intercategoriale — percepiamo le differenze tra ingroup e outgroup come più grandi di quanto siano realmente. Insieme all'accentuazione intracategoriale produce distorsioni percettive sistematiche.", "21|Tajfel|Favoritismo per il proprio gruppo": "D.236: favoritismo per il proprio gruppo (ingroup bias) — tendenza a favorire i comportamenti dell'ingroup e discriminare quelli dell'outgroup, anche quando la distinzione è arbitraria. È il cuore della Teoria dell'Identità Sociale.", "21|Tajfel|I conflitti sono una dimensione naturale": "D.373: Tajfel — i conflitti sono una dimensione naturale delle relazioni sociali: non sono patologie da eliminare ma espressione normale della differenziazione tra gruppi e della difesa dell'identità sociale.", "21|Tajfel|Continuum interpersonale/intergruppi → identità": "D.374-375: Tajfel propone un continuum — a un estremo il comportamento interpersonale (guidato da caratteristiche individuali), all'altro il comportamento intergruppi (guidato dall'appartenenza categoriale). Il meccanismo che collega i due estremi è l'identità.", "21|Turner|Senso del Noi = gruppo psicologico": "D.376: Turner — il senso del «Noi» e lo spirito di solidarietà indicano la formazione di un gruppo psicologico. Quando le persone si percepiscono come «noi» contrapposti a «loro», si è formata un'identità collettiva condivisa.", "21|Allport|Ipotesi del contatto": "D.250: Allport formula l'ipotesi del contatto — il pregiudizio si riduce attraverso il contatto tra gruppi in condizioni ottimali: parità di status, obiettivi comuni, cooperazione, supporto istituzionale.", "22|Freud|Bisogno di un nemico fuori dal gruppo": "D.243: Freud — necessità di individuare un nemico al di fuori del proprio gruppo perché questo sia libero da conflitti interni. L'aggressività interna viene proiettata verso l'esterno attraverso il meccanismo del capro espiatorio.", "22|Freud|Aggressività: tensione eros vs thanatos": "D.253: per Freud l'aggressività è inevitabile perché deriva dalla tensione strutturale tra eros (pulsione di vita, costruzione) e thanatos (pulsione di morte, distruzione). Queste due forze sono in perenne conflitto.", "22|Freud|Relazioni sociali = frustrazione civile": "D.254: per Freud le relazioni sociali sono dominate da una frustrazione civile — la civiltà richiede la rinuncia alle pulsioni, producendo una frustrazione strutturale alla base dei conflitti sociali.", "22|Lewin|I dittatori inventano un nemico esterno": "D.244: Lewin afferma che è tipico dei dittatori «inventare» un nemico esterno per convogliare su di esso l'aggressività generata all'interno del gruppo che governano. Il nemico esterno è uno strumento politico di coesione interna.", "22|Lewin|Convegliano l'aggressività interna verso l'esterno": "D.244: il meccanismo di Lewin — i dittatori creano o amplificano un nemico esterno per deviare l'aggressività interna del gruppo verso quel bersaglio, evitando che si rivolga contro il leader o il gruppo stesso.", "22|Allport|Ipotesi/teoria del contatto": "D.250: Allport — per ridurre il pregiudizio è necessario il contatto tra gruppi in condizioni di parità di status, obiettivi comuni, cooperazione e supporto istituzionale. Senza queste condizioni il contatto può rafforzare i pregiudizi.", "22|Tajfel|Conflitti = dimensione naturale": "D.373: Tajfel — i conflitti intergruppi sono una dimensione naturale delle relazioni sociali: emergono dalla differenziazione tra gruppi e dalla difesa dell'identità sociale. Non sono anomalie ma componenti strutturali della vita sociale.", "22|Sherif|La sconfitta non rafforza sempre la solidarietà intra-gruppo": "D.239-240: Sherif mostra che la competizione tra gruppi non rafforza sempre la solidarietà intra-gruppo — la sconfitta nel gioco competitivo portava a conflitti interni nel gruppo perdente. La solidarietà interna aumenta con certi tipi di conflitto intergruppi.", "22|Sherif|Ricerche nei campi estivi": "D.240: le ricerche di Sherif nei campi estivi (1948-52) — divide i ragazzi in gruppi, crea competizione per risorse scarse generando conflitti violenti, poi introduce obiettivi sovraordinati (che richiedono cooperazione) per ridurre i conflitti.", "23|Berkowitz|Tutti i sentimenti negativi possono indurre aggressività": "D.261: Berkowitz allarga il modello frustrazione-aggressività — non solo la frustrazione ma tutti i sentimenti negativi possono indurre aggressività, perché è una delle varianti di risposte possibili agli stati emotivi negativi.", "23|Berkowitz|Aggressività predomina con stimoli associati a connotazione negativa": "D.262: per Berkowitz, l'aggressività diventa la risposta predominante solo se si presentano stimoli a cui la persona ha già precedentemente associato una connotazione negativa (cue aggressivi). La sola frustrazione non basta.", "23|Berkowitz|Esperimento del fucile/racchetta": "D.263: nell'esperimento di Berkowitz — i soggetti frustrati somministravano più scosse quando sul tavolo era presente un fucile (stimolo aggressivo cue) rispetto a quando c'era una racchetta (stimolo neutro). I cue aggressivi amplificano la risposta aggressiva.", "23|Berkowitz|Dolore fisico → più aggressività (acqua gelata)": "D.281: Berkowitz — gli studenti che avevano avvertito dolore immergendo una mano nell'acqua gelata mostravano più comportamenti aggressivi verso un collega. Il dolore fisico attiva stati emotivi negativi che aumentano la propensione all'aggressività.", "23|Dollard & Miller|Teoria frustrazione-aggressività": "D.167/D.260: Dollard e Miller — la frustrazione (blocco di un obiettivo) produce sempre aggressività, e l'aggressività è sempre prodotta dalla frustrazione. Rapporto biunivoco. Questa aggressività può spostarsi verso un capro espiatorio.", "23|Dollard & Miller|Rapporto biunivoco frustrazione-aggressività": "D.260: per Dollard e Miller, frustrazione e aggressività hanno un rapporto biunivoco — ogni frustrazione produce aggressività E ogni aggressività presuppone una frustrazione previa. Doppia implicazione, non solo associazione.", "23|Le Bon|Prima teoria della deindividuazione": "D.282: Le Bon è il primo a elaborare la teoria della deindividuazione — nella folla le persone perdono l'identità personale, il senso critico e la responsabilità morale, venendo dominate da una mentalità collettiva primitiva.", "23|Le Bon|Suggestione come ipnosi collettiva": "D.265: Le Bon spiega il comportamento della folla con la suggestione — una sorta di ipnosi collettiva che si trasmette tra i membri, inibendo il pensiero razionale e amplificando le reazioni emotive primitive.", "23|Le Bon|Perdita controllo razionale nella folla": "D.283: Le Bon — le persone sono capaci di razionalità ma perdono il controllo di questa capacità quando si trovano a far parte della folla. La suggestione collettiva sopprime il pensiero critico individuale.", "23|Tarde|Imitazione = principio base del comportamento sociale nei grandi gruppi": "D.264: Gabriel Tarde — l'imitazione è il principio alla base del comportamento sociale, soprattutto nei grandi gruppi. Le persone si imitano reciprocamente. Anticipò il concetto di contagio sociale.", "23|Hobbes|Ontologia deterministica e materialistica": "D.251: Hobbes — ontologia deterministica e materialistica: l'essere umano è fondamentalmente egoista e aggressivo («homo homini lupus»). Senza il controllo dello Stato vivrebbe in guerra di tutti contro tutti.", "23|Rousseau|La società corrompe l'uomo": "D.252: Rousseau sostiene la posizione opposta a Hobbes — l'essere umano è naturalmente buono («buon selvaggio»), ed è la società a corrompere l'uomo con le sue istituzioni, disuguaglianze e condizionamenti.", "23|Lombroso|Teoria della 'degenerazione'": "D.258: Lombroso — teoria della degenerazione: il criminale è un individuo biologicamente inferiore, atavicamente regredito, riconoscibile da caratteristiche fisiche. Oggi completamente superata ma ebbe enorme influenza nel XIX secolo.", "23|Schneider|Classificazione della Personalità Psicopatica": "D.259: Schneider fornisce una classificazione della Personalità Psicopatica — individui che soffrono per la propria anomalia di personalità o fanno soffrire la società per essa.", "24|Berkowitz|Stimoli cue aggressivi + frustrazione previa → aggressività": "D.263: Berkowitz — la sola presenza di stimoli aggressivi non basta: è necessaria una precedente attivazione emotiva negativa (frustrazione, dolore) affinché il cue aggressivo attivi la risposta aggressiva. Due condizioni insieme.", "24|Milgram|Gente normale complice di distruzione": "D.268: Milgram — «gente normale può, da un momento all'altro, rendersi complice di un processo di distruzione». Non servono persone malvagie: basta un sistema autoritario che crea lo stato eteronomico.", "24|Milgram|Stato eteronomico": "D.269: nello stato eteronomico i soggetti perdono la propria autonomia comportamentale e si percepiscono come strumenti dell'autorità. Il comportamento non è più sentito come proprio — questo allevia il senso di responsabilità personale.", "24|Le Bon|Teoria della deindividuazione": "D.282-283: Le Bon formula la prima teoria della deindividuazione — nella folla le persone perdono identità personale, senso critico e responsabilità morale, venendo dominate dalla suggestione collettiva come una sorta di ipnosi.", "24|Zimbardo|Esperimento carcerario: i soggetti dimenticarono la propria identità": "D.286: nell'esperimento di Stanford le persone entrarono così profondamente nei ruoli da dimenticare le loro identità personali e il proprio senso di umanità. La situazione aveva più potere della personalità individuale.", "24|Zimbardo|Deindividuazione indebolisce i processi inibitori": "D.288-289: la deindividuazione indebolisce i processi che inibiscono l'espressione di comportamenti distruttivi — quando ci si sente anonimi nel gruppo, i freni normativi e morali si abbassano. Spiega la violenza collettiva e degli abusi istituzionali.", "25|Olweus|Principale esponente degli studi sul bullismo": "D.271: Dan Olweus è il principale esponente degli studi sul bullismo internazionale. Ha condotto i primi studi sistematici nei paesi scandinavi negli anni '70, dopo le reazioni pubbliche al suicidio di studenti vittime di prepotenze.", "25|Olweus|Bullismo = esposizione ripetuta ad azioni offensive": "D.271/D.277: Olweus definisce il bullismo come l'esposizione ripetuta nel corso del tempo ad azioni offensive da parte di uno o più compagni. I tre elementi chiave: intenzionalità, ripetizione nel tempo e squilibrio di potere. La ripetitività è sempre presente nel bullo.", "25|Olweus|Vittima può essere sottomessa": "D.279: Olweus distingue la vittima passiva/sottomessa (ansiosa, insicura, con scarsa autostima, non reagisce alle provocazioni) dalla vittima provocatrice (che presenta sintomi sia ansiosi che aggressivi, D.275). La vittima passiva è il tipo più comune.", "25|Olweus|Tutte le ripetività sempre presente nel bullo": "D.277: tra i tratti sempre presenti nei comportamenti del bullo vi è la ripetitività — il bullismo non è un episodio isolato ma un pattern sistematico di comportamenti oppressivi ripetuti nel tempo verso la stessa vittima.", "25|Fonzi|Le bulle prediligono calunnie e ricatti": "D.278: Fonzi evidenzia che le bulle (bullismo femminile) prediligono forme indirette di aggressività: calunnie, ricatti, esclusione sociale, diffusione di voci false. Il bullismo femminile è spesso più nascosto rispetto a quello maschile (più fisico e diretto).", "25|Farrington|Definizione completa di bullismo (1991)": "D.271: Farrington (1991) — bullismo come oppressione psicologica o fisica, ripetuta e continuata nel tempo, perpetuata da una persona o gruppo più potente nei confronti di un'altra percepita come più debole. Tre elementi: oppressione, ripetizione, squilibrio di potere.", "25|Farrington|Oppressione ripetuta da chi è più potente verso il più debole": "D.271: la definizione di Farrington sottolinea tre elementi strutturali del bullismo: oppressione (non semplice conflitto), ripetizione nel tempo (non episodio isolato), squilibrio di potere (il bullo è percepito come più forte). Tutti e tre insieme definiscono il fenomeno.", "26|Le Bon|Prima teoria della deindividuazione": "D.282: Le Bon (1841-1931) elabora per primo la teoria della deindividuazione — nella folla le persone perdono l'identità personale, il senso critico e la responsabilità morale, venendo dominate da una mentalità collettiva primitiva.", "26|Le Bon|Perdita dell'identità personale nella folla": "D.283/D.287: nella folla Le Bon osserva una riduzione del senso di individualità e di responsabilità personale. L'individuo si fonde nella massa e perde i tratti che lo definiscono come tale — identità e comunità.", "26|Le Bon|Suggestione = sorta di ipnosi collettiva": "D.265: Le Bon spiega la folla con la suggestione — una sorta di ipnosi collettiva che si trasmette tra i membri, inibendo il pensiero razionale e amplificando le reazioni emotive primitive. È il meccanismo base della deindividuazione.", "26|Zimbardo|Esperimento carcerario di Stanford": "D.284-289: Zimbardo (1971) — la potenza della deindividuazione istituzionale: studenti normali assegnati casualmente al ruolo di guardie mostravano comportamenti sadici in pochi giorni. Il ruolo e il contesto avevano più potere della personalità individuale.", "26|Zimbardo|Abbigliamento = condizione di deindividuazione": "D.284: nell'esperimento di Stanford l'abbigliamento — uniforme per le guardie, camice senza nome per i prigionieri — poneva entrambi i gruppi in una condizione di deindividuazione: l'identità individuale veniva soppressa a favore dell'identità di ruolo.", "26|Zimbardo|Soggetti dimenticarono identità personali": "D.285-286: i soggetti di Stanford assunsero così profondamente i propri ruoli da dimenticare le loro identità personali e il proprio senso di umanità, costringendo i ricercatori a interrompere l'esperimento prima del previsto.", "26|Zimbardo|Ruolo istituzionale → adozione delle norme dell'istituzione": "D.289: assumere un ruolo istituzionale di controllo induce ad assumere le norme e le regole dell'istituzione come unico valore guida — il ruolo diventa più potente della persona che lo ricopre. Spiega gli abusi nelle istituzioni totali.", "26|Festinger et al.|Deindividuazione = ridotto senso di individualità e responsabilità": "D.287: Festinger, Pepitone e Newcomb modernizzano il concetto di Le Bon — la deindividuazione è una sensazione psicologica caratterizzata dalla riduzione del senso di individualità e di responsabilità personale provata da chi si sente anonimo in una situazione di gruppo.", "26|Festinger et al.|Indebolisce i processi inibitori verso i comportamenti distruttivi": "D.288: la deindividuazione indebolisce i processi che inibiscono l'espressione di comportamenti distruttivi — quando ci si sente anonimi nel gruppo, i freni normativi e morali si abbassano. Spiega la violenza collettiva e il vandalismo di massa.", "27|Zimbardo|Effetto Lucifero = errore di attribuzione": "D.292: l'Effetto Lucifero di Zimbardo si fonda sull'errore fondamentale di attribuzione (Heider) — la tendenza a spiegare il male attribuendolo alla personalità cattiva degli individui invece che alle forze situazionali. Zimbardo ribalta questa prospettiva con il situazionismo.", "27|Zimbardo|Sistema politico/economico con forti ideologie": "D.294: il sistema sociale in cui si genera l'Effetto Lucifero deve avere forti ideologie — il contesto ideologico fornisce la giustificazione morale per comportamenti altrimenti inaccettabili. Le istituzioni con forte ideologia facilitano il disimpegno morale collettivo.", "27|Zimbardo|10 passi per costruire resistenza all'influenza": "D.319: Zimbardo propone un programma di 10 passi per costruire la resistenza all'influenza sociale non desiderata e promuovere la resilienza personale e la virtù civica — tra cui: riconoscere i propri errori, non sacrificare le libertà per la sicurezza, evitare situazioni totalizzanti.", "27|Zimbardo|Non sacrificare libertà personali per sicurezza astratta": "D.320: uno dei 10 passi di Zimbardo — non sacrificare mai le libertà personali di base per la promessa di una sicurezza, perché i sacrifici sono reali e immediati, mentre la sicurezza promessa è un concetto astratto, un'illusione distante.", "27|Milgram|Studi sull'obbedienza all'autorità": "D.293: gli studi sull'obbedienza all'autorità sono stati condotti da Milgram — dimostrano che la maggioranza delle persone normali obbedisce agli ordini di un'autorità anche quando ciò comporta infliggere dolore a innocenti. Sono la base empirica dell'Effetto Lucifero.", "27|Milgram|Eterodirezione: comportamento percepito come non proprio": "D.300: l'eterodirezione — l'individuo percepisce il proprio comportamento come non suo, dettato dall'esterno dall'autorità. Meccanismo di deresponsabilizzazione centrale: «stavo solo seguendo gli ordini». Usato anche dai criminali di guerra come giustificazione.", "27|Heider|Errore fondamentale di attribuzione (FAE) alla base": "D.292: l'Effetto Lucifero si fonda sull'errore fondamentale di attribuzione di Heider — tendiamo a spiegare i comportamenti cattivi con la natura malvagia delle persone (disposizionismo), ignorando il potere delle forze situazionali. Zimbardo dimostra il contrario.", "27|Arendt|Assenza di responsabilità = incapacità di elaborare il proprio agire": "D.454: Arendt — l'assenza di responsabilità riguarda l'incapacità di elaborare il significato del proprio agire. Eichmann non era un mostro ma qualcuno che aveva smesso di pensare — la «banalità del male». Chiunque smetta di riflettere criticamente può diventare complice del male.", "27|Simon|Gli stati mentali per atti crudeli evolvono da processi psicologici comuni": "D.458: Simon — gli stati mentali che permettono di compiere atti crudeli evolvono da processi psicologici comuni a tutti. Tutti noi abbiamo un lato oscuro più o meno sopito. Non servono disturbi mentali speciali.", "28|Latané & Darley|Primo esperimento sul comportamento prosociale": "D.301: Latané e Darley (1968) — uno dei primi esperimenti sistematici sul comportamento prosociale. La probabilità di intervenire in caso di emergenza (attacco epilettico simulato) diminuisce al crescere del numero di testimoni presenti.", "28|Latané & Darley|Probabilità di aiutare dipende dalla situazione": "D.302: Latané e Darley — la probabilità di attuare comportamenti altruistici dipende anche da fattori relativi alla situazione: numero di testimoni, ambiguità dell'emergenza, responsabilità percepita. Non è solo una questione di personalità.", "28|Latané & Darley|Diffusione della responsabilità": "D.303: Latané e Darley spiegano i risultati con la diffusione della responsabilità — più persone sono presenti, meno ciascuna si sente responsabile di intervenire (\"lo farà qualcun altro\"). Il fattore più predittivo del comportamento prosociale è la percezione della propria efficacia (D.304).", "28|Hoffman|Ruolo dell'empatia nel comportamento prosociale": "D.305: Hoffman ha cercato di dare una spiegazione al comportamento prosociale a partire dal ruolo che in esso gioca l'empatia — è la capacità di immedesimarsi negli stati emotivi altrui il motore principale del comportamento d'aiuto genuinamente altruistico.", "28|Hoffman|Empatia = fattore motivante separante altruismo da prosocialità": "D.314: il fattore motivante che separa il comportamento prosociale dall'altruismo è proprio l'empatia. Il comportamento prosociale può avere motivazioni miste (egoismo incluso), mentre l'altruismo genuino è guidato esclusivamente dall'empatia verso l'altro.", "28|Cialdini et al.|Comportamenti prosociali = motivazione fondamentalmente egoistica": "D.307: Cialdini e colleghi — i comportamenti prosociali deriverebbero da una motivazione fondamentalmente egoistica: aiutiamo gli altri perché ci fa sentire bene, riduce il nostro senso di colpa o migliora la nostra immagine sociale.", "29|Zimbardo|10 passi per costruire resistenza all'influenza sociale": "D.319: Zimbardo ha messo a punto un programma di 10 passi per costruire la resistenza all'impatto dell'influenza sociale non desiderata e promuovere la resilienza personale e la virtù civica — tra cui pensiero critico, assertività, rifiuto di sacrificare libertà.", "29|Zimbardo|Non sacrificare libertà personali per sicurezza astratta": "D.320: Zimbardo — non sacrificare mai le libertà personali di base per la promessa di una sicurezza, perché i sacrifici sono reali e immediati, mentre la sicurezza è un concetto astratto, un'illusione distante. Un principio cardine contro l'influenza autoritaria.", "29|Zimbardo|Evitare situazioni totalizzanti (perdita del supporto sociale)": "D.318: uno dei 10 passi di Zimbardo — evitare le situazioni totalizzanti dove si rischia di perdere il contatto con il proprio supporto sociale e con la propria rete di informazioni. L'isolamento da reti di supporto rende vulnerabili all'influenza non desiderata.", "29|Milgram|Insegnare ai bambini a disobbedire all'autorità ingiusta": "D.315: insegnare ai bambini a disubbidire all'autorità ingiusta è possibile supportando in loro lo sviluppo delle abilità di pensiero critic
